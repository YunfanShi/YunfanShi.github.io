<!DOCTYPE html>
<html>
<head>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0a0a0f;--surf:#12121a;--surf2:#1a1a26;--surf3:#22223a;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.16);
  --text:#f0f0ff;--text2:rgba(240,240,255,0.55);--text3:rgba(240,240,255,0.25);
  --blue:#4a9eff;--blue-dim:rgba(74,158,255,0.15);
  --green:#30d158;--green-dim:rgba(48,209,88,0.15);
  --orange:#ff9f0a;--orange-dim:rgba(255,159,10,0.15);
  --red:#ff453a;--red-dim:rgba(255,69,58,0.15);
  --purple:#bf5af2;--purple-dim:rgba(191,90,242,0.15);
  --teal:#5ac8fa;--teal-dim:rgba(90,200,250,0.15);
  --r:20px;--r-sm:12px;--r-xs:8px;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:600px;overflow:hidden;user-select:none;}

.root{display:flex;flex-direction:column;height:600px;}

/* TOPBAR */
.topbar{height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:rgba(10,10,15,0.95);backdrop-filter:blur(24px);border-bottom:0.5px solid var(--border);flex-shrink:0;}
.brand{font-size:15px;font-weight:600;letter-spacing:-0.3px;color:var(--text);}
.brand span{color:var(--blue);}
.topbar-actions{display:flex;gap:8px;align-items:center;}
.tb-btn{background:var(--surf2);border:0.5px solid var(--border);border-radius:var(--r-xs);padding:6px 12px;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;transition:all 0.2s cubic-bezier(0.34,1.56,0.64,1);}
.tb-btn:hover{background:var(--surf3);color:var(--text);border-color:var(--border2);}
.tb-btn.active{background:var(--blue-dim);color:var(--blue);border-color:rgba(74,158,255,0.4);}
.tb-btn:active{transform:scale(0.96);}

/* LAYOUT SWITCHER */
.layout-switcher{display:flex;gap:4px;background:var(--surf);border:0.5px solid var(--border);border-radius:var(--r-xs);padding:3px;}
.layout-btn{width:28px;height:22px;border:none;background:transparent;border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.18s ease;}
.layout-btn:hover{background:var(--surf2);}
.layout-btn.on{background:var(--surf3);}
.layout-icon{display:flex;gap:2px;}
.layout-icon .b{background:var(--text3);border-radius:1px;transition:background 0.15s;}
.layout-btn.on .b{background:var(--text2);}

/* TIMER ARENA */
.arena{flex:1;display:flex;overflow:hidden;position:relative;}
.timer-slot{flex:1;display:flex;flex-direction:column;position:relative;transition:flex 0.4s cubic-bezier(0.4,0,0.2,1),opacity 0.3s ease;}
.timer-slot.split-right{border-left:0.5px solid var(--border);}
.timer-slot.collapsed{flex:0;overflow:hidden;opacity:0;pointer-events:none;}

/* RING */
.ring-wrap{position:relative;display:flex;align-items:center;justify-content:center;}
.ring-svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:rgba(255,255,255,0.07);stroke-linecap:round;}
.ring-fill{fill:none;stroke-linecap:round;transition:stroke-dasharray 0.8s cubic-bezier(0.4,0,0.2,1),stroke 0.4s ease;}
.ring-pulse{fill:none;stroke-linecap:round;opacity:0;}

/* INNER DISPLAY */
.timer-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;}
.t-time{font-size:clamp(28px,7vw,64px);font-weight:300;letter-spacing:-3px;font-variant-numeric:tabular-nums;line-height:1;transition:color 0.4s ease;}
.t-label{font-size:11px;font-weight:500;color:var(--text3);letter-spacing:0.8px;text-transform:uppercase;margin-top:4px;}
.t-prog-text{font-size:12px;color:var(--text3);font-variant-numeric:tabular-nums;}

/* TIMER CARD LAYOUT */
.timer-card{display:flex;flex-direction:column;align-items:center;padding:20px 16px;height:100%;gap:12px;overflow-y:auto;}
.timer-header{display:flex;align-items:center;justify-content:space-between;width:100%;padding:0 4px;}
.timer-subj{display:flex;align-items:center;gap:8px;}
.subj-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.subj-name{font-size:13px;font-weight:600;letter-spacing:-0.2px;}
.subj-paper{font-size:11px;color:var(--text3);}
.timer-actions-top{display:flex;gap:6px;}
.icon-btn{width:30px;height:30px;border-radius:var(--r-xs);border:0.5px solid var(--border);background:var(--surf2);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all 0.18s ease;}
.icon-btn:hover{background:var(--surf3);color:var(--text);border-color:var(--border2);}
.icon-btn:active{transform:scale(0.92);}
.icon-btn.danger:hover{background:var(--red-dim);color:var(--red);border-color:rgba(255,69,58,0.4);}
.icon-btn.active-state{background:var(--orange-dim);color:var(--orange);border-color:rgba(255,159,10,0.4);}

/* CONTROLS */
.controls{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;}
.ctrl-btn{border:0.5px solid var(--border2);background:var(--surf2);color:var(--text);border-radius:50px;cursor:pointer;font-size:13px;font-weight:500;transition:all 0.22s cubic-bezier(0.34,1.56,0.64,1);display:flex;align-items:center;justify-content:center;}
.ctrl-btn:hover{background:var(--surf3);border-color:var(--border2);}
.ctrl-btn:active{transform:scale(0.92);}
.ctrl-play{width:52px;height:52px;font-size:18px;background:var(--blue);border-color:transparent;color:#fff;}
.ctrl-play:hover{background:#5baeff;border-color:transparent;}
.ctrl-play.is-running{background:var(--orange);color:#fff;}
.ctrl-play.is-running:hover{background:#ffb030;}
.ctrl-sm{width:36px;height:36px;font-size:14px;}

/* QUICK PRESETS */
.presets-section{width:100%;}
.presets-label{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:0.8px;text-transform:uppercase;margin-bottom:8px;padding:0 2px;}
.presets-grid{display:flex;flex-wrap:wrap;gap:6px;}
.preset-chip{padding:6px 12px;border-radius:50px;border:0.5px solid var(--border);background:var(--surf2);color:var(--text2);font-size:11px;font-weight:500;cursor:pointer;transition:all 0.2s cubic-bezier(0.34,1.56,0.64,1);}
.preset-chip:hover{border-color:var(--border2);color:var(--text);background:var(--surf3);}
.preset-chip:active{transform:scale(0.94);}
.preset-chip.active-p{color:var(--blue);border-color:rgba(74,158,255,0.5);background:var(--blue-dim);}

/* STATUS BAR */
.status-row{display:flex;align-items:center;justify-content:center;gap:8px;font-size:11px;color:var(--text3);width:100%;}
.status-dot{width:5px;height:5px;border-radius:50%;background:var(--text3);}
.status-dot.running{background:var(--green);animation:pulse-dot 1.4s ease infinite;}
.status-dot.paused{background:var(--orange);}
.status-dot.done{background:var(--green);}
@keyframes pulse-dot{0%,100%{opacity:1;}50%{opacity:0.4;}}

/* ADD TIMER PANEL */
.add-panel{padding:20px;height:100%;display:flex;flex-direction:column;gap:16px;overflow-y:auto;}
.panel-title{font-size:16px;font-weight:600;letter-spacing:-0.3px;color:var(--text);}
.form-group{display:flex;flex-direction:column;gap:6px;}
.form-label{font-size:11px;font-weight:500;color:var(--text3);letter-spacing:0.6px;text-transform:uppercase;}
.form-input{background:var(--surf2);border:0.5px solid var(--border);border-radius:var(--r-xs);padding:9px 12px;font-size:13px;color:var(--text);outline:none;transition:border-color 0.18s ease;}
.form-input:focus{border-color:rgba(74,158,255,0.5);}
.form-select{background:var(--surf2);border:0.5px solid var(--border);border-radius:var(--r-xs);padding:9px 12px;font-size:13px;color:var(--text);outline:none;transition:border-color 0.18s ease;appearance:none;cursor:pointer;}
.form-select:focus{border-color:rgba(74,158,255,0.5);}
.color-row{display:flex;gap:8px;flex-wrap:wrap;}
.color-dot{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all 0.18s cubic-bezier(0.34,1.56,0.64,1);}
.color-dot.sel{border-color:#fff;transform:scale(1.2);}
.btn-primary{background:var(--blue);color:#fff;border:none;border-radius:50px;padding:10px 24px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.22s cubic-bezier(0.34,1.56,0.64,1);}
.btn-primary:hover{background:#5baeff;}
.btn-primary:active{transform:scale(0.96);}
.btn-secondary{background:var(--surf2);color:var(--text2);border:0.5px solid var(--border);border-radius:50px;padding:10px 20px;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.2s ease;}
.btn-secondary:hover{background:var(--surf3);color:var(--text);}

/* HISTORY */
.hist-list{display:flex;flex-direction:column;gap:6px;}
.hist-item{background:var(--surf2);border:0.5px solid var(--border);border-radius:var(--r-xs);padding:10px 12px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all 0.18s ease;}
.hist-item:hover{background:var(--surf3);border-color:var(--border2);}
.hist-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.hist-info{flex:1;min-width:0;}
.hist-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hist-meta{font-size:10px;color:var(--text3);margin-top:2px;}
.hist-time{font-size:12px;font-weight:600;font-variant-numeric:tabular-nums;color:var(--text2);}
.hist-resume-btn{font-size:10px;padding:4px 8px;border-radius:20px;background:var(--blue-dim);color:var(--blue);border:0.5px solid rgba(74,158,255,0.4);cursor:pointer;transition:all 0.15s ease;white-space:nowrap;}
.hist-resume-btn:hover{background:rgba(74,158,255,0.25);}

/* EMPTY STATE */
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--text3);text-align:center;padding:32px;}
.empty-ico{width:56px;height:56px;border-radius:50%;background:var(--surf2);border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:22px;}
.empty-title{font-size:15px;font-weight:500;color:var(--text2);}
.empty-desc{font-size:12px;line-height:1.6;}

/* SIDE DRAWER */
.drawer{position:absolute;right:0;top:0;bottom:0;width:280px;background:var(--surf);border-left:0.5px solid var(--border);transform:translateX(100%);transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);z-index:50;display:flex;flex-direction:column;overflow:hidden;}
.drawer.open{transform:translateX(0);}
.drawer-hd{padding:16px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--border);}
.drawer-title{font-size:14px;font-weight:600;}
.drawer-body{flex:1;overflow-y:auto;padding:12px;}

/* TOAST */
.toast{position:absolute;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:rgba(30,30,46,0.95);border:0.5px solid var(--border2);color:var(--text);font-size:12px;font-weight:500;padding:9px 18px;border-radius:50px;backdrop-filter:blur(20px);transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);z-index:100;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* FULLSCREEN OVERLAY */
.fs-overlay{position:fixed;inset:0;background:var(--bg);z-index:999;display:none;flex-direction:column;align-items:center;justify-content:center;}
.fs-overlay.open{display:flex;}
.fs-close{position:absolute;top:20px;right:20px;background:var(--surf2);border:0.5px solid var(--border);color:var(--text2);border-radius:50px;padding:8px 16px;font-size:12px;cursor:pointer;transition:all 0.18s ease;}
.fs-close:hover{background:var(--surf3);color:var(--text);}
.fs-time{font-size:clamp(72px,20vw,160px);font-weight:200;letter-spacing:-8px;font-variant-numeric:tabular-nums;line-height:1;transition:color 0.4s ease;}
.fs-label{font-size:16px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-top:16px;}
.fs-subj{font-size:20px;font-weight:600;margin-top:8px;}
.fs-controls{display:flex;gap:16px;margin-top:40px;}
.fs-btn{border:0.5px solid var(--border2);background:rgba(255,255,255,0.06);color:var(--text);border-radius:50px;cursor:pointer;font-size:16px;width:60px;height:60px;display:flex;align-items:center;justify-content:center;transition:all 0.22s cubic-bezier(0.34,1.56,0.64,1);}
.fs-btn:hover{background:rgba(255,255,255,0.12);}
.fs-btn:active{transform:scale(0.92);}
.fs-play{width:72px;height:72px;font-size:22px;background:var(--blue);border-color:transparent;color:#fff;}
.fs-play:hover{background:#5baeff;}
.fs-play.is-running{background:var(--orange);}
.fs-ring{margin-bottom:8px;}

/* ANIMATIONS */
@keyframes fadeIn{from{opacity:0;transform:scale(0.96);}to{opacity:1;transform:scale(1);}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes flash{0%,100%{opacity:1;}50%{opacity:0.3;}}

.timer-slot{animation:fadeIn 0.3s ease;}
.new-timer{animation:slideUp 0.35s cubic-bezier(0.34,1.56,0.64,1);}

/* SAVE INTERVAL BADGE */
.save-badge{position:absolute;top:8px;left:8px;font-size:9px;color:var(--text3);background:var(--surf2);border:0.5px solid var(--border);border-radius:20px;padding:2px 7px;opacity:0;transition:opacity 0.3s ease;}
.save-badge.flash{opacity:1;animation:fadeIn 0.2s ease;}

/* IGCSE QUICK-SET */
.igcse-quick{width:100%;display:flex;flex-direction:column;gap:8px;}
.igcse-section{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:0.8px;text-transform:uppercase;margin-bottom:4px;}
.igcse-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.igcse-chip{background:var(--surf2);border:0.5px solid var(--border);border-radius:var(--r-xs);padding:8px 10px;cursor:pointer;transition:all 0.2s cubic-bezier(0.34,1.56,0.64,1);}
.igcse-chip:hover{background:var(--surf3);border-color:var(--border2);}
.igcse-chip:active{transform:scale(0.95);}
.igcse-chip-name{font-size:11px;font-weight:600;color:var(--text);}
.igcse-chip-dur{font-size:10px;color:var(--text3);margin-top:2px;}
.igcse-chip-marks{font-size:10px;color:var(--text2);margin-top:1px;}
.igcse-chip.active-p .igcse-chip-name{color:var(--blue);}
.igcse-chip.active-p{border-color:rgba(74,158,255,0.4);background:var(--blue-dim);}

/* SPLIT RESIZE HANDLE */
.resize-handle{width:4px;background:transparent;cursor:col-resize;position:absolute;top:0;bottom:0;z-index:10;transition:background 0.15s;}
.resize-handle:hover{background:rgba(255,255,255,0.1);}

/* NAV TABS */
.nav-tabs{display:flex;border-bottom:0.5px solid var(--border);flex-shrink:0;}
.nav-tab{flex:1;padding:8px 4px;font-size:11px;font-weight:500;color:var(--text3);border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.18s ease;}
.nav-tab.on{color:var(--blue);border-bottom-color:var(--blue);}
.nav-tab:hover:not(.on){color:var(--text2);}
</style>
</head>
<body>
<div class="root" id="root">

  <div class="topbar">
    <div class="brand">IGCSE <span>Timer</span></div>
    <div class="topbar-actions">
      <div class="layout-switcher" id="layoutSwitcher">
        <button class="layout-btn on" id="l1" onclick="setLayout(1)" title="Single">
          <div class="layout-icon"><div class="b" style="width:14px;height:16px;"></div></div>
        </button>
        <button class="layout-btn" id="l2" onclick="setLayout(2)" title="Split">
          <div class="layout-icon"><div class="b" style="width:6px;height:16px;"></div><div class="b" style="width:6px;height:16px;"></div></div>
        </button>
      </div>
      <button class="tb-btn" onclick="openHistory()">History</button>
      <button class="tb-btn" onclick="openAddTimer()">+ New Timer</button>
    </div>
  </div>

  <div class="arena" id="arena">
    <div class="timer-slot" id="slot0"></div>
    <div class="timer-slot split-right collapsed" id="slot1"></div>
  </div>

  <div class="drawer" id="histDrawer">
    <div class="drawer-hd">
      <span class="drawer-title">Session History</span>
      <button class="icon-btn" onclick="closeDrawer('histDrawer')">✕</button>
    </div>
    <div class="drawer-body" id="histBody"></div>
  </div>

  <div class="drawer" id="addDrawer">
    <div class="drawer-hd">
      <span class="drawer-title">New Timer</span>
      <button class="icon-btn" onclick="closeDrawer('addDrawer')">✕</button>
    </div>
    <div class="drawer-body">
      <div class="add-panel" style="padding:0;height:auto;">
        <div class="form-group">
          <label class="form-label">Subject</label>
          <select class="form-select" id="f-subj" onchange="subjectChanged()">
            <option value="custom">Custom</option>
            <option value="0580">0580 Mathematics</option>
            <option value="0610">0610 Biology</option>
            <option value="0620">0620 Chemistry</option>
            <option value="0625">0625 Physics</option>
          </select>
        </div>
        <div class="igcse-quick" id="igcseQuick" style="display:none;">
          <div class="igcse-section">IGCSE Papers</div>
          <div class="igcse-grid" id="igcseGrid"></div>
        </div>
        <div class="form-group">
          <label class="form-label">Name / Paper</label>
          <input class="form-input" id="f-name" placeholder="e.g. Paper 4 / Mock Run">
        </div>
        <div class="form-group">
          <label class="form-label">Duration</label>
          <div class="presets-grid" id="durPresets" style="margin-bottom:6px;"></div>
          <input class="form-input" id="f-dur" type="number" placeholder="Minutes" min="1" max="300">
        </div>
        <div class="form-group">
          <label class="form-label">Color</label>
          <div class="color-row" id="colorRow"></div>
        </div>
        <div class="form-group">
          <label class="form-label">Auto-save interval</label>
          <select class="form-select" id="f-save">
            <option value="1">Every 1 second</option>
            <option value="5" selected>Every 5 seconds</option>
            <option value="10">Every 10 seconds</option>
            <option value="30">Every 30 seconds</option>
          </select>
        </div>
        <div style="display:flex;gap:8px;margin-top:4px;">
          <button class="btn-primary" style="flex:1;" onclick="createTimer()">Start Timer</button>
          <button class="btn-secondary" onclick="closeDrawer('addDrawer')">Cancel</button>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- FULLSCREEN -->
<div class="fs-overlay" id="fsOverlay">
  <button class="fs-close" onclick="exitFullscreen()">✕ Exit Fullscreen</button>
  <svg class="fs-ring" id="fsRing" width="300" height="300" viewBox="0 0 300 300">
    <circle cx="150" cy="150" r="130" class="ring-bg" stroke-width="6"/>
    <circle cx="150" cy="150" r="130" id="fsRingFill" class="ring-fill" stroke-width="6" stroke-dasharray="0 817"/>
  </svg>
  <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;" id="fsMid">
    <div class="fs-time" id="fsTime">00:00</div>
    <div class="fs-subj" id="fsSubj">Timer</div>
    <div class="fs-label" id="fsLabel">REMAINING</div>
  </div>
  <div class="fs-controls">
    <button class="fs-btn" onclick="fsReset()">↺</button>
    <button class="fs-btn fs-play" id="fsPlay" onclick="fsToggle()">▶</button>
    <button class="fs-btn" onclick="fsStop()">■</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const COLORS = [
  {id:'blue',hex:'#4a9eff'},{id:'green',hex:'#30d158'},{id:'orange',hex:'#ff9f0a'},
  {id:'red',hex:'#ff453a'},{id:'purple',hex:'#bf5af2'},{id:'teal',hex:'#5ac8fa'},
  {id:'pink',hex:'#ff6b9d'},{id:'yellow',hex:'#ffd60a'}
];
const IGCSE_PAPERS = {
  '0580':[
    {name:'Paper 1',paper:'P1',dur:90,marks:70,tier:'Core'},
    {name:'Paper 2',paper:'P2',dur:90,marks:70,tier:'Extended'},
    {name:'Paper 3',paper:'P3',dur:120,marks:104,tier:'Core'},
    {name:'Paper 4',paper:'P4',dur:150,marks:130,tier:'Extended'},
  ],
  '0610':[
    {name:'Paper 1',paper:'P1',dur:45,marks:40,tier:'Core MCQ'},
    {name:'Paper 2',paper:'P2',dur:45,marks:40,tier:'Ext MCQ'},
    {name:'Paper 3',paper:'P3',dur:75,marks:80,tier:'Core Theory'},
    {name:'Paper 4',paper:'P4',dur:75,marks:80,tier:'Ext Theory'},
    {name:'Paper 5',paper:'P5',dur:75,marks:40,tier:'Practical'},
    {name:'Paper 6',paper:'P6',dur:60,marks:40,tier:'Alt Prac'},
  ],
  '0620':[
    {name:'Paper 1',paper:'P1',dur:45,marks:40,tier:'Core MCQ'},
    {name:'Paper 2',paper:'P2',dur:45,marks:40,tier:'Ext MCQ'},
    {name:'Paper 3',paper:'P3',dur:75,marks:80,tier:'Core Theory'},
    {name:'Paper 4',paper:'P4',dur:75,marks:80,tier:'Ext Theory'},
    {name:'Paper 5',paper:'P5',dur:75,marks:40,tier:'Practical'},
    {name:'Paper 6',paper:'P6',dur:60,marks:40,tier:'Alt Prac'},
  ],
  '0625':[
    {name:'Paper 1',paper:'P1',dur:45,marks:40,tier:'Core MCQ'},
    {name:'Paper 2',paper:'P2',dur:45,marks:40,tier:'Ext MCQ'},
    {name:'Paper 3',paper:'P3',dur:75,marks:80,tier:'Core Theory'},
    {name:'Paper 4',paper:'P4',dur:75,marks:80,tier:'Ext Theory'},
    {name:'Paper 5',paper:'P5',dur:75,marks:40,tier:'Practical'},
    {name:'Paper 6',paper:'P6',dur:60,marks:40,tier:'Alt Prac'},
  ],
};
const QUICK_DURS = [
  {l:'45 min',v:45},{l:'1 hr',v:60},{l:'1h 15m',v:75},{l:'1h 30m',v:90},{l:'2 hrs',v:120},{l:'2h 30m',v:150}
];

let timers = [];
let history = [];
let layout = 1;
let selColor = 'blue';
let selDur = null;
let selIgcse = null;
let fsTimerIdx = null;
let saveTick = {};
let toastT;

function loadState(){
  try{
    const s=JSON.parse(localStorage.getItem('igcse_timer_v3')||'null');
    if(s){timers=s.timers||[];history=s.history||[];layout=s.layout||1;}
  }catch(e){}
}
function saveState(){
  localStorage.setItem('igcse_timer_v3',JSON.stringify({timers,history,layout}));
}

function durFmt(sec){
  if(sec<0)sec=0;
  const m=Math.floor(sec/60),s=sec%60;
  return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}
function durLabel(min){
  if(min<60)return min+' min';
  const h=Math.floor(min/60),m=min%60;
  return m?`${h}h ${m}m`:`${h} hr${h>1?'s':''}`;
}
function colHex(id){return (COLORS.find(c=>c.id===id)||COLORS[0]).hex;}
function pct(t){return t.total>0?Math.max(0,Math.min(1,(t.total-t.left)/t.total)):0;}
function ringDash(r,p){const circ=2*Math.PI*r;return `${circ*p} ${circ*(1-p)}`;}

function toast(msg,dur=2200){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),dur);
}

function buildColorRow(){
  const row=document.getElementById('colorRow');
  if(!row)return;
  row.innerHTML=COLORS.map(c=>`<div class="color-dot${c.id===selColor?' sel':''}" style="background:${c.hex};" onclick="pickColor('${c.id}')"></div>`).join('');
}
function pickColor(id){selColor=id;buildColorRow();}

function buildDurPresets(){
  const el=document.getElementById('durPresets');
  if(!el)return;
  el.innerHTML=QUICK_DURS.map(d=>`<div class="preset-chip${selDur===d.v?' active-p':''}" onclick="pickDur(${d.v})">${d.l}</div>`).join('');
}
function pickDur(v){
  selDur=v;
  document.getElementById('f-dur').value=v;
  buildDurPresets();
}

function subjectChanged(){
  const s=document.getElementById('f-subj').value;
  const q=document.getElementById('igcseQuick');
  if(s==='custom'){q.style.display='none';selIgcse=null;return;}
  q.style.display='block';
  const papers=IGCSE_PAPERS[s]||[];
  document.getElementById('igcseGrid').innerHTML=papers.map((p,i)=>`
    <div class="igcse-chip${selIgcse&&selIgcse.paper===p.paper?' active-p':''}" onclick="pickIgcse(${i},'${s}')">
      <div class="igcse-chip-name">${p.paper} · ${p.tier}</div>
      <div class="igcse-chip-dur">${durLabel(p.dur)}</div>
      <div class="igcse-chip-marks">${p.marks} marks</div>
    </div>
  `).join('');
}
function pickIgcse(i,subj){
  const p=IGCSE_PAPERS[subj][i];
  selIgcse=p;
  document.getElementById('f-name').value=`${subj} ${p.paper} · ${p.tier}`;
  pickDur(p.dur);
  document.getElementById('igcseGrid').querySelectorAll('.igcse-chip').forEach((el,j)=>{
    el.classList.toggle('active-p',j===i);
  });
}

function openAddTimer(){
  selColor='blue';selDur=null;selIgcse=null;
  buildColorRow();buildDurPresets();subjectChanged();
  document.getElementById('f-name').value='';
  document.getElementById('f-dur').value='';
  document.getElementById('f-subj').value='custom';
  openDrawer('addDrawer');
}

function createTimer(){
  const name=(document.getElementById('f-name').value.trim())||'Timer';
  const dur=parseInt(document.getElementById('f-dur').value)||selDur||90;
  const saveInterval=parseInt(document.getElementById('f-save').value)||5;
  const color=selColor;
  const subj=document.getElementById('f-subj').value;
  if(!dur||dur<1){toast('Enter a duration');return;}

  const t={
    id:Date.now(),name,dur,left:dur*60,total:dur*60,color,subj,
    running:false,paused:false,done:false,
    started:null,saveInterval,lastSaved:Date.now(),
    paper:selIgcse?selIgcse.paper:null,
    marks:selIgcse?selIgcse.marks:null,
  };

  const freeSlot=layout===2?timers.findIndex(x=>x.slot!==undefined&&x===null):-1;
  if(layout===2&&timers.length>=2){toast('Max 2 timers in split view. Remove one first.');return;}
  if(layout===1&&timers.length>=1){
    if(!confirm('Replace current timer?'))return;
    timers.forEach(x=>{x.running=false;clearInterval(x._interval);});
    timers=[];
  }

  timers.push(t);
  saveState();
  closeDrawer('addDrawer');
  renderAll();
  toast(`Timer started: ${name}`);
  startTimer(t.id);
}

function startTimer(id){
  const t=timers.find(x=>x.id===id);
  if(!t||t.done)return;
  if(layout===2){
    timers.forEach(x=>{if(x.id!==id&&x.running){pauseTimer(x.id);}});
  }
  t.running=true;t.paused=false;
  if(!t.started)t.started=Date.now();
  clearInterval(t._interval);
  t._interval=setInterval(()=>tickTimer(id),1000);
  renderAll();
}
function pauseTimer(id){
  const t=timers.find(x=>x.id===id);
  if(!t)return;
  t.running=false;t.paused=true;
  clearInterval(t._interval);
  saveState();
  renderAll();
}
function toggleTimer(id){
  const t=timers.find(x=>x.id===id);
  if(!t)return;
  if(t.running)pauseTimer(id);
  else startTimer(id);
}
function resetTimer(id){
  const t=timers.find(x=>x.id===id);
  if(!t)return;
  clearInterval(t._interval);
  t.left=t.total;t.running=false;t.paused=false;t.done=false;t.started=null;
  saveState();renderAll();
}
function removeTimer(id){
  const t=timers.find(x=>x.id===id);
  if(t)clearInterval(t._interval);
  timers=timers.filter(x=>x.id!==id);
  saveState();renderAll();
}

function tickTimer(id){
  const t=timers.find(x=>x.id===id);
  if(!t||!t.running)return;
  t.left=Math.max(0,t.left-1);
  if(Date.now()-t.lastSaved>=t.saveInterval*1000){
    t.lastSaved=Date.now();saveState();flashSaveBadge(id);
  }
  if(t.left<=0){
    t.done=true;t.running=false;
    clearInterval(t._interval);
    history.unshift({id:t.id,name:t.name,color:t.color,subj:t.subj,paper:t.paper,dur:t.dur,completedAt:Date.now(),type:'completed'});
    saveState();toast(`✓ ${t.name} — Time's up!`,3500);
    renderAll();return;
  }
  renderTimerDisplay(id);
  if(fsTimerIdx!==null&&timers.indexOf(t)===fsTimerIdx)updateFsDisplay();
}

function flashSaveBadge(id){
  const el=document.getElementById(`save-badge-${id}`);
  if(!el)return;
  el.classList.remove('flash');
  void el.offsetWidth;
  el.classList.add('flash');
  setTimeout(()=>el.classList.remove('flash'),800);
}

function setLayout(n){
  layout=n;
  document.querySelectorAll('.layout-btn').forEach((b,i)=>b.classList.toggle('on',i+1===n));
  const slot1=document.getElementById('slot1');
  if(n===1){
    slot1.classList.add('collapsed');
    if(timers.length>1){
      clearInterval(timers[1]._interval);
      history.unshift({id:timers[1].id,name:timers[1].name,color:timers[1].color,subj:timers[1].subj,paper:timers[1].paper,dur:timers[1].dur,left:timers[1].left,completedAt:Date.now(),type:'saved'});
      timers=timers.slice(0,1);
    }
  } else {
    slot1.classList.remove('collapsed');
  }
  saveState();renderAll();
}

function openFullscreen(idx){
  fsTimerIdx=idx;
  const overlay=document.getElementById('fsOverlay');
  overlay.classList.add('open');
  updateFsDisplay();
}
function exitFullscreen(){
  document.getElementById('fsOverlay').classList.remove('open');
  fsTimerIdx=null;
}
function fsToggle(){if(fsTimerIdx===null)return;toggleTimer(timers[fsTimerIdx]?.id);}
function fsReset(){if(fsTimerIdx===null)return;resetTimer(timers[fsTimerIdx]?.id);}
function fsStop(){if(fsTimerIdx===null)return;pauseTimer(timers[fsTimerIdx]?.id);exitFullscreen();}
function updateFsDisplay(){
  const t=fsTimerIdx!==null?timers[fsTimerIdx]:null;
  if(!t){exitFullscreen();return;}
  const p=pct(t);const c=colHex(t.color);
  document.getElementById('fsTime').textContent=durFmt(t.left);
  document.getElementById('fsTime').style.color=t.done?'#30d158':(t.left<60?'#ff453a':c);
  document.getElementById('fsSubj').textContent=t.name;
  document.getElementById('fsLabel').textContent=t.done?'COMPLETE':(t.running?'REMAINING':'PAUSED');
  const fill=document.getElementById('fsRingFill');
  fill.style.stroke=t.done?'#30d158':(t.left<60?'#ff453a':c);
  fill.style.strokeDasharray=ringDash(130,p);
  const fb=document.getElementById('fsPlay');
  fb.textContent=t.running?'⏸':'▶';
  fb.className='fs-btn fs-play'+(t.running?' is-running':'');
}

function renderAll(){
  const slots=[document.getElementById('slot0'),document.getElementById('slot1')];
  slots.forEach((slot,i)=>{
    const t=timers[i];
    if(t){slot.innerHTML=buildTimerCard(t,i);}
    else{slot.innerHTML=buildEmptySlot(i);}
  });
}

function buildTimerCard(t,idx){
  const p=pct(t);const c=colHex(t.color);
  const r=90,circ=2*Math.PI*r,dashArr=ringDash(r,p);
  const ringColor=t.done?'#30d158':(t.left<60&&t.left>0?'#ff453a':c);
  const timeColor=t.done?'#30d158':(t.left<60&&t.left>0?'#ff453a':'var(--text)');
  const statusLabel=t.done?'Complete':t.running?'Running':t.paused?'Paused':'Ready';
  const statusCls=t.done?'done':t.running?'running':t.paused?'paused':'';
  const ringAnim=t.running&&t.left<60?'animation:flash 1s ease infinite;':'';
  return `
  <div class="timer-card new-timer">
    <div class="save-badge" id="save-badge-${t.id}">saved</div>
    <div class="timer-header">
      <div class="timer-subj">
        <div class="subj-dot" style="background:${c};"></div>
        <div>
          <div class="subj-name">${t.name}</div>
          ${t.paper?`<div class="subj-paper">${t.subj} · ${durLabel(t.dur)}</div>`:`<div class="subj-paper">${durLabel(t.dur)}</div>`}
        </div>
      </div>
      <div class="timer-actions-top">
        <button class="icon-btn" onclick="openFullscreen(${idx})" title="Fullscreen">⛶</button>
        <button class="icon-btn danger" onclick="removeTimer(${t.id})" title="Remove">✕</button>
      </div>
    </div>

    <div class="ring-wrap" style="width:200px;height:200px;">
      <svg class="ring-svg" width="200" height="200" viewBox="0 0 200 200">
        <circle cx="100" cy="100" r="${r}" class="ring-bg" stroke-width="8"/>
        <circle cx="100" cy="100" r="${r}" class="ring-fill" stroke-width="8"
          stroke="${ringColor}" style="${ringAnim}"
          stroke-dasharray="${dashArr}" id="ring-${t.id}"/>
      </svg>
      <div class="timer-inner">
        <div class="t-time" style="color:${timeColor};">${durFmt(t.left)}</div>
        <div class="t-label">${t.done?'Done!':t.running?'Remaining':'Paused'}</div>
        <div class="t-prog-text">${Math.round(p*100)}%</div>
      </div>
    </div>

    <div class="controls">
      <button class="ctrl-btn ctrl-sm" onclick="resetTimer(${t.id})">↺</button>
      <button class="ctrl-btn ctrl-play${t.running?' is-running':''}" onclick="toggleTimer(${t.id})"
        id="play-${t.id}">${t.running?'⏸':'▶'}</button>
      <button class="ctrl-btn ctrl-sm icon-btn active-state" onclick="addTime(${t.id},5)" title="+5 min">+5</button>
    </div>

    <div class="status-row">
      <div class="status-dot ${statusCls}"></div>
      <span>${statusLabel}</span>
      ${t.marks?`<span>·</span><span>${t.marks} marks</span>`:''}
    </div>

    <div class="presets-section">
      <div class="presets-label">Quick set</div>
      <div class="presets-grid">
        ${QUICK_DURS.map(d=>`<div class="preset-chip${t.total===d.v*60?' active-p':''}" onclick="setTimerDur(${t.id},${d.v})">${d.l}</div>`).join('')}
      </div>
    </div>

    ${t.subj&&t.subj!=='custom'?buildIgcseQuickForCard(t):''}
  </div>`;
}

function buildIgcseQuickForCard(t){
  const papers=IGCSE_PAPERS[t.subj]||[];
  if(!papers.length)return '';
  return `<div class="presets-section">
    <div class="presets-label">${t.subj} Papers</div>
    <div style="display:flex;flex-wrap:wrap;gap:5px;">
      ${papers.map(p=>`<div class="preset-chip${t.paper===p.paper?' active-p':''}" onclick="setTimerPaper(${t.id},'${t.subj}','${p.paper}')">${p.paper} · ${durLabel(p.dur)}</div>`).join('')}
    </div>
  </div>`;
}

function buildEmptySlot(idx){
  if(layout===1&&idx===1)return '';
  return `<div class="empty-state">
    <div class="empty-ico">⏱</div>
    <div class="empty-title">${idx===0?'No Timer':'Second Timer'}</div>
    <div class="empty-desc">${idx===0?'Create a timer to start your mock exam.':layout===2?'Add a second timer for another subject.':''}</div>
    <button class="btn-primary" style="margin-top:8px;" onclick="openAddTimer()">+ New Timer</button>
  </div>`;
}

function renderTimerDisplay(id){
  const t=timers.find(x=>x.id===id);if(!t)return;
  const p=pct(t);const c=colHex(t.color);
  const r=90,dashArr=ringDash(r,p);
  const ringColor=t.done?'#30d158':(t.left<60&&t.left>0?'#ff453a':c);
  const timeColor=t.done?'#30d158':(t.left<60&&t.left>0?'#ff453a':'var(--text)');

  const ring=document.getElementById(`ring-${id}`);
  const timeEl=t.left<60?document.querySelector(`#slot${timers.indexOf(t)} .t-time`):null;
  const dispEl=document.querySelector(`#slot${timers.indexOf(t)} .t-time`);
  const progEl=document.querySelector(`#slot${timers.indexOf(t)} .t-prog-text`);
  const playEl=document.getElementById(`play-${id}`);
  const statusEl=document.querySelector(`#slot${timers.indexOf(t)} .status-dot`);
  const statusTxt=document.querySelector(`#slot${timers.indexOf(t)} .status-row span`);

  if(ring){ring.style.strokeDasharray=dashArr;ring.style.stroke=ringColor;}
  if(dispEl){dispEl.textContent=durFmt(t.left);dispEl.style.color=timeColor;}
  if(progEl)progEl.textContent=Math.round(p*100)+'%';
  if(playEl){playEl.textContent=t.running?'⏸':'▶';playEl.className='ctrl-btn ctrl-play'+(t.running?' is-running':'');}
  if(statusEl){statusEl.className='status-dot '+(t.running?'running':t.paused?'paused':t.done?'done':'');}
  if(statusTxt)statusTxt.textContent=t.done?'Complete':t.running?'Running':t.paused?'Paused':'Ready';
}

function setTimerDur(id,min){
  const t=timers.find(x=>x.id===id);if(!t)return;
  const wasRunning=t.running;
  if(wasRunning)pauseTimer(id);
  t.total=min*60;t.left=min*60;t.done=false;t.started=null;
  saveState();renderAll();
  if(wasRunning)startTimer(id);
}

function setTimerPaper(id,subj,paper){
  const t=timers.find(x=>x.id===id);if(!t)return;
  const papers=IGCSE_PAPERS[subj]||[];
  const p=papers.find(x=>x.paper===paper);
  if(!p)return;
  const wasRunning=t.running;
  if(wasRunning)pauseTimer(id);
  t.paper=p.paper;t.marks=p.marks;t.dur=p.dur;t.total=p.dur*60;t.left=p.dur*60;t.done=false;t.started=null;
  saveState();renderAll();
  if(wasRunning)startTimer(id);
}

function addTime(id,min){
  const t=timers.find(x=>x.id===id);if(!t)return;
  t.left+=min*60;t.total+=min*60;
  if(t.done){t.done=false;}
  saveState();renderTimerDisplay(id);toast(`+${min} min added`);
}

function openHistory(){
  const el=document.getElementById('histBody');
  if(!history.length){el.innerHTML='<div class="empty-state" style="height:200px;"><div class="empty-ico">📋</div><div class="empty-title">No history yet</div></div>';
  } else {
    el.innerHTML=history.slice(0,30).map(h=>`
      <div class="hist-item" onclick="resumeFromHistory('${h.id}')">
        <div class="hist-dot" style="background:${colHex(h.color)};"></div>
        <div class="hist-info">
          <div class="hist-name">${h.name}</div>
          <div class="hist-meta">${h.type==='completed'?'✓ Completed':h.type==='saved'?'Saved':''} · ${new Date(h.completedAt).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})}</div>
        </div>
        <div class="hist-time">${durLabel(h.dur)}</div>
        <button class="hist-resume-btn" onclick="event.stopPropagation();resumeFromHistory(${JSON.stringify(JSON.stringify(h))})">Resume</button>
      </div>
    `).join('')}
  `;}
  openDrawer('histDrawer');
}

function resumeFromHistory(raw){
  let h;
  try{h=typeof raw==='string'?JSON.parse(raw):raw;}catch(e){return;}
  if(!h)return;
  const left=h.left||h.dur*60;
  const t={
    id:Date.now(),name:h.name,dur:h.dur,left:left,total:h.dur*60,color:h.color,
    subj:h.subj||'custom',running:false,paused:true,done:false,started:null,
    saveInterval:5,lastSaved:Date.now(),paper:h.paper||null,marks:h.marks||null
  };
  if(layout===1){
    timers.forEach(x=>{x.running=false;clearInterval(x._interval);});timers=[t];
  } else if(timers.length<2){
    timers.push(t);
  } else {
    toast('Remove a timer first');return;
  }
  saveState();closeDrawer('histDrawer');renderAll();toast(`Resumed: ${t.name}`);
}

function openDrawer(id){
  document.getElementById(id).classList.add('open');
  if(id==='addDrawer'){buildColorRow();buildDurPresets();}
}
function closeDrawer(id){document.getElementById(id).classList.remove('open');}

loadState();

timers.forEach(t=>{
  t.running=false;t.paused=true;
  if(t.left===undefined)t.left=t.total;
});

if(layout===2)setLayout(2);
else setLayout(1);

renderAll();

if(timers.length===0){
  setTimeout(()=>openAddTimer(),400);
}

window.addEventListener('beforeunload',()=>saveState());
</script>
</body>
</html>
