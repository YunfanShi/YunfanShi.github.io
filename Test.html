<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goal Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --surface: #111111;
  --surface2: #181818;
  --surface3: #222222;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.14);
  --text: #efefef;
  --text2: #777;
  --text3: #444;
  --blue: #4d9ef7;
  --blue-dim: rgba(77,158,247,0.15);
  --green: #34c76a;
  --green-dim: rgba(52,199,106,0.15);
  --yellow: #f5a623;
  --red: #ff5c5c;
  --seg-done: #34c76a;
  --seg-todo: #1a3d8f;
  --radius: 14px;
  --font: 'DM Sans', system-ui, sans-serif;
  --mono: 'DM Mono', monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}

/* TOPBAR */
.topbar{
  background:rgba(10,10,10,0.9);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  height:58px;display:flex;align-items:center;
  justify-content:space-between;padding:0 32px;
  position:sticky;top:0;z-index:100;
}
.brand{display:flex;align-items:center;gap:10px;}
.brand-dots{display:flex;gap:5px;}
.brand-dots span{width:9px;height:9px;border-radius:50%;display:block;}
.brand-name{font-size:15px;font-weight:600;letter-spacing:-0.3px;}
.topbar-r{display:flex;gap:8px;align-items:center;}

/* COUNTDOWN BANNER */
.cd-banner{
  background:rgba(12,12,12,0.95);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:0 32px;
  overflow:hidden;
  max-height:0;
  transition:max-height .35s cubic-bezier(.4,0,.2,1), padding .3s;
}
.cd-banner.visible{max-height:120px;padding:12px 32px;}
.cd-strip{
  display:flex;
  align-items:center;
  gap:0;
  overflow-x:auto;
  scrollbar-width:none;
  -ms-overflow-style:none;
}
.cd-strip::-webkit-scrollbar{display:none;}
.cd-item{
  display:flex;
  align-items:center;
  gap:14px;
  padding:9px 20px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--surface);
  flex-shrink:0;
  margin-right:10px;
  cursor:default;
  transition:border-color .15s,background .15s;
  position:relative;
}
.cd-item:hover{border-color:var(--border2);background:#141414;}
.cd-item-left{display:flex;flex-direction:column;gap:2px;}
.cd-label{font-size:11px;font-weight:500;color:var(--text2);letter-spacing:0.2px;white-space:nowrap;}
.cd-emoji{font-size:14px;line-height:1;}
.cd-numbers{display:flex;align-items:baseline;gap:6px;}
.cd-unit-group{display:flex;align-items:baseline;gap:2px;}
.cd-num{font-size:22px;font-weight:600;font-family:var(--mono);letter-spacing:-1px;line-height:1;}
.cd-unit{font-size:10px;font-weight:500;color:var(--text2);letter-spacing:0.3px;text-transform:uppercase;margin-left:1px;}
.cd-sep{font-size:14px;color:var(--text3);font-family:var(--mono);align-self:center;}
.cd-past{opacity:.45;}
.cd-urgent .cd-num{color:#ff5c5c!important;}
.cd-warn .cd-num{color:#f5a623!important;}
.cd-ok .cd-num{color:#4d9ef7;}
.cd-actions-ico{display:flex;gap:2px;opacity:0;transition:opacity .15s;position:absolute;right:8px;top:50%;transform:translateY(-50%);}
.cd-item:hover .cd-actions-ico{opacity:1;}

/* LAYOUT */
.main{max-width:880px;margin:0 auto;padding:38px 28px;}

/* PAGE HEADER */
.page-hd{margin-bottom:36px;}
.page-title{font-size:30px;font-weight:600;letter-spacing:-0.7px;line-height:1.15;}
.page-sub{font-size:13px;color:var(--text2);margin-top:5px;}

/* STATS */
.stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:32px;}
.stat{
  background:var(--surface);border:1px solid var(--border);
  border-radius:99px;padding:9px 18px;
  display:flex;align-items:center;gap:9px;
  transition:border-color .15s;
}
.stat:hover{border-color:var(--border2);}
.stat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.stat-v{font-size:15px;font-weight:600;font-family:var(--mono);letter-spacing:-0.4px;}
.stat-lbl{font-size:12px;color:var(--text2);}

/* FILTER */
.filter-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;gap:12px;flex-wrap:wrap;}
.tabs{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:99px;padding:3px;gap:2px;}
.tab{padding:5px 14px;border-radius:99px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text2);font-family:var(--font);transition:all .15s;}
.tab.on{background:var(--surface3);color:var(--text);}
.tab:hover:not(.on){color:var(--text);}
.sort-sel{background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-family:var(--font);font-size:13px;padding:6px 12px;outline:none;cursor:pointer;}
.sort-sel:focus{border-color:var(--border2);}
option{background:#1a1a1a;}

/* GOAL CARD */
.goal-list{display:flex;flex-direction:column;gap:10px;}
.gcard{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:20px 22px 18px;
  transition:border-color .2s,background .2s;
  position:relative;
  overflow:hidden;
}
.gcard:hover{border-color:var(--border2);background:#121212;}

/* left accent line */
.gcard::before{
  content:'';position:absolute;left:0;top:10%;bottom:10%;
  width:3px;border-radius:0 3px 3px 0;
  background:var(--accent);
  opacity:0.7;
}

/* TOP ROW */
.gtop{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;gap:10px;}
.gleft{flex:1;min-width:0;}
.gname{font-size:17px;font-weight:600;letter-spacing:-0.4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;}
.gmeta{display:flex;align-items:center;gap:8px;margin-top:4px;flex-wrap:wrap;}
.gdesc{font-size:12px;color:var(--text3);}
.gcat{font-size:11px;font-weight:500;padding:2px 8px;border-radius:4px;letter-spacing:0.2px;}
.gdeadline{font-size:11px;color:var(--text3);font-family:var(--mono);}

.gright{display:flex;align-items:center;gap:12px;flex-shrink:0;}
.gpct{font-size:23px;font-weight:600;font-family:var(--mono);letter-spacing:-1px;line-height:1;}
.gbadge{font-size:11px;font-weight:500;padding:3px 9px;border-radius:5px;white-space:nowrap;margin-top:4px;text-align:center;}
.gactions{display:flex;gap:2px;opacity:0;transition:opacity .15s;}
.gcard:hover .gactions{opacity:1;}

/* SEGMENTED BAR */
.segwrap{position:relative;cursor:pointer;margin-bottom:10px;padding:4px 0;}
.segbar{display:flex;gap:2.5px;height:13px;}
.seg{flex:1;border-radius:2.5px;transition:opacity .12s,transform .12s;}
.seg.done{background:var(--seg-done);}
.seg.todo{background:var(--seg-todo);}
.segwrap:hover .seg{opacity:0.6;}
.segwrap:hover .seg:hover{opacity:1;transform:scaleY(1.18);}
.seg-labels{display:flex;justify-content:space-between;margin-top:4px;}
.seg-lbl{font-size:10px;color:var(--text3);font-family:var(--mono);}

/* tooltip */
.seg-tip{
  position:absolute;bottom:calc(100% + 2px);
  background:#1e1e1e;border:1px solid var(--border2);
  color:var(--text);font-size:11px;font-family:var(--mono);
  padding:3px 8px;border-radius:5px;pointer-events:none;
  white-space:nowrap;opacity:0;transition:opacity .1s;z-index:10;
  transform:translateX(-50%);
}
.segwrap:hover .seg-tip{opacity:1;}

/* FOOTER */
.gfoot{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.gfoot-l{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text3);font-family:var(--mono);}
.pri-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.gfoot-r{display:flex;align-items:center;gap:5px;}
.act-dots{display:flex;gap:3px;align-items:center;}
.adot{width:5px;height:5px;border-radius:50%;background:var(--surface3);}
.adot.on{background:var(--green);}

/* BUTTONS */
.btn{border:none;outline:none;cursor:pointer;font-family:var(--font);font-weight:500;border-radius:8px;transition:all .15s;display:inline-flex;align-items:center;gap:6px;user-select:none;}
.btn:active{transform:scale(0.97);}
.btn-pri{background:var(--blue);color:#000;padding:9px 18px;font-size:13px;border-radius:8px;}
.btn-pri:hover{background:#6db3ff;}
.btn-ghost{background:transparent;color:var(--text2);padding:8px 14px;font-size:13px;border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--border2);color:var(--text);background:var(--surface2);}
.btn-ico{background:transparent;color:var(--text3);width:28px;height:28px;padding:0;border-radius:6px;font-size:13px;justify-content:center;}
.btn-ico:hover{background:var(--surface3);color:var(--text2);}
.btn-ico.del:hover{background:rgba(255,92,92,.15);color:var(--red);}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;visibility:hidden;transition:opacity .2s,visibility .2s;}
.overlay.open{opacity:1;visibility:visible;}
.modal{background:#141414;border:1px solid var(--border2);border-radius:18px;width:100%;max-width:500px;box-shadow:0 32px 80px rgba(0,0,0,.7);transform:scale(0.95) translateY(14px);transition:transform .25s cubic-bezier(.4,0,.2,1);}
.overlay.open .modal{transform:scale(1) translateY(0);}
.mhd{padding:22px 24px 0;font-size:17px;font-weight:600;letter-spacing:-0.3px;}
.mbody{padding:18px 24px;display:flex;flex-direction:column;gap:15px;}
.mfoot{padding:8px 24px 20px;display:flex;justify-content:flex-end;gap:8px;border-top:1px solid var(--border);}

/* FORM */
.fg{display:flex;flex-direction:column;gap:6px;}
.flbl{font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:0.6px;}
.fi{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 13px;font-size:14px;font-family:var(--font);color:var(--text);outline:none;transition:border-color .15s;width:100%;}
.fi:focus{border-color:var(--blue);}
.fi::placeholder{color:var(--text3);}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* SLIDER */
.slrow{display:flex;align-items:center;gap:12px;}
.slval{font-size:17px;font-weight:600;font-family:var(--mono);min-width:44px;text-align:right;color:var(--blue);}
input[type=range]{-webkit-appearance:none;flex:1;height:4px;border-radius:99px;background:var(--surface3);outline:none;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--blue);box-shadow:0 0 0 3px rgba(77,158,247,.2);transition:box-shadow .15s;}
input[type=range]::-webkit-slider-thumb:hover{box-shadow:0 0 0 5px rgba(77,158,247,.3);}

/* QUICK BTNS */
.qbtns{display:flex;gap:6px;flex-wrap:wrap;}
.qb{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text2);font-family:var(--mono);font-size:12px;padding:5px 10px;cursor:pointer;transition:all .12s;}
.qb:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-dim);}

/* COLOR */
.crow{display:flex;gap:9px;flex-wrap:wrap;}
.cdot{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .12s;}
.cdot.sel{border-color:var(--text);transform:scale(1.15);}

/* EMPTY */
.empty{text-align:center;padding:72px 24px;color:var(--text2);}
.empty-ico{font-size:44px;margin-bottom:14px;}
.empty-title{font-size:17px;font-weight:500;color:var(--text);margin-bottom:6px;}
.empty-desc{font-size:13px;}

/* TOAST */
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(70px);background:#1c1c1c;border:1px solid var(--border2);color:var(--text);font-size:13px;padding:10px 20px;border-radius:10px;box-shadow:0 10px 40px rgba(0,0,0,.5);z-index:999;transition:transform .28s cubic-bezier(.4,0,.2,1);white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}

@media(max-width:600px){
  .main{padding:22px 16px;}
  .topbar{padding:0 18px;}
  .frow{grid-template-columns:1fr;}
  .page-title{font-size:22px;}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-dots">
      <span style="background:#4285f4"></span>
      <span style="background:#ea4335"></span>
      <span style="background:#fbbc04"></span>
      <span style="background:#34a853"></span>
    </div>
    <span class="brand-name">Goal Tracker</span>
  </div>
  <div class="topbar-r">
    <button class="btn btn-ghost" onclick="openCdSettings()" title="倒计时设置">⏱ 倒计时</button>
    <button class="btn btn-ghost" onclick="exportData()">↑ 导出</button>
    <button class="btn btn-pri" onclick="openAdd()">＋ 新建目标</button>
  </div>
</div>

<!-- COUNTDOWN BANNER -->
<div class="cd-banner" id="cdBanner">
  <div class="cd-strip" id="cdStrip"></div>
</div>

<div class="main">
  <div class="page-hd">
    <div class="page-title" id="greeting">我的目标</div>
    <div class="page-sub" id="dateStr"></div>
  </div>

  <div class="stats" id="statsEl"></div>

  <div class="filter-row">
    <div class="tabs">
      <button class="tab on" onclick="setFilter('all',this)">全部</button>
      <button class="tab" onclick="setFilter('active',this)">进行中</button>
      <button class="tab" onclick="setFilter('done',this)">已完成</button>
      <button class="tab" onclick="setFilter('overdue',this)">逾期</button>
    </div>
    <select class="sort-sel" onchange="setSort(this.value)">
      <option value="created">按创建时间</option>
      <option value="progress-asc">进度 ↑</option>
      <option value="progress-desc">进度 ↓</option>
      <option value="deadline">按截止日期</option>
      <option value="name">按名称</option>
    </select>
  </div>

  <div class="goal-list" id="goalList"></div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="overlay" id="goalModal">
  <div class="modal">
    <div class="mhd" id="mTitle">新建目标</div>
    <div class="mbody">
      <div class="fg">
        <label class="flbl">目标名称 *</label>
        <input class="fi" id="iName" placeholder="例如：Math0580、健身计划…" maxlength="50">
      </div>
      <div class="fg">
        <label class="flbl">描述</label>
        <input class="fi" id="iDesc" placeholder="简短说明" maxlength="100">
      </div>
      <div class="frow">
        <div class="fg">
          <label class="flbl">分类</label>
          <select class="fi" id="iCat">
            <option value="学习">📚 学习</option>
            <option value="健康">💪 健康</option>
            <option value="工作">💼 工作</option>
            <option value="生活">🏠 生活</option>
            <option value="财务">💰 财务</option>
            <option value="其他">✦ 其他</option>
          </select>
        </div>
        <div class="fg">
          <label class="flbl">优先级</label>
          <select class="fi" id="iPri">
            <option value="high">🔴 高</option>
            <option value="mid" selected>🟡 中</option>
            <option value="low">🟢 低</option>
          </select>
        </div>
      </div>
      <div class="frow">
        <div class="fg">
          <label class="flbl">截止日期</label>
          <input class="fi" id="iDeadline" type="date">
        </div>
        <div class="fg">
          <label class="flbl">单位（可选）</label>
          <input class="fi" id="iUnit" placeholder="章 / 次 / 页…" maxlength="10">
        </div>
      </div>
      <div class="frow">
        <div class="fg">
          <label class="flbl">已完成数量</label>
          <input class="fi" id="iDone" type="number" min="0" value="0" placeholder="例如 6">
        </div>
        <div class="fg">
          <label class="flbl">总数量 *</label>
          <input class="fi" id="iTotal" type="number" min="1" value="10" placeholder="例如 10">
        </div>
      </div>
      <div class="fg">
        <label class="flbl">颜色</label>
        <div class="crow" id="colorRow"></div>
      </div>
    </div>
    <div class="mfoot">
      <button class="btn btn-ghost" onclick="closeM('goalModal')">取消</button>
      <button class="btn btn-pri" onclick="saveGoal()">保存</button>
    </div>
  </div>
</div>

<!-- PROGRESS MODAL -->
<div class="overlay" id="progModal">
  <div class="modal" style="max-width:420px;">
    <div class="mhd" id="progMTitle">更新进度</div>
    <div class="mbody">
      <div id="progPreview" style="margin-bottom:6px;"></div>
      <!-- fraction display -->
      <div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:18px;">
        <input class="fi" id="qDone" type="number" min="0" value="0"
          style="width:88px;font-size:28px;font-weight:600;text-align:center;padding:10px 8px;font-family:var(--mono);"
          oninput="onQDone()">
        <span style="font-size:24px;color:var(--text3);font-weight:300;">/</span>
        <input class="fi" id="qTotal" type="number" min="1" value="10"
          style="width:88px;font-size:28px;font-weight:600;text-align:center;padding:10px 8px;font-family:var(--mono);color:var(--text2);"
          oninput="onQDone()">
        <span id="qUnitLabel" style="font-size:14px;color:var(--text2);min-width:32px;"></span>
      </div>
      <div style="text-align:center;margin-bottom:14px;">
        <span id="qPctDisplay" style="font-size:18px;font-weight:600;font-family:var(--mono);color:var(--blue);">0%</span>
        <span style="font-size:12px;color:var(--text3);margin-left:6px;">完成率</span>
      </div>
      <!-- quick +1 / +5 buttons -->
      <div class="qbtns" style="justify-content:center;">
        <span class="qb" onclick="stepDone(-5)">－5</span>
        <span class="qb" onclick="stepDone(-1)">－1</span>
        <span class="qb" onclick="stepDone(1)">＋1</span>
        <span class="qb" onclick="stepDone(5)">＋5</span>
        <span class="qb" onclick="setDoneMax()">全部完成 🎉</span>
      </div>
      <div class="fg" style="margin-top:14px;">
        <label class="flbl">备注（可选）</label>
        <input class="fi" id="qNote" placeholder="这次更新的说明…" maxlength="80">
      </div>
    </div>
    <div class="mfoot">
      <button class="btn btn-ghost" onclick="closeM('progModal')">取消</button>
      <button class="btn btn-pri" onclick="saveQ()">确认更新</button>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="overlay" id="detailModal">
  <div class="modal" style="max-width:540px;">
    <div class="mhd" id="dTitle"></div>
    <div class="mbody" id="dBody"></div>
    <div class="mfoot">
      <button class="btn btn-ghost" onclick="closeM('detailModal')">关闭</button>
      <button class="btn btn-pri" id="dEditBtn">编辑目标</button>
    </div>
  </div>
</div>

<!-- COUNTDOWN SETTINGS MODAL -->
<div class="overlay" id="cdModal">
  <div class="modal" style="max-width:560px;">
    <div class="mhd">⏱ 倒计时管理</div>
    <div class="mbody" style="max-height:65vh;overflow-y:auto;">
      <div id="cdList" style="display:flex;flex-direction:column;gap:10px;margin-bottom:4px;"></div>
      <button class="btn btn-ghost" style="width:100%;justify-content:center;margin-top:4px;" onclick="addCdItem()">＋ 添加倒计时</button>
    </div>
    <div class="mfoot">
      <button class="btn btn-ghost" onclick="closeM('cdModal')">关闭</button>
      <button class="btn btn-pri" onclick="saveCd()">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* DATA */
const COLORS=[
  {id:'blue',hex:'#4d9ef7',dim:'rgba(77,158,247,0.12)'},
  {id:'green',hex:'#34c76a',dim:'rgba(52,199,106,0.12)'},
  {id:'yellow',hex:'#f5a623',dim:'rgba(245,166,35,0.12)'},
  {id:'red',hex:'#ff5c5c',dim:'rgba(255,92,92,0.12)'},
  {id:'purple',hex:'#b57bee',dim:'rgba(181,123,238,0.12)'},
  {id:'teal',hex:'#2dd4bf',dim:'rgba(45,212,191,0.12)'},
  {id:'pink',hex:'#f472b6',dim:'rgba(244,114,182,0.12)'},
  {id:'orange',hex:'#fb923c',dim:'rgba(251,146,60,0.12)'},
];

function gc(id){return COLORS.find(c=>c.id===id)||COLORS[0];}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* SEGMENTED BAR */
function segBar(pct,segs,h){
  const done=Math.round(pct/100*segs);
  let s=`<div class="segbar" style="height:${h}px;">`;
  for(let i=0;i<segs;i++) s+=`<div class="seg ${i<done?'done':'todo'}"></div>`;
  return s+'</div>';
}

/* STATS */
function renderStats(){
  const tot=goals.length,done=goals.filter(g=>getPct(g)===100).length;
  const avg=tot?Math.round(goals.reduce((s,g)=>s+getPct(g),0)/tot):0;
  const today=new Date().toISOString().slice(0,10);
  const ov=goals.filter(g=>g.deadline&&g.deadline<today&&getPct(g)<100).length;
  let h=`
    <div class="stat"><div class="stat-dot" style="background:#4d9ef7;"></div><span class="stat-v" style="color:#4d9ef7;">${tot}</span><span class="stat-lbl">目标总数</span></div>
    <div class="stat"><div class="stat-dot" style="background:#34c76a;"></div><span class="stat-v" style="color:#34c76a;">${done}</span><span class="stat-lbl">已完成</span></div>
    <div class="stat"><div class="stat-dot" style="background:#f5a623;"></div><span class="stat-v" style="color:#f5a623;">${avg}%</span><span class="stat-lbl">平均进度</span></div>`;
  if(ov) h+=`<div class="stat"><div class="stat-dot" style="background:#ff5c5c;"></div><span class="stat-v" style="color:#ff5c5c;">${ov}</span><span class="stat-lbl">逾期</span></div>`;
  document.getElementById('statsEl').innerHTML=h;
}

/* FILTER/SORT */
function setFilter(f,el){
  filter=f;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  render();
}
function setSort(v){sort=v;render();}

function filtered(){
  const today=new Date().toISOString().slice(0,10);
  let l=[...goals];
  if(filter==='active') l=l.filter(g=>getPct(g)>0&&getPct(g)<100);
  else if(filter==='done') l=l.filter(g=>getPct(g)===100);
  else if(filter==='overdue') l=l.filter(g=>g.deadline&&g.deadline<today&&getPct(g)<100);
  if(sort==='progress-asc') l.sort((a,b)=>getPct(a)-getPct(b));
  else if(sort==='progress-desc') l.sort((a,b)=>getPct(b)-getPct(a));
  else if(sort==='deadline') l.sort((a,b)=>(a.deadline||'9999')>(b.deadline||'9999')?1:-1);
  else if(sort==='name') l.sort((a,b)=>a.name.localeCompare(b.name,'zh'));
  else l.sort((a,b)=>b.created-a.created);
  return l;
}

function onQDone(){
  const d=Math.max(0,parseInt(document.getElementById('qDone').value)||0);
  const t=Math.max(1,parseInt(document.getElementById('qTotal').value)||1);
  const pct=Math.min(100,Math.round(d/t*100));
  document.getElementById('qPctDisplay').textContent=pct+'%';
  document.getElementById('progPreview').innerHTML=segBar(pct,40,10);
}
function stepDone(delta){
  const inp=document.getElementById('qDone');
  const t=Math.max(1,parseInt(document.getElementById('qTotal').value)||1);
  const cur=parseInt(inp.value)||0;
  inp.value=Math.max(0,Math.min(t,cur+delta));
  onQDone();
}
function setDoneMax(){
  const t=Math.max(1,parseInt(document.getElementById('qTotal').value)||1);
  document.getElementById('qDone').value=t;
  onQDone();
}
function saveQ(){
  if(quickId===null)return;
  const doneVal=Math.max(0,parseInt(document.getElementById('qDone').value)||0);
  const totalVal=Math.max(1,parseInt(document.getElementById('qTotal').value)||1);
  const note=document.getElementById('qNote').value.trim();
  const g=goals.find(x=>x.id===quickId);
  if(g){
    g.done=Math.min(doneVal,totalVal);
    g.total=totalVal;
    if(!g.history)g.history=[];
    g.history.push({date:new Date().toISOString().slice(0,10),done:g.done,total:g.total,note});
  }
  save();render();closeM('progModal');
  const pct=getPct(g);
  toast(pct===100?'🎉 目标完成！干得漂亮！':'进度已更新 → '+g.done+'/'+g.total+' ('+pct+'%)');
}

/* COUNTDOWN */
const CD_FORMATS=[
  {id:'d',label:'天',desc:'只显示天数'},
  {id:'h',label:'时',desc:'只显示小时'},
  {id:'m',label:'分',desc:'只显示分钟'},
  {id:'dh',label:'天时',desc:'天 + 小时'},
  {id:'dhm',label:'天时分',desc:'天 + 小时 + 分钟'},
  {id:'dhms',label:'天时分秒',desc:'实时秒级'},
  {id:'Wd',label:'周天',desc:'周 + 天'},
  {id:'Mwd',label:'月周天',desc:'月 + 周 + 天'},
  {id:'Md',label:'月天',desc:'月 + 天'},
];
let countdowns=JSON.parse(localStorage.getItem('cd_v2')||'null')||[
  {id:1,label:'期末考试',emoji:'📝',target:'2026-06-20',format:'dhm',color:'#4d9ef7'},
  {id:2,label:'元旦',emoji:'🎆',target:'2027-01-01',format:'Md',color:'#34c76a'},
];
let cdDraft=[],cdTimer=null;
function saveCdData(){localStorage.setItem('cd_v2',JSON.stringify(countdowns));}

function calcCountdown(targetDate,fmt){
  const now=new Date(),target=new Date(targetDate+'T00:00:00');
  const diff=target-now,past=diff<0,abs=Math.abs(diff);
  const totalSec=Math.floor(abs/1000),totalMin=Math.floor(totalSec/60);
  const totalH=Math.floor(totalMin/60),totalD=Math.floor(totalH/24);
  const totalW=Math.floor(totalD/7),totalM=Math.floor(totalD/30.436875);
  const s=totalSec%60,m=totalMin%60,h=totalH%24;
  const wd=totalD-(totalW*7),dInM=totalD-Math.floor(totalM*30.436875);
  let parts=[];
  if(fmt==='d') parts=[{v:totalD,u:'天'}];
  else if(fmt==='h') parts=[{v:totalH,u:'时'}];
  else if(fmt==='m') parts=[{v:totalMin,u:'分'}];
  else if(fmt==='dh') parts=[{v:totalD,u:'天'},{v:h,u:'时'}];
  else if(fmt==='dhm') parts=[{v:totalD,u:'天'},{v:h,u:'时'},{v:m,u:'分'}];
  else if(fmt==='dhms') parts=[{v:totalD,u:'天'},{v:h,u:'时'},{v:m,u:'分'},{v:s,u:'秒'}];
  else if(fmt==='Wd') parts=[{v:totalW,u:'周'},{v:wd,u:'天'}];
  else if(fmt==='Mwd') parts=[{v:totalM,u:'月'},{v:Math.floor(dInM/7),u:'周'},{v:dInM%7,u:'天'}];
  else if(fmt==='Md') parts=[{v:totalM,u:'月'},{v:dInM,u:'天'}];
  return {parts,past,totalD};
}

function renderCdBanner(){
  const strip=document.getElementById('cdStrip');
  const banner=document.getElementById('cdBanner');
  if(!countdowns.length){banner.classList.remove('visible');return;}
  banner.classList.add('visible');
  strip.innerHTML=countdowns.map(function(cd){
    const res=calcCountdown(cd.target,cd.format);
    const parts=res.parts,past=res.past,totalD=res.totalD;
    const numColor=cd.color||(totalD<=3?'#ff5c5c':totalD<=14?'#f5a623':'#4d9ef7');
    const urgClass=past?'cd-past':totalD<=3?'cd-urgent':totalD<=14?'cd-warn':'cd-ok';
    let numsHtml='';
    for(let i=0;i<parts.length;i++){
      numsHtml+='<div class="cd-unit-group"><span class="cd-num" style="color:'+numColor+';">'+String(parts[i].v).padStart(2,'0')+'</span><span class="cd-unit">'+parts[i].u+'</span></div>';
      if(i<parts.length-1) numsHtml+='<span class="cd-sep">·</span>';
    }
    const pastLabel=past?'<span style="font-size:10px;color:var(--text3);margin-left:4px;">已过</span>':'';
    return '<div class="cd-item '+urgClass+'" id="cdi'+cd.id+'"><div class="cd-item-left"><span class="cd-emoji">'+(cd.emoji||'⏱')+'</span><span class="cd-label">'+esc(cd.label)+pastLabel+'</span></div><div class="cd-numbers">'+numsHtml+'</div><div class="cd-actions-ico"><button class="btn btn-ico" onclick="openCdSettings()" title="管理倒计时">✎</button><button class="btn btn-ico del" onclick="deleteCd('+cd.id+')" title="删除">✕</button></div></div>';
  }).join('');
}

function startCdTimer(){
  if(cdTimer) clearInterval(cdTimer);
  renderCdBanner();
  const hasSeconds=countdowns.some(function(c){return c.format==='dhms';});
  cdTimer=setInterval(renderCdBanner,hasSeconds?1000:30000);
}

function deleteCd(id){
  countdowns=countdowns.filter(function(c){return c.id!==id;});
  saveCdData();startCdTimer();toast('倒计时已删除');
}

function openCdSettings(){
  cdDraft=JSON.parse(JSON.stringify(countdowns));
  renderCdList();
  openM('cdModal');
}

function renderCdList(){
  const el=document.getElementById('cdList');
  if(!cdDraft.length){
    el.innerHTML='<div style="text-align:center;padding:24px;color:var(--text3);font-size:13px;">还没有倒计时，点击下方按钮添加 👇</div>';
    return;
  }
  const colorOpts=['#4d9ef7','#34c76a','#f5a623','#ff5c5c','#b57bee','#2dd4bf','#f472b6','#fb923c'];
  let html='';
  for(let i=0;i<cdDraft.length;i++){
    const cd=cdDraft[i];
    let fmtOptions='';
    for(let fi=0;fi<CD_FORMATS.length;fi++){
      const f=CD_FORMATS[fi];
      fmtOptions+='<option value="'+f.id+'"'+(cd.format===f.id?' selected':'')+'>'+(f.label)+' — '+f.desc+'</option>';
    }
    let colorDots='';
    for(let ci=0;ci<colorOpts.length;ci++){
      const hex=colorOpts[ci];
      colorDots+='<div data-i="'+i+'" data-c="'+hex+'" onclick="cdDraft['+i+'].color=\''+hex+'\';renderCdList()" style="width:22px;height:22px;border-radius:50%;background:'+hex+';cursor:pointer;border:2.5px solid '+(cd.color===hex?'#fff':'transparent')+';transition:border-color .1s;flex-shrink:0;"></div>';
    }
    html+='<div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;">'
      +'<div style="display:grid;grid-template-columns:50px 1fr 1fr;gap:10px;align-items:end;margin-bottom:10px;">'
      +'<div class="fg"><label class="flbl">图标</label><input class="fi" value="'+esc(cd.emoji||'⏱')+'" maxlength="2" style="text-align:center;font-size:18px;padding:6px;" oninput="cdDraft['+i+'].emoji=this.value"></div>'
      +'<div class="fg"><label class="flbl">名称 *</label><input class="fi" value="'+esc(cd.label)+'" maxlength="20" placeholder="倒计时名称…" oninput="cdDraft['+i+'].label=this.value"></div>'
      +'<div class="fg"><label class="flbl">目标日期 *</label><input class="fi" type="date" value="'+cd.target+'" onchange="cdDraft['+i+'].target=this.value"></div>'
      +'</div>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr 36px;gap:10px;align-items:end;">'
      +'<div class="fg"><label class="flbl">显示格式</label><select class="fi" onchange="cdDraft['+i+'].format=this.value">'+fmtOptions+'</select></div>'
      +'<div class="fg"><label class="flbl">数字颜色</label><div style="display:flex;gap:7px;flex-wrap:wrap;padding-top:8px;">'+colorDots+'</div></div>'
      +'<div class="fg" style="align-self:end;"><button class="btn btn-ico del" style="width:36px;height:36px;" onclick="cdDraft.splice('+i+',1);renderCdList()" title="删除此倒计时">✕</button></div>'
      +'</div></div>';
  }
  el.innerHTML=html;
}

function addCdItem(){
  const d=new Date(Date.now()+864e5*30).toISOString().slice(0,10);
  cdDraft.push({id:Date.now(),label:'新倒计时',emoji:'⏱',target:d,format:'dhm',color:'#4d9ef7'});
  renderCdList();
  setTimeout(function(){document.getElementById('cdList').lastElementChild.scrollIntoView({behavior:'smooth'});},80);
}

function saveCd(){
  countdowns=JSON.parse(JSON.stringify(cdDraft));
  saveCdData();startCdTimer();closeM('cdModal');
  toast('倒计时已保存 ✓');
}


/* INIT */
initGreeting();
render();
startCdTimer();
</script>
</body>
</html>
