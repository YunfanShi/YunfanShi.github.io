=false;\nlet customBellObjectUrl='',customBellPlaybackSrc='';\nlet mediaPermissionPrimed=false;\nlet pomodoroSessionSerial=0,quoteCursor=0;\n// RAF-based tick\nlet globalRafId=null,lastTickMs=0;\n// Waveform\nlet waveRafId=null;\n// Drag-sort\nlet dragSrcId=null;\n\nconst PRE_END_ALERT_THRESHOLD=20;\nconst DEFAULT_BELL_UNATTENDED_DELAY_SEC=60;\nconst MIN_BELL_UNATTENDED_DELAY_SEC=5;\nconst MAX_BELL_UNATTENDED_DELAY_SEC=600;\nconst TONE_LOOP_INTERVAL_MS=1200;\nconst HITOKOTO_API_URL='https://v1.hitokoto.cn/?c=d&c=i&c=k&encode=json&min_length=8&max_length=60';\nconst AUDIO_DB_NAME='igcountdown_audio_v1';\nconst AUDIO_DB_STORE='audioFiles';\nconst AUDIO_DB_KEY='customBell';\nconst RING_R=85;\nconst RING_CIRC=2*Math.PI*RING_R;\n\n// ============================================================\n// I18N\n// ============================================================\nfunction getLanguage(){return settings.language==='en'?'en':'zh';}\nfunction t(key){const m={zh:{appSub:\"Jack's Ecosystem · 考试计时器\",fsExit:'退出全屏',statusReady:'准备',statusRunning:'计时中',statusPaused:'已暂停',statusDone:'完成',tapToContinue:'点击屏幕继续'},en:{appSub:\"Jack's Ecosystem · Exam Timer\",fsExit:'Exit fullscreen',statusReady:'Ready',statusRunning:'Running',statusPaused:'Paused',statusDone:'Done',tapToContinue:'Tap screen to continue'}};const l=getLanguage();return(m[l]&&m[l][key])||key;}\nfunction applyI18n(){\n  const s=(id,v)=>{const e=document.getElementById(id);if(e&&v!==undefined)e.textContent=v;};\n  s('appBarSub',t('appSub'));s('fsExitText',t('fsExit'));\n  refreshMotivationQuote(false);renderSettingsUI();\n}\n\n// ============================================================\n// PERSISTENCE\n// ============================================================\nconst SK='igcse_timer_v6';\nfunction openAudioDb(){return new Promise((resolve,reject)=>{if(!window.indexedDB){reject(new Error('no IDB'));return;}const req=indexedDB.open(AUDIO_DB_NAME,1);req.onupgradeneeded=()=>{const db=req.result;if(!db.objectStoreNames.contains(AUDIO_DB_STORE))db.createObjectStore(AUDIO_DB_STORE);};req.onsuccess=()=>resolve(req.result);req.onerror=()=>reject(req.error);});}\nasync function saveCustomAudioToIndexedDb(file){const db=await openAudioDb();return new Promise((resolve,reject)=>{const tx=db.transaction(AUDIO_DB_STORE,'readwrite');tx.oncomplete=()=>{db.close();resolve(true);};tx.onerror=()=>{db.close();reject(tx.error);};tx.objectStore(AUDIO_DB_STORE).put({blob:file,type:file.type||'audio/mpeg',name:file.name||''},AUDIO_DB_KEY);});}\nasync function readCustomAudioFromIndexedDb(){const db=await openAudioDb();return new Promise((resolve,reject)=>{const tx=db.transaction(AUDIO_DB_STORE,'readonly');const req=tx.objectStore(AUDIO_DB_STORE).get(AUDIO_DB_KEY);req.onsuccess=()=>{db.close();const v=req.result;if(v&&v.blob instanceof Blob)resolve(v);else resolve(null);};req.onerror=()=>{db.close();reject(req.error);};});}\nasync function clearCustomAudioFromIndexedDb(){try{const db=await openAudioDb();await new Promise((resolve,reject)=>{const tx=db.transaction(AUDIO_DB_STORE,'readwrite');tx.oncomplete=()=>{db.close();resolve();};tx.onerror=()=>{db.close();reject();};tx.objectStore(AUDIO_DB_STORE).delete(AUDIO_DB_KEY);});}catch(e){}}\nfunction setCustomAudioPreviewSrc(src){const p=document.getElementById('customAudioPreview');if(!p)return;if(customBellObjectUrl&&customBellObjectUrl!==src)URL.revokeObjectURL(customBellObjectUrl);customBellObjectUrl=src&&String(src).startsWith('blob:')?src:'';p.src=src||'';p.style.display=src?'block':'none';}\nasync function restoreCustomAudioFromStorage(){try{const stored=await readCustomAudioFromIndexedDb();if(stored?.blob){const src=URL.createObjectURL(stored.blob);customBellPlaybackSrc=src;settings.customBellType=stored.type||settings.customBellType||'audio/mpeg';setCustomAudioPreviewSrc(src);return true;}}catch(e){}if(settings.customBellData){customBellPlaybackSrc=settings.customBellData;setCustomAudioPreviewSrc(settings.customBellData);return true;}customBellPlaybackSrc='';setCustomAudioPreviewSrc('');return false;}\nfunction persist(){const snap={timers:timers.map(t=>({id:t.id,name:t.name,color:t.color,subj:t.subj,paperId:t.paperId,paper:t.paper,marks:t.marks,total:t.total,left:t.left,running:false,paused:t.paused||!t.running,done:t.done,note:t.note||'',saveInterval:t.saveInterval,createdAt:t.createdAt,startedAt:t.startedAt,finishSceneData:t.finishSceneData||null,pomodoroPhase:t.pomodoroPhase||null,pomodoroCycle:Number(t.pomodoroCycle)||0})),history:getHistory(),stats:getStats(),settings,heatmap:getHeatmap()};localStorage.setItem(SK,JSON.stringify(snap));}\nfunction loadPersisted(){try{const raw=localStorage.getItem(SK);if(!raw)return;const s=JSON.parse(raw);if(s.settings)settings={...settings,...s.settings};settings.language=settings.language==='en'?'en':'zh';settings.bellSource=settings.bellSource==='netease'?'netease':'local';settings.bellUnattendedAction=['manual','mute','close'].includes(settings.bellUnattendedAction)?settings.bellUnattendedAction:'manual';const ud=Number(settings.bellUnattendedDelaySec);settings.bellUnattendedDelaySec=Number.isFinite(ud)?Math.min(MAX_BELL_UNATTENDED_DELAY_SEC,Math.max(MIN_BELL_UNATTENDED_DELAY_SEC,Math.round(ud))):DEFAULT_BELL_UNATTENDED_DELAY_SEC;settings.autoFS=settings.autoFS!==false;settings.fullscreenFx=!!settings.fullscreenFx;settings.interruptLog=settings.interruptLog!==false;settings.pomodoroAutoCycle=settings.pomodoroAutoCycle!==false;settings.pomodoroFocusMin=Math.min(90,Math.max(10,Number(settings.pomodoroFocusMin)||25));settings.pomodoroBreakMin=Math.min(30,Math.max(3,Number(settings.pomodoroBreakMin)||5));settings.bellVolume=Math.min(1,Math.max(0.1,Number(settings.bellVolume)||0.8));if(s.timers){timers=s.timers.map(t=>({...t,running:false,paused:true,_interval:null,_saveCountdown:t.saveInterval||5,_preEndAlerted:false,_muteNextRing:false,_finishScenePrefetching:false,pomodoroPhase:t.pomodoroPhase||null,pomodoroCycle:Number(t.pomodoroCycle)||0}));}}catch(e){console.warn('load failed',e);}}\nfunction getHistory(){try{return JSON.parse(localStorage.getItem('igcse_hist')||'[]');}catch(e){return[];}}\nfunction saveHistory(h){localStorage.setItem('igcse_hist',JSON.stringify(h));}\nfunction addHistory(entry){const h=getHistory();h.unshift(entry);if(h.length>200)h.splice(200);saveHistory(h);}\nasync function clearAllHistory(){const{ok}=await showConfirmDialog({title:'清空历史记录',body:'确定清除全部历史记录？',okText:'清空',cancelText:'取消'});if(!ok)return;saveHistory([]);renderHistory();closeModal('historyModal');showSnackbar('历史记录已清除');}\nfunction getStats(){try{return JSON.parse(localStorage.getItem('igcse_stats')||'{}');}catch(e){return{};}}\nfunction saveStats(s){localStorage.setItem('igcse_stats',JSON.stringify(s));}\nfunction getHeatmap(){try{return JSON.parse(localStorage.getItem('igcse_heat')||'{}');}catch(e){return{};}}\nfunction saveHeatmap(h){localStorage.setItem('igcse_heat',JSON.stringify(h));}\nfunction addToHeatmap(mins){const h=getHeatmap();const today=new Date().toISOString().slice(0,10);h[today]=(h[today]||0)+mins;saveHeatmap(h);}\nfunction addToStats(field,val=1){const s=getStats();const today=new Date().toISOString().slice(0,10);if(!s[today])s[today]={focusMins:0,completed:0,pauses:0};s[today][field]=(s[today][field]||0)+val;saveStats(s);}\nfunction getTodayStats(){const s=getStats();const today=new Date().toISOString().slice(0,10);return s[today]||{focusMins:0,completed:0,pauses:0};}\nfunction getCurrentStreakDays(){const stats=getStats();let streak=0;const cursor=new Date();for(let i=0;i<365;i++){const d=cursor.toISOString().slice(0,10);const day=stats[d];if((day?.focusMins||0)>0||(day?.completed||0)>0){streak++;cursor.setDate(cursor.getDate()-1);continue;}break;}return streak;}\nfunction getTodayPomodoroCount(){const stats=getStats();const today=new Date().toISOString().slice(0,10);return(stats[today]?.pomodoroFocus)||0;}\n\n// ============================================================\n// HELPERS\n// ============================================================\nfunction fmtTime(sec){if(sec<0)sec=0;const m=Math.floor(sec/60),s=sec%60;return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');}\nfunction fmtHMS(sec){if(sec<0)sec=0;const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=sec%60;return`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;}\nfunction fmtDur(min){if(min<60)return min+' min';const h=Math.floor(min/60),m=min%60;return m?`${h}h ${m}m`:`${h} hr${h>1?'s':''}`;}\nfunction uid(){return Date.now()+Math.random().toString(36).slice(2,7);}\nfunction esc(v){return String(v??'').replace(/[&<>\"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',\"'\":'&#39;'}[ch]));}\nfunction sanitizeNumericInput(value){return String(value||'').replace(/[^\\d]/g,'');}\nfunction statusText(t){const l=getLanguage()==='en';return t.done?(l?'Done':'完成'):t.running?(l?'Running':'计时中'):t.paused?(l?'Paused':'已暂停'):(l?'Ready':'准备');}\nfunction remainingText(percent){const v=Math.round(percent*100);return getLanguage()==='en'?`${v}% left`:`剩余 ${v}%`;}\nfunction pct(t){if(!t.total)return 0;return Math.max(0,Math.min(1,t.left/t.total));}\nfunction fallbackFinishLines(name='计时器'){const s=String(name||'计时器').slice(0,36);return{zhHans:`${s} 倒计时结束`,en:`${s} countdown finished`,source:''};}\nfunction stripForColor(c){return`linear-gradient(90deg,${c} 0 25%,#ea4335 25% 50%,#fbbc04 50% 75%,#34a853 75%)`;}\n\n// ============================================================\n// CSV EXPORT\n// ============================================================\nfunction exportHistoryCsv(){\n  const h=getHistory();\n  if(!h.length){showSnackbar('暂无历史记录可导出');return;}\n  const headers=['Name','Subject','Paper','Duration(min)','SpentTime(min)','PauseCount','Note','CompletedAt'];\n  const rows=h.map(e=>[`\"${(e.name||'').replace(/\"/g,'\"\"')}\"`,e.subj||'',e.paper||'',e.dur||0,e.spentMins||0,e.pauseCount||0,`\"${(e.note||'').replace(/\"/g,'\"\"')}\"`,e.completedAt?new Date(e.completedAt).toLocaleString('zh-CN'):''    ].join(','));\n  const csv=[headers.join(','),...rows].join('\\n');\n  const blob=new Blob(['\\ufeff'+csv],{type:'text/csv;charset=utf-8'});\n  const url=URL.createObjectURL(blob);\n  const a=document.createElement('a');a.href=url;a.download=`igcse_timer_history_${new Date().toISOString().slice(0,10)}.csv`;a.click();\n  setTimeout(()=>URL.revokeObjectURL(url),1000);\n  showSnackbar(`已导出 ${h.length} 条记录`);\n}\n\n// ============================================================\n// MOTIVATION QUOTE\n// ============================================================\nfunction refreshMotivationQuote(advance=false){\n  if(advance)quoteCursor=(quoteCursor+1)%FOCUS_QUOTES.length;\n  const q=FOCUS_QUOTES[quoteCursor%FOCUS_QUOTES.length];\n  const lang=getLanguage();\n  const textEl=document.getElementById('motivationQuoteText');\n  const metaEl=document.getElementById('motivationQuoteMeta');\n  if(textEl)textEl.textContent=lang==='en'?q.en:q.zh;\n  if(metaEl)metaEl.textContent='— IGCSE Focus Companion';\n}\n\n// ============================================================\n// QUICK START\n// ============================================================\nfunction renderQuickStart(){\n  const wrap=document.getElementById('igcseQuickstart');\n  const focusMin=Math.min(90,Math.max(10,Number(settings.pomodoroFocusMin)||25));\n  const breakMin=Math.min(30,Math.max(3,Number(settings.pomodoroBreakMin)||5));\n  const shown=[\n    {id:'0580P4',icon:'📐',color:'#1a73e8',bg:'#e8f0fe'},{id:'0580P2',icon:'📐',color:'#1a73e8',bg:'#e8f0fe'},\n    {id:'0625P4',icon:'⚡',color:'#9c27b0',bg:'#f3e5f5'},{id:'0625P2',icon:'⚡',color:'#9c27b0',bg:'#f3e5f5'},\n    {id:'0620P4',icon:'⚗️',color:'#fa7b17',bg:'#fce8b2'},{id:'0620P6',icon:'⚗️',color:'#fa7b17',bg:'#fce8b2'},\n    {id:'0610P4',icon:'🔬',color:'#34a853',bg:'#e6f4ea'},{id:'0610P6',icon:'🔬',color:'#34a853',bg:'#e6f4ea'},\n    {id:'0500P1',icon:'📚',color:'#ea4335',bg:'#fce8e6'},\n  ];\n  const paperHtml=shown.map(s=>{const p=IGCSE_PAPERS.find(x=>x.id===s.id);if(!p)return'';return`<button class=\"igcse-chip\" onclick=\"quickLaunch('${p.id}')\" title=\"${p.name} · ${fmtDur(p.dur)}\"><div class=\"igcse-chip-icon\" style=\"background:${s.bg};color:${s.color};\">${s.icon}</div><div class=\"igcse-chip-info\"><div class=\"igcse-chip-name\" style=\"color:${s.color};\">${p.subj}/${p.paper.replace('Paper ','P')}</div><div class=\"igcse-chip-meta\">${fmtDur(p.dur)} · ${p.marks}m</div></div></button>`;}).join('');\n  const pomHtml=`<button class=\"igcse-chip\" onclick=\"startPomodoroFocus()\" title=\"Pomodoro ${focusMin}/${breakMin}\"><div class=\"igcse-chip-icon\" style=\"background:#fee2e2;color:#ef4444;\">🍅</div><div class=\"igcse-chip-info\"><div class=\"igcse-chip-name\" style=\"color:#ef4444;\">Pomodoro</div><div class=\"igcse-chip-meta\">${focusMin}m focus · ${breakMin}m break</div></div></button>`;\n  wrap.innerHTML=pomHtml+paperHtml;\n}\nfunction quickLaunch(paperId){const p=IGCSE_PAPERS.find(x=>x.id===paperId);if(!p)return;createTimer({name:`${p.subj} ${p.paper}`,color:p.color,subj:p.subj,paperId:p.id,paper:p.paper,marks:p.marks,dur:p.dur,saveInterval:5,note:''});showSnackbar(`启动：${p.name} (${fmtDur(p.dur)})`);}\nfunction startPomodoroFocus(){pomodoroSessionSerial++;const focusMin=Math.min(90,Math.max(10,Number(settings.pomodoroFocusMin)||25));createTimer({name:`🍅 Pomodoro Focus #${pomodoroSessionSerial}`,color:'#ef4444',subj:'custom',dur:focusMin,saveInterval:5,note:'',pomodoroPhase:'focus',pomodoroCycle:pomodoroSessionSerial});}\n\n// ============================================================\n// CREATE MODAL\n// ============================================================\nfunction openCreateModal(){\n  editingTimerId=null;selColor=COLORS[0];selDur=null;selIgcse=null;\n  document.getElementById('f-name').value='';document.getElementById('f-dur').value='';\n  document.getElementById('f-note').value='';document.getElementById('f-saveInterval').value='5';\n  document.getElementById('createModalTitle').textContent='新建计时器';\n  setCreateModalAction('play_arrow','启动计时');\n  const ic=document.getElementById('igcseChips');\n  ic.innerHTML=IGCSE_PAPERS.map(p=>`<button class=\"form-chip\" data-igcse=\"${p.id}\" onclick=\"pickIgcse('${p.id}')\" title=\"${p.tier} · ${fmtDur(p.dur)}\">${p.name}</button>`).join('');\n  const dc=document.getElementById('durChips');\n  dc.innerHTML=DUR_PRESETS.map(d=>`<button class=\"form-chip\" data-dur=\"${d.v}\" onclick=\"pickDur(${d.v})\">${d.label}</button>`).join('');\n  renderColorDots();openModal('createModal');setTimeout(()=>document.getElementById('f-name').focus(),300);\n}\nfunction setCreateModalAction(icon,text){const btn=document.getElementById('createModalConfirmBtn');if(!btn)return;btn.innerHTML=`<span class=\"material-icons-round\">${icon}</span> ${text}`;}\nfunction getTimerDurationMinutes(t){if(Number.isFinite(t?.dur)&&t.dur>0)return t.dur;if(Number.isFinite(t?.total))return Math.max(1,Math.round(t.total/60));return 1;}\nfunction openEditModal(id){\n  const t=timers.find(x=>x.id===id);if(!t)return;\n  editingTimerId=id;selColor=t.color||COLORS[0];selDur=getTimerDurationMinutes(t);\n  selIgcse=t.paperId?IGCSE_PAPERS.find(p=>p.id===t.paperId):null;\n  document.getElementById('f-name').value=t.name||'';document.getElementById('f-dur').value=selDur;\n  document.getElementById('f-note').value=t.note||'';document.getElementById('f-saveInterval').value=String(t.saveInterval||5);\n  document.getElementById('createModalTitle').textContent='编辑计时器';setCreateModalAction('save','保存修改');\n  const ic=document.getElementById('igcseChips');\n  ic.innerHTML=IGCSE_PAPERS.map(p=>`<button class=\"form-chip\" data-igcse=\"${p.id}\" onclick=\"pickIgcse('${p.id}')\">${p.name}</button>`).join('');\n  document.querySelectorAll('#igcseChips .form-chip').forEach(b=>b.classList.toggle('sel',selIgcse&&b.dataset.igcse===selIgcse.id));\n  const dc=document.getElementById('durChips');\n  dc.innerHTML=DUR_PRESETS.map(d=>`<button class=\"form-chip\" data-dur=\"${d.v}\" onclick=\"pickDur(${d.v})\">${d.label}</button>`).join('');\n  document.querySelectorAll('#durChips .form-chip').forEach(b=>b.classList.toggle('sel',Number(b.dataset.dur)===selDur));\n  renderColorDots();openModal('createModal');setTimeout(()=>document.getElementById('f-name').focus(),300);\n}\nfunction pickIgcse(id){selIgcse=IGCSE_PAPERS.find(p=>p.id===id);if(!selIgcse)return;document.getElementById('f-name').value=`${selIgcse.subj} ${selIgcse.paper}`;pickDur(selIgcse.dur);pickColor(selIgcse.color);document.querySelectorAll('#igcseChips .form-chip').forEach(b=>b.classList.toggle('sel',b.dataset.igcse===id));}\nfunction pickDur(v){selDur=v;document.getElementById('f-dur').value=v;document.querySelectorAll('#durChips .form-chip').forEach(b=>b.classList.toggle('sel',Number(b.dataset.dur)===v));}\nfunction pickColor(c){selColor=c;document.querySelectorAll('#colorDots .color-dot').forEach(d=>d.classList.toggle('sel',d.style.background===c));}\nfunction renderColorDots(){const cd=document.getElementById('colorDots');cd.innerHTML=COLORS.map(c=>`<div class=\"color-dot${c===selColor?' sel':''}\" style=\"background:${c};\" onclick=\"pickColor('${c}')\"></div>`).join('');}\nfunction confirmCreate(){\n  const name=document.getElementById('f-name').value.trim()||'Custom Timer';\n  const dur=parseInt(document.getElementById('f-dur').value)||selDur;\n  const note=document.getElementById('f-note').value.trim();\n  const si=parseInt(document.getElementById('f-saveInterval').value)||5;\n  if(!dur||dur<1){showSnackbar('请选择或输入时长');return;}\n  closeModal('createModal');\n  if(editingTimerId){\n    const t=timers.find(x=>x.id===editingTimerId);if(!t){editingTimerId=null;return;}\n    t.name=name;t.color=selColor;t.subj=selIgcse?selIgcse.subj:'custom';\n    t.paperId=selIgcse?selIgcse.id:null;t.paper=selIgcse?selIgcse.paper:null;t.marks=selIgcse?selIgcse.marks:null;\n    t.note=note;t.saveInterval=si;t._saveCountdown=si;\n    const nextDur=Math.max(1,dur);\n    if(t.dur!==nextDur)setTimerDur(editingTimerId,nextDur);\n    else{persist();renderTimerCard(editingTimerId);refreshFsDisplay();updateMiniPill();}\n    editingTimerId=null;showSnackbar('计时器信息已更新');return;\n  }\n  createTimer({name,color:selColor,subj:selIgcse?selIgcse.subj:'custom',paperId:selIgcse?selIgcse.id:null,paper:selIgcse?selIgcse.paper:null,marks:selIgcse?selIgcse.marks:null,dur,saveInterval:si,note});\n}\n\n// ============================================================\n// TIMER LIFECYCLE\n// ============================================================\nfunction createTimer(cfg){\n  const t={id:uid(),name:cfg.name,color:cfg.color||COLORS[0],subj:cfg.subj||'custom',paperId:cfg.paperId||null,paper:cfg.paper||null,marks:cfg.marks||null,total:cfg.dur*60,left:cfg.left!==undefined?cfg.left:cfg.dur*60,dur:cfg.dur,running:false,paused:false,done:false,note:cfg.note||'',saveInterval:cfg.saveInterval||5,_interval:null,_saveCountdown:cfg.saveInterval||5,_pauseCount:cfg.pauseCount||0,_preEndAlerted:false,_muteNextRing:false,_finishScenePrefetching:false,finishSceneData:cfg.finishSceneData||null,pomodoroPhase:cfg.pomodoroPhase||null,pomodoroCycle:Number(cfg.pomodoroCycle)||0,createdAt:cfg.createdAt||Date.now(),startedAt:null};\n  timers.push(t);\n  currentPage=settings.layoutMode==='carousel'?Math.max(0,timers.length-1):Math.floor((timers.length-1)/3);\n  updateArenaLayout();renderAll();startTimer(t.id);\n  if(settings.autoFS)openFullscreen(t.id);\n  persist();\n}\n\n// RAF global tick — replaces per-timer setInterval for display\nfunction startGlobalRaf(){\n  if(globalRafId)return;\n  function loop(now){\n    globalRafId=requestAnimationFrame(loop);\n    if(now-lastTickMs>=950){lastTickMs=now;tickAllRunningTimers();}\n    if(fsTimerId!==null)refreshFsDisplay();\n    updateMiniPillTime();\n  }\n  lastTickMs=performance.now();\n  globalRafId=requestAnimationFrame(loop);\n}\nfunction stopGlobalRaf(){if(globalRafId){cancelAnimationFrame(globalRafId);globalRafId=null;}}\nfunction tickAllRunningTimers(){let any=false;timers.forEach(t=>{if(t.running&&!t.done){any=true;tickTimer(t.id);}});if(!any)stopGlobalRaf();}\n\nfunction startTimer(id){\n  const t=timers.find(x=>x.id===id);if(!t||t.done)return;\n  primeMediaPlaybackPermission().catch(()=>{});\n  stopDoneSound();\n  if(timers.length>1)timers.filter(x=>x.id!==id&&x.running).forEach(x=>pauseTimer(x.id,false));\n  t.running=true;t.paused=false;\n  if(!t.startedAt)t.startedAt=Date.now();\n  startGlobalRaf();\n  refreshCardControls(id);updateMiniPill();startWaveform(id);\n}\nfunction pauseTimer(id,logPause=true){\n  const t=timers.find(x=>x.id===id);if(!t)return;\n  t.running=false;t.paused=true;\n  if(logPause){t._pauseCount++;addToStats('pauses');if(settings.interruptLog){pendingInterruptTimerId=id;openModal('interruptModal');}}\n  persist();refreshCardControls(id);updateMiniPill();stopWaveform(id);\n  if(!timers.some(x=>x.running))stopGlobalRaf();\n}\nfunction toggleTimer(id){const t=timers.find(x=>x.id===id);if(!t||t.done)return;if(t.running)pauseTimer(id);else startTimer(id);}\nfunction resetTimer(id){\n  const t=timers.find(x=>x.id===id);if(!t)return;\n  stopDoneSound();t.left=t.total;t.running=false;t.paused=false;t.done=false;\n  t._preEndAlerted=false;t._muteNextRing=false;t.startedAt=null;t._pauseCount=0;\n  persist();renderTimerCard(id);updateMiniPill();stopWaveform(id);\n}\nfunction addTime(id,mins){const t=timers.find(x=>x.id===id);if(!t)return;stopDoneSound();t.left+=mins*60;t.total+=mins*60;if(t.done){t.done=false;t.left=mins*60;t.total=mins*60;}if(t.left>PRE_END_ALERT_THRESHOLD)t._preEndAlerted=false;t._muteNextRing=false;persist();renderTimerCard(id);showSnackbar(`+${mins} 分钟已添加`);}\nfunction removeTimer(id){\n  const t=timers.find(x=>x.id===id);if(!t)return;\n  stopDoneSound();stopWaveform(id);\n  const el=document.getElementById('card-'+id);\n  if(el){el.classList.add('exiting');setTimeout(()=>{timers=timers.filter(x=>x.id!==id);renderAll();updateArenaLayout();persist();},250);}\n  else{timers=timers.filter(x=>x.id!==id);renderAll();updateArenaLayout();persist();}\n  if(fsTimerId===id)exitFullscreen();\n  updateMiniPill();\n}\nfunction tickTimer(id){\n  const t=timers.find(x=>x.id===id);if(!t||!t.running)return;\n  t.left=Math.max(0,t.left-1);\n  if(t.left<=PRE_END_ALERT_THRESHOLD&&!t._finishScenePrefetching&&!t.finishSceneData)prefetchFinishSceneData(t.id);\n  if(t.left===PRE_END_ALERT_THRESHOLD&&!t.done&&!t._preEndAlerted){t._preEndAlerted=true;showPreEndBellPopup(t);}\n  t._saveCountdown--;\n  if(t._saveCountdown<=0){t._saveCountdown=t.saveInterval;persist();flashSaveIndicator(id);}\n  refreshTimerDisplay(id);\n  const now=performance.now();if(now-statsRenderClock>900){statsRenderClock=now;renderStats();}\n  if(t.left<=0)onTimerDone(id);\n}\nasync function showPreEndBellPopup(t){if(!t)return;if(!settings.sound){showSnackbar(`⏳ ${t.name} 剩余 ${PRE_END_ALERT_THRESHOLD} 秒`);return;}const{ok}=await showConfirmDialog({title:'结束铃声提醒',body:`⏳ ${t.name} 剩余 ${PRE_END_ALERT_THRESHOLD} 秒，结束时要播放铃声吗？`,okText:'播放铃声',cancelText:'静音结束'});t._muteNextRing=!ok;showSnackbar(ok?'已保留结束铃声':'本次结束将静音');}\nasync function onTimerDone(id){\n  const t=timers.find(x=>x.id===id);if(!t)return;\n  t.running=false;t.done=true;stopWaveform(id);\n  const spentMins=Math.round((t.total-t.left)/60);\n  addToStats('completed');addToStats('focusMins',spentMins);\n  if(t.pomodoroPhase==='focus')addToStats('pomodoroFocus');\n  addToHeatmap(spentMins);\n  const entry={id:t.id,name:t.name,color:t.color,subj:t.subj,paper:t.paper,marks:t.marks,dur:t.dur,spentMins,pauseCount:t._pauseCount,note:t.note,completedAt:Date.now(),type:'completed'};\n  addHistory(entry);persist();\n  const shouldPlayRing=settings.sound&&!t._muteNextRing;\n  const didPlayBell=shouldPlayRing?await playDoneSound():false;\n  t._muteNextRing=false;t._preEndAlerted=false;\n  openFinishScene(t,shouldPlayRing&&settings.bellSource==='netease'&&!!sanitizeNumericInput(settings.neteaseSongId));\n  if(settings.mockLink)notifyMockPortal(entry);if(settings.goalLink)notifyGoalTracker(entry);\n  // Pomodoro auto-cycle\n  if(t.pomodoroPhase==='focus'&&settings.pomodoroAutoCycle){\n    const bMin=Math.min(30,Math.max(3,Number(settings.pomodoroBreakMin)||5));\n    setTimeout(()=>createTimer({name:`☕ Pomodoro Break #${t.pomodoroCycle||1}`,color:'#0ea5e9',subj:'custom',dur:bMin,saveInterval:5,note:'',pomodoroPhase:'break',pomodoroCycle:t.pomodoroCycle||1}),800);\n  }\n  showSnackbar(`✓ ${t.name} — 时间到！`,didPlayBell,didPlayBell?stopDoneSound:null,'停止播放',didPlayBell?null:3200);\n  renderTimerCard(id);refreshFsDisplay();renderStats();renderHistory();renderHeatmap();updateMiniPill();\n  if(!timers.some(x=>x.running))stopGlobalRaf();\n}\nfunction notifyMockPortal(entry){try{const k='warden_mock_portal_v4';const raw=localStorage.getItem(k);if(!raw)return;const s=JSON.parse(raw);if(!s._timerLog)s._timerLog=[];s._timerLog.unshift({from:'igcse-timer',name:entry.name,paper:entry.paper,subj:entry.subj,spentMins:entry.spentMins,completedAt:entry.completedAt});localStorage.setItem(k,JSON.stringify(s));}catch(e){}}\nfunction notifyGoalTracker(entry){try{const k='gt_v6';const raw=localStorage.getItem(k);if(!raw)return;const goals=JSON.parse(raw);const match=goals.find(g=>g.name&&(g.name.toLowerCase().includes(entry.subj)||g.name.toLowerCase().includes(entry.name.toLowerCase().split(' ')[0]))&&g.total>0&&g.done<g.total);if(match){match.done=Math.min(match.total,(match.done||0)+1);if(!match.history)match.history=[];match.history.push({date:new Date().toISOString().slice(0,10),done:match.done,total:match.total,note:`Auto from IGCSE Timer: ${entry.name} (${entry.spentMins}min)`});localStorage.setItem(k,JSON.stringify(goals));}}catch(e){}}\n\n// ============================================================\n// WAVEFORM VISUALIZER\n// ============================================================\nfunction startWaveform(id){\n  stopWaveform(id);\n  const container=document.getElementById('wave-'+id);if(!container)return;\n  container.classList.add('active');\n  const bars=[...container.querySelectorAll('.wave-bar')];\n  let raf;\n  function animate(){\n    bars.forEach((bar,i)=>{\n      const h=Math.max(3,Math.sin(Date.now()/200+i*0.8)*14+16);\n      bar.style.height=h+'px';\n    });\n    raf=requestAnimationFrame(animate);\n  }\n  raf=requestAnimationFrame(animate);\n  container._waveRaf=raf;\n}\nfunction stopWaveform(id){\n  const container=document.getElementById('wave-'+id);if(!container)return;\n  if(container._waveRaf){cancelAnimationFrame(container._waveRaf);container._waveRaf=null;}\n  container.classList.remove('active');\n  container.querySelectorAll('.wave-bar').forEach(b=>b.style.height='3px');\n}\n\n// ============================================================\n// SOUND\n// ============================================================\nfunction getBellUnattendedDelaySec(){const n=Number(settings.bellUnattendedDelaySec);if(!Number.isFinite(n))return DEFAULT_BELL_UNATTENDED_DELAY_SEC;return Math.min(MAX_BELL_UNATTENDED_DELAY_SEC,Math.max(MIN_BELL_UNATTENDED_DELAY_SEC,Math.round(n)));}\nfunction scheduleBellUnattendedAction(){clearTimeout(unattendedBellTimer);unattendedBellTimer=null;const action=settings.bellUnattendedAction;if(action!=='mute'&&action!=='close')return;const delaySec=getBellUnattendedDelaySec();unattendedBellTimer=setTimeout(()=>{if(action==='close'){stopDoneSound(false);dismissFinishScene();showSnackbar('无人值守：已自动静音并关闭结束界面');return;}stopDoneSound(false);showSnackbar('无人值守：已自动静音');},delaySec*1000);}\nasync function primeMediaPlaybackPermission(){if(mediaPermissionPrimed)return;mediaPermissionPrimed=true;try{const Ctx=window.AudioContext||window.webkitAudioContext;if(Ctx){const ac=new Ctx();if(ac.state==='suspended')await ac.resume();try{await ac.close();}catch(e){}}}catch(e){}}\nasync function playDoneSound(){\n  try{\n    stopDoneSound();await primeMediaPlaybackPermission();\n    const bellVolume=Math.min(1,Math.max(0.1,Number(settings.bellVolume)||0.8));\n    const source=settings.bellSource==='netease'?'netease':'local';\n    if(source==='netease'&&sanitizeNumericInput(settings.neteaseSongId)){activeBellMode='netease';showBellStopToast();scheduleBellUnattendedAction();return true;}\n    const customSrc=customBellPlaybackSrc||settings.customBellData;\n    if(source==='local'&&customSrc){const bell=new Audio(customSrc);bell.loop=true;bell.preload='auto';bell.volume=bellVolume;activeBellAudio=bell;try{await bell.play();activeBellMode='custom';showBellStopToast();scheduleBellUnattendedAction();return true;}catch(playErr){activeBellAudio=null;}}\n    const ac=new(window.AudioContext||window.webkitAudioContext)();\n    if(ac.state==='suspended')await ac.resume();activeBellContext=ac;\n    function tone(freq,start,dur,vol,offset=ac.currentTime){const o=ac.createOscillator();const g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type='sine';o.frequency.value=freq;g.gain.setValueAtTime(vol,offset+start);g.gain.exponentialRampToValueAtTime(0.001,offset+start+dur);o.start(offset+start);o.stop(offset+start+dur);}\n    const playTonePattern=()=>{const base=ac.currentTime;const vol=0.32*bellVolume;tone(523,0,0.3,vol,base);tone(659,0.2,0.3,vol,base);tone(784,0.4,0.5,vol,base);};\n    playTonePattern();clearTimeout(activeToneLoopTimer);\n    const loop=()=>{playTonePattern();activeToneLoopTimer=setTimeout(loop,TONE_LOOP_INTERVAL_MS);};\n    activeToneLoopTimer=setTimeout(loop,TONE_LOOP_INTERVAL_MS);\n    activeBellMode='tone';showBellStopToast();scheduleBellUnattendedAction();return true;\n  }catch(e){stopDoneSound(false);return false;}\n}\nfunction stopDoneSound(hideSnackbar=true){\n  clearTimeout(unattendedBellTimer);unattendedBellTimer=null;clearTimeout(activeToneLoopTimer);activeToneLoopTimer=null;\n  hideBellStopToast();\n  if(activeBellAudio){try{activeBellAudio.pause();activeBellAudio.currentTime=0;activeBellAudio.src='';}catch(e){}activeBellAudio=null;}\n  if(activeBellContext){try{activeBellContext.close();}catch(e){}activeBellContext=null;}\n  const frame=document.getElementById('neteaseBgFrame');if(frame)frame.src='';\n  activeBellMode=null;\n  if(hideSnackbar)document.getElementById('snackbar').classList.remove('show');\n}\n\n// ============================================================\n// PREFETCH FINISH SCENE DATA\n// ============================================================\nfunction parseAiTextPayload(payload){if(typeof payload==='string')return payload;if(Array.isArray(payload))return payload.map(p=>typeof p==='string'?p:(p&&typeof p.text==='string'?p.text:'')).join(' ').trim();if(payload&&typeof payload.text==='string')return payload.text;return'';}\nfunction cleanupTranslationText(text){return String(text||'').replace(/^```[\\w-]*\\s*/i,'').replace(/```$/i,'').replace(/^[\"'\"\"''\\s]+|[\"'\"\"''\\s]+$/g,'').trim();}\nfunction looksLikeEnglish(text){const v=String(text||'');const la=(v.match(/[A-Za-z]/g)||[]).length;const cjk=(v.match(/[\\u3400-\\u9FFF]/g)||[]).length;return la>=3&&la>=cjk;}\nasync function translateWithDeepSeekIfAvailable(text,targetLang){if(!settings.apiKey)return'';const langMap={en:'英文'};const target=langMap[targetLang]||targetLang;const prompt=`请将下面内容翻译成${target}，只返回翻译结果，不要解释：\\n${text}`;try{const resp=await fetch('https://api.deepseek.com/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${settings.apiKey}`},body:JSON.stringify({model:'deepseek-chat',messages:[{role:'user',content:prompt}],temperature:0.2})});if(!resp.ok)throw new Error('api err');const data=await resp.json();const parsed=cleanupTranslationText(parseAiTextPayload(data?.choices?.[0]?.message?.content||data?.choices?.[0]?.text));if(targetLang==='en'&&!looksLikeEnglish(parsed))throw new Error('invalid en');return parsed||'';}catch(err){return '';}}\nasync function prefetchFinishSceneData(timerId){\n  const t=timers.find(x=>x.id===timerId);if(!t||t.finishSceneData||t._finishScenePrefetching)return;\n  t._finishScenePrefetching=true;const fallback=fallbackFinishLines(t.name);\n  try{const hitResp=await fetch(HITOKOTO_API_URL);if(!hitResp.ok)throw new Error('hitokoto err');const hitData=await hitResp.json();const zh=(String(hitData?.hitokoto||'').trim()||fallback.zhHans).slice(0,72)||fallback.zhHans;const en=await translateWithDeepSeekIfAvailable(zh,'en');t.finishSceneData={zhHans:zh,en:en||'',source:String(hitData?.from||'').trim(),sourceWho:String(hitData?.from_who||'').trim(),loadedAt:Date.now()};}\n  catch(e){t.finishSceneData={...fallback,en:'',loadedAt:Date.now()};}\n  finally{t._finishScenePrefetching=false;persist();}\n}\n\n// ============================================================\n// CARD RENDERING\n// ============================================================\nfunction updateArenaLayout(){\n  const arena=document.getElementById('timer-arena');arena.className='';\n  const visibleCount=getVisibleTimers().length;\n  if(visibleCount===2)arena.classList.add('split-2');\n  if(visibleCount>=3)arena.classList.add('split-3');\n  const label=document.getElementById('timersLabel');const empty=document.getElementById('emptyState');\n  if(timers.length>0){label.style.display='block';empty.style.display='none';}\n  else{label.style.display='none';empty.style.display='flex';}\n  renderPageControls();\n}\nfunction totalPages(){if(timers.length<=3)return 1;return settings.layoutMode==='carousel'?timers.length:Math.ceil(timers.length/3);}\nfunction getVisibleTimers(){if(timers.length<=3)return timers;const pages=totalPages();currentPage=Math.max(0,Math.min(currentPage,pages-1));if(settings.layoutMode==='grouped'){const start=currentPage*3;return timers.slice(start,start+3);}return timers.slice(currentPage,currentPage+3);}\nfunction setPage(page){currentPage=Math.max(0,Math.min(page,totalPages()-1));renderAll();}\nfunction renderPageControls(){const wrap=document.getElementById('timerPageControls');if(!wrap)return;const pages=totalPages();if(timers.length<=3||pages<=1){wrap.style.display='none';wrap.innerHTML='';return;}wrap.style.display='flex';wrap.innerHTML=Array.from({length:pages},(_,i)=>`<button class=\"mini-fab${i===currentPage?' active':''}\" onclick=\"setPage(${i})\">${i+1}</button>`).join('');}\nfunction renderAll(){\n  updateArenaLayout();const arena=document.getElementById('timer-arena');const visibleTimers=getVisibleTimers();\n  const existingIds=[...arena.querySelectorAll('.timer-card')].map(e=>e.id.replace('card-',''));\n  const stateIds=visibleTimers.map(t=>t.id);\n  existingIds.forEach(id=>{if(!stateIds.includes(id)){const el=document.getElementById('card-'+id);if(el)el.remove();}});\n  visibleTimers.forEach(t=>{\n    const existing=document.getElementById('card-'+t.id);\n    if(!existing){const el=buildCard(t);arena.appendChild(el);}\n    else{refreshTimerDisplay(t.id);refreshCardControls(t.id);}\n  });\n  renderStats();renderSettingsUI();\n}\nfunction buildCard(t){const el=document.createElement('div');el.className='timer-card';el.id='card-'+t.id;el.setAttribute('draggable','true');el.innerHTML=cardHTML(t);bindDragEvents(el,t.id);return el;}\n\nfunction cardHTML(t){\n  const p=pct(t);const dashOffset=RING_CIRC*(1-p);const color=t.color;\n  const icon=SUBJ_ICONS[t.subj]||'⏱️';\n  const statusLabel=statusText(t);\n  const statusBg=t.done?'#e6f4ea':t.running?'#e8f0fe':t.paused?'#fce8b2':'#f1f3f4';\n  const statusColor=t.done?'#34a853':t.running?'#1a73e8':t.paused?'#f29900':'#5f6368';\n  const dotColor=t.done?'#34a853':t.running?'#1a73e8':t.paused?'#fbbc04':'#dadce0';\n  const timeColor=t.done?'#34a853':(t.left<60&&t.left>0)?'#ea4335':'#202124';\n  const playIcon=t.running?'pause':'play_arrow';\n  const playClass=t.running?' running':t.done?' done':'';\n  const marks=t.marks?` · ${t.marks} marks`:'';\n  const paperLine=t.paper?`${t.paper}${marks}`:(t.dur?fmtDur(t.dur):'');\n  const waveBars=Array.from({length:12},()=>'<div class=\"wave-bar\"></div>').join('');\n  return`<div class=\"card-strip\" style=\"background:${stripForColor(color)};\"></div>\n<div class=\"card-header\">\n  <div class=\"card-header-left\">\n    <div class=\"subj-icon\" style=\"background:${color}18;\">${icon}</div>\n    <div class=\"subj-info\">\n      <div class=\"subj-name\" contenteditable=\"true\" style=\"color:${color};\" onblur=\"saveTimerName('${t.id}',this.textContent)\" onkeydown=\"editableKeydown(event,this)\">${esc(t.name)}</div>\n      <div class=\"subj-paper\"><span class=\"editable-dur\" onclick=\"editTimerDuration('${t.id}')\">${esc(paperLine)}</span></div>\n    </div>\n  </div>\n  <div class=\"card-header-actions\">\n    <button class=\"icon-btn\" onclick=\"openEditModal('${t.id}')\"><span class=\"material-icons-round\" style=\"font-size:20px;\">edit</span></button>\n    <button class=\"icon-btn\" onclick=\"openFullscreen('${t.id}')\"><span class=\"material-icons-round\" style=\"font-size:20px;\">open_in_full</span></button>\n    <button class=\"icon-btn\" onclick=\"removeTimer('${t.id}')\" style=\"color:var(--md-error);\"><span class=\"material-icons-round\" style=\"font-size:20px;\">close</span></button>\n  </div>\n</div>\n<div class=\"save-indicator\" id=\"save-${t.id}\"><span class=\"material-icons-round\">cloud_done</span>${getLanguage()==='en'?'Saved':'已保存'}</div>\n<div class=\"card-body\">\n  <div class=\"ring-container\" onclick=\"toggleTimer('${t.id}')\">\n    <svg class=\"ring-svg\" viewBox=\"0 0 200 200\">\n      <circle cx=\"100\" cy=\"100\" r=\"${RING_R}\" class=\"ring-track\" stroke-width=\"10\"/>\n      <circle cx=\"100\" cy=\"100\" r=\"${RING_R}\" class=\"ring-progress\" id=\"ring-${t.id}\" stroke=\"${color}\" stroke-width=\"10\" stroke-dasharray=\"${RING_CIRC}\" stroke-dashoffset=\"${dashOffset}\"/>\n      <circle cx=\"100\" cy=\"100\" r=\"${RING_R}\" class=\"ring-warn${(t.running&&t.left<60&&!t.done)?' active':''}\" id=\"ring-warn-${t.id}\" stroke=\"${color}\" stroke-width=\"10\" stroke-dasharray=\"${RING_CIRC}\" stroke-dashoffset=\"0\"/>\n    </svg>\n    <div class=\"ring-inner\">\n      <div class=\"time-display\" id=\"time-${t.id}\" style=\"color:${timeColor};\">${fmtTime(t.left)}</div>\n      <div class=\"time-pct\" id=\"pct-${t.id}\">${remainingText(p)}</div>\n      <div class=\"time-status-badge\" id=\"badge-${t.id}\" style=\"background:${statusBg};color:${statusColor};\">\n        <div class=\"status-dot\" id=\"dot-${t.id}\" style=\"background:${dotColor};\"></div>${statusLabel}\n      </div>\n    </div>\n  </div>\n  <div class=\"controls-row\">\n    <button class=\"ctrl-btn ctrl-sm\" onclick=\"resetTimer('${t.id}')\"><span class=\"material-icons-round\">replay</span></button>\n    <button class=\"ctrl-btn ctrl-play${playClass}\" id=\"play-${t.id}\" onclick=\"toggleTimer('${t.id}')\"><span class=\"material-icons-round\" id=\"play-icon-${t.id}\">${playIcon}</span></button>\n    <button class=\"ctrl-btn ctrl-sm\" onclick=\"addTime('${t.id}',5)\"><span class=\"material-icons-round\">add</span></button>\n  </div>\n  <div class=\"controls-row\" style=\"gap:6px;\">${DUR_PRESETS.map(d=>`<button class=\"ctrl-text${t.total===d.v*60?' active':''}\" onclick=\"setTimerDur('${t.id}',${d.v})\">${d.label}</button>`).join('')}</div>\n</div>\n<div class=\"waveform-container${t.running?' active':''}\" id=\"wave-${t.id}\">${waveBars}</div>\n<div class=\"card-notes\">\n  <div class=\"presets-label\">${getLanguage()==='en'?'Checkpoint note':'断点记录（自动保存）'}</div>\n  <textarea class=\"notes-input\" oninput=\"saveTimerNoteDebounced('${t.id}',this.value)\" maxlength=\"200\" placeholder=\"${getLanguage()==='en'?'Input current question':'输入当前做的题目'}\">${esc(t.note||'')}</textarea>\n</div>\n<div class=\"presets-section\" style=\"padding-top:0;\">\n  <div class=\"presets-label\">${t.subj!=='custom'?(t.subj+' 卷型'):'常用时长'}</div>\n  <div class=\"presets-chips\" id=\"paper-chips-${t.id}\">\n    ${IGCSE_PAPERS.filter(p2=>p2.subj===t.subj).map(p2=>`<button class=\"preset-chip${t.paperId===p2.id?' active':''}\" onclick=\"switchPaper('${t.id}','${p2.id}')\">${p2.paper.replace('Paper ','P')}</button>`).join('')||DUR_PRESETS.map(d=>`<button class=\"preset-chip${t.total===d.v*60?' active':''}\" onclick=\"setTimerDur('${t.id}',${d.v})\">${d.label}</button>`).join('')}\n  </div>\n</div>`;\n}\n\n// ============================================================\n// DRAG-SORT\n// ============================================================\nfunction bindDragEvents(el,id){\n  el.addEventListener('dragstart',e=>{dragSrcId=id;el.style.opacity='0.5';e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',id);});\n  el.addEventListener('dragend',()=>{el.style.opacity='';document.querySelectorAll('.timer-card').forEach(c=>c.classList.remove('drag-over'));});\n  el.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='move';el.classList.add('drag-over');});\n  el.addEventListener('dragleave',()=>el.classList.remove('drag-over'));\n  el.addEventListener('drop',e=>{e.preventDefault();el.classList.remove('drag-over');if(!dragSrcId||dragSrcId===id)return;const srcIdx=timers.findIndex(t=>t.id===dragSrcId);const dstIdx=timers.findIndex(t=>t.id===id);if(srcIdx<0||dstIdx<0)return;const [moved]=timers.splice(srcIdx,1);timers.splice(dstIdx,0,moved);renderAll();persist();dragSrcId=null;});\n}\n\nfunction setTimerDur(id,mins){const t=timers.find(x=>x.id===id);if(!t)return;stopDoneSound();const wasRunning=t.running;if(wasRunning)pauseTimer(id,false);t.total=mins*60;t.left=mins*60;t.dur=mins;t.done=false;t._preEndAlerted=false;t._muteNextRing=false;t.startedAt=null;persist();renderTimerCard(id);if(wasRunning)startTimer(id);}\nfunction switchPaper(timerId,paperId){const t=timers.find(x=>x.id===timerId);const p=IGCSE_PAPERS.find(x=>x.id===paperId);if(!t||!p)return;stopDoneSound();const wasRunning=t.running;if(wasRunning)pauseTimer(timerId,false);t.paperId=p.id;t.paper=p.paper;t.marks=p.marks;t.color=p.color;t.total=p.dur*60;t.left=p.dur*60;t.dur=p.dur;t.done=false;t._preEndAlerted=false;t._muteNextRing=false;t.startedAt=null;persist();renderTimerCard(timerId);if(wasRunning)startTimer(timerId);}\nfunction editableKeydown(e,el){if(e.key==='Enter'){e.preventDefault();el.blur();}}\nfunction saveTimerName(id,text){const t=timers.find(x=>x.id===id);if(!t)return;t.name=(text||'').trim()||'Custom Timer';persist();refreshFsDisplay();updateMiniPill();}\nasync function editTimerDuration(id){const t=timers.find(x=>x.id===id);if(!t)return;const{ok,value}=await showConfirmDialog({title:'修改时长',body:'请输入新的时长（分钟）',okText:'保存',cancelText:'取消',input:{type:'number',value:String(Math.round(t.total/60)),min:'1',max:'600',placeholder:'1-600'}});if(!ok)return;const mins=parseInt(value,10);if(Number.isNaN(mins)||mins<1||mins>600){showSnackbar('时长范围应为 1-600 分钟');return;}setTimerDur(id,mins);}\nfunction saveTimerNoteDebounced(id,val){const t=timers.find(x=>x.id===id);if(!t)return;t.note=(val||'').slice(0,200);clearTimeout(noteDebounceTimers[id]);noteDebounceTimers[id]=setTimeout(()=>{persist();flashSaveIndicator(id);},1000);}\nfunction renderTimerCard(id){const el=document.getElementById('card-'+id);const t=timers.find(x=>x.id===id);if(!el||!t)return;const newEl=buildCard(t);el.replaceWith(newEl);if(t.running)startWaveform(id);}\nfunction refreshTimerDisplay(id){\n  const t=timers.find(x=>x.id===id);if(!t)return;\n  const p=pct(t);const dashOffset=RING_CIRC*(1-p);\n  const timeColor=t.done?'#34a853':(t.left<60&&t.left>0)?'#ea4335':'#202124';\n  const ringEl=document.getElementById('ring-'+id);const timeEl=document.getElementById('time-'+id);const pctEl=document.getElementById('pct-'+id);const warnEl=document.getElementById('ring-warn-'+id);\n  if(ringEl){ringEl.style.strokeDashoffset=dashOffset;ringEl.style.stroke=(t.left<60&&!t.done)?'#ea4335':t.color;}\n  if(timeEl){timeEl.textContent=fmtTime(t.left);timeEl.style.color=timeColor;}\n  if(pctEl)pctEl.textContent=remainingText(p);\n  if(warnEl){if(t.running&&t.left<60&&!t.done)warnEl.classList.add('active');else warnEl.classList.remove('active');}\n}\nfunction refreshCardControls(id){\n  const t=timers.find(x=>x.id===id);if(!t)return;\n  const playBtn=document.getElementById('play-'+id);const playIcon=document.getElementById('play-icon-'+id);const badge=document.getElementById('badge-'+id);\n  if(playBtn)playBtn.className='ctrl-btn ctrl-play'+(t.running?' running':t.done?' done':'');\n  if(playIcon)playIcon.textContent=t.running?'pause':'play_arrow';\n  if(badge){const statusLabel=statusText(t);const statusBg=t.done?'#e6f4ea':t.running?'#e8f0fe':t.paused?'#fce8b2':'#f1f3f4';const statusColor=t.done?'#34a853':t.running?'#1a73e8':t.paused?'#f29900':'#5f6368';badge.style.background=statusBg;badge.style.color=statusColor;badge.innerHTML=`<div class=\"status-dot\" style=\"background:${t.running?'#1a73e8':t.done?'#34a853':t.paused?'#fbbc04':'#dadce0'}\"></div>${statusLabel}`;}\n}\nfunction flashSaveIndicator(id){const el=document.getElementById('save-'+id);if(!el)return;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),1800);}\n\n// ============================================================\n// STATS & HEATMAP\n// ============================================================\nfunction renderStats(){\n  const today=getTodayStats();\n  const liveFocusMins=timers.reduce((sum,t)=>{if(t.done||!t.running||t.total<=0)return sum;return sum+Math.max(0,(t.total-t.left)/60);},0);\n  const focusMins=Math.round((today.focusMins||0)+liveFocusMins);\n  document.getElementById('statFocusTime').innerHTML=focusMins>=60?`${Math.floor(focusMins/60)}<span class=\"stat-unit\">hr</span> ${focusMins%60}<span class=\"stat-unit\">m</span>`:`${focusMins}<span class=\"stat-unit\">min</span>`;\n  document.getElementById('statCompleted').innerHTML=`${today.completed||0}<span class=\"stat-unit\">次</span>`;\n  document.getElementById('statPauses').innerHTML=`${today.pauses||0}<span class=\"stat-unit\">次</span>`;\n  const streakEl=document.getElementById('statStreak');if(streakEl)streakEl.innerHTML=`${getCurrentStreakDays()}<span class=\"stat-unit\">天</span>`;\n  const pomEl=document.getElementById('statPomodoro');if(pomEl)pomEl.innerHTML=`${getTodayPomodoroCount()}<span class=\"stat-unit\">轮</span>`;\n}\nfunction renderHeatmap(){\n  const heatmap=getHeatmap();const days7=[];\n  for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);days7.push(d.toISOString().slice(0,10));}\n  const dayLabels=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];\n  const daysEl=document.getElementById('heatmapDays');const gridEl=document.getElementById('heatmapGrid');\n  if(!daysEl||!gridEl)return;\n  daysEl.innerHTML=days7.map(d=>`<span class=\"heatmap-day\">${dayLabels[new Date(d).getDay()]}</span>`).join('');\n  const maxMins=Math.max(...days7.map(d=>heatmap[d]||0),1);\n  gridEl.innerHTML=days7.map(d=>{const mins=heatmap[d]||0;const intensity=Math.min(1,mins/maxMins);const alpha=0.1+intensity*0.9;return`<div class=\"heat-cell\" style=\"background:${mins>0?`rgba(26,115,232,${alpha.toFixed(2)})`:'var(--md-surface-container)'}\" data-mins=\"${mins}\" data-label=\"${Math.round(mins)} min\"></div>`;}).join('');\n}\n\n// ============================================================\n// HISTORY\n// ============================================================\nfunction renderHistory(){const h=getHistory();renderHistoryList(document.getElementById('recentHistory'),h.slice(0,5));const em=document.getElementById('histEmptyMsg');if(em)em.style.display=h.length===0?'block':'none';}\nfunction renderHistoryList(container,items){if(!container)return;if(!items.length){container.innerHTML='';return;}container.innerHTML=items.map(entry=>{const t=new Date(entry.completedAt);const timeStr=t.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});const dateStr=t.toLocaleDateString('zh-CN',{month:'short',day:'numeric'});return`<div class=\"hist-item\"><div class=\"hist-color-bar\" style=\"background:${entry.color};\"></div><div class=\"hist-info\"><div class=\"hist-name\">${esc(entry.name||'')}</div><div class=\"hist-meta\">${dateStr} ${timeStr} · ${entry.pauseCount||0}次暂停</div>${entry.note?`<div class=\"hist-meta\" style=\"margin-top:2px;\">📌 ${esc(entry.note)}</div>`:''}</div><div class=\"hist-time\">${fmtDur(entry.spentMins||0)}</div><button class=\"hist-resume-btn\" onclick='resumeSession(${JSON.stringify(entry).split('\"').join(\"&quot;\")})'>恢复</button></div>`;}).join('');}\nfunction openHistoryModal(){const h=getHistory();const container=document.getElementById('fullHistoryList');renderHistoryList(container,h);if(!h.length)container.innerHTML='<div style=\"text-align:center;padding:40px;color:var(--md-on-surface-variant);font-size:14px;\">暂无历史记录</div>';openModal('historyModal');}\nfunction resumeSession(entry){closeModal('historyModal');const remaining=(entry.spentMins<entry.dur)?(entry.dur-entry.spentMins)*60:entry.dur*60;createTimer({name:entry.name,color:entry.color,subj:entry.subj,paper:entry.paper,marks:entry.marks,paperId:entry.paperId,dur:entry.dur,left:remaining,saveInterval:5,note:entry.note||''});showSnackbar(`已恢复：${entry.name}（剩余 ${fmtDur(Math.round(remaining/60))}）`);}\n\n// ============================================================\n// FULLSCREEN — FIXED\n// ============================================================\nfunction openFullscreen(id){\n  fsTimerId=id;\n  const overlay=document.getElementById('fullscreen-overlay');\n  overlay.classList.add('open');\n  overlay.classList.toggle('fx-on',!!settings.fullscreenFx);\n  refreshFsDisplay();\n  startGlobalRaf();\n  requestBrowserFullscreen(document.documentElement);\n}\nfunction exitFullscreen(){\n  const overlay=document.getElementById('fullscreen-overlay');\n  overlay.classList.remove('open');\n  fsTimerId=null;\n  exitBrowserFullscreen();\n}\nfunction refreshFsDisplay(){\n  if(fsTimerId===null)return;\n  const t=timers.find(x=>x.id===fsTimerId);if(!t){exitFullscreen();return;}\n  const p=pct(t);\n  const color=t.done?'#34a853':(t.left<60)?'#ea4335':t.color;\n  const c.msFullscreenElement);if(!isFs){const overlay=document.getElementById('fullscreen-overlay');if(overlay)overlay.classList.remove('open');fsTimerId=null;}}\n\n// ============================================================\n// FINISH SCENE — PARTICLE SYSTEM (from v1)\n// ============================================================\nfunction spawnFinishParticles(){\n  const container=document.getElementById('finishParticles');if(!container)return;\n  container.innerHTML='';\n  const colors=['#1a73e8','#34a853','#fbbc04','#ea4335','#9c27b0','#00acc1','#ffffff'];\n  for(let i=0;i<32;i++){\n    const p=document.createElement('div');p.className='finish-particle';\n    const size=Math.random()*7+2;const left=Math.random()*100;const drift=(Math.random()-0.5)*240;\n    const duration=Math.random()*8+6;const delay=Math.random()*4;const color=colors[Math.floor(Math.random()*colors.length)];\n    p.style.cssText=`width:${size}px;height:${size}px;left:${left}%;background:${color};opacity:0.75;--drift:${drift}px;animation-duration:${duration}s;animation-delay:${delay}s;`;\n    container.appendChild(p);\n  }\n}\nfunction openFinishScene(timerObj,shouldPlayNetease=false){\n  const scene=document.getElementById('finishScene');if(!scene)return;\n  const fallback=fallbackFinishLines(timerObj?.name);\n  const info=timerObj?.finishSceneData||fallback;\n  const main=document.getElementById('finishMainText');const sub=document.getElementById('finishSubText');const meta=document.getElementById('finishMetaText');\n  finishSceneOwnerId=timerObj?.id||null;\n  const zhText=info.zhHans||fallback.zhHans||'倒计时结束';\n  const enText=settings.apiKey?(info.en||'').trim():'';\n  const englishOnTop=getLanguage()==='en'&&!!enText;\n  if(main)main.textContent=englishOnTop?enText:zhText;\n  if(sub){sub.textContent=englishOnTop?zhText:enText;sub.style.display=enText?'':'none';}\n  if(meta){const sourceLine=info.source?`来自「${info.source}」${info.sourceWho?` · ${info.sourceWho}`:''}`:'' ;meta.textContent=sourceLine?`${sourceLine} · ${t('tapToContinue')}`:t('tapToContinue');}\n  if(shouldPlayNetease&&settings.neteaseSongId){const frame=document.getElementById('neteaseBgFrame');const nid=sanitizeNumericInput(settings.neteaseSongId);if(frame){frame.setAttribute('allow','autoplay');frame.setAttribute('sandbox','allow-scripts allow-forms allow-popups');try{frame.src=`https://music.163.com/outchain/player?type=2&id=${encodeURIComponent(nid)}&auto=1&height=66&autoplay=1`;}catch(e){}}}\n  spawnFinishParticles();\n  scene.classList.add('open');\n  // Make entire scene clickable to dismiss\n  scene.onclick=dismissFinishScene;\n  updateBodyScrollLock();\n}\nfunction dismissFinishScene(e){\n  if(e&&e.target&&e.target.closest&&e.target.closest('.finish-btn')){}\n  const scene=document.getElementById('finishScene');if(!scene||!scene.classList.contains('open'))return;\n  scene.classList.remove('open');finishSceneOwnerId=null;stopDoneSound(false);updateBodyScrollLock();\n}\n\n// ============================================================\n// MINI PILL\n// ============================================================\nfunction toggleMinipill(){miniPillActive=!miniPillActive;document.getElementById('minipillBtn').classList.toggle('active',miniPillActive);updateMiniPill();}\nfunction updateMiniPill(){\n  const pill=document.getElementById('mini-pill');if(!miniPillActive){pill.style.display='none';return;}\n  const active=timers.find(x=>x.running)||timers[0];if(!active){pill.style.display='none';return;}\n  pill.style.display='flex';document.getElementById('pillSubject').textContent=active.name;document.getElementById('mini-pill-time').textContent=fmtTime(active.left);const icon=document.getElementById('pillIcon');if(icon)icon.textContent=active.running?'timer':'pause';\n}\nfunction updateMiniPillTime(){if(!miniPillActive)return;const active=timers.find(x=>x.running)||timers[0];if(!active)return;const t=document.getElementById('mini-pill-time');if(t)t.textContent=fmtTime(active.left);}\nfunction expandFromPill(){const active=timers.find(x=>x.running)||timers[0];if(active)openFullscreen(active.id);miniPillActive=false;const btn=document.getElementById('minipillBtn');if(btn)btn.classList.remove('active');updateMiniPill();}\n\n// ============================================================\n// SHORTCUT PANEL\n// ============================================================\nfunction toggleShortcutPanel(){shortcutPanelOpen=!shortcutPanelOpen;document.getElementById('shortcut-panel').classList.toggle('show',shortcutPanelOpen);}\n\n// ============================================================\n// SETTINGS\n// ============================================================\nfunction openSettings(){\n  renderSettingsUI();\n  const ed=localStorage.getItem('igcse_exam_date')||'';document.getElementById('sExamDate').value=ed;\n  document.getElementById('sApiKey').value=settings.apiKey||'';\n  const ni=document.getElementById('neteaseSongId');if(ni)ni.value=settings.neteaseSongId||'';\n  const ua=document.getElementById('bellUnattendedAction');if(ua)ua.value=settings.bellUnattendedAction||'manual';\n  const ud=document.getElementById('bellUnattendedDelay');if(ud)ud.value=String(getBellUnattendedDelaySec());\n  const pfm=document.getElementById('sPomodoroFocusMin');if(pfm)pfm.value=String(Math.min(90,Math.max(10,Number(settings.pomodoroFocusMin)||25)));\n  const pbm=document.getElementById('sPomodoroBreakMin');if(pbm)pbm.value=String(Math.min(30,Math.max(3,Number(settings.pomodoroBreakMin)||5)));\n  const bv=document.getElementById('sBellVolume');if(bv)bv.value=String(Math.min(1,Math.max(0.1,Number(settings.bellVolume)||0.8)));\n  const lang=document.getElementById('sLanguage');if(lang)lang.value=getLanguage();\n  updateExamCountdown(ed);openModal('settingsModal');\n}\nfunction renderSettingsUI(){\n  ['sound','autoFS','fullscreenFx','interruptLog','mockLink','goalLink','pomodoroAutoCycle'].forEach(key=>{const el=document.getElementById('toggle'+key[0].toUpperCase()+ ent=step.title;document.getElementById('obdesc').textContent=step.desc;document.getElementById('obnext').textContent=onboardingIdx===ONBOARD_STEPS.length-1?'完成':'下一步';}\nfunction nextOnboarding(){onboardingIdx++;if(onboardingIdx>=ONBOARD_STEPS.length){skipOnboarding();return;}showOnboardingStep();}\nfunction skipOnboarding(){document.getElementById('oblay').classList.remove('show');localStorage.setItem('is_first_run','done');}\n\n// ============================================================\n// MODALS\n// ============================================================\nfunction updateBodyScrollLock(){const hasOpen=!!document.querySelector('.modal-backdrop.open');const hasScene=!!document.getElementById('finishScene')?.classList.contains('open');document.body.style.overflow=(hasOpen||hasScene)?'hidden':'';}\nfunction openModal(id){const m=document.getElementById(id);if(!m)return;const idx=modalStack.indexOf(id);if(idx>=0)modalStack.splice(idx,1);modalStack.push(id);m.classList.add('open');updateBodyScrollLock();}\nfunction closeModal(id){const m=document.getElementById(id);if(!m)return;modalStack=modalStack.filter(mid=>mid!==id);m.classList.remove('open');updateBodyScrollLock();}\nfunction closeModalOnBackdrop(e,id){if(e.target.id!==id)return;if(id==='confirmModal'){resolveConfirmModal(false);return;}closeModal(id);}\nfunction closeTopmostOverlay(){\n  const openModalId=modalStack[modalStack.length-1];\n  if(openModalId){const el=document.getElementById(openModalId);if(el&&el.classList.contains('open')){if(openModalId==='confirmModal')resolveConfirmModal(false);else closeModal(openModalId);return true;}}\n  const fs=document.getElementById('finishScene');if(fs&&fs.classList.contains('open')){dismissFinishScene();return true;}\n  const ob=document.getElementById('oblay');if(ob&&ob.classList.contains('show')){skipOnboarding();return true;}\n  return false;\n}\nfunction showConfirmDialog(opts={}){\n  if(suppressStandardAlerts){const value=opts.input?String(opts.input.value||'').trim():'';return Promise.resolve({ok:true,value});}\n  const title=document.getElementById('confirmTitle');const body=document.getElementById('confirmBody');const okBtn=document.getElementById('confirmOkBtn');const cancelBtn=document.getElementById('confirmCancelBtn');const input=document.getElementById('confirmInput');\n  if(!title||!body||!okBtn||!cancelBtn||!input)return Promise.resolve({ok:false,value:''});\n  title.textContent=opts.title||'确认操作';body.textContent=opts.body||'确定继续吗？';okBtn.textContent=opts.okText||'确定';cancelBtn.textContent=opts.cancelText||'取消';\n  const inputCfg=opts.input||null;confirmModalHasInput=!!inputCfg;\n  if(inputCfg){input.type=inputCfg.type||'text';input.placeholder=inputCfg.placeholder||'';input.value=inputCfg.value||'';input.min=inputCfg.min||'';input.max=inputCfg.max||'';input.style.display='block';input.onkeydown=(ev)=>{if(ev.key==='Enter'){ev.preventDefault();resolveConfirmModal(true);}};}\n  else{input.style.display='none';input.value='';input.onkeydown=null;}\n  openModal('confirmModal');if(inputCfg)setTimeout(()=>input.focus(),80);\n  return new Promise(resolve=>{confirmModalResolver=resolve;});\n}\nfunction resolveConfirmModal(ok){const resolve=confirmModalResolver;const input=document.getElementById('confirmInput');const value=confirmModalHasInput&&input?(input.value||'').trim():'';confirmModalResolver=null;confirmModalHasInput=false;closeModal('confirmModal');if(resolve)resolve({ok,value});}\n\n// ============================================================\n// SNACKBAR\n// ============================================================\nfunction showSnackbar(msg,showUndo=false,undoFn=null,actionLabel='撤销',durationMs=3000){if(suppressStandardAlerts)return;document.getElementById('snackbar-msg').textContent=msg;const ab=document.getElementById('snackbar-action');ab.textContent=actionLabel;ab.style.display=showUndo?'inline':'none';snackbarUndoFn=undoFn;const el=document.getElementById('snackbar');el.classList.add('show');clearTimeout(snackbarTimer);if(durationMs===null)return;snackbarTimer=setTimeout(()=>el.classList.remove('show'),durationMs);}\nfunction snackbarAction(){if(snackbarUndoFn){snackbarUndoFn();snackbarUndoFn=null;}document.getElementById('snackbar').classList.remove('show');}\nfunction showBellStopToast(){const el=document.getElementById('bell-stop-toast');if(el)el.classList.add('show');}\nfunction hideBellStopToast(){const el=document.getElementById('bell-stop-toast');if(el)el.classList.remove('show');}\n\n// ============================================================\n// DEBUG\n// ============================================================\nfunction setDebugOutput(text){const out=document.getElementById('debugOutput');if(out)out.textContent=text||'';}\nfunction getDebugTargetTimer(){const sel=document.getElementById('debugTimerSelect');const id=sel?sel.value:'';return timers.find(x=>x.id===id)||timers[0]||null;}\nfunction refreshDebugTimerSelect(){const sel=document.getElementById('debugTimerSelect');if(!sel)return;const selected=sel.value;sel.innerHTML=timers.length?timers.map(t=>`<option value=\"${esc(t.id)}\">${esc(t.name)} (${fmtTime(t.left)})</option>`).join(''):'<option value=\"\">暂无计时器</option>';if(selected&&timers.some(t=>t.id===selected))sel.value=selected;}\nfunction openDebugModal(){refreshDebugTimerSelect();setDebugOutput('调试模式已开启。');openModal('debugModal');}\nasync function runInDebugMode(fn){suppressStandardAlerts=true;try{await fn();}finally{suppressStandardAlerts=false;}}\nasync function debugForceFinishSelected(){const t=getDebugTargetTimer();if(!t)return setDebugOutput('没有可用计时器。');await runInDebugMode(async()=>{t.running=true;t.left=0;await onTimerDone(t.id);});setDebugOutput(`已触发结束：${t.name}`);}\nasync function debugPlayBellSelected(){await runInDebugMode(async()=>{await playDoneSound();});setDebugOutput('已触发铃声播放测试。');}\nfunction debugStopBellSelected(){stopDoneSound(false);setDebugOutput('已停止铃声。');}\nasync function debugForceSceneWithPrefetch(){const t=getDebugTargetTimer();if(!t)return setDebugOutput('没有可用计时器。');await runInDebugMode(async()=>{await prefetchFinishSceneData(t.id);openFinishScene(t,settings.bellSource==='netease'&&!!sanitizeNumericInput(settings.neteaseSongId));});setDebugOutput(`已展示结束动画：${t.name}`);}\nfunction debugInjectFakeSceneData(){const t=getDebugTargetTimer();if(!t)return setDebugOutput('没有可用计时器。');const hitokoto=(document.getElementById('debugFakeHitokoto')?.value||'').trim()||`${t.name} 调试文本`;const source=(document.getElementById('debugFakeFrom')?.value||'').trim()||'Debug Source';t.finishSceneData={zhHans:hitokoto,en:`Debug: ${hitokoto}`,source,sourceWho:'Debug',loadedAt:Date.now()};openFinishScene(t,false);persist();setDebugOutput(`已注入并展示：${t.name}`);}\n\nfunction bindNeteaseSafetyHandlers(){\n  const isCrossOriginErr=(msg)=>{const text=String(msg||'');return text.includes('Blocked a frame with origin')&&text.includes('music.163.com');};\n  window.addEventListener('error',(event)=>{if(isCrossOriginErr(event?.message))event.preventDefault();});\n  window.addEventListener('unhandledrejection',(event)=>{const reason=event?.reason;if(isCrossOriginErr(reason?.message||reason))event.preventDefault();});\n}\n\n// ============================================================\n// KEYBOARD SHORTCUTS\n// ============================================================\nfunction handleGlobalKeydown(e){\n  // Debug\n  if((e.key==='~'||e.key==='`')&&!e.repeat){const tag=e.target?.tagName?.toLowerCase()||'';if(!['input','textarea','select'].includes(tag)){e.preventDefault();openDebugModal();return;}}\n  if(e.key==='Escape'){e.preventDefault();if(closeTopmostOverlay())return;exitFullscreen();return;}\n  const tag=e.target?.tagName?.toLowerCase()||'';const isInput=['input','textarea','select'].includes(tag);\n  if(!isInput){\n    if(e.key===' '&&fsTimerId!==null){e.preventDefault();fsToggle();return;}\n    if(e.key==='f'||e.key==='F'){const running=timers.find(x=>x.running)||timers[0];if(running)openFullscreen(running.id);return;}\n    if(e.key==='r'||e.key==='R'){if(fsTimerId!==null)fsReset();return;}\n    if(e.key==='n'||e.key==='N'){openCreateModal();return;}\n    if(e.key==='h'||e.key==='H'){if(shortcutPanelOpen)toggleShortcutPanel();return;}\n    if((e.key==='e'||e.key==='E')&&e.ctrlKey){e.preventDefault();exportHistoryCsv();return;}\n  }\n}\n\n// ============================================================\n// GLOBAL LISTENERS\n// ============================================================\nfunction bindGlobalListeners(){\n  if(listenersBound)return;listenersBound=true;\n  // Fullscreen overlay buttons — using addEventListener to guarantee they work\n  const fsExitBtn=document.getElementById('fsExitBtn');if(fsExitBtn)fsExitBtn.addEventListener('click',exitFullscreen);\n  const fsPlayBtn=document.getElementById('fsPlayBtn');if(fsPlayBtn)fsPlayBtn.addEventListener('click',fsToggle);\n  const fsResetBtn=document.getElementById('fsResetBtn');if(fsResetBtn)fsResetBtn.addEventListener('click',fsReset);\n  const fsAddBtn=document.getElementById('fsAddBtn');if(fsAddBtn)fsAddBtn.addEventListener('click',()=>fsAddTime(5));\n  document.addEventListener('keydown',handleGlobalKeydown);\n  document.addEventListener('fullscreenchange',onFullscreenChange);\n  document.addEventListener('webkitfullscreenchange',onFullscreenChange);\n  document.addEventListener('mozfullscreenchange',onFullscreenChange);\n  document.addEventListener('MSFullscreenChange',onFullscreenChange);\n  const primeOnce=()=>{primeMediaPlaybackPermission().catch(()=>{});};\n  document.addEventListener('pointerdown',primeOnce,{once:true,passive:true});\n  document.addEventListener('keydown',primeOnce,{once:true});\n  window.addEventListener('scroll',()=>{document.getElementById('topAppBar').classList.toggle('elevated',window.scrollY>8);},{passive:true});\n  document.addEventListener('click',(e)=>{const panel=document.getElementById('shortcut-panel');if(shortcutPanelOpen&&panel&&!panel.contains(e.target)&&!e.target.closest('[onclick=\"toggleShortcutPanel()\"]')){shortcutPanelOpen=false;panel.classList.remove('show');}});\n}\n\n// ============================================================\n// INIT\n// ============================================================\nasync function init(){\n  if(isInitialized)return;isInitialized=true;\n  bindGlobalListeners();bindNeteaseSafetyHandlers();\n  loadPersisted();applyI18n();renderSettingsUI();renderQuickStart();renderAll();\n  const ed=localStorage.getItem('igcse_exam_date')||'';const si=document.getElementById('sExamDate');if(si)si.value=ed;\n  timers.forEach(t=>{t.paused=true;t.running=false;});\n  updateArenaLayout();renderStats();renderHistory();renderHeatmap();\n  await restoreCustomAudioFromStorage();\n  const ni=document.getElementById('neteaseSongId');if(ni)ni.value=settings.neteaseSongId||'';\n  const lang=document.getElementById('sLanguage');if(lang)lang.value=getLanguage();\n  const ve=document.getElementById('settingsVersion');if(ve)ve.textContent=`Version: ${APP_VERSION}`;\n  const is=document.getElementById('interruptReason');if(is)is.onchange=updateInterruptCustomInputVisibility;\n  updateInterruptCustomInputVisibility();refreshDebugTimerSelect();\n  if(!localStorage.getItem('is_first_run'))setTimeout(startOnboarding,450);\n  console.log(`🎓 IGCSE Timer v3 loaded. Timers restored: ${timers.length}`);\n}\ndocument.addEventListener('DOMContentLoaded',init);\nwindow.addEventListener('beforeunload',persist);\n<\/script>\n</body>\n</html>\n";

    function buildUISwitchScript(currentVersion) {
      const targetVersion = currentVersion === 'new' ? 'old' : 'new';
      const subText = currentVersion === 'new' ? '当前使用：新版（轻量版）' : '当前使用：旧版（稳定版）';
      const buttonText = currentVersion === 'new' ? '切换回旧版' : '切换到新版';
      return `<script>(function(){const KEY='igcse_ui_version';const target='${targetVersion}';function inject(){const modal=document.getElementById('settingsModal');if(!modal)return;const body=modal.querySelector('.modal-body');if(!body||body.querySelector('[data-ui-version-switch="1"]'))return;const divider=document.createElement('div');divider.className='divider';const row=document.createElement('div');row.className='settings-row';row.setAttribute('data-ui-version-switch','1');const left=document.createElement('div');const label=document.createElement('div');label.className='settings-row-label';label.textContent='UI 版本';const sub=document.createElement('div');sub.className='settings-row-sub';sub.textContent='${subText}';left.appendChild(label);left.appendChild(sub);const btn=document.createElement('button');btn.className='btn-tonal';btn.type='button';btn.textContent='${buttonText}';btn.addEventListener('click',function(){localStorage.setItem(KEY,target);location.reload();});row.appendChild(left);row.appendChild(btn);body.appendChild(divider);body.appendChild(row);}if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',inject);}else{inject();}})();<\/script>`;
    }

    function renderVersion(version) {
      const baseHtml = version === 'new' ? NEW_HTML : OLD_HTML;
      const switchScript = buildUISwitchScript(version);
      const renderedHtml = /<\/body>/i.test(baseHtml)
        ? baseHtml.replace(/<\/body>/i, switchScript + '\n</body>')
        : baseHtml + switchScript;
      document.open();
      document.write(renderedHtml);
      document.close();
    }

    const version = localStorage.getItem('igcse_ui_version') === 'new' ? 'new' : 'old';
    renderVersion(version);
  </script>
