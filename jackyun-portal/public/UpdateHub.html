<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />

    <style>
        :root {
            --primary: #1a73e8;
            --primary-bg: #e8f0fe;
            --surface: #ffffff;
            --background: #f8f9fa;
            --text-main: #202124;
            --text-sub: #5f6368;
            --border: #dadce0;
            --shadow-card: 0 1px 2px 0 rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15);
            --shadow-hover: 0 4px 8px 3px rgba(60,64,67,0.15);
            --anim-curve: cubic-bezier(0.4, 0.0, 0.2, 1);
        }

        body {
            font-family: 'Google Sans', 'Roboto', sans-serif;
            background-color: var(--background);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        /* --- Header --- */
        header {
            text-align: center;
            padding: 60px 20px 40px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            background: #e6f4ea;
            color: #137333;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 16px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #1e8e3e;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        h1 {
            font-size: 40px;
            margin: 0 0 10px 0;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-sub);
            font-size: 18px;
        }

        /* --- Sticky Navigation --- */
        .nav-container {
            position: sticky;
            top: 20px;
            z-index: 100;
            display: flex;
            justify-content: center;
            margin-top: -25px;
            margin-bottom: 40px;
            pointer-events: none;
        }

        .toggle-switch {
            pointer-events: auto;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 6px;
            border-radius: 100px;
            display: flex;
            position: relative;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.5);
        }

        .toggle-btn {
            padding: 12px 32px;
            border: none;
            background: transparent;
            font-size: 16px;
            font-weight: 500;
            color: var(--text-sub);
            cursor: pointer;
            z-index: 2;
            transition: color 0.3s;
            position: relative;
            font-family: 'Google Sans', sans-serif;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toggle-btn.active { color: var(--primary); }

        .slider {
            position: absolute;
            height: calc(100% - 12px);
            top: 6px;
            left: 6px;
            background: var(--primary-bg);
            border-radius: 90px;
            z-index: 1;
            transition: transform 0.4s var(--anim-curve), width 0.4s var(--anim-curve);
        }

        /* --- Content Layout --- */
        .content-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px 80px;
            opacity: 1;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .content-container.fading {
            opacity: 0;
            transform: translateY(10px);
        }

        .section-title {
            font-size: 22px;
            color: var(--text-main);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* --- Update Log (Timeline) --- */
        .global-log {
            background: var(--surface);
            border-radius: 24px;
            padding: 30px;
            box-shadow: var(--shadow-card);
            margin-bottom: 40px;
            border: 1px solid var(--border);
        }

        .log-section-label {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .log-section-label.major { color: #1a73e8; }
        .log-section-label.regular { color: var(--text-sub); margin-top: 24px; }

        .log-item {
            padding-bottom: 20px;
            border-left: 2px solid var(--border);
            padding-left: 20px;
            position: relative;
        }
        .log-item:last-child { border-left: 2px solid transparent; padding-bottom: 0; }

        .log-item.major::before {
            background: #1a73e8;
            border-color: #1a73e8;
            box-shadow: 0 0 0 2px rgba(26, 115, 232, 0.3);
        }

        .log-item::before {
            content: '';
            position: absolute;
            left: -7px;
            top: 0;
            width: 12px;
            height: 12px;
            background: var(--primary);
            border-radius: 50%;
            border: 4px solid var(--surface);
        }

        .log-date { font-size: 12px; color: var(--text-sub); font-weight: 500; margin-bottom: 4px; }
        .log-content { font-size: 15px; line-height: 1.6; }

        /* --- Modules Grid --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }

        .card {
            background: var(--surface);
            border-radius: 24px;
            padding: 24px;
            box-shadow: var(--shadow-card);
            transition: all 0.3s var(--anim-curve);
            border: 1px solid transparent;
            display: flex;
            flex-direction: column;
            cursor: default;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-hover);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .card-icon {
            width: 48px;
            height: 48px;
            background: var(--primary-bg);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
        }

        .card-badge {
            font-size: 12px;
            font-weight: 500;
            padding: 4px 10px;
            border-radius: 12px;
        }

        .card-badge.online { background: #e6f4ea; color: #137333; }
        .card-badge.beta { background: #fef7e0; color: #e37400; }
        .card-badge.offline { background: #fce8e6; color: #c5221f; }

        .module-name { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
        .module-desc { font-size: 14px; color: var(--text-sub); line-height: 1.5; flex: 1; margin-bottom: 16px; }

        .update-info {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 16px;
        }

        .update-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            padding: 4px 0;
            color: var(--text-sub);
        }

        .update-row span:last-child { font-weight: 500; color: var(--text-main); }

        .action-btn {
            display: block;
            width: 100%;
            padding: 12px;
            border: none;
            background: var(--primary);
            color: white;
            font-size: 14px;
            font-weight: 500;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            text-decoration: none;
            font-family: 'Google Sans', sans-serif;
            box-sizing: border-box;
        }

        .action-btn:hover { background: #1557b0; }
    </style>
</head>

        // ==========================================
        // 2. 核心逻辑
        // ==========================================

        let currentView = 'desktop';

        function init() {
            renderContent('desktop');
            updateSlider(document.querySelector('.toggle-btn.active'));
        }

        function switchView(view, btn) {
            if (view === currentView) return;

            updateSlider(btn);

            document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const container = document.getElementById('main-content');
            container.classList.add('fading');

            setTimeout(() => {
                renderContent(view);
                currentView = view;
                container.classList.remove('fading');
            }, 300);
        }

        function updateSlider(btn) {
            const slider = document.getElementById('slider');
            slider.style.width = btn.offsetWidth + 'px';
            slider.style.transform = `translateX(${btn.offsetLeft}px)`;
        }

        function renderContent(type) {
            const data = database[type];
            const container = document.getElementById('main-content');

            const statusLabel = { online: '在线', beta: '测试中', offline: '已下线' };

            const logsHTML = `
                <section>
                    <div class="section-title">
                        <span class="material-symbols-rounded">history</span>
                        平台更新记录 (${type === 'desktop' ? '桌面端' : '移动端'})
                    </div>
                    <div class="global-log">
                        ${data.logsMajor.length > 0 ? `
                        <div class="log-section-label major">
                            <span class="material-symbols-rounded" style="font-size:18px">star</span> 重要更新
                        </div>
                        ${data.logsMajor.map(log => `
                            <div class="log-item major">
                                <div class="log-date">${log.date}</div>
                                <div class="log-content">${log.content}</div>
                            </div>
                        `).join('')}
                        ` : ''}
                        ${data.logsRegular.length > 0 ? `
                        <div class="log-section-label regular">
                            <span class="material-symbols-rounded" style="font-size:18px">sync</span> 常规更新
                        </div>
                        ${data.logsRegular.map(log => `
                            <div class="log-item">
                                <div class="log-date">${log.date}</div>
                                <div class="log-content">${log.content}</div>
                            </div>
                        `).join('')}
                        ` : ''}
                    </div>
                </section>
            `;

            const modulesHTML = `
                <section>
                    <div class="section-title">
                        <span class="material-symbols-rounded">grid_view</span>
                        功能模块状态
                    </div>
                    <div class="grid">
                        ${data.modules.map(mod => `
                            <div class="card">
                                <div class="card-header">
                                    <div class="card-icon">
                                        <span class="material-symbols-rounded">${mod.icon}</span>
                                    </div>
                                    <span class="card-badge ${mod.status}">${statusLabel[mod.status] || mod.status}</span>
                                </div>
                                <div class="module-name">${mod.name}</div>
                                <div class="module-desc">${mod.desc}</div>
                                <div class="update-info">
                                    <div class="update-row">
                                        <span>最近更新</span>
                                        <span>${mod.date}</span>
                                    </div>
                                    <div class="update-row">
                                        <span>状态</span>
                                        <span style="color:${mod.status === 'online' ? '#1e8e3e' : mod.status === 'beta' ? '#e37400' : '#c5221f'}">${statusLabel[mod.status] || mod.status}</span>
                                    </div>
                                </div>
                                <a href="${mod.link}" target="${mod.link.startsWith('http') ? '_blank' : '_top'}" class="action-btn">
                                    打开 ${mod.name}
                                </a>
                            </div>
                        `).join('')}
                    </div>
                </section>
            `;

            container.innerHTML = logsHTML + modulesHTML;
        }

        window.addEventListener('resize', () => {
            updateSlider(document.querySelector('.toggle-btn.active'));
        });

        init();
    </script>
