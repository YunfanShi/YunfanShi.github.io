<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goal Tracker × AI</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --surface: #111111;
  --surface2: #181818;
  --surface3: #222222;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.14);
  --text: #efefef;
  --text2: #777;
  --text3: #444;
  --blue: #4d9ef7;
  --blue-dim: rgba(77,158,247,0.15);
  --green: #34c76a;
  --green-dim: rgba(52,199,106,0.15);
  --yellow: #f5a623;
  --red: #ff5c5c;
  --ai: #a78bfa;
  --ai-dim: rgba(167,139,250,0.12);
  --ai-border: rgba(167,139,250,0.25);
  --seg-done: #34c76a;
  --seg-todo: #1a3d8f;
  --radius: 14px;
  --font: 'DM Sans', system-ui, sans-serif;
  --mono: 'DM Mono', monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}

/* TOPBAR */
.topbar{
  background:rgba(10,10,10,0.9);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  height:58px;display:flex;align-items:center;
  justify-content:space-between;padding:0 32px;
  position:sticky;top:0;z-index:100;
}
.brand{display:flex;align-items:center;gap:10px;}
.brand-dots{display:flex;gap:5px;}
.brand-dots span{width:9px;height:9px;border-radius:50%;display:block;}
.brand-name{font-size:15px;font-weight:600;letter-spacing:-0.3px;}
.ai-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;background:var(--ai-dim);color:var(--ai);border:1px solid var(--ai-border);letter-spacing:0.5px;}
.topbar-r{display:flex;gap:8px;align-items:center;}

/* LAYOUT */
.main{max-width:920px;margin:0 auto;padding:38px 28px;}

/* PAGE HEADER */
.page-hd{margin-bottom:36px;}
.page-title{font-size:30px;font-weight:600;letter-spacing:-0.7px;line-height:1.15;}
.page-sub{font-size:13px;color:var(--text2);margin-top:5px;}

/* AI STATUS BAR */
.ai-bar{
  background:var(--ai-dim);border:1px solid var(--ai-border);
  border-radius:10px;padding:10px 16px;margin-bottom:24px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  font-size:12px;
}
.ai-bar.no-key{background:rgba(255,92,92,0.06);border-color:rgba(255,92,92,0.2);}
.ai-bar-l{display:flex;align-items:center;gap:8px;color:var(--text2);}
.ai-dot{width:6px;height:6px;border-radius:50%;background:var(--ai);flex-shrink:0;}
.ai-dot.off{background:var(--red);}
.ai-bar-r{display:flex;gap:6px;}

/* STATS */
.stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:32px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:99px;padding:9px 18px;display:flex;align-items:center;gap:9px;transition:border-color .15s;}
.stat:hover{border-color:var(--border2);}
.stat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.stat-v{font-size:15px;font-weight:600;font-family:var(--mono);letter-spacing:-0.4px;}
.stat-lbl{font-size:12px;color:var(--text2);}

/* FILTER */
.filter-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;gap:12px;flex-wrap:wrap;}
.tabs{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:99px;padding:3px;gap:2px;}
.tab{padding:5px 14px;border-radius:99px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text2);font-family:var(--font);transition:all .15s;}
.tab.on{background:var(--surface3);color:var(--text);}
.tab:hover:not(.on){color:var(--text);}
.sort-sel{background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-family:var(--font);font-size:13px;padding:6px 12px;outline:none;cursor:pointer;}
option{background:#1a1a1a;}

/* GOAL CARD */
.goal-list{display:flex;flex-direction:column;gap:10px;}
.gcard{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:20px 22px 18px;
  transition:border-color .2s,background .2s;position:relative;overflow:hidden;
}
.gcard:hover{border-color:var(--border2);background:#121212;}
.gcard::before{content:'';position:absolute;left:0;top:10%;bottom:10%;width:3px;border-radius:0 3px 3px 0;background:var(--accent);opacity:0.7;}

/* TOP ROW */
.gtop{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;gap:10px;}
.gleft{flex:1;min-width:0;}
.gname{font-size:17px;font-weight:600;letter-spacing:-0.4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;}
.gmeta{display:flex;align-items:center;gap:8px;margin-top:4px;flex-wrap:wrap;}
.gdesc{font-size:12px;color:var(--text3);}
.gcat{font-size:11px;font-weight:500;padding:2px 8px;border-radius:4px;letter-spacing:0.2px;}
.gdeadline{font-size:11px;color:var(--text3);font-family:var(--mono);}

.gright{display:flex;align-items:center;gap:12px;flex-shrink:0;}
.gpct{font-size:23px;font-weight:600;font-family:var(--mono);letter-spacing:-1px;line-height:1;}
.gbadge{font-size:11px;font-weight:500;padding:3px 9px;border-radius:5px;white-space:nowrap;margin-top:4px;text-align:center;}
.gactions{display:flex;gap:2px;opacity:0;transition:opacity .15s;}
.gcard:hover .gactions{opacity:1;}

/* AI PREDICTION CHIP */
.ai-pred{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--ai-dim);border:1px solid var(--ai-border);
  border-radius:6px;padding:3px 9px;cursor:pointer;
  transition:all .15s;margin-top:6px;
  font-size:11px;font-weight:500;color:var(--ai);
  white-space:nowrap;
}
.ai-pred:hover{background:rgba(167,139,250,0.2);border-color:rgba(167,139,250,0.4);}
.ai-pred.loading{opacity:0.6;pointer-events:none;}
.ai-pred .ai-ico{font-size:10px;animation:none;}
.ai-pred.loading .ai-ico{animation:spin .8s linear infinite;}
.ai-pred.error{background:rgba(255,92,92,0.08);border-color:rgba(255,92,92,0.2);color:var(--red);}
.ai-pred.no-key{background:rgba(255,255,255,0.04);border-color:var(--border);color:var(--text3);}
@keyframes spin{to{transform:rotate(360deg);}}

/* SEGMENTED BAR */
.segwrap{position:relative;cursor:pointer;margin-bottom:10px;padding:4px 0;}
.segbar{display:flex;gap:2.5px;height:13px;}
.seg{flex:1;border-radius:2.5px;transition:opacity .12s,transform .12s;}
.seg.done{background:var(--seg-done);}
.seg.todo{background:var(--seg-todo);}
.segwrap:hover .seg{opacity:0.6;}
.segwrap:hover .seg:hover{opacity:1;transform:scaleY(1.18);}
.seg-labels{display:flex;justify-content:space-between;margin-top:4px;}
.seg-lbl{font-size:10px;color:var(--text3);font-family:var(--mono);}
.seg-tip{position:absolute;bottom:calc(100% + 2px);background:#1e1e1e;border:1px solid var(--border2);color:var(--text);font-size:11px;font-family:var(--mono);padding:3px 8px;border-radius:5px;pointer-events:none;white-space:nowrap;opacity:0;transition:opacity .1s;z-index:10;transform:translateX(-50%);}
.segwrap:hover .seg-tip{opacity:1;}

/* FOOTER */
.gfoot{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.gfoot-l{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text3);font-family:var(--mono);}
.pri-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.gfoot-r{display:flex;align-items:center;gap:5px;}
.act-dots{display:flex;gap:3px;align-items:center;}
.adot{width:5px;height:5px;border-radius:50%;background:var(--surface3);}
.adot.on{background:var(--green);}

/* BUTTONS */
.btn{border:none;outline:none;cursor:pointer;font-family:var(--font);font-weight:500;border-radius:8px;transition:all .15s;display:inline-flex;align-items:center;gap:6px;user-select:none;}
.btn:active{transform:scale(0.97);}
.btn-pri{background:var(--blue);color:#000;padding:9px 18px;font-size:13px;border-radius:8px;}
.btn-pri:hover{background:#6db3ff;}
.btn-ghost{background:transparent;color:var(--text2);padding:8px 14px;font-size:13px;border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--border2);color:var(--text);background:var(--surface2);}
.btn-ai{background:var(--ai-dim);color:var(--ai);padding:8px 14px;font-size:13px;border:1px solid var(--ai-border);border-radius:8px;}
.btn-ai:hover{background:rgba(167,139,250,0.2);border-color:rgba(167,139,250,0.4);}
.btn-ico{background:transparent;color:var(--text3);width:28px;height:28px;padding:0;border-radius:6px;font-size:13px;justify-content:center;}
.btn-ico:hover{background:var(--surface3);color:var(--text2);}
.btn-ico.del:hover{background:rgba(255,92,92,.15);color:var(--red);}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;visibility:hidden;transition:opacity .2s,visibility .2s;}
.overlay.open{opacity:1;visibility:visible;}
.modal{background:#141414;border:1px solid var(--border2);border-radius:18px;width:100%;max-width:500px;box-shadow:0 32px 80px rgba(0,0,0,.7);transform:scale(0.95) translateY(14px);transition:transform .25s cubic-bezier(.4,0,.2,1);}
.overlay.open .modal{transform:scale(1) translateY(0);}
.mhd{padding:22px 24px 0;font-size:17px;font-weight:600;letter-spacing:-0.3px;display:flex;align-items:center;gap:10px;}
.mbody{padding:18px 24px;display:flex;flex-direction:column;gap:15px;}
.mfoot{padding:8px 24px 20px;display:flex;justify-content:flex-end;gap:8px;border-top:1px solid var(--border);}

/* FORM */
.fg{display:flex;flex-direction:column;gap:6px;}
.flbl{font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:0.6px;}
.fi{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 13px;font-size:14px;font-family:var(--font);color:var(--text);outline:none;transition:border-color .15s;width:100%;}
.fi:focus{border-color:var(--blue);}
.fi::placeholder{color:var(--text3);}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* SLIDER */
.slrow{display:flex;align-items:center;gap:12px;}
.slval{font-size:17px;font-weight:600;font-family:var(--mono);min-width:44px;text-align:right;color:var(--blue);}
input[type=range]{-webkit-appearance:none;flex:1;height:4px;border-radius:99px;background:var(--surface3);outline:none;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--blue);box-shadow:0 0 0 3px rgba(77,158,247,.2);transition:box-shadow .15s;}
input[type=range]::-webkit-slider-thumb:hover{box-shadow:0 0 0 5px rgba(77,158,247,.3);}

/* QUICK BTNS */
.qbtns{display:flex;gap:6px;flex-wrap:wrap;}
.qb{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text2);font-family:var(--mono);font-size:12px;padding:5px 10px;cursor:pointer;transition:all .12s;}
.qb:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-dim);}

/* COLOR */
.crow{display:flex;gap:9px;flex-wrap:wrap;}
.cdot{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .12s;}
.cdot.sel{border-color:var(--text);transform:scale(1.15);}

/* EMPTY */
.empty{text-align:center;padding:72px 24px;color:var(--text2);}
.empty-ico{font-size:44px;margin-bottom:14px;}
.empty-title{font-size:17px;font-weight:500;color:var(--text);margin-bottom:6px;}
.empty-desc{font-size:13px;}

/* TOAST */
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(70px);background:#1c1c1c;border:1px solid var(--border2);color:var(--text);font-size:13px;padding:10px 20px;border-radius:10px;box-shadow:0 10px 40px rgba(0,0,0,.5);z-index:999;transition:transform .28s cubic-bezier(.4,0,.2,1);white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* AI MODAL */
.ai-modal-ico{font-size:22px;}
.ai-response{
  background:var(--surface2);border:1px solid var(--ai-border);
  border-radius:10px;padding:16px;font-size:13px;line-height:1.7;
  color:var(--text);min-height:80px;position:relative;
  max-height:380px;overflow-y:auto;
}
.ai-response.loading-state{display:flex;align-items:center;justify-content:center;gap:10px;color:var(--text2);}
.ai-response.error-state{border-color:rgba(255,92,92,0.3);color:var(--red);}
.ai-response p{margin-bottom:10px;}
.ai-response p:last-child{margin-bottom:0;}
.ai-response strong{color:var(--ai);font-weight:600;}
.ai-response ul{padding-left:18px;margin-bottom:10px;}
.ai-response li{margin-bottom:5px;}
.typing-dots{display:inline-flex;gap:4px;align-items:center;}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--ai);animation:bounce .9s infinite;}
.typing-dots span:nth-child(2){animation-delay:.15s;}
.typing-dots span:nth-child(3){animation-delay:.3s;}
@keyframes bounce{0%,80%,100%{transform:scale(0.7);opacity:0.5;}40%{transform:scale(1);opacity:1;}}

/* AI FEATURES GRID */
.ai-features{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.ai-feat{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;padding:14px;cursor:pointer;
  transition:all .15s;text-align:left;
}
.ai-feat:hover{border-color:var(--ai-border);background:var(--ai-dim);}
.ai-feat-ico{font-size:20px;margin-bottom:6px;}
.ai-feat-name{font-size:13px;font-weight:600;margin-bottom:3px;}
.ai-feat-desc{font-size:11px;color:var(--text2);}

/* SETTINGS */
.settings-section{margin-bottom:20px;}
.settings-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:var(--text3);margin-bottom:10px;}
.api-key-row{display:flex;gap:8px;}
.api-key-row .fi{flex:1;font-family:var(--mono);font-size:12px;}
.key-status{font-size:11px;padding:4px 10px;border-radius:6px;display:inline-flex;align-items:center;gap:5px;}
.key-status.ok{background:var(--green-dim);color:var(--green);}
.key-status.no{background:rgba(255,92,92,0.1);color:var(--red);}

/* MARKDOWN-LIKE RENDERING */
.md-content h3{font-size:14px;font-weight:600;color:var(--ai);margin:12px 0 6px;}
.md-content p{margin-bottom:8px;font-size:13px;line-height:1.65;}
.md-content ul{padding-left:16px;margin-bottom:8px;}
.md-content li{font-size:13px;line-height:1.65;margin-bottom:4px;}
.md-content .highlight{background:rgba(167,139,250,0.12);padding:8px 12px;border-radius:6px;border-left:2px solid var(--ai);margin:10px 0;}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:99px;}

@media(max-width:600px){
  .main{padding:22px 16px;}
  .topbar{padding:0 18px;}
  .frow{grid-template-columns:1fr;}
  .page-title{font-size:22px;}
  .ai-features{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-dots">
      <span style="background:#4285f4"></span>
      <span style="background:#ea4335"></span>
      <span style="background:#fbbc04"></span>
      <span style="background:#34a853"></span>
    </div>
    <span class="brand-name">Goal Tracker</span>
    <span class="ai-badge">× AI</span>
  </div>
  <div class="topbar-r">
    <button class="btn btn-ai" onclick="openAIHub()">✦ AI 助手</button>
    <button class="btn btn-ghost" onclick="openSettings()">⚙ 设置</button>
    <button class="btn btn-ghost" onclick="exportData()">↑ 导出</button>
    <button class="btn btn-pri" onclick="openAdd()">＋ 新建目标</button>
  </div>
</div>

<div class="main">
  <div class="page-hd">
    <div class="page-title" id="greeting">我的目标</div>
    <div class="page-sub" id="dateStr"></div>
  </div>

  <div class="ai-bar" id="aiStatusBar">
    <div class="ai-bar-l">
      <div class="ai-dot" id="aiDot"></div>
      <span id="aiStatusText">检查 AI 配置中…</span>
    </div>
    <div class="ai-bar-r">
      <button class="btn btn-ghost" style="padding:5px 12px;font-size:12px;" onclick="openSettings()">配置 API Key</button>
    </div>
  </div>

  <div class="stats" id="statsEl"></div>

  <div class="filter-row">
    <div class="tabs">
      <button class="tab on" onclick="setFilter('all',this)">全部</button>
      <button class="tab" onclick="setFilter('active',this)">进行中</button>
      <button class="tab" onclick="setFilter('done',this)">已完成</button>
      <button class="tab" onclick="setFilter('overdue',this)">逾期</button>
    </div>
    <select class="sort-sel" onchange="setSort(this.value)">
      <option value="created">按创建时间</option>
      <option value="progress-asc">进度 ↑</option>
      <option value="progress-desc">进度 ↓</option>
      <option value="deadline">按截止日期</option>
      <option value="name">按名称</option>
    </select>
  </div>

  <div class="goal-list" id="goalList"></div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="overlay" id="goalModal">
  <div class="modal">
    <div class="mhd" id="mTitle">新建目标</div>
    <div class="mbody">
      <div class="fg">
        <label class="flbl">目标名称 *</label>
        <input class="fi" id="iName" placeholder="例如：Math0580、健身计划…" maxlength="50">
      </div>
      <div class="fg">
        <label class="flbl">描述</label>
        <input class="fi" id="iDesc" placeholder="简短说明" maxlength="100">
      </div>
      <div class="frow">
        <div class="fg">
          <label class="flbl">分类</label>
          <select class="fi" id="iCat">
            <option value="学习">📚 学习</option>
            <option value="健康">💪 健康</option>
            <option value="工作">💼 工作</option>
            <option value="生活">🏠 生活</option>
            <option value="财务">💰 财务</option>
            <option value="其他">✦ 其他</option>
          </select>
        </div>
        <div class="fg">
          <label class="flbl">优先级</label>
          <select class="fi" id="iPri">
            <option value="high">🔴 高</option>
            <option value="mid" selected>🟡 中</option>
            <option value="low">🟢 低</option>
          </select>
        </div>
      </div>
      <div class="frow">
        <div class="fg">
          <label class="flbl">截止日期</label>
          <input class="fi" id="iDeadline" type="date">
        </div>
        <div class="fg">
          <label class="flbl">单位（可选）</label>
          <input class="fi" id="iUnit" placeholder="章 / 次 / 页…" maxlength="10">
        </div>
      </div>
      <div class="fg">
        <label class="flbl">初始进度</label>
        <div class="slrow">
          <input type="range" id="iProgress" min="0" max="100" value="0"
            oninput="document.getElementById('iProgVal').textContent=this.value+'%'">
          <span class="slval" id="iProgVal">0%</span>
        </div>
      </div>
      <div class="fg">
        <label class="flbl">颜色</label>
        <div class="crow" id="colorRow"></div>
      </div>
    </div>
    <div class="mfoot">
      <button class="btn btn-ghost" onclick="closeM('goalModal')">取消</button>
      <button class="btn btn-pri" onclick="saveGoal()">保存</button>
    </div>
  </div>
</div>

<!-- PROGRESS MODAL -->
<div class="overlay" id="progModal">
  <div class="modal" style="max-width:440px;">
    <div class="mhd" id="progMTitle">更新进度</div>
    <div class="mbody">
      <div id="progPreview" style="margin-bottom:2px;"></div>
      <div class="slrow">
        <input type="range" id="qSlider" min="0" max="100" value="0" oninput="onQSlider(this.value)">
        <span class="slval" id="qVal">0%</span>
      </div>
      <div class="qbtns">
        <span class="qb" onclick="setQ(0)">0%</span>
        <span class="qb" onclick="setQ(10)">10%</span>
        <span class="qb" onclick="setQ(25)">25%</span>
        <span class="qb" onclick="setQ(50)">50%</span>
        <span class="qb" onclick="setQ(75)">75%</span>
        <span class="qb" onclick="setQ(90)">90%</span>

let goals=JSON.parse(localStorage.getItem('gt_v4')||'null')||[

let filter='all',sort='created',editId=null,quickId=null,selColor='blue';

/* ======= GREETING ======= */

/* ======= SEGMENTED BAR ======= */
function segBar(pct,segs,h){

}

/* ======= STATS ======= */
function renderStats(){
  const tot=goals.length,done=goals.filter(g=>g.progress===100).length;
  const avg=tot?Math.round(goals.reduce((s,g)=>s+g.progress,0)/tot):0;
  const today=new Date().toISOString().slice(0,10);
  const ov=goals.filter(g=>g.deadline&&g.deadline<today&&g.progress<100).length;
  let h=`
    <div class="stat"><div class="stat-dot" style="background:#4d9ef7;"></div><span class="stat-v" style="color:#4d9ef7;">${tot}</span><span class="stat-lbl">目标总数</span></div>

    <div class="stat"><div class="stat-dot" style="background:#f5a623;"></div><span class="stat-v" style="color:#f5a623;">${avg}%</span><span class="stat-lbl">平均进度</span></div>`;
  if(ov) h+=`<div class="stat"><div class="stat-dot" style="background:#ff5c5c;"></div><span class="stat-v" style="color:#ff5c5c;">${ov}</span><span class="stat-lbl">逾期</span></div>`;
  document.getElementById('statsEl').innerHTML=h;

/* ======= FILTER/SORT ======= */
function setFilter(f,el){filter=f;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));el.classList.add('on');render();}
function setSort(v){sort=v;render();}
function filtered(){
  const today=new Date().toISOString().slice(0,10);
  let l=[...goals];
  if(filter==='active') l=l.filter(g=>g.progress>0&&g.progress<100);
  else if(filter==='done') l=l.filter(g=>g.progress===100);
  else if(filter==='overdue') l=l.filter(g=>g.deadline&&g.deadline<today&&g.progress<100);
  if(sort==='progress-asc') l.sort((a,b)=>a.progress-b.progress);
  else if(sort==='progress-desc') l.sort((a,b)=>b.progress-a.progress);
  else if(sort==='deadline') l.sort((a,b)=>(a.deadline||'9999')>(b.deadline||'9999')?1:-1);
  else if(sort==='name') l.sort((a,b)=>a.name.localeCompare(b.name,'zh'));
  else l.sort((a,b)=>b.created-a.created);
  return l;
}

/* ======= AI PREDICTION CHIP ======= */
function predChipHTML(g){
  if(!prefs.showPred) return '';
  const key=getKey();
  const cached=aiPreds[g.id];
  if(!key){
    return `<div class="ai-pred no-key" onclick="openSettings()" title="配置 API Key 以启用 AI 预测">✦ AI预测 (未配置)</div>`;
  }
  if(cached && cached.summary){
    return `<div class="ai-pred" onclick="showCachedPred(${g.id})" title="查看 AI 详细分析">✦ ${esc(cached.summary)}</div>`;
  }
  return `<div class="ai-pred" id="pred-${g.id}" onclick="runPred(${g.id})" title="点击获取 AI 预测">✦ AI 预测完成时间</div>`;
}

/* ======= BUILD GOAL CONTEXT STRING ======= */
function buildGoalContext(g){
  const today=new Date().toISOString().slice(0,10);
  const hist=(g.history||[]);
  const dlDays=g.deadline?Math.ceil((new Date(g.deadline)-new Date())/864e5):null;

  // calculate average daily velocity from history
  let velocity='暂无历史数据';
  if(hist.length>=2){
    const first=hist[0],last=hist[hist.length-1];
    const daysDiff=Math.max(1,Math.ceil((new Date(last.date)-new Date(first.date))/864e5));
    const pctPerDay=((last.v-first.v)/daysDiff).toFixed(2);
    velocity=`每天约 ${pctPerDay}% 进度`;
  }

  return `目标名称: ${g.name}
描述: ${g.desc||'无'}
分类: ${g.cat}
当前进度: ${g.progress}%
优先级: ${g.priority==='high'?'高':g.priority==='mid'?'中':'低'}
截止日期: ${g.deadline||'未设置'}${dlDays!==null?`（距今${dlDays}天）`:''}
进度单位: ${g.unit||'未设置'}
历史更新记录 (共${hist.length}次):
${hist.map(h=>`  ${h.date}: ${h.v}%${h.note?' ('+h.note+')':''}`).join('\n')||'  无'}
当前速率估算: ${velocity}
今日日期: ${today}`;
}

/* ======= CALL DEEPSEEK API ======= */
async function callDeepSeek(messages, onChunk){
  const key=getKey();
  if(!key) throw new Error('未配置 API Key');

  const res=await fetch('https://api.deepseek.com/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
    body:JSON.stringify({
      model:'deepseek-chat',
      messages,
      stream:true,
      max_tokens:800,
      temperature:0.7,
    })
  });

  if(!res.ok){
    const err=await res.json().catch(()=>({}));
    throw new Error(err.error?.message||`API 错误 ${res.status}`);
  }

  const reader=res.body.getReader();
  const decoder=new TextDecoder();
  let full='';

  while(true){
    const {done,value}=await reader.read();
    if(done) break;
    const chunk=decoder.decode(value);
    const lines=chunk.split('\n');
    for(const line of lines){
      if(!line.startsWith('data:')) continue;
      const d=line.slice(5).trim();
      if(d==='[DONE]') break;
      try{
        const j=JSON.parse(d);
        const t=j.choices?.[0]?.delta?.content||'';
        if(t){full+=t;if(onChunk) onChunk(full);}
      }catch(e){}
    }
  }
  return full;
}

/* ======= RUN PREDICTION FOR A GOAL ======= */
async function runPred(id){
  const g=goals.find(x=>x.id===id);
  if(!g) return;

  // open modal immediately
  currentPredId=id;
  document.getElementById('aiPredTitle').textContent=`AI 分析 — ${g.name}`;
  document.getElementById('aiPredContent').className='ai-response loading-state';
  document.getElementById('aiPredContent').innerHTML=`<div class="typing-dots"><span></span><span></span><span></span></div><span style="margin-left:8px;font-size:13px;">DeepSeek 分析中…</span>`;
  document.getElementById('aiPredMeta').textContent='';
  openM('aiPredModal');

  // mark chip as loading
  const chip=document.getElementById('pred-'+id);
  if(chip){chip.classList.add('loading');chip.innerHTML='<span class="ai-ico">↻</span> 分析中…';}

  const ctx=buildGoalContext(g);
  const messages=[
    {role:'system',content:`你是一个专业的目标管理 AI 助手。请用中文回答，回答要简洁有洞察力。
格式要求：
1. 第一行输出一行简短预测（如"预计约 45 天完成"或"有风险，建议提速"），前缀用 [预测]
2. 然后换行详细分析，包含：完成时间预测、速度分析、建议
3. 回答总长度控制在200字以内`},
    {role:'user',content:`请根据以下目标数据，预测完成时间并给出建议：\n\n${ctx}`}
  ];

  try{
    const t0=Date.now();
    let fullText='';

    await callDeepSeek(messages,(partial)=>{
      fullText=partial;
      document.getElementById('aiPredContent').className='ai-response md-content';
      document.getElementById('aiPredContent').innerHTML=renderMD(partial);
    });

    // extract summary (first line after [预测])
    const summaryMatch=fullText.match(/\[预测\]\s*(.+)/);
    const summary=summaryMatch?summaryMatch[1].trim().slice(0,20):extractShortPred(fullText);

    aiPreds[id]={text:fullText,summary,ts:Date.now()};
    savePreds();

    const elapsed=((Date.now()-t0)/1000).toFixed(1);
    document.getElementById('aiPredMeta').textContent=`DeepSeek · ${elapsed}s · ${new Date().toLocaleTimeString('zh-CN')}`;

    // update chip
    render();
  }catch(err){
    document.getElementById('aiPredContent').className='ai-response error-state';
    document.getElementById('aiPredContent').innerHTML=`❌ ${esc(err.message)}`;
    if(chip){chip.classList.remove('loading');chip.classList.add('error');chip.innerHTML='✦ 分析失败，重试';}
    toast('AI 请求失败: '+err.message);
  }
}

function extractShortPred(text){
  // try to find a time estimate
  const m=text.match(/(\d+)\s*(天|周|月|小时|days?|weeks?)/);
  if(m) return `约${m[1]}${m[2]}完成`;
  return '已分析';
}

function showCachedPred(id){
  const g=goals.find(x=>x.id===id);
  const cached=aiPreds[id];
  if(!g||!cached) return;
  currentPredId=id;
  document.getElementById('aiPredTitle').textContent=`AI 分析 — ${g.name}`;
  document.getElementById('aiPredContent').className='ai-response md-content';
  document.getElementById('aiPredContent').innerHTML=renderMD(cached.text);
  document.getElementById('aiPredMeta').textContent=`缓存 · ${new Date(cached.ts).toLocaleString('zh-CN')}`;
  openM('aiPredModal');
}

function rerunPred(){
  if(currentPredId!==null){
    delete aiPreds[currentPredId];
    savePreds();
    closeM('aiPredModal');
    runPred(currentPredId);
  }
}

/* ======= RENDER MARKDOWN-LIKE ======= */
function renderMD(text){
  if(!text) return '';
  let h=text
    .replace(/\[预测\]\s*/g,'<strong style="color:var(--ai)">📊 预测：</strong>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/^###\s(.+)$/gm,'<strong style="color:var(--ai);display:block;margin:10px 0 4px;">$1</strong>')
    .replace(/^##\s(.+)$/gm,'<strong style="color:var(--ai);display:block;margin:10px 0 4px;">$1</strong>')
    .replace(/^-\s(.+)$/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs,'<ul>$1</ul>')
    .replace(/\n\n/g,'</p><p>')
    .replace(/\n/g,'<br>');
  return `<div class="md-content"><p>${h}</p></div>`;
}

/* ======= RENDER ======= */
function render(){
  renderStats();
  updateAIStatus();
  const list=filtered();
  const el=document.getElementById('goalList');
  if(!list.length){
    el.innerHTML=`<div class="empty"><div class="empty-ico">🌑</div><div class="empty-title">暂无目标</div><div class="empty-desc">点击「新建目标」开始追踪</div></div>`;
    return;
  }
  const today=new Date().toISOString().slice(0,10);
  el.innerHTML=list.map(g=>{
    const c=gc(g.color);
    const p=g.progress,done=p===100;
    const ov=g.deadline&&g.deadline<today&&!done;
    const dl=g.deadline?Math.ceil((new Date(g.deadline)-new Date())/864e5):null;
    const badge=done?'Completed ✓':ov?'Overdue':p===0?'Not started':dl!==null&&dl<=7?`${dl}d left`:'In progress';
    const bc=done?'rgba(52,199,106,.15)':ov?'rgba(255,92,92,.15)':p===0?'rgba(255,255,255,.05)':'rgba(77,158,247,.12)';
    const bcolor=done?'#34c76a':ov?'#ff5c5c':p===0?'#444':'#4d9ef7';
    const hist=(g.history||[]).slice(-7);
    const dots=Array(7).fill(0).map((_,i)=>`<div class="adot ${i<hist.length?'on':''}"></div>`).join('');
    return `<div class="gcard" style="--accent:${c.hex};" id="gc${g.id}">
      <div class="gtop">
        <div class="gleft">
          <div class="gname">${esc(g.name)}</div>
          <div class="gmeta">
            ${g.desc?`<span class="gdesc">${esc(g.desc)}</span>`:''}
            <span class="gcat" style="background:${c.dim};color:${c.hex};">${CAT_E[g.cat]||'✦'} ${g.cat}</span>
            ${g.deadline?`<span class="gdeadline">${g.deadline.slice(5).replace('-','/')}</span>`:''}
          </div>
          ${done?'':predChipHTML(g)}
        </div>
        <div class="gright">
          <div>
            <div class="gpct" style="color:${done?'#34c76a':c.hex};">${p}%</div>
            <div class="gbadge" style="background:${bc};color:${bcolor};">${badge}</div>
          </div>
          <div class="gactions">
            <button class="btn btn-ico" onclick="openDetail(${g.id})" title="详情">◎</button>
            <button class="btn btn-ico" onclick="openEdit(${g.id})" title="编辑">✎</button>
            <button class="btn btn-ico del" onclick="delGoal(${g.id})" title="删除">✕</button>
          </div>
        </div>
      </div>
      <div class="segwrap" onclick="openProg(${g.id})" title="点击更新进度">
        <span class="seg-tip" id="stt${g.id}">${p}%</span>
        ${segBar(p,60,13)}
        <div class="seg-labels"><span class="seg-lbl">0%</span><span class="seg-lbl">25%</span><span class="seg-lbl">50%</span><span class="seg-lbl">75%</span><span class="seg-lbl">100%</span></div>
      </div>
      <div class="gfoot">
        <div class="gfoot-l">
          <div class="pri-dot" style="background:${PRI_C[g.priority]};"></div>
          <span>${g.priority==='high'?'高优先级':g.priority==='mid'?'中优先级':'低优先级'}</span>
          ${(g.history&&g.history.length)?`<span style="color:#333">·</span><span>${g.history.length}次更新</span>`:''}
          ${g.unit?`<span style="color:#333">·</span><span>单位:${esc(g.unit)}</span>`:''}
        </div>
        <div class="gfoot-r">
          <span style="font-size:10px;color:#333;margin-right:3px;">近期</span>
          <div class="act-dots">${dots}</div>
        </div>
      </div>
    </div>`;
  }).join('');

  // tooltip on mousemove
  list.forEach(g=>{
    const card=document.getElementById('gc'+g.id);
    const wrap=card&&card.querySelector('.segwrap');
    const tip=document.getElementById('stt'+g.id);
    const bar=wrap&&wrap.querySelector('.segbar');
    if(!wrap||!tip||!bar) return;
    wrap.addEventListener('mousemove',e=>{
      const r=bar.getBoundingClientRect();
      const x=Math.max(0,Math.min(e.clientX-r.left,r.width));
      const pv=Math.round(x/r.width*100);
      tip.textContent=pv+'%';
      tip.style.left=(e.clientX-wrap.getBoundingClientRect().left)+'px';
    });
  });
}

/* ======= AI HUB ======= */
function openAIHub(){
  document.getElementById('aiHubResponse').style.display='none';
  document.getElementById('aiCustomQ').value='';
  openM('aiHubModal');
}

async function aiFeature(type){
  if(!getKey()){toast('请先配置 API Key');openSettings();return;}
  const allCtx=goals.map(g=>buildGoalContext(g)).join('\n\n---\n\n');
  const today=new Date().toISOString().slice(0,10);

  const prompts={
    overview:`今日日期: ${today}\n\n以下是我的所有目标数据：\n\n${allCtx}\n\n请给出整体完成情况分析，包括：总体趋势、最接近完成的目标、需要加速的目标，以及综合预测。200字以内。`,
    priority:`今日日期: ${today}\n\n${allCtx}\n\n作为今日规划助手，请告诉我今天应该重点关注哪个目标？给出排序和理由。150字以内。`,
    plan:`今日日期: ${today}\n\n${allCtx}\n\n请为本周（7天）制定每个目标的具体行动计划，包括每天建议投入时间和具体任务。尽量具体可操作。`,
    risk:`今日日期: ${today}\n\n${allCtx}\n\n请识别有截止日期风险的目标，分析原因，并给出补救建议。`
  };

  const resp=document.getElementById('aiHubResponse');
  resp.style.display='block';
  resp.className='ai-response loading-state';
  resp.innerHTML=`<div class="typing-dots"><span></span><span></span><span></span></div><span style="margin-left:8px;">DeepSeek 思考中…</span>`;

  try{
    await callDeepSeek([
      {role:'system',content:'你是专业的目标管理教练，用中文回答，简洁有洞察力，适当使用 emoji。'},
      {role:'user',content:prompts[type]}
    ],(partial)=>{
      resp.className='ai-response md-content';
      resp.innerHTML=renderMD(partial);
    });
  }catch(err){
    resp.className='ai-response error-state';
    resp.innerHTML='❌ '+esc(err.message);
    toast('AI 请求失败');
  }
}

async function askCustom(){
  const q=document.getElementById('aiCustomQ').value.trim();
  if(!q){toast('请输入问题');return;}
  if(!getKey()){toast('请先配置 API Key');openSettings();return;}
  const allCtx=goals.map(g=>buildGoalContext(g)).join('\n\n---\n\n');

  const resp=document.getElementById('aiHubResponse');
  resp.style.display='block';
  resp.className='ai-response loading-state';
  resp.innerHTML=`<div class="typing-dots"><span></span><span></span><span></span></div><span style="margin-left:8px;">DeepSeek 思考中…</span>`;

  try{
    await callDeepSeek([
      {role:'system',content:'你是目标管理助手。用户提供了他们的目标数据，请基于这些数据用中文回答问题。'},
      {role:'user',content:`我的目标数据：\n\n${allCtx}\n\n我的问题：${q}`}
    ],(partial)=>{
      resp.className='ai-response md-content';
      resp.innerHTML=renderMD(partial);
    });
  }catch(err){
    resp.className='ai-response error-state';
    resp.innerHTML='❌ '+esc(err.message);
  }
}

/* ======= SETTINGS ======= */
function openSettings(){
  const key=getKey();
  document.getElementById('apiKeyInput').value=key;
  document.getElementById('toggleAutoPred').checked=prefs.autoPred;
  document.getElementById('toggleShowPred').checked=prefs.showPred;
  updateKeyStatus(!!key);
  openM('settingsModal');
}
function saveApiKey(){
  const k=document.getElementById('apiKeyInput').value.trim();
  localStorage.setItem('ds_key',k);
  updateKeyStatus(!!k);
  updateAIStatus();
  render();
  toast(k?'API Key 已保存 ✓':'API Key 已清除');
}
function updateKeyStatus(ok){
  document.getElementById('keyStatusEl').innerHTML=`<span class="key-status ${ok?'ok':'no'}">${ok?'✓ Key 已配置':'✗ 未配置 Key'}</span>`;
}
function clearAllPreds(){
  aiPreds={};savePreds();render();toast('AI 缓存已清除');
}

/* ======= COLOR ROW ======= */
function buildCR(sel){return COLORS.map(c=>`<div class="cdot ${c.id===sel?'sel':''}" style="background:${c.hex};" onclick="pickC('${c.id}')"></div>`).join('');}
function pickC(id){selColor=id;document.getElementById('colorRow').innerHTML=buildCR(id);}

/* ======= ADD/EDIT ======= */
function openAdd(){
  editId=null;selColor='blue';
  document.getElementById('mTitle').textContent='新建目标';
  ['iName','iDesc','iDeadline','iUnit'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('iCat').value='学习';
  document.getElementById('iPri').value='mid';
  document.getElementById('iProgress').value=0;
  document.getElementById('iProgVal').textContent='0%';
  document.getElementById('colorRow').innerHTML=buildCR('blue');
  openM('goalModal');
  setTimeout(()=>document.getElementById('iName').focus(),250);
}
function openEdit(id){
  const g=goals.find(x=>x.id===id);if(!g)return;
  editId=id;selColor=g.color;
  document.getElementById('mTitle').textContent='编辑目标';
  document.getElementById('iName').value=g.name;
  document.getElementById('iDesc').value=g.desc||'';
  document.getElementById('iCat').value=g.cat||'学习';
  document.getElementById('iPri').value=g.priority||'mid';
  document.getElementById('iDeadline').value=g.deadline||'';
  document.getElementById('iUnit').value=g.unit||'';
  document.getElementById('iProgress').value=g.progress;
  document.getElementById('iProgVal').textContent=g.progress+'%';
  document.getElementById('colorRow').innerHTML=buildCR(g.color);
  openM('goalModal');
}
function saveGoal(){
  const name=document.getElementById('iName').value.trim();
  if(!name){document.getElementById('iName').focus();toast('请输入目标名称');return;}
  const obj={name,desc:document.getElementById('iDesc').value.trim(),cat:document.getElementById('iCat').value,priority:document.getElementById('iPri').value,deadline:document.getElementById('iDeadline').value,unit:document.getElementById('iUnit').value.trim(),progress:parseInt(document.getElementById('iProgress').value),color:selColor};
  if(editId){const g=goals.find(x=>x.id===editId);if(g)Object.assign(g,obj);}
  else goals.push({...obj,id:Date.now(),history:[],created:Date.now()});
  save();render();closeM('goalModal');
  toast(editId?'目标已更新 ✓':'目标已创建 🎯');
}

/* ======= PROGRESS MODAL ======= */
function openProg(id){
  const g=goals.find(x=>x.id===id);if(!g)return;
  quickId=id;
  document.getElementById('progMTitle').textContent='更新进度 — '+g.name;
  document.getElementById('qSlider').value=g.progress;
  document.getElementById('qVal').textContent=g.progress+'%';
  document.getElementById('qNote').value='';
  document.getElementById('progPreview').innerHTML=segBar(g.progress,40,10);
  openM('progModal');
}
function onQSlider(v){
  document.getElementById('qVal').textContent=v+'%';
  document.getElementById('progPreview').innerHTML=segBar(parseInt(v),40,10);
}
function setQ(v){document.getElementById('qSlider').value=v;onQSlider(v);}
function saveQ(){
  if(quickId===null)return;
  const v=parseInt(document.getElementById('qSlider').value);
  const note=document.getElementById('qNote').value.trim();
  const g=goals.find(x=>x.id===quickId);
  if(g){g.progress=v;if(!g.history)g.history=[];g.history.push({date:new Date().toISOString().slice(0,10),v,note});
    // invalidate AI cache since data changed
    delete aiPreds[quickId];savePreds();
  }
  save();render();closeM('progModal');
  toast(v===100?'🎉 目标完成！干得漂亮！':`进度已更新 → ${v}%`);
}

/* ======= DETAIL ======= */
function openDetail(id){
  const g=goals.find(x=>x.id===id);if(!g)return;
  const c=gc(g.color);
  document.getElementById('dTitle').textContent=g.name;
  document.getElementById('dEditBtn').onclick=()=>{closeM('detailModal');openEdit(id);};
  const hist=(g.history||[]).slice().reverse().slice(0,10);
  const histH=hist.length?hist.map(h=>`
    <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);">
      <span style="font-family:var(--mono);font-size:11px;color:var(--text2);min-width:76px;">${h.date}</span>
      <div style="flex:1;">${segBar(h.v,30,8)}</div>
      <span style="font-family:var(--mono);font-size:12px;font-weight:600;color:${c.hex};min-width:34px;text-align:right;">${h.v}%</span>
      ${h.note?`<span style="font-size:11px;color:var(--text3);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(h.note)}</span>`:''}
    </div>`).join(''):'<div style="color:var(--text3);font-size:13px;padding:10px 0;">暂无更新记录</div>';
  const kv=[['当前进度',g.progress+'%'],['分类',`${CAT_E[g.cat]||''} ${g.cat}`],['优先级',g.priority==='high'?'🔴 高':g.priority==='mid'?'🟡 中':'🟢 低'],['截止日期',g.deadline||'未设置'],['单位',g.unit||'未设置'],['更新次数',(g.history||[]).length+'次']];
  const cached=aiPreds[id];
  const aiSection=cached?`<div style="margin-bottom:18px;"><div style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.8px;color:var(--text3);margin-bottom:8px;">AI 分析</div><div style="background:var(--ai-dim);border:1px solid var(--ai-border);border-radius:8px;padding:12px;font-size:12px;line-height:1.6;">${renderMD(cached.text)}</div><div style="text-align:right;font-size:10px;color:var(--text3);margin-top:4px;">${new Date(cached.ts).toLocaleString('zh-CN')}</div></div>`:'';
  document.getElementById('dBody').innerHTML=`
    <div style="margin-bottom:14px;">${segBar(g.progress,60,14)}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px;">
      ${kv.map(([k,v])=>`<div style="background:var(--surface2);border-radius:8px;padding:11px;"><div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;">${k}</div><div style="font-size:14px;font-weight:500;">${v}</div></div>`).join('')}
    </div>
    ${aiSection}
    <div style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.8px;color:var(--text3);margin-bottom:8px;">更新历史</div>
    ${histH}`;
  openM('detailModal');
}

/* ======= DELETE ======= */
function delGoal(id){
  if(!confirm('确定删除此目标？'))return;
  goals=goals.filter(x=>x.id!==id);
  delete aiPreds[id];savePreds();
  save();render();toast('目标已删除');
}

/* ======= EXPORT ======= */
function exportData(){
  const blob=new Blob([JSON.stringify({goals,aiPreds},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='goals-export.json';a.click();
  toast('已导出 JSON ↓');
}

/* ======= MODAL UTILS ======= */
function openM(id){document.getElementById(id).classList.add('open');}
function closeM(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.overlay').forEach(o=>{o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');});});
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.querySelectorAll('.overlay.open').forEach(o=>o.classList.remove('open'));});

/* ======= TOAST ======= */
let tt;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('show'),2800);}

/* ======= INIT ======= */
initGreeting();
updateAIStatus();
document.getElementById('toggleAutoPred').checked=prefs.autoPred;
document.getElementById('toggleShowPred').checked=prefs.showPred;
render();
</script>
</body>
