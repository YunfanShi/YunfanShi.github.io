<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goal Tracker × AI</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a; --surface: #111; --surface2: #181818; --surface3: #222;
  --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.14);
  --text: #efefef; --text2: #999; --text3: #555;
  --blue: #4d9ef7; --blue-dim: rgba(77,158,247,0.15);
  --green: #34c76a; --green-dim: rgba(52,199,106,0.15);
  --red: #ff5c5c; --yellow: #f5a623;
  --ai: #c4b5fd; --ai-dim: rgba(196,181,253,0.12); --ai-border: rgba(196,181,253,0.3);
  --seg-done: #34c76a; --seg-todo: #1a3d8f;
  --radius: 14px; --font: 'DM Sans',system-ui,sans-serif; --mono: 'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}

/* TOPBAR */
.topbar{background:rgba(10,10,10,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:100;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-dots{display:flex;gap:5px;}
.brand-dots span{width:9px;height:9px;border-radius:50%;display:block;}
.brand-name{font-size:15px;font-weight:600;letter-spacing:-.3px;}
.ai-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;background:var(--ai-dim);color:var(--ai);border:1px solid var(--ai-border);letter-spacing:.5px;}
.topbar-r{display:flex;gap:6px;align-items:center;}

/* CD BANNER */
.cd-banner{background:rgba(12,12,12,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);overflow:hidden;max-height:0;transition:max-height .35s cubic-bezier(.4,0,.2,1),padding .3s;}
.cd-banner.visible{max-height:120px;padding:10px 28px;}
.cd-strip{display:flex;align-items:center;overflow-x:auto;scrollbar-width:none;gap:10px;}
.cd-strip::-webkit-scrollbar{display:none;}
.cd-item{display:flex;align-items:center;gap:12px;padding:8px 16px;border-radius:10px;border:1px solid var(--border);background:var(--surface);flex-shrink:0;position:relative;transition:border-color .15s;}
.cd-item:hover{border-color:var(--border2);}
.cd-item-left{display:flex;flex-direction:column;gap:2px;}
.cd-label{font-size:11px;font-weight:500;color:var(--text2);white-space:nowrap;}
.cd-emoji{font-size:13px;}
.cd-numbers{display:flex;align-items:baseline;gap:5px;}
.cd-unit-group{display:flex;align-items:baseline;gap:2px;}
.cd-num{font-size:20px;font-weight:600;font-family:var(--mono);letter-spacing:-1px;}
.cd-unit{font-size:10px;color:var(--text2);text-transform:uppercase;}
.cd-sep{font-size:13px;color:var(--text3);font-family:var(--mono);}
.cd-past{opacity:.4;}
.cd-urgent .cd-num{color:#ff5c5c!important;}
.cd-warn .cd-num{color:#f5a623!important;}
.cd-ok .cd-num{color:#4d9ef7;}
.cd-actions-ico{display:flex;gap:2px;opacity:0;transition:opacity .15s;position:absolute;right:6px;top:50%;transform:translateY(-50%);}
.cd-item:hover .cd-actions-ico{opacity:1;}

/* AI STATUS BAR */
.ai-bar{background:var(--ai-dim);border:1px solid var(--ai-border);border-radius:10px;padding:9px 14px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;gap:12px;font-size:12px;}
.ai-bar.no-key{background:rgba(255,92,92,.06);border-color:rgba(255,92,92,.2);}
.ai-bar-l{display:flex;align-items:center;gap:8px;color:var(--text2);}
.ai-dot{width:6px;height:6px;border-radius:50%;background:var(--ai);}
.ai-dot.off{background:var(--red);}

/* MAIN */
.main{max-width:1000px;margin:0 auto;padding:32px 28px;}
.page-hd{margin-bottom:28px;}
.page-title{font-size:28px;font-weight:600;letter-spacing:-.6px;}
.page-sub{font-size:13px;color:var(--text2);margin-top:4px;}

/* STATS */
.stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:99px;padding:8px 16px;display:flex;align-items:center;gap:8px;transition:border-color .15s;cursor:default;}
.stat:hover{border-color:var(--border2);}
.stat-dot{width:6px;height:6px;border-radius:50%;}
.stat-v{font-size:14px;font-weight:600;font-family:var(--mono);}
.stat-lbl{font-size:12px;color:var(--text2);}

/* FILTER ROW */
.filter-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:10px;flex-wrap:wrap;}
.tabs{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:99px;padding:3px;gap:2px;}
.tab{padding:5px 13px;border-radius:99px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text2);font-family:var(--font);transition:all .15s;}
.tab.on{background:var(--surface3);color:var(--text);}
.tab:hover:not(.on){color:var(--text);}
.sort-sel{background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-family:var(--font);font-size:13px;padding:6px 11px;outline:none;cursor:pointer;}
option{background:#1a1a1a;}

/* GOAL CARDS */
.goal-list{display:flex;flex-direction:column;gap:8px;}

/* PARENT TASK */
.parent-block{display:flex;flex-direction:column;gap:4px;}
.pcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px 14px;transition:border-color .2s,background .2s;position:relative;overflow:hidden;}
.pcard:hover{border-color:var(--border2);background:#121212;}
.pcard::before{content:'';position:absolute;left:0;top:8%;bottom:8%;width:3px;border-radius:0 3px 3px 0;background:var(--accent);opacity:.8;}
.pcard-header{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:12px;}
.pcard-left{flex:1;min-width:0;}
.pcard-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;background:rgba(255,255,255,.06);color:var(--text2);border:1px solid var(--border);letter-spacing:.4px;display:inline-block;margin-bottom:5px;}
.pcard-name{font-size:18px;font-weight:600;letter-spacing:-.4px;line-height:1.25;}
.pcard-meta{display:flex;align-items:center;gap:8px;margin-top:4px;flex-wrap:wrap;}
.pcard-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.pcard-pct{font-size:24px;font-weight:600;font-family:var(--mono);letter-spacing:-1px;}
.pcard-actions{display:flex;gap:2px;opacity:0;transition:opacity .15s;}
.pcard:hover .pcard-actions{opacity:1;}

/* CHILD TASKS */
.children-list{padding-left:20px;display:flex;flex-direction:column;gap:4px;}
.gcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px 13px;transition:border-color .2s,background .2s;position:relative;overflow:hidden;}
.gcard.child{background:#0e0e0e;border-radius:10px;}
.gcard:hover,.gcard.child:hover{border-color:var(--border2);background:#131313;}
.gcard::before{content:'';position:absolute;left:0;top:10%;bottom:10%;width:3px;border-radius:0 3px 3px 0;background:var(--accent);opacity:.7;}

.gtop{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;gap:10px;}
.gleft{flex:1;min-width:0;}
.gname{font-size:16px;font-weight:600;letter-spacing:-.35px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.gname.child-name{font-size:15px;}
.gmeta{display:flex;align-items:center;gap:7px;margin-top:4px;flex-wrap:wrap;}
.gdesc{font-size:12px;color:var(--text3);}
.gcat{font-size:11px;font-weight:500;padding:2px 7px;border-radius:4px;}
.gdeadline{font-size:11px;color:var(--text3);font-family:var(--mono);}
.gright{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.gpct{font-size:21px;font-weight:600;font-family:var(--mono);letter-spacing:-1px;line-height:1;}
.gbadge{font-size:11px;font-weight:500;padding:3px 8px;border-radius:5px;white-space:nowrap;margin-top:3px;text-align:center;}
.gactions{display:flex;gap:2px;opacity:0;transition:opacity .15s;}
.gcard:hover .gactions,.pcard:hover .pcard-actions{opacity:1;}

/* AI PRED CHIP */
.ai-pred{display:inline-flex;align-items:center;gap:5px;background:var(--ai-dim);border:1px solid var(--ai-border);border-radius:6px;padding:3px 8px;cursor:pointer;transition:all .15s;margin-top:5px;font-size:11px;font-weight:500;color:var(--ai);white-space:nowrap;}
.ai-pred:hover{background:rgba(196,181,253,.2);border-color:rgba(196,181,253,.5);}
.ai-pred.loading{opacity:.6;pointer-events:none;}
.ai-pred .ai-ico{font-size:10px;}
.ai-pred.loading .ai-ico{animation:spin .8s linear infinite;}
.ai-pred.no-key{background:rgba(255,255,255,.03);border-color:var(--border);color:var(--text3);}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes bounce{0%,80%,100%{transform:scale(.7);opacity:.5;}40%{transform:scale(1);opacity:1;}}

/* SEGMENTED BAR */
.segwrap{position:relative;cursor:pointer;margin-bottom:8px;padding:3px 0;}
.segbar{display:flex;gap:2px;height:11px;}
.seg{flex:1;border-radius:2px;transition:opacity .12s,transform .12s;}
.seg.done{background:var(--seg-done);}
.seg.todo{background:var(--seg-todo);}
.segwrap:hover .seg{opacity:.6;}
.segwrap:hover .seg:hover{opacity:1;transform:scaleY(1.2);}
.seg-tip{position:absolute;bottom:calc(100% + 2px);background:#1e1e1e;border:1px solid var(--border2);color:var(--text);font-size:11px;font-family:var(--mono);padding:3px 7px;border-radius:5px;pointer-events:none;white-space:nowrap;opacity:0;transition:opacity .1s;z-index:10;transform:translateX(-50%);}
.segwrap:hover .seg-tip{opacity:1;}
.seg-labels{display:flex;justify-content:space-between;margin-top:3px;}
.seg-lbl{font-size:10px;color:var(--text3);font-family:var(--mono);}

/* FOOT */
.gfoot{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.gfoot-l{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--text3);font-family:var(--mono);}
.pri-dot{width:5px;height:5px;border-radius:50%;}
.act-dots{display:flex;gap:3px;align-items:center;}
.adot{width:5px;height:5px;border-radius:50%;background:var(--surface3);}
.adot.on{background:var(--green);}

/* BUTTONS */
.btn{border:none;outline:none;cursor:pointer;font-family:var(--font);font-weight:500;border-radius:8px;transition:all .15s;display:inline-flex;align-items:center;gap:5px;user-select:none;}
.btn:active{transform:scale(.97);}
.btn-pri{background:var(--blue);color:#000;padding:8px 16px;font-size:13px;}
.btn-pri:hover{background:#6db3ff;}
.btn-ghost{background:transparent;color:var(--text2);padding:7px 13px;font-size:13px;border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--border2);color:var(--text);background:var(--surface2);}
.btn-ai{background:var(--ai-dim);color:var(--ai);padding:7px 13px;font-size:13px;border:1px solid var(--ai-border);}
.btn-ai:hover{background:rgba(196,181,253,.22);border-color:rgba(196,181,253,.5);}
.btn-ico{background:transparent;color:var(--text3);width:26px;height:26px;padding:0;border-radius:6px;font-size:12px;justify-content:center;}
.btn-ico:hover{background:var(--surface3);color:var(--text2);}
.btn-ico.del:hover{background:rgba(255,92,92,.15);color:var(--red);}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(12px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;visibility:hidden;transition:opacity .2s,visibility .2s;}
.overlay.open{opacity:1;visibility:visible;}
.modal{background:#141414;border:1px solid var(--border2);border-radius:18px;width:100%;max-width:520px;box-shadow:0 32px 80px rgba(0,0,0,.8);transform:scale(.95) translateY(14px);transition:transform .25s cubic-bezier(.4,0,.2,1);}
.modal.wide{max-width:760px;}
.overlay.open .modal{transform:scale(1) translateY(0);}
.mhd{padding:20px 22px 0;font-size:17px;font-weight:600;letter-spacing:-.3px;display:flex;align-items:center;gap:9px;}
.mbody{padding:16px 22px;display:flex;flex-direction:column;gap:13px;}
.mfoot{padding:6px 22px 18px;display:flex;justify-content:flex-end;gap:8px;border-top:1px solid var(--border);}

/* FORM */
.fg{display:flex;flex-direction:column;gap:5px;}
.flbl{font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;}
.fi{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:14px;font-family:var(--font);color:var(--text);outline:none;transition:border-color .15s;width:100%;}
.fi:focus{border-color:var(--blue);}
.fi::placeholder{color:var(--text3);}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.frow3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}

/* QUICK BTNS */
.qbtns{display:flex;gap:6px;flex-wrap:wrap;}
.qb{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text2);font-family:var(--mono);font-size:12px;padding:5px 10px;cursor:pointer;transition:all .12s;}
.qb:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-dim);}

/* COLOR */
.crow{display:flex;gap:8px;flex-wrap:wrap;}
.cdot{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .12s;}
.cdot.sel{border-color:var(--text);transform:scale(1.15);}

/* EMPTY */
.empty{text-align:center;padding:60px 24px;color:var(--text2);}
.empty-ico{font-size:40px;margin-bottom:12px;}
.empty-title{font-size:17px;font-weight:500;color:var(--text);margin-bottom:5px;}
.empty-desc{font-size:13px;}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(70px);background:#1c1c1c;border:1px solid var(--border2);color:var(--text);font-size:13px;padding:9px 18px;border-radius:10px;box-shadow:0 10px 40px rgba(0,0,0,.5);z-index:999;transition:transform .28s cubic-bezier(.4,0,.2,1);white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* AI RESPONSE */
.ai-response{background:var(--surface2);border:1px solid var(--ai-border);border-radius:10px;padding:14px;font-size:13px;line-height:1.7;color:var(--text);min-height:70px;max-height:340px;overflow-y:auto;}
.ai-response.loading-state{display:flex;align-items:center;justify-content:center;gap:10px;color:var(--text2);}
.ai-response.error-state{border-color:rgba(255,92,92,.3);color:var(--red);}
.typing-dots{display:inline-flex;gap:4px;align-items:center;}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--ai);animation:bounce .9s infinite;}
.typing-dots span:nth-child(2){animation-delay:.15s;}
.typing-dots span:nth-child(3){animation-delay:.3s;}

/* AI HUB — horizontal layout */
.ai-features{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
.ai-feat{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;cursor:pointer;transition:all .15s;text-align:center;}
.ai-feat:hover{border-color:var(--ai-border);background:var(--ai-dim);}
.ai-feat-ico{font-size:20px;margin-bottom:5px;}
.ai-feat-name{font-size:12px;font-weight:600;color:var(--text);margin-bottom:2px;}
.ai-feat-desc{font-size:10px;color:var(--text2);line-height:1.4;}

/* SETTINGS */
.settings-section{margin-bottom:18px;}
.settings-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:9px;}
.api-key-row{display:flex;gap:8px;}
.api-key-row .fi{flex:1;font-family:var(--mono);font-size:12px;}
.key-status{font-size:11px;padding:3px 9px;border-radius:6px;display:inline-flex;align-items:center;gap:5px;}
.key-status.ok{background:var(--green-dim);color:var(--green);}
.key-status.no{background:rgba(255,92,92,.1);color:var(--red);}

/* MD CONTENT */
.md-content p{margin-bottom:7px;font-size:13px;line-height:1.65;color:var(--text);}
.md-content ul{padding-left:15px;margin-bottom:7px;}
.md-content li{font-size:13px;line-height:1.65;margin-bottom:3px;color:var(--text);}
.md-content strong{color:var(--ai);font-weight:600;}

/* MOVE OPTION */
.move-opt{display:flex;align-items:center;gap:12px;padding:10px 13px;border-radius:9px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;transition:all .15s;}
.move-opt:hover{border-color:var(--blue);background:var(--blue-dim);}
.move-opt.current{border-color:var(--border2);opacity:.45;cursor:default;}
.move-opt.detach{border-color:var(--border);color:var(--text2);}
.move-opt.detach:hover{border-color:var(--red);background:rgba(255,92,92,.08);color:var(--red);}
.move-opt-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.move-opt-name{font-size:14px;font-weight:500;}
.move-opt-sub{font-size:11px;color:var(--text2);margin-top:1px;}
.move-opt-check{margin-left:auto;color:var(--green);font-size:15px;}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:99px;}

@media(max-width:700px){
  .main{padding:20px 14px;}
  .topbar{padding:0 16px;}
  .frow,.frow3{grid-template-columns:1fr;}
  .ai-features{grid-template-columns:1fr 1fr;}
  .modal.wide{max-width:100%;}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-dots">
      <span style="background:#4285f4"></span><span style="background:#ea4335"></span>
      <span style="background:#fbbc04"></span><span style="background:#34a853"></span>
    </div>
    <span class="brand-name">Goal Tracker</span>
    <span class="ai-badge">× AI</span>
  </div>
  <div class="topbar-r">
    <button class="btn btn-ai" onclick="openAIHub()">✦ AI 助手</button>
    <button class="btn btn-ghost" onclick="openCdSettings()">⏱ 倒计时</button>
    <button class="btn btn-ghost" onclick="openSettings()">⚙ 设置</button>
    <button class="btn btn-ghost" onclick="exportData()">↑ 导出</button>
    <button class="btn btn-pri" onclick="openAdd()">＋ 新建目标</button>
  </div>
</div>

<div class="cd-banner" id="cdBanner"><div class="cd-strip" id="cdStrip"></div></div>

<div class="main">
  <div class="page-hd">
    <div class="page-title" id="greeting">我的目标</div>
    <div class="page-sub" id="dateStr"></div>
  </div>

  <div class="ai-bar" id="aiStatusBar">
    <div class="ai-bar-l"><div class="ai-dot" id="aiDot"></div><span id="aiStatusText">检查 AI 配置…</span></div>
    <button class="btn btn-ghost" style="padding:4px 11px;font-size:12px;" onclick="openSettings()">配置 API Key</button>
  </div>

  <div class="stats" id="statsEl"></div>

  <div class="filter-row">
    <div class="tabs">
      <button class="tab on" onclick="setFilter('all',this)">全部</button>
      <button class="tab" onclick="setFilter('active',this)">进行中</button>
      <button class="tab" onclick="setFilter('done',this)">已完成</button>
      <button class="tab" onclick="setFilter('overdue',this)">逾期</button>
    </div>
    <select class="sort-sel" id="sortSel" onchange="setSort(this.value)">
      <option value="created">按创建时间</option>
      <option value="progress-asc">进度 ↑</option>
      <option value="progress-desc">进度 ↓</option>
      <option value="deadline">按截止日期</option>
      <option value="name">按名称</option>
    </select>
  </div>

  <div class="goal-list" id="goalList"></div>
</div>

<!-- ADD/EDIT GOAL MODAL -->
<div class="overlay" id="goalModal">
  <div class="modal">
    <div class="mhd" id="mTitle">新建目标</div>
    <div class="mbody">
      <div class="fg">
        <label class="flbl">目标名称 *</label>
        <input class="fi" id="iName" placeholder="例如：ZNotes、Math0580…" maxlength="50">
      </div>
      <div class="fg">
        <label class="flbl">描述</label>
        <input class="fi" id="iDesc" placeholder="简短说明" maxlength="100">
      </div>
      <div class="fg">
        <label class="flbl">父任务（可选，选择后成为子任务）</label>
        <select class="fi" id="iParent">
          <option value="">— 独立任务 —</option>
        </select>
      </div>
      <div class="frow">
        <div class="fg">
          <label class="flbl">分类</label>
          <select class="fi" id="iCat">
            <option value="学习">📚 学习</option><option value="健康">💪 健康</option>

<script>
/* ===================== CONSTANTS ===================== */
const COLORS=[
  {id:'blue',hex:'#4d9ef7',dim:'rgba(77,158,247,0.12)'},
  {id:'green',hex:'#34c76a',dim:'rgba(52,199,106,0.12)'},
  {id:'yellow',hex:'#f5a623',dim:'rgba(245,166,35,0.12)'},
  {id:'red',hex:'#ff5c5c',dim:'rgba(255,92,92,0.12)'},
  {id:'purple',hex:'#b57bee',dim:'rgba(181,123,238,0.12)'},
  {id:'teal',hex:'#2dd4bf',dim:'rgba(45,212,191,0.12)'},
  {id:'pink',hex:'#f472b6',dim:'rgba(244,114,182,0.12)'},
  {id:'orange',hex:'#fb923c',dim:'rgba(251,146,60,0.12)'},
];
const PRI_C={high:'#ff5c5c',mid:'#f5a623',low:'#34c76a'};
const CAT_E={'学习':'📚','健康':'💪','工作':'💼','生活':'🏠','财务':'💰','其他':'✦'};
const PROVIDER_ENDPOINTS={deepseek:'https://api.deepseek.com/chat/completions',openai:'https://api.openai.com/v1/chat/completions'};
const PROVIDER_MODELS={deepseek:'deepseek-chat',openai:'gpt-4o',custom:''};

/* ===================== STATE ===================== */
let goals = JSON.parse(localStorage.getItem('gt_v6')||'null') || [
  {id:1,name:'ZNotes',desc:'笔记整理计划',cat:'学习',priority:'high',parentId:null,done:0,total:0,color:'blue',deadline:'2026-08-31',unit:'',history:[],created:Date.now()-864e5*10},
  {id:2,name:'Physics',desc:'Physics笔记',cat:'学习',priority:'high',parentId:1,done:3,total:12,color:'blue',deadline:'2026-06-30',unit:'章',history:[{date:'2026-03-10',done:3,total:12}],created:Date.now()-864e5*8},
  {id:3,name:'Chemistry',desc:'Chemistry笔记',cat:'学习',priority:'mid',parentId:1,done:5,total:15,color:'teal',deadline:'2026-07-15',unit:'章',history:[{date:'2026-03-08',done:4,total:15},{date:'2026-03-12',done:5,total:15}],created:Date.now()-864e5*7},
  {id:4,name:'Mathematics',desc:'Mathematics笔记',cat:'学习',priority:'high',parentId:1,done:8,total:20,color:'purple',deadline:'2026-06-15',unit:'章',history:[{date:'2026-03-05',done:5,total:20},{date:'2026-03-14',done:8,total:20}],created:Date.now()-864e5*6},
  {id:5,name:'健身计划',desc:'每周三次力量训练',cat:'健康',priority:'mid',parentId:null,done:24,total:30,color:'green',deadline:'2026-09-01',unit:'次',history:[{date:'2026-03-01',done:18,total:30},{date:'2026-03-15',done:24,total:30}],created:Date.now()-864e5*15},
  {id:6,name:'读书100本',desc:'全年阅读计划',cat:'生活',priority:'low',parentId:null,done:22,total:100,color:'orange',deadline:'2026-12-31',unit:'本',history:[{date:'2026-02-15',done:8,total:100},{date:'2026-03-10',done:22,total:100}],created:Date.now()-864e5*30},
];

let filter = localStorage.getItem('gt_filter')||'all';
let sort   = localStorage.getItem('gt_sort')||'created';
let editId=null, quickId=null, selColor='blue';
let aiPreds = JSON.parse(localStorage.getItem('ai_preds')||'{}');
let prefs   = JSON.parse(localStorage.getItem('ai_prefs')||'{"autoPred":true,"showPred":true}');
let currentPredId = null;

/* ===================== PERSISTENCE ===================== */
function save(){localStorage.setItem('gt_v6',JSON.stringify(goals));}
function savePreds(){localStorage.setItem('ai_preds',JSON.stringify(aiPreds));}
function savePref(){
  prefs.autoPred = document.getElementById('toggleAutoPred').checked;
  prefs.showPred = document.getElementById('toggleShowPred').checked;
  localStorage.setItem('ai_prefs',JSON.stringify(prefs));
  render();
}

/* ===================== HELPERS ===================== */
function getPct(g){
  if(g.parentId===null){
    // parent: aggregate children
    const ch=goals.filter(c=>c.parentId===g.id);
    if(!ch.length) return g.total>0?Math.min(100,Math.round((g.done||0)/g.total*100)):0;
    const td=ch.reduce((s,c)=>s+(c.done||0),0), tt=ch.reduce((s,c)=>s+(c.total||0),0);
    return tt>0?Math.min(100,Math.round(td/tt*100)):0;
  }
  return g.total>0?Math.min(100,Math.round((g.done||0)/g.total*100)):0;
}
function getDoneTotal(g){
  const ch=goals.filter(c=>c.parentId===g.id);
  if(ch.length){
    return {done:ch.reduce((s,c)=>s+(c.done||0),0), total:ch.reduce((s,c)=>s+(c.total||0),0)};
  }
  return {done:g.done||0, total:g.total||0};
}
function getKey(){return localStorage.getItem('ds_key')||'';}
function getProvider(){return localStorage.getItem('ai_provider')||'deepseek';}
function getModel(){const s=localStorage.getItem('ai_model');return s||(PROVIDER_MODELS[getProvider()]||'deepseek-chat');}
function getEndpoint(){const p=getProvider();return p==='custom'?(localStorage.getItem('ai_custom_endpoint')||''):(PROVIDER_ENDPOINTS[p]||PROVIDER_ENDPOINTS.deepseek);}
function gc(id){return COLORS.find(c=>c.id===id)||COLORS[0];}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function isParent(g){return g.parentId===null&&goals.some(c=>c.parentId===g.id);}
function isLeaf(g){return !goals.some(c=>c.parentId===g.id);}

/* Deadline: treat as end-of-day — add 1 day so "June 12" = June 12 23:59:59 */
function deadlineDays(dateStr){
  if(!dateStr) return null;
  const target=new Date(dateStr+'T00:00:00');
  target.setDate(target.getDate()+1); // end of that day
  return Math.ceil((target-new Date())/864e5);
}
function isOverdue(g){
  if(!g.deadline||getPct(g)>=100) return false;
  return deadlineDays(g.deadline)<=0;
}

/* ===================== AI STATUS ===================== */
function updateAIStatus(){
  const key=getKey(),bar=document.getElementById('aiStatusBar'),dot=document.getElementById('aiDot'),txt=document.getElementById('aiStatusText');
  const pn=getProvider()==='deepseek'?'DeepSeek':getProvider()==='openai'?'OpenAI':'自定义';
  if(key){bar.classList.remove('no-key');dot.classList.remove('off');txt.textContent=pn+' AI 已连接 — 自动预测已'+(prefs.autoPred?'开启':'关闭');}
  else{bar.classList.add('no-key');dot.classList.add('off');txt.textContent='未配置 API Key — AI 功能不可用';}
}

/* ===================== GREETING ===================== */
function initGreeting(){
  const h=new Date().getHours();
  const g=h<6?'深夜好 🌙':h<12?'早上好 ☀️':h<14?'中午好 🌤':h<18?'下午好 🌤':h<22?'傍晚好 🌆':'晚上好 🌙';
  document.getElementById('greeting').textContent=g+' — 我的目标';
  document.getElementById('dateStr').textContent=new Date().toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
}

/* ===================== SEG BAR ===================== */
function segBar(pct,segs,h){
  const d=Math.round(pct/100*segs);
  let s=`<div class="segbar" style="height:${h}px;">`;
  for(let i=0;i<segs;i++) s+=`<div class="seg ${i<d?'done':'todo'}"></div>`;
  return s+'</div>';
}

/* ===================== STATS ===================== */
function renderStats(){
  const roots=goals.filter(g=>g.parentId===null);
  const tot=roots.length, done=roots.filter(g=>getPct(g)===100).length;
  const avg=tot?Math.round(roots.reduce((s,g)=>s+getPct(g),0)/tot):0;
  const ov=roots.filter(g=>isOverdue(g)).length;
  let h=`<div class="stat"><div class="stat-dot" style="background:#4d9ef7;"></div><span class="stat-v" style="color:#4d9ef7;">${tot}</span><span class="stat-lbl">目标</span></div>
    <div class="stat"><div class="stat-dot" style="background:#34c76a;"></div><span class="stat-v" style="color:#34c76a;">${done}</span><span class="stat-lbl">已完成</span></div>
    <div class="stat"><div class="stat-dot" style="background:#f5a623;"></div><span class="stat-v" style="color:#f5a623;">${avg}%</span><span class="stat-lbl">平均进度</span></div>`;
  if(ov) h+=`<div class="stat"><div class="stat-dot" style="background:#ff5c5c;"></div><span class="stat-v" style="color:#ff5c5c;">${ov}</span><span class="stat-lbl">逾期</span></div>`;
  document.getElementById('statsEl').innerHTML=h;
}

/* ===================== FILTER / SORT ===================== */
function setFilter(f,el){
  filter=f;
  localStorage.setItem('gt_filter',f);
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  render();
}
function setSort(v){
  sort=v;
  localStorage.setItem('gt_sort',v);
  render();
}
function filteredRoots(){
  const today=new Date().toISOString().slice(0,10);
  let roots=goals.filter(g=>g.parentId===null);
  if(filter==='active') roots=roots.filter(g=>{const p=getPct(g);return p>0&&p<100;});
  else if(filter==='done') roots=roots.filter(g=>getPct(g)===100);
  else if(filter==='overdue') roots=roots.filter(g=>isOverdue(g));
  if(sort==='progress-asc') roots.sort((a,b)=>getPct(a)-getPct(b));
  else if(sort==='progress-desc') roots.sort((a,b)=>getPct(b)-getPct(a));
  else if(sort==='deadline') roots.sort((a,b)=>(a.deadline||'9999')>(b.deadline||'9999')?1:-1);
  else if(sort==='name') roots.sort((a,b)=>a.name.localeCompare(b.name,'zh'));
  else roots.sort((a,b)=>b.created-a.created);
  return roots;
}

/* ===================== AI PRED CHIP ===================== */
function predChipHTML(g){
  if(!prefs.showPred||getPct(g)===0||getPct(g)===100) return '';
  const key=getKey(), cached=aiPreds[g.id];
  if(!key) return `<div class="ai-pred no-key" onclick="openSettings()">✦ AI预测 (未配置)</div>`;
  if(cached&&cached.summary) return `<div class="ai-pred" onclick="showCachedPred(${g.id})">✦ ${esc(cached.summary)}</div>`;
  return `<div class="ai-pred" id="pred-${g.id}" onclick="runPred(${g.id})">✦ AI 预测完成时间</div>`;
}

/* ===================== BUILD AI CONTEXT ===================== */
function buildGoalContext(g, includeSiblings=true){
  const pct=getPct(g);
  const hist=(g.history||[]);
  const dlDays=deadlineDays(g.deadline);
  let velocity='暂无历史数据';
  if(hist.length>=2){
    const f=hist[0],l=hist[hist.length-1];
    const days=Math.max(1,Math.ceil((new Date(l.date)-new Date(f.date))/864e5));
    const fd=f.done!=null?f.done:(f.v||0),ld=l.done!=null?l.done:(l.v||0);
    velocity=`每天约 ${((ld-fd)/days).toFixed(2)} ${g.unit||'单位'}`;
  }
  let ctx=`【${g.name}】
描述: ${g.desc||'无'}
分类: ${g.cat}  优先级: ${g.priority==='high'?'高':g.priority==='mid'?'中':'低'}
完成: ${g.done||0} / ${g.total} ${g.unit||'单位'} (${pct}%)
截止: ${g.deadline||'未设置'}${dlDays!=null?`（距今${dlDays}天）`:''}
历史(${hist.length}次): ${hist.slice(-5).map(h=>`${h.date}:${h.done!=null?h.done:(h.v||0)}/${h.total||g.total}`).join(', ')||'无'}
当前速率: ${velocity}`;

  // siblings context
  if(includeSiblings&&g.parentId!==null){
    const siblings=goals.filter(c=>c.parentId===g.id&&c.id!==g.id);
    // actually siblings = same parentId, different id
    const sibs=goals.filter(c=>c.parentId===g.parentId&&c.id!==g.id);
    if(sibs.length){
      ctx+=`\n\n【同父任务下的其他子任务】`;
      sibs.forEach(s=>{ctx+=`\n - ${s.name}: ${s.done||0}/${s.total} (${getPct(s)}%)，截止${s.deadline||'未设置'}`;});
      const parent=goals.find(p=>p.id===g.parentId);
      if(parent) ctx+=`\n父任务 [${parent.name}] 整体进度: ${getPct(parent)}%`;
    }
  }
  if(includeSiblings&&g.parentId===null){
    // if parent, include children
    const children=goals.filter(c=>c.parentId===g.id);
    if(children.length){
      ctx+=`\n\n【子任务列表】`;
      children.forEach(c=>{ctx+=`\n - ${c.name}: ${c.done||0}/${c.total} (${getPct(c)}%)，截止${c.deadline||'未设置'}`;});
    }
  }
  return ctx;
}

function buildAllContext(){
  const today=new Date().toISOString().slice(0,10);
  const roots=goals.filter(g=>g.parentId===null);
  return `今日: ${today}\n\n`+roots.map(r=>{
    let txt=buildGoalContext(r,false);
    const ch=goals.filter(c=>c.parentId===r.id);
    if(ch.length) txt+='\n  子任务: '+ch.map(c=>`${c.name}(${getPct(c)}%)`).join(', ');
    return txt;
  }).join('\n\n---\n\n');
}

/* ===================== CALL AI ===================== */
async function callAI(messages,onChunk){
  const key=getKey();if(!key)throw new Error('未配置 API Key');
  const endpoint=getEndpoint();if(!endpoint)throw new Error('未配置 API 端点');
  const res=await fetch(endpoint,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
    body:JSON.stringify({model:getModel(),messages,stream:true,max_tokens:900,temperature:0.7})});
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error?.message||`API 错误 ${res.status}`);}
  const reader=res.body.getReader(),dec=new TextDecoder();let full='';
  while(true){
    const{done,value}=await reader.read();if(done)break;
    for(const line of dec.decode(value).split('\n')){
      if(!line.startsWith('data:'))continue;
      const d=line.slice(5).trim();if(d==='[DONE]')break;
      try{const t=JSON.parse(d).choices?.[0]?.delta?.content||'';if(t){full+=t;if(onChunk)onChunk(full);}}catch(e){}
    }
  }
  return full;
}

/* ===================== AUTO PREDICT (background) ===================== */
async function autoPredictIfNeeded(id){
  if(!prefs.autoPred||!getKey()) return;
  const g=goals.find(x=>x.id===id);
  if(!g||!isLeaf(g)) return; // only predict leaf tasks
  const p=getPct(g);
  if(p===0||p===100) return;
  // run silently
  try{
    let full='';
    await callAI([
      {role:'system',content:'你是目标管理AI。中文，简洁。第一行用[预测]前缀给出10字以内的核心预测（如"预计45天完成"），然后换行给2-3句分析。100字以内。'},
      {role:'user',content:`请预测完成时间：\n\n${buildGoalContext(g,true)}`}
    ],(partial)=>{full=partial;});
    const m=full.match(/\[预测\]\s*(.+)/);
    const summary=m?m[1].trim().slice(0,18):(full.match(/(\d+)\s*(天|周|月)/)?`约${RegExp.$1}${RegExp.$2}完成`:'已分析');
    aiPreds[id]={text:full,summary,ts:Date.now(),auto:true};
    savePreds();
    render(); // refresh chips silently
  }catch(e){/* silent fail */}
}

/* ===================== RENDER MD ===================== */
function renderMD(text){
  if(!text)return '';
  let h=text
    .replace(/\[预测\]\s*/g,'<strong>📊 预测：</strong>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/^#{1,3}\s(.+)$/gm,'<strong style="display:block;margin:9px 0 3px;">$1</strong>')
    .replace(/^-\s(.+)$/gm,'<li>$1</li>')
    .replace(/(<li>[\s\S]*?<\/li>)/g,'<ul>$1</ul>')
    .replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>');
  return `<div class="md-content"><p>${h}</p></div>`;
}

/* ===================== MOVE TO PARENT ===================== */
let moveId=null;
function openMove(id){
  const g=goals.find(x=>x.id===id);if(!g)return;
  moveId=id;
  document.getElementById('moveTargetName').textContent=g.name;

  // candidates: all tasks that are NOT g itself, NOT a descendant of g, and NOT already a child of something else
  // A valid parent must have parentId===null and id!==g.id
  // Also g must not already be a parent of candidates (no circular)
  const descendants=new Set();
  function collectDesc(pid){goals.filter(c=>c.parentId===pid).forEach(c=>{descendants.add(c.id);collectDesc(c.id);});}
  collectDesc(id);

  const candidates=goals.filter(c=>
    c.id!==id &&
    c.parentId===null &&      // only top-level can be parents
    !descendants.has(c.id)    // can't move into own descendant
  );

  const list=document.getElementById('moveList');
  let html='';

  // Option: detach (make independent)
  if(g.parentId!==null){
    html+=`<div class="move-opt detach" onclick="doMove(null)">
      <div class="move-opt-dot" style="background:var(--border2);"></div>
      <div><div class="move-opt-name">— 设为独立任务</div><div class="move-opt-sub">从当前大任务中移出</div></div>
    </div>`;
  }

  if(!candidates.length&&g.parentId===null){
    html+='<div style="text-align:center;padding:20px;color:var(--text3);font-size:13px;">暂无可用的大任务<br><span style="font-size:12px;">先创建一个大任务，或让其他任务保持独立</span></div>';
  }

  candidates.forEach(c=>{
    const isCurrent=g.parentId===c.id;
    const col=gc(c.color);
    const children=goals.filter(x=>x.parentId===c.id);
    html+=`<div class="move-opt${isCurrent?' current':''}" ${isCurrent?'':'onclick="doMove('+c.id+')"'}>
      <div class="move-opt-dot" style="background:${col.hex};"></div>
      <div style="flex:1;">
        <div class="move-opt-name">${esc(c.name)}</div>
        <div class="move-opt-sub">${children.length}个子任务 · ${getPct(c)}% 完成</div>
      </div>
      ${isCurrent?'<span class="move-opt-check">✓ 当前</span>':''}
    </div>`;
  });

  list.innerHTML=html;
  openM('moveModal');
}
function doMove(parentId){
  const g=goals.find(x=>x.id===moveId);if(!g)return;
  g.parentId=parentId;
  save();render();closeM('moveModal');
  toast(parentId?'已移入大任务 ✓':'已设为独立任务 ✓');
}

/* ===================== ADD / EDIT ===================== */
function populateParentSelect(excludeId=null){
  const sel=document.getElementById('iParent');
  sel.innerHTML='<option value="">— 独立任务 —</option>';
  goals.filter(g=>g.parentId===null&&g.id!==excludeId).forEach(g=>{
    const opt=document.createElement('option');
    opt.value=g.id;opt.textContent=g.name;
    sel.appendChild(opt);
  });
}
function openAdd(){
  editId=null;selColor='blue';
  document.getElementById('mTitle').textContent='新建目标';
  ['iName','iDesc','iDeadline','iUnit'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('iCat').value='学习';document.getElementById('iPri').value='mid';
  document.getElementById('iDone').value=0;document.getElementById('iTotal').value=10;
  document.getElementById('colorRow').innerHTML=buildCR('blue');
  populateParentSelect();
  document.getElementById('iParent').value='';
  openM('goalModal');setTimeout(()=>document.getElementById('iName').focus(),250);
}
function openAddChild(parentId){
  openAdd();
  document.getElementById('iParent').value=parentId;
  const p=goals.find(g=>g.id===parentId);
  if(p){selColor=p.color;document.getElementById('colorRow').innerHTML=buildCR(p.color);}
}
function openEdit(id){
  const g=goals.find(x=>x.id===id);if(!g)return;
  editId=id;selColor=g.color;
  document.getElementById('mTitle').textContent='编辑目标';
  document.getElementById('iName').value=g.name;document.getElementById('iDesc').value=g.desc||'';
  document.getElementById('iCat').value=g.cat||'学习';document.getElementById('iPri').value=g.priority||'mid';
  document.getElementById('iDeadline').value=g.deadline||'';document.getElementById('iUnit').value=g.unit||'';
  document.getElementById('iDone').value=g.done||0;document.getElementById('iTotal').value=g.total||10;
  document.getElementById('colorRow').innerHTML=buildCR(g.color);
  populateParentSelect(id);
  document.getElementById('iParent').value=g.parentId||'';
  openM('goalModal');
}
function saveGoal(){
  const name=document.getElementById('iName').value.trim();
  if(!name){document.getElementById('iName').focus();toast('请输入目标名称');return;}
  const dv=Math.max(0,parseInt(document.getElementById('iDone').value)||0);
  const tv=Math.max(1,parseInt(document.getElementById('iTotal').value)||1);
  const parentIdRaw=document.getElementById('iParent').value;
  const parentId=parentIdRaw?parseInt(parentIdRaw):null;
  const obj={name,desc:document.getElementById('iDesc').value.trim(),cat:document.getElementById('iCat').value,
    priority:document.getElementById('iPri').value,deadline:document.getElementById('iDeadline').value,
    unit:document.getElementById('iUnit').value.trim(),done:Math.min(dv,tv),total:tv,color:selColor,parentId};
  if(editId){const g=goals.find(x=>x.id===editId);if(g)Object.assign(g,obj);}
  else goals.push({...obj,id:Date.now(),history:[],created:Date.now()});
  save();render();closeM('goalModal');toast(editId?'目标已更新 ✓':'目标已创建 🎯');
}

/* ===================== PROGRESS MODAL ===================== */
function openProg(id){
  const g=goals.find(x=>x.id===id);if(!g)return;
  quickId=id;
  document.getElementById('progMTitle').textContent='更新进度 — '+g.name;
  document.getElementById('qDone').value=g.done||0;document.getElementById('qTotal').value=g.total||10;
  document.getElementById('qUnitLabel').textContent=g.unit||'';document.getElementById('qNote').value='';
  const p=getPct(g);document.getElementById('qPctDisplay').textContent=p+'%';
  document.getElementById('progPreview').innerHTML=segBar(p,38,9);openM('progModal');
}
function onQDone(){
  const d=Math.max(0,parseInt(document.getElementById('qDone').value)||0),t=Math.max(1,parseInt(document.getElementById('qTotal').value)||1);
  const p=Math.min(100,Math.round(d/t*100));
  document.getElementById('qPctDisplay').textContent=p+'%';document.getElementById('progPreview').innerHTML=segBar(p,38,9);
}
function stepDone(delta){
  const inp=document.getElementById('qDone'),t=Math.max(1,parseInt(document.getElementById('qTotal').value)||1);
  inp.value=Math.max(0,Math.min(t,(parseInt(inp.value)||0)+delta));onQDone();
}
function setDoneMax(){document.getElementById('qDone').value=Math.max(1,parseInt(document.getElementById('qTotal').value)||1);onQDone();}
function saveQ(){
  if(quickId===null)return;
  const dv=Math.max(0,parseInt(document.getElementById('qDone').value)||0);
  const tv=Math.max(1,parseInt(document.getElementById('qTotal').value)||1);
  const note=document.getElementById('qNote').value.trim();
  const g=goals.find(x=>x.id===quickId);
  if(g){
    g.done=Math.min(dv,tv);g.total=tv;
    if(!g.history)g.history=[];
    g.history.push({date:new Date().toISOString().slice(0,10),done:g.done,total:g.total,note});
    // invalidate old pred
    delete aiPreds[quickId];savePreds();
  }
  save();render();closeM('progModal');
  const p=getPct(g);
  toast(p===100?'🎉 目标完成！干得漂亮！':'进度已更新 → '+g.done+'/'+g.total+' ('+p+'%)');
  // auto predict in background
  if(g&&isLeaf(g)) setTimeout(()=>autoPredictIfNeeded(quickId),300);
}

/* ===================== DETAIL ===================== */
function openDetail(id){
  const g=goals.find(x=>x.id===id);if(!g)return;
  const c=gc(g.color),dl=deadlineDays(g.deadline);
  document.getElementById('dTitle').textContent=g.name;
  document.getElementById('dEditBtn').onclick=()=>{closeM('detailModal');openEdit(id);};
  const hist=(g.history||[]).slice().reverse().slice(0,10);
  const histH=hist.length?hist.map(h=>{
    const hd=h.done!=null?h.done:(h.v||0),ht=h.total||g.total;
    const hp=ht>0?Math.min(100,Math.round(hd/ht*100)):0;
    return `<div style="display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--border);">
      <span style="font-family:var(--mono);font-size:11px;color:var(--text2);min-width:74px;">${h.date}</span>
      <div style="flex:1;">${segBar(hp,28,7)}</div>
      <span style="font-family:var(--mono);font-size:12px;font-weight:600;color:${c.hex};min-width:46px;text-align:right;">${hd}/${ht}</span>
      ${h.note?`<span style="font-size:11px;color:var(--text3);max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(h.note)}</span>`:''}
    </div>`;}).join(''):'<div style="color:var(--text3);font-size:13px;padding:9px 0;">暂无更新记录</div>';
  const p=getPct(g),{done:dd,total:dt}=getDoneTotal(g);
  const kv=[['完成情况',dd+' / '+dt+(g.unit?' '+g.unit:'')],['完成率',p+'%'],['分类',`${CAT_E[g.cat]||''} ${g.cat}`],
    ['优先级',g.priority==='high'?'🔴 高':g.priority==='mid'?'🟡 中':'🟢 低'],
    ['截止日期',g.deadline||(dl!=null?`${dl}天后`:'未设置')],['更新次数',(g.history||[]).length+'次']];
  const cached=aiPreds[id];
  const aiSec=cached?`<div style="margin-bottom:16px;"><div style="font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);margin-bottom:7px;">AI 分析 ${cached.auto?'(自动)':''}</div><div style="background:var(--ai-dim);border:1px solid var(--ai-border);border-radius:8px;padding:11px;font-size:12px;line-height:1.6;">${renderMD(cached.text)}</div><div style="text-align:right;font-size:10px;color:var(--text3);margin-top:3px;">${new Date(cached.ts).toLocaleString('zh-CN')}</div></div>`:'';
  // children summary
  const children=goals.filter(c=>c.parentId===id);
  const chSec=children.length?`<div style="margin-bottom:16px;"><div style="font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);margin-bottom:7px;">子任务 (${children.length})</div>${children.map(ch=>`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);"><span style="flex:1;font-size:13px;">${esc(ch.name)}</span><div style="width:100px;">${segBar(getPct(ch),20,6)}</div><span style="font-family:var(--mono);font-size:12px;color:${gc(ch.color).hex};min-width:40px;text-align:right;">${getPct(ch)}%</span></div>`).join('')}</div>`:'';
  document.getElementById('dBody').innerHTML=`
    <div style="margin-bottom:12px;">${segBar(p,55,12)}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:16px;">
      ${kv.map(([k,v])=>`<div style="background:var(--surface2);border-radius:8px;padding:10px;"><div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px;">${k}</div><div style="font-size:13px;font-weight:500;color:var(--text);">${v}</div></div>`).join('')}
    </div>${chSec}${aiSec}
    <div style="font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);margin-bottom:7px;">更新历史</div>${histH}`;
  openM('detailModal');
}

/* ===================== DELETE ===================== */
function delGoal(id){
  if(!confirm('确定删除此目标？（子任务也会一并删除）'))return;
  const idsToDelete=[id,...goals.filter(g=>g.parentId===id).map(g=>g.id)];
  goals=goals.filter(g=>!idsToDelete.includes(g.id));
  idsToDelete.forEach(i=>{delete aiPreds[i];});
  savePreds();save();render();toast('目标已删除');
}

/* ===================== EXPORT / IMPORT ===================== */
function exportData(){
  const blob=new Blob([JSON.stringify({goals,aiPreds},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='goals-export.json';a.click();toast('已导出 JSON ↓');
}
function importData(){document.getElementById('importFile').click();}
function doImport(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(d.goals&&Array.isArray(d.goals)){goals=d.goals;if(d.aiPreds)aiPreds=d.aiPreds;}
      else if(Array.isArray(d)){goals=d;}
      else throw new Error('格式不正确');
      save();savePreds();render();toast('导入成功 ✓');
    }catch(err){toast('导入失败: '+err.message);}
  };r.readAsText(file);e.target.value='';
}

/* ===================== COUNTDOWN ===================== */
const CD_FORMATS=[
  {id:'d',label:'天',desc:'只显示天数'},{id:'h',label:'时',desc:'只显示小时'},{id:'m',label:'分',desc:'分钟'},
  {id:'dh',label:'天时',desc:'天+小时'},{id:'dhm',label:'天时分',desc:'天+小时+分'},
  {id:'dhms',label:'天时分秒',desc:'实时秒级'},{id:'Wd',label:'周天',desc:'周+天'},
  {id:'Mwd',label:'月周天',desc:'月+周+天'},{id:'Md',label:'月天',desc:'月+天'},
];
let countdowns=JSON.parse(localStorage.getItem('cd_v2')||'null')||[
  {id:1,label:'期末考试',emoji:'📝',target:'2026-06-20',format:'dhm',color:'#4d9ef7'},
  {id:2,label:'元旦',emoji:'🎆',target:'2027-01-01',format:'Md',color:'#34c76a'},
];
let cdDraft=[],cdTimer=null;
function saveCdData(){localStorage.setItem('cd_v2',JSON.stringify(countdowns));}
function calcCountdown(targetDate,fmt){
  const now=new Date(),target=new Date(targetDate+'T00:00:00');
  target.setDate(target.getDate()+1); // end of that day
  const diff=target-now,past=diff<0,abs=Math.abs(diff);
  const totalSec=Math.floor(abs/1000),totalMin=Math.floor(totalSec/60),totalH=Math.floor(totalMin/60),totalD=Math.floor(totalH/24);
  const totalW=Math.floor(totalD/7),totalM=Math.floor(totalD/30.436875);
  const s=totalSec%60,m=totalMin%60,h=totalH%24,wd=totalD-(totalW*7),dInM=totalD-Math.floor(totalM*30.436875);
  let parts=[];
  if(fmt==='d')parts=[{v:totalD,u:'天'}];else if(fmt==='h')parts=[{v:totalH,u:'时'}];else if(fmt==='m')parts=[{v:totalMin,u:'分'}];
  else if(fmt==='dh')parts=[{v:totalD,u:'天'},{v:h,u:'时'}];else if(fmt==='dhm')parts=[{v:totalD,u:'天'},{v:h,u:'时'},{v:m,u:'分'}];
  else if(fmt==='dhms')parts=[{v:totalD,u:'天'},{v:h,u:'时'},{v:m,u:'分'},{v:s,u:'秒'}];
  else if(fmt==='Wd')parts=[{v:totalW,u:'周'},{v:wd,u:'天'}];
  else if(fmt==='Mwd')parts=[{v:totalM,u:'月'},{v:Math.floor(dInM/7),u:'周'},{v:dInM%7,u:'天'}];
  else if(fmt==='Md')parts=[{v:totalM,u:'月'},{v:dInM,u:'天'}];
  return{parts,past,totalD};
}
function renderCdBanner(){
  const strip=document.getElementById('cdStrip'),banner=document.getElementById('cdBanner');
  if(!countdowns.length){banner.classList.remove('visible');return;}
  banner.classList.add('visible');
  strip.innerHTML=countdowns.map(cd=>{
    const res=calcCountdown(cd.target,cd.format),parts=res.parts,past=res.past,totalD=res.totalD;
    const numColor=cd.color||(totalD<=3?'#ff5c5c':totalD<=14?'#f5a623':'#4d9ef7');
    const urgClass=past?'cd-past':totalD<=3?'cd-urgent':totalD<=14?'cd-warn':'cd-ok';
    let numsHtml='';
    parts.forEach((p,i)=>{
      numsHtml+=`<div class="cd-unit-group"><span class="cd-num" style="color:${numColor};">${String(p.v).padStart(2,'0')}</span><span class="cd-unit">${p.u}</span></div>`;
      if(i<parts.length-1)numsHtml+='<span class="cd-sep">·</span>';
    });
    const pastLabel=past?'<span style="font-size:10px;color:var(--text3);margin-left:3px;">已过</span>':'';
    return `<div class="cd-item ${urgClass}"><div class="cd-item-left"><span class="cd-emoji">${cd.emoji||'⏱'}</span><span class="cd-label">${esc(cd.label)}${pastLabel}</span></div><div class="cd-numbers">${numsHtml}</div><div class="cd-actions-ico"><button class="btn btn-ico" onclick="openCdSettings()">✎</button><button class="btn btn-ico del" onclick="deleteCd(${cd.id})">✕</button></div></div>`;
  }).join('');
}
function startCdTimer(){
  if(cdTimer)clearInterval(cdTimer);renderCdBanner();
  cdTimer=setInterval(renderCdBanner,countdowns.some(c=>c.format==='dhms')?1000:30000);
}
function deleteCd(id){countdowns=countdowns.filter(c=>c.id!==id);saveCdData();startCdTimer();toast('倒计时已删除');}
function openCdSettings(){cdDraft=JSON.parse(JSON.stringify(countdowns));renderCdList();openM('cdModal');}
function renderCdList(){
  const el=document.getElementById('cdList');
  if(!cdDraft.length){el.innerHTML='<div style="text-align:center;padding:24px;color:var(--text3);font-size:13px;">还没有倒计时，点击下方按钮添加 👇</div>';return;}
  const colorOpts=['#4d9ef7','#34c76a','#f5a623','#ff5c5c','#b57bee','#2dd4bf','#f472b6','#fb923c'];
  el.innerHTML=cdDraft.map((cd,i)=>{
    const fmtOpts=CD_FORMATS.map(f=>`<option value="${f.id}"${cd.format===f.id?' selected':''}>${f.label} — ${f.desc}</option>`).join('');
    const colorDots=colorOpts.map(hex=>`<div onclick="cdDraft[${i}].color='${hex}';renderCdList()" style="width:20px;height:20px;border-radius:50%;background:${hex};cursor:pointer;border:2.5px solid ${cd.color===hex?'#fff':'transparent'};flex-shrink:0;"></div>`).join('');
    return `<div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:13px 15px;">
      <div style="display:grid;grid-template-columns:48px 1fr 1fr;gap:9px;align-items:end;margin-bottom:9px;">
        <div class="fg"><label class="flbl">图标</label><input class="fi" value="${esc(cd.emoji||'⏱')}" maxlength="2" style="text-align:center;font-size:17px;padding:5px;" oninput="cdDraft[${i}].emoji=this.value"></div>
        <div class="fg"><label class="flbl">名称</label><input class="fi" value="${esc(cd.label)}" maxlength="20" oninput="cdDraft[${i}].label=this.value"></div>
        <div class="fg"><label class="flbl">目标日期</label><input class="fi" type="date" value="${cd.target}" onchange="cdDraft[${i}].target=this.value"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 34px;gap:9px;align-items:end;">
        <div class="fg"><label class="flbl">格式</label><select class="fi" onchange="cdDraft[${i}].format=this.value">${fmtOpts}</select></div>
        <div class="fg"><label class="flbl">颜色</label><div style="display:flex;gap:6px;flex-wrap:wrap;padding-top:7px;">${colorDots}</div></div>
        <div class="fg" style="align-self:end;"><button class="btn btn-ico del" style="width:34px;height:34px;" onclick="cdDraft.splice(${i},1);renderCdList()">✕</button></div>
      </div>
    </div>`;
  }).join('');
}
function addCdItem(){
  cdDraft.push({id:Date.now(),label:'新倒计时',emoji:'⏱',target:new Date(Date.now()+864e5*30).toISOString().slice(0,10),format:'dhm',color:'#4d9ef7'});
  renderCdList();setTimeout(()=>document.getElementById('cdList').lastElementChild?.scrollIntoView({behavior:'smooth'}),80);
}
function saveCd(){countdowns=JSON.parse(JSON.stringify(cdDraft));saveCdData();startCdTimer();closeM('cdModal');toast('倒计时已保存 ✓');}
