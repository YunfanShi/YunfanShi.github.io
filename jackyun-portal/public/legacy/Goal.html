<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goal Tracker × AI</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --surface: #111111;
  --surface2: #181818;
  --surface3: #222222;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.14);
  --text: #efefef;
  --text2: #777;
  --text3: #444;
  --blue: #4d9ef7;
  --blue-dim: rgba(77,158,247,0.15);
  --green: #34c76a;
  --green-dim: rgba(52,199,106,0.15);
  --yellow: #f5a623;
  --red: #ff5c5c;
  --ai: #a78bfa;
  --ai-dim: rgba(167,139,250,0.12);
  --ai-border: rgba(167,139,250,0.25);
  --seg-done: #34c76a;
  --seg-todo: #1a3d8f;
  --radius: 14px;
  --font: 'DM Sans', system-ui, sans-serif;
  --mono: 'DM Mono', monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}

/* TOPBAR */
.topbar{
  background:rgba(10,10,10,0.9);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  height:58px;display:flex;align-items:center;
  justify-content:space-between;padding:0 32px;
  position:sticky;top:0;z-index:100;
}
.brand{display:flex;align-items:center;gap:10px;}
.brand-dots{display:flex;gap:5px;}
.brand-dots span{width:9px;height:9px;border-radius:50%;display:block;}
.brand-name{font-size:15px;font-weight:600;letter-spacing:-0.3px;}
.ai-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;background:var(--ai-dim);color:var(--ai);border:1px solid var(--ai-border);letter-spacing:0.5px;}
.topbar-r{display:flex;gap:8px;align-items:center;}

/* COUNTDOWN BANNER */
.cd-banner{
  background:rgba(12,12,12,0.95);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:0 32px;overflow:hidden;
  max-height:0;transition:max-height .35s cubic-bezier(.4,0,.2,1),padding .3s;
}
.cd-banner.visible{max-height:120px;padding:12px 32px;}
.cd-strip{display:flex;align-items:center;gap:0;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;}
.cd-strip::-webkit-scrollbar{display:none;}
.cd-item{
  display:flex;align-items:center;gap:14px;padding:9px 20px;
  border-radius:10px;border:1px solid var(--border);background:var(--surface);
  flex-shrink:0;margin-right:10px;cursor:default;
  transition:border-color .15s,background .15s;position:relative;
}
.cd-item:hover{border-color:var(--border2);background:#141414;}
.cd-item-left{display:flex;flex-direction:column;gap:2px;}
.cd-label{font-size:11px;font-weight:500;color:var(--text2);letter-spacing:0.2px;white-space:nowrap;}
.cd-emoji{font-size:14px;line-height:1;}
.cd-numbers{display:flex;align-items:baseline;gap:6px;}
.cd-unit-group{display:flex;align-items:baseline;gap:2px;}
.cd-num{font-size:22px;font-weight:600;font-family:var(--mono);letter-spacing:-1px;line-height:1;}
.cd-unit{font-size:10px;font-weight:500;color:var(--text2);letter-spacing:0.3px;text-transform:uppercase;margin-left:1px;}
.cd-sep{font-size:14px;color:var(--text3);font-family:var(--mono);align-self:center;}
.cd-past{opacity:.45;}
.cd-urgent .cd-num{color:#ff5c5c!important;}
.cd-warn .cd-num{color:#f5a623!important;}
.cd-ok .cd-num{color:#4d9ef7;}
.cd-actions-ico{display:flex;gap:2px;opacity:0;transition:opacity .15s;position:absolute;right:8px;top:50%;transform:translateY(-50%);}
.cd-item:hover .cd-actions-ico{opacity:1;}

/* AI STATUS BAR */
.ai-bar{
  background:var(--ai-dim);border:1px solid var(--ai-border);
  border-radius:10px;padding:10px 16px;margin-bottom:24px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;font-size:12px;
}
.ai-bar.no-key{background:rgba(255,92,92,0.06);border-color:rgba(255,92,92,0.2);}
.ai-bar-l{display:flex;align-items:center;gap:8px;color:var(--text2);}
.ai-dot{width:6px;height:6px;border-radius:50%;background:var(--ai);flex-shrink:0;}
.ai-dot.off{background:var(--red);}

/* LAYOUT */
.main{max-width:920px;margin:0 auto;padding:38px 28px;}

/* PAGE HEADER */
.page-hd{margin-bottom:36px;}
.page-title{font-size:30px;font-weight:600;letter-spacing:-0.7px;line-height:1.15;}
.page-sub{font-size:13px;color:var(--text2);margin-top:5px;}

/* STATS */
.stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:32px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:99px;padding:9px 18px;display:flex;align-items:center;gap:9px;transition:border-color .15s;}
.stat:hover{border-color:var(--border2);}
.stat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.stat-v{font-size:15px;font-weight:600;font-family:var(--mono);letter-spacing:-0.4px;}
.stat-lbl{font-size:12px;color:var(--text2);}

/* FILTER */
.filter-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;gap:12px;flex-wrap:wrap;}
.tabs{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:99px;padding:3px;gap:2px;}
.tab{padding:5px 14px;border-radius:99px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text2);font-family:var(--font);transition:all .15s;}
.tab.on{background:var(--surface3);color:var(--text);}
.tab:hover:not(.on){color:var(--text);}
.sort-sel{background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-family:var(--font);font-size:13px;padding:6px 12px;outline:none;cursor:pointer;}
.sort-sel:focus{border-color:var(--border2);}
option{background:#1a1a1a;}

/* GOAL CARD */
.goal-list{display:flex;flex-direction:column;gap:10px;}
.gcard{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:20px 22px 18px;
  transition:border-color .2s,background .2s;position:relative;overflow:hidden;
}
.gcard:hover{border-color:var(--border2);background:#121212;}
.gcard::before{content:'';position:absolute;left:0;top:10%;bottom:10%;width:3px;border-radius:0 3px 3px 0;background:var(--accent);opacity:0.7;}

/* TOP ROW */
.gtop{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;gap:10px;}
.gleft{flex:1;min-width:0;}
.gname{font-size:17px;font-weight:600;letter-spacing:-0.4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;}
.gmeta{display:flex;align-items:center;gap:8px;margin-top:4px;flex-wrap:wrap;}
.gdesc{font-size:12px;color:var(--text3);}
.gcat{font-size:11px;font-weight:500;padding:2px 8px;border-radius:4px;letter-spacing:0.2px;}
.gdeadline{font-size:11px;color:var(--text3);font-family:var(--mono);}
.gright{display:flex;align-items:center;gap:12px;flex-shrink:0;}
.gpct{font-size:23px;font-weight:600;font-family:var(--mono);letter-spacing:-1px;line-height:1;}
.gbadge{font-size:11px;font-weight:500;padding:3px 9px;border-radius:5px;white-space:nowrap;margin-top:4px;text-align:center;}
.gactions{display:flex;gap:2px;opacity:0;transition:opacity .15s;}
.gcard:hover .gactions{opacity:1;}

/* AI PREDICTION CHIP */
.ai-pred{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--ai-dim);border:1px solid var(--ai-border);
  border-radius:6px;padding:3px 9px;cursor:pointer;
  transition:all .15s;margin-top:6px;
  font-size:11px;font-weight:500;color:var(--ai);white-space:nowrap;
}
.ai-pred:hover{background:rgba(167,139,250,0.2);border-color:rgba(167,139,250,0.4);}
.ai-pred.loading{opacity:0.6;pointer-events:none;}
.ai-pred .ai-ico{font-size:10px;}
.ai-pred.loading .ai-ico{animation:spin .8s linear infinite;}
.ai-pred.error{background:rgba(255,92,92,0.08);border-color:rgba(255,92,92,0.2);color:var(--red);}
.ai-pred.no-key{background:rgba(255,255,255,0.04);border-color:var(--border);color:var(--text3);}
@keyframes spin{to{transform:rotate(360deg);}}

/* SEGMENTED BAR */
.segwrap{position:relative;cursor:pointer;margin-bottom:10px;padding:4px 0;}
.segbar{display:flex;gap:2.5px;height:13px;}
.seg{flex:1;border-radius:2.5px;transition:opacity .12s,transform .12s;}
.seg.done{background:var(--seg-done);}
.seg.todo{background:var(--seg-todo);}
.segwrap:hover .seg{opacity:0.6;}
.segwrap:hover .seg:hover{opacity:1;transform:scaleY(1.18);}
.seg-labels{display:flex;justify-content:space-between;margin-top:4px;}
.seg-lbl{font-size:10px;color:var(--text3);font-family:var(--mono);}
.seg-tip{position:absolute;bottom:calc(100% + 2px);background:#1e1e1e;border:1px solid var(--border2);color:var(--text);font-size:11px;font-family:var(--mono);padding:3px 8px;border-radius:5px;pointer-events:none;white-space:nowrap;opacity:0;transition:opacity .1s;z-index:10;transform:translateX(-50%);}
.segwrap:hover .seg-tip{opacity:1;}

/* FOOTER */
.gfoot{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.gfoot-l{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text3);font-family:var(--mono);}
.pri-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.gfoot-r{display:flex;align-items:center;gap:5px;}
.act-dots{display:flex;gap:3px;align-items:center;}
.adot{width:5px;height:5px;border-radius:50%;background:var(--surface3);}
.adot.on{background:var(--green);}

/* BUTTONS */
.btn{border:none;outline:none;cursor:pointer;font-family:var(--font);font-weight:500;border-radius:8px;transition:all .15s;display:inline-flex;align-items:center;gap:6px;user-select:none;}
.btn:active{transform:scale(0.97);}
.btn-pri{background:var(--blue);color:#000;padding:9px 18px;font-size:13px;border-radius:8px;}
.btn-pri:hover{background:#6db3ff;}
.btn-ghost{background:transparent;color:var(--text2);padding:8px 14px;font-size:13px;border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--border2);color:var(--text);background:var(--surface2);}
.btn-ai{background:var(--ai-dim);color:var(--ai);padding:8px 14px;font-size:13px;border:1px solid var(--ai-border);border-radius:8px;}
.btn-ai:hover{background:rgba(167,139,250,0.2);border-color:rgba(167,139,250,0.4);}
.btn-ico{background:transparent;color:var(--text3);width:28px;height:28px;padding:0;border-radius:6px;font-size:13px;justify-content:center;}
.btn-ico:hover{background:var(--surface3);color:var(--text2);}
.btn-ico.del:hover{background:rgba(255,92,92,.15);color:var(--red);}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;visibility:hidden;transition:opacity .2s,visibility .2s;}
.overlay.open{opacity:1;visibility:visible;}
.modal{background:#141414;border:1px solid var(--border2);border-radius:18px;width:100%;max-width:500px;box-shadow:0 32px 80px rgba(0,0,0,.7);transform:scale(0.95) translateY(14px);transition:transform .25s cubic-bezier(.4,0,.2,1);}
.overlay.open .modal{transform:scale(1) translateY(0);}
.mhd{padding:22px 24px 0;font-size:17px;font-weight:600;letter-spacing:-0.3px;display:flex;align-items:center;gap:10px;}
.mbody{padding:18px 24px;display:flex;flex-direction:column;gap:15px;}
.mfoot{padding:8px 24px 20px;display:flex;justify-content:flex-end;gap:8px;border-top:1px solid var(--border);}

/* FORM */
.fg{display:flex;flex-direction:column;gap:6px;}
.flbl{font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:0.6px;}
.fi{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 13px;font-size:14px;font-family:var(--font);color:var(--text);outline:none;transition:border-color .15s;width:100%;}
.fi:focus{border-color:var(--blue);}
.fi::placeholder{color:var(--text3);}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* QUICK BTNS */
.qbtns{display:flex;gap:6px;flex-wrap:wrap;}
.qb{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text2);font-family:var(--mono);font-size:12px;padding:5px 10px;cursor:pointer;transition:all .12s;}
.qb:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-dim);}

/* COLOR */
.crow{display:flex;gap:9px;flex-wrap:wrap;}
.cdot{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .12px;}
.cdot.sel{border-color:var(--text);transform:scale(1.15);}

/* EMPTY */
.empty{text-align:center;padding:72px 24px;color:var(--text2);}
.empty-ico{font-size:44px;margin-bottom:14px;}
.empty-title{font-size:17px;font-weight:500;color:var(--text);margin-bottom:6px;}
.empty-desc{font-size:13px;}

/* TOAST */
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(70px);background:#1c1c1c;border:1px solid var(--border2);color:var(--text);font-size:13px;padding:10px 20px;border-radius:10px;box-shadow:0 10px 40px rgba(0,0,0,.5);z-index:999;transition:transform .28s cubic-bezier(.4,0,.2,1);white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* AI MODAL */
.ai-modal-ico{font-size:22px;}
.ai-response{background:var(--surface2);border:1px solid var(--ai-border);border-radius:10px;padding:16px;font-size:13px;line-height:1.7;color:var(--text);min-height:80px;position:relative;max-height:380px;overflow-y:auto;}
.ai-response.loading-state{display:flex;align-items:center;justify-content:center;gap:10px;color:var(--text2);}
.ai-response.error-state{border-color:rgba(255,92,92,0.3);color:var(--red);}
.ai-response p{margin-bottom:10px;}
.ai-response p:last-child{margin-bottom:0;}
.ai-response strong{color:var(--ai);font-weight:600;}
.ai-response ul{padding-left:18px;margin-bottom:10px;}
.ai-response li{margin-bottom:5px;}
.typing-dots{display:inline-flex;gap:4px;align-items:center;}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--ai);animation:bounce .9s infinite;}
.typing-dots span:nth-child(2){animation-delay:.15s;}
.typing-dots span:nth-child(3){animation-delay:.3s;}
@keyframes bounce{0%,80%,100%{transform:scale(0.7);opacity:0.5;}40%{transform:scale(1);opacity:1;}}

/* AI FEATURES GRID */
.ai-features{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.ai-feat{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:all .15s;text-align:left;}
.ai-feat:hover{border-color:var(--ai-border);background:var(--ai-dim);}
.ai-feat-ico{font-size:20px;margin-bottom:6px;}
.ai-feat-name{font-size:13px;font-weight:600;margin-bottom:3px;}
.ai-feat-desc{font-size:11px;color:var(--text2);}

/* SETTINGS */
.settings-section{margin-bottom:20px;}
.settings-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:var(--text3);margin-bottom:10px;}
.api-key-row{display:flex;gap:8px;}
.api-key-row .fi{flex:1;font-family:var(--mono);font-size:12px;}
.key-status{font-size:11px;padding:4px 10px;border-radius:6px;display:inline-flex;align-items:center;gap:5px;}
.key-status.ok{background:var(--green-dim);color:var(--green);}
.key-status.no{background:rgba(255,92,92,0.1);color:var(--red);}

/* MARKDOWN */
.md-content p{margin-bottom:8px;font-size:13px;line-height:1.65;}
.md-content ul{padding-left:16px;margin-bottom:8px;}
.md-content li{font-size:13px;line-height:1.65;margin-bottom:4px;}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:99px;}

@media(max-width:600px){
  .main{padding:22px 16px;}
  .topbar{padding:0 18px;}
  .frow{grid-template-columns:1fr;}
  .page-title{font-size:22px;}
  .ai-features{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-dots">
      <span style="background:#4285f4"></span>
      <span style="background:#ea4335"></span>
      <span style="background:#fbbc04"></span>
      <span style="background:#34a853"></span>
    </div>
    <span class="brand-name">Goal Tracker</span>
    <span class="ai-badge">× AI</span>
  </div>
  <div class="topbar-r">
    <button class="btn btn-ai" onclick="openAIHub()">✦ AI 助手</button>
    <button class="btn btn-ghost" onclick="openCdSettings()" title="倒计时设置">⏱ 倒计时</button>
    <button class="btn btn-ghost" onclick="openSettings()">⚙ 设置</button>
    <button class="btn btn-ghost" onclick="exportData()">↑ 导出</button>
    <button class="btn btn-pri" onclick="openAdd()">＋ 新建目标</button>
  </div>
</div>

<!-- COUNTDOWN BANNER -->
<div class="cd-banner" id="cdBanner">
  <div class="cd-strip" id="cdStrip"></div>
</div>

<div class="main">
  <div class="page-hd">
    <div class="page-title" id="greeting">我的目标</div>
    <div class="page-sub" id="dateStr"></div>
  </div>

  <div class="ai-bar" id="aiStatusBar">
    <div class="ai-bar-l">
      <div class="ai-dot" id="aiDot"></div>
      <span id="aiStatusText">检查 AI 配置中…</span>
    </div>
    <div>
      <button class="btn btn-ghost" style="padding:5px 12px;font-size:12px;" onclick="openSettings()">配置 API Key</button>
    </div>
  </div>

  <div class="stats" id="statsEl"></div>

  <div class="filter-row">
    <div class="tabs">
      <button class="tab on" onclick="setFilter('all',this)">全部</button>
      <button class="tab" onclick="setFilter('active',this)">进行中</button>
      <button class="tab" onclick="setFilter('done',this)">已完成</button>
      <button class="tab" onclick="setFilter('overdue',this)">逾期</button>
    </div>
    <select class="sort-sel" onchange="setSort(this.value)">
      <option value="created">按创建时间</option>
      <option value="progress-asc">进度 ↑</option>
      <option value="progress-desc">进度 ↓</option>
      <option value="deadline">按截止日期</option>
      <option value="name">按名称</option>
    </select>
  </div>

  <div class="goal-list" id="goalList"></div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="overlay" id="goalModal">
  <div class="modal">
    <div class="mhd" id="mTitle">新建目标</div>
    <div class="mbody">
      <div class="fg">
        <label class="flbl">目标名称 *</label>
        <input class="fi" id="iName" placeholder="例如：Math0580、健身计划…" maxlength="50">
      </div>
      <div class="fg">
        <label class="flbl">描述</label>
        <input class="fi" id="iDesc" placeholder="简短说明" maxlength="100">
      </div>
      <div class="frow">
        <div class="fg">
          <label class="flbl">分类</label>
          <select class="fi" id="iCat">
            <option value="学习">📚 学习</option>
            <option value="健康">💪 健康</option>
            <option value="工作">💼 工作</option>
            <option value="生活">🏠 生活</option>
            <option value="财务">💰 财务</option>
            <option value="其他">✦ 其他</option>
          </select>
        </div>
        <div class="fg">
          <label class="flbl">优先级</label>
          <select class="fi" id="iPri">
            <option value="high">🔴 高</option>
            <option value="mid" selected>🟡 中</option>
            <option value="low">🟢 低</option>
          </select>
        </div>
      </div>
      <div class="frow">
        <div class="fg">
          <label class="flbl">截止日期</label>
          <input class="fi" id="iDeadline" type="date">
        </div>
        <div class="fg">
          <label class="flbl">单位（可选）</label>
          <input class="fi" id="iUnit" placeholder="章 / 次 / 页…" maxlength="10">
        </div>
      </div>
      <div class="frow">
        <div class="fg">
          <label class="flbl">已完成数量</label>
          <input class="fi" id="iDone" type="number" min="0" value="0" placeholder="例如 6">
        </div>

<script>
/* ======= DATA ======= */

  {id:'pink',hex:'#f472b6',dim:'rgba(244,114,182,0.12)'},
  {id:'orange',hex:'#fb923c',dim:'rgba(251,146,60,0.12)'},

const PRI_C={high:'#ff5c5c',mid:'#f5a623',low:'#34c76a'};
const CAT_E={'学习':'📚','健康':'💪','工作':'💼','生活':'🏠','财务':'💰','其他':'✦'};
const PROVIDER_ENDPOINTS={

};
const PROVIDER_MODELS={deepseek:'deepseek-chat',openai:'gpt-4o',custom:''};

let goals=JSON.parse(localStorage.getItem('gt_v5')||'null')||[
  {id:1,name:'Math0580',desc:'高等数学课程学习',cat:'学习',priority:'high',done:13,total:20,color:'blue',deadline:'2026-06-30',unit:'章',history:[{date:'2026-02-20',done:4,total:20},{date:'2026-03-01',done:8,total:20},{date:'2026-03-06',done:13,total:20}],created:Date.now()-864e5*5},
  {id:2,name:'English CET-6',desc:'英语六级备考',cat:'学习',priority:'mid',done:6,total:15,color:'teal',deadline:'2026-12-15',unit:'套题',history:[{date:'2026-03-02',done:4,total:15},{date:'2026-03-06',done:6,total:15}],created:Date.now()-864e5*3},
  {id:3,name:'健身计划',desc:'每周三次力量训练',cat:'健康',priority:'mid',done:24,total:30,color:'green',deadline:'2026-09-01',unit:'次',history:[{date:'2026-03-01',done:18,total:30},{date:'2026-03-05',done:24,total:30}],created:Date.now()-864e5*10},
  {id:4,name:'读书100本',desc:'全年阅读计划',cat:'生活',priority:'low',done:22,total:100,color:'purple',deadline:'2026-12-31',unit:'本',history:[{date:'2026-02-15',done:8,total:100},{date:'2026-03-06',done:22,total:100}],created:Date.now()-864e5*20},
];

let filter='all',sort='created',editId=null,quickId=null,selColor='blue';
let aiPreds=JSON.parse(localStorage.getItem('ai_preds')||'{}');
let prefs=JSON.parse(localStorage.getItem('ai_prefs')||'{"showPred":true,"autoInvalidate":true}');
let currentPredId=null;

function save(){localStorage.setItem('gt_v5',JSON.stringify(goals));}
function savePreds(){localStorage.setItem('ai_preds',JSON.stringify(aiPreds));}
function savePref(){
  prefs.showPred=document.getElementById('toggleShowPred').checked;
  prefs.autoInvalidate=document.getElementById('toggleAutoInvalidate').checked;
  localStorage.setItem('ai_prefs',JSON.stringify(prefs));
  render();
}
function getPct(g){return g.total>0?Math.min(100,Math.round((g.done||0)/g.total*100)):0;}
function gc(id){return COLORS.find(c=>c.id===id)||COLORS[0];}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function getKey(){return localStorage.getItem('ds_key')||'';}
function getProvider(){return localStorage.getItem('ai_provider')||'deepseek';}
function getModel(){const s=localStorage.getItem('ai_model');return s||PROVIDER_MODELS[getProvider()]||'deepseek-chat';}
function getEndpoint(){const p=getProvider();if(p==='custom')return localStorage.getItem('ai_custom_endpoint')||'';return PROVIDER_ENDPOINTS[p]||PROVIDER_ENDPOINTS.deepseek;}

/* ======= AI STATUS ======= */
function updateAIStatus(){
  const key=getKey();
  const bar=document.getElementById('aiStatusBar');
  const dot=document.getElementById('aiDot');
  const txt=document.getElementById('aiStatusText');

    bar.classList.remove('no-key');dot.classList.remove('off');
    txt.textContent='AI 已连接 — 点击目标上的预测标签查看分析';
  } else {
    bar.classList.add('no-key');dot.classList.add('off');
    txt.textContent='未配置 API Key — AI 功能不可用';
  }
}

/* ======= GREETING ======= */
function initGreeting(){
  const h=new Date().getHours();
  const g=h<6?'深夜好 🌙':h<12?'早上好 ☀️':h<14?'中午好 🌤':h<18?'下午好 🌤':h<22?'傍晚好 🌆':'晚上好 🌙';
  document.getElementById('greeting').textContent=g+' — 我的目标';
  const d=new Date();
  document.getElementById('dateStr').textContent=d.toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
}

/* ======= SEGMENTED BAR ======= */
function segBar(pct,segs,h){
  const done=Math.round(pct/100*segs);
  let s=`<div class="segbar" style="height:${h}px;">`;
  for(let i=0;i<segs;i++) s+=`<div class="seg ${i<done?'done':'todo'}"></div>`;
  return s+'</div>';
}

/* ======= STATS ======= */
function renderStats(){
  const tot=goals.length,done=goals.filter(g=>getPct(g)===100).length;
  const avg=tot?Math.round(goals.reduce((s,g)=>s+getPct(g),0)/tot):0;
  const today=new Date().toISOString().slice(0,10);
  const ov=goals.filter(g=>g.deadline&&g.deadline<today&&getPct(g)<100).length;
  let h=`
    <div class="stat"><div class="stat-dot" style="background:#4d9ef7;"></div><span class="stat-v" style="color:#4d9ef7;">${tot}</span><span class="stat-lbl">目标总数</span></div>
    <div class="stat"><div class="stat-dot" style="background:#34c76a;"></div><span class="stat-v" style="color:#34c76a;">${done}</span><span class="stat-lbl">已完成</span></div>
    <div class="stat"><div class="stat-dot" style="background:#f5a623;"></div><span class="stat-v" style="color:#f5a623;">${avg}%</span><span class="stat-lbl">平均进度</span></div>`;
  if(ov) h+=`<div class="stat"><div class="stat-dot" style="background:#ff5c5c;"></div><span class="stat-v" style="color:#ff5c5c;">${ov}</span><span class="stat-lbl">逾期</span></div>`;
  document.getElementById('statsEl').innerHTML=h;
}

/* ======= FILTER/SORT ======= */
function setFilter(f,el){filter=f;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));el.classList.add('on');render();}
function setSort(v){sort=v;render();}
function filtered(){
  const today=new Date().toISOString().slice(0,10);
  let l=[...goals];
  if(filter==='active') l=l.filter(g=>getPct(g)>0&&getPct(g)<100);
  else if(filter==='done') l=l.filter(g=>getPct(g)===100);
  else if(filter==='overdue') l=l.filter(g=>g.deadline&&g.deadline<today&&getPct(g)<100);
  if(sort==='progress-asc') l.sort((a,b)=>getPct(a)-getPct(b));
  else if(sort==='progress-desc') l.sort((a,b)=>getPct(b)-getPct(a));
  else if(sort==='deadline') l.sort((a,b)=>(a.deadline||'9999')>(b.deadline||'9999')?1:-1);
  else if(sort==='name') l.sort((a,b)=>a.name.localeCompare(b.name,'zh'));
  else l.sort((a,b)=>b.created-a.created);
  return l;
}

/* ======= AI PREDICTION CHIP ======= */
function predChipHTML(g){
  if(!prefs.showPred) return '';
  const key=getKey();
  const cached=aiPreds[g.id];
  if(!key) return `<div class="ai-pred no-key" onclick="openSettings()" title="配置 API Key 以启用 AI 预测">✦ AI预测 (未配置)</div>`;
  if(cached&&cached.summary) return `<div class="ai-pred" onclick="showCachedPred(${g.id})" title="查看 AI 详细分析">✦ ${esc(cached.summary)}</div>`;
  return `<div class="ai-pred" id="pred-${g.id}" onclick="runPred(${g.id})" title="点击获取 AI 预测">✦ AI 预测完成时间</div>`;
}

/* ======= BUILD GOAL CONTEXT ======= */
function buildGoalContext(g){
  const today=new Date().toISOString().slice(0,10);
  const hist=g.history||[];
  const dlDays=g.deadline?Math.ceil((new Date(g.deadline)-new Date())/864e5):null;
  const pct=getPct(g);
  let velocity='暂无历史数据';
  if(hist.length>=2){
    const first=hist[0],last=hist[hist.length-1];
    const daysDiff=Math.max(1,Math.ceil((new Date(last.date)-new Date(first.date))/864e5));
    const firstPct=first.total>0?Math.round((first.done||first.v||0)/first.total*100):(first.v||0);
    const lastPct=last.total>0?Math.round((last.done||last.v||0)/last.total*100):(last.v||0);
    const pctPerDay=((lastPct-firstPct)/daysDiff).toFixed(2);
    velocity=`每天约 ${pctPerDay}% 进度`;
  }
  return `目标名称: ${g.name}
描述: ${g.desc||'无'}
分类: ${g.cat}
当前进度: ${g.done||0} / ${g.total} ${g.unit||''} (${pct}%)
优先级: ${g.priority==='high'?'高':g.priority==='mid'?'中':'低'}
截止日期: ${g.deadline||'未设置'}${dlDays!==null?`（距今${dlDays}天）`:''}
历史记录 (共${hist.length}次):
${hist.map(h=>{const hd=h.done!==undefined?h.done:(h.v||0);const ht=h.total||g.total;return `  ${h.date}: ${hd}/${ht}${h.note?' ('+h.note+')':''}`;}).join('\n')||'  无'}
当前速率估算: ${velocity}
今日日期: ${today}`;
}

/* ======= CALL AI API ======= */
async function callAI(messages,onChunk){
  const key=getKey();
  if(!key) throw new Error('未配置 API Key');
  const endpoint=getEndpoint();
  const model=getModel();
  if(!endpoint) throw new Error('未配置 API 端点');
  const res=await fetch(endpoint,{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
    body:JSON.stringify({model,messages,stream:true,max_tokens:800,temperature:0.7})
  });
  if(!res.ok){const err=await res.json().catch(()=>({}));throw new Error(err.error?.message||`API 错误 ${res.status}`);}
  const reader=res.body.getReader();
  const decoder=new TextDecoder();
  let full='';
  while(true){
    const {done,value}=await reader.read();
    if(done) break;
    for(const line of decoder.decode(value).split('\n')){
      if(!line.startsWith('data:')) continue;
      const d=line.slice(5).trim();
      if(d==='[DONE]') break;
      try{const t=JSON.parse(d).choices?.[0]?.delta?.content||'';if(t){full+=t;if(onChunk)onChunk(full);}}catch(e){}
    }
  }
  return full;
}

/* ======= RUN PREDICTION ======= */
async function runPred(id){
  const g=goals.find(x=>x.id===id);if(!g)return;
  currentPredId=id;
  document.getElementById('aiPredTitle').textContent=`AI 分析 — ${g.name}`;
  document.getElementById('aiPredContent').className='ai-response loading-state';
  document.getElementById('aiPredContent').innerHTML=`<div class="typing-dots"><span></span><span></span><span></span></div><span style="margin-left:8px;font-size:13px;">AI 分析中…</span>`;
  document.getElementById('aiPredMeta').textContent='';
  openM('aiPredModal');
  const chip=document.getElementById('pred-'+id);
  if(chip){chip.classList.add('loading');chip.innerHTML='<span class="ai-ico">↻</span> 分析中…';}
  try{
    const t0=Date.now();
    let fullText='';
    await callAI([
      {role:'system',content:`你是专业目标管理 AI 助手，用中文回答，简洁有洞察力。
格式：第一行输出简短预测前缀 [预测]（如"预计约 45 天完成"），然后换行详细分析：完成时间预测、速度分析、建议。总长度200字以内。`},
      {role:'user',content:`请根据以下目标数据，预测完成时间并给出建议：\n\n${buildGoalContext(g)}`}
    ],(partial)=>{
      fullText=partial;
      document.getElementById('aiPredContent').className='ai-response md-content';
      document.getElementById('aiPredContent').innerHTML=renderMD(partial);
    });
    const m=fullText.match(/\[预测\]\s*(.+)/);
    const summary=m?m[1].trim().slice(0,20):extractShortPred(fullText);
    aiPreds[id]={text:fullText,summary,ts:Date.now()};
    savePreds();
    document.getElementById('aiPredMeta').textContent=`${getProvider()} · ${((Date.now()-t0)/1000).toFixed(1)}s · ${new Date().toLocaleTimeString('zh-CN')}`;
    render();
  }catch(err){
    document.getElementById('aiPredContent').className='ai-response error-state';
    document.getElementById('aiPredContent').innerHTML=`❌ ${esc(err.message)}`;
    if(chip){chip.classList.remove('loading');chip.classList.add('error');chip.innerHTML='✦ 分析失败，重试';}
    toast('AI 请求失败: '+err.message);
  }
}

function extractShortPred(text){
  const m=text.match(/(\d+)\s*(天|周|月|小时)/);
  return m?`约${m[1]}${m[2]}完成`:'已分析';
}
function showCachedPred(id){
  const g=goals.find(x=>x.id===id),cached=aiPreds[id];
  if(!g||!cached)return;
  currentPredId=id;
  document.getElementById('aiPredTitle').textContent=`AI 分析 — ${g.name}`;
  document.getElementById('aiPredContent').className='ai-response md-content';
  document.getElementById('aiPredContent').innerHTML=renderMD(cached.text);
  document.getElementById('aiPredMeta').textContent=`缓存 · ${new Date(cached.ts).toLocaleString('zh-CN')}`;
  openM('aiPredModal');
}
function rerunPred(){if(currentPredId!==null){delete aiPreds[currentPredId];savePreds();closeM('aiPredModal');runPred(currentPredId);}}

/* ======= RENDER MARKDOWN ======= */
function renderMD(text){
  if(!text)return '';
  let h=text
    .replace(/\[预测\]\s*/g,'<strong style="color:var(--ai)">📊 预测：</strong>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/^#{2,3}\s(.+)$/gm,'<strong style="color:var(--ai);display:block;margin:10px 0 4px;">$1</strong>')
    .replace(/^-\s(.+)$/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs,'<ul>$1</ul>')
    .replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>');
  return `<div class="md-content"><p>${h}</p></div>`;
}

            <div style="font-size:11px;font-family:var(--mono);color:${isDone?'#34c76a':c.hex};text-align:right;margin-top:2px;">${p}%</div>

          </div>

            <button class="btn btn-ico" onclick="openEdit(${g.id})" title="编辑">✎</button>

          </div>

        <span class="seg-tip" id="stt${g.id}">${p}%</span>
        ${segBar(p,60,13)}
        <div style="text-align:center;margin-top:-2px;font-size:10px;color:var(--text3);font-family:var(--mono);">${g.done||0} / ${g.total} ${g.unit?esc(g.unit):''}</div>
        <div class="seg-labels"><span class="seg-lbl">0%</span><span class="seg-lbl">25%</span><span class="seg-lbl">50%</span><span class="seg-lbl">75%</span><span class="seg-lbl">100%</span></div>
      </div>
      <div class="gfoot">
        <div class="gfoot-l">
          <div class="pri-dot" style="background:${PRI_C[g.priority]};"></div>
          <span>${g.priority==='high'?'高优先级':g.priority==='mid'?'中优先级':'低优先级'}</span>
          ${g.history&&g.history.length?`<span style="color:#333">·</span><span>${g.history.length}次更新</span>`:''}

function onQDone(){
  const d=Math.max(0,parseInt(document.getElementById('qDone').value)||0);
  const t=Math.max(1,parseInt(document.getElementById('qTotal').value)||1);
  const pct=Math.min(100,Math.round(d/t*100));
  document.getElementById('qPctDisplay').textContent=pct+'%';
  document.getElementById('progPreview').innerHTML=segBar(pct,40,10);
}
function stepDone(delta){
  const inp=document.getElementById('qDone');
  const t=Math.max(1,parseInt(document.getElementById('qTotal').value)||1);
  inp.value=Math.max(0,Math.min(t,(parseInt(inp.value)||0)+delta));
  onQDone();
}
function setDoneMax(){
  document.getElementById('qDone').value=Math.max(1,parseInt(document.getElementById('qTotal').value)||1);
  onQDone();
}
function saveQ(){
  if(quickId===null)return;
  const doneVal=Math.max(0,parseInt(document.getElementById('qDone').value)||0);
  const totalVal=Math.max(1,parseInt(document.getElementById('qTotal').value)||1);
  const note=document.getElementById('qNote').value.trim();
  const g=goals.find(x=>x.id===quickId);
  if(g){
    g.done=Math.min(doneVal,totalVal);g.total=totalVal;
    if(!g.history)g.history=[];
    g.history.push({date:new Date().toISOString().slice(0,10),done:g.done,total:g.total,note});
    if(prefs.autoInvalidate!==false){delete aiPreds[quickId];savePreds();}
  }
  save();render();closeM('progModal');
  const pct=getPct(g);
  toast(pct===100?'🎉 目标完成！干得漂亮！':'进度已更新 → '+g.done+'/'+g.total+' ('+pct+'%)');
}

function doImport(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(d.goals&&Array.isArray(d.goals)){goals=d.goals;if(d.aiPreds)aiPreds=d.aiPreds;}
      else if(Array.isArray(d)){goals=d;}
      else throw new Error('格式不正确');
      save();savePreds();render();toast('导入成功 ✓');
    }catch(err){toast('导入失败: '+err.message);}
  };
  r.readAsText(file);e.target.value='';
}

  {id:'h',label:'时',desc:'只显示小时'},
  {id:'m',label:'分',desc:'只显示分钟'},

function calcCountdown(targetDate,fmt){
  const now=new Date(),target=new Date(targetDate+'T00:00:00');
  const diff=target-now,past=diff<0,abs=Math.abs(diff);
  const totalSec=Math.floor(abs/1000),totalMin=Math.floor(totalSec/60);
  const totalH=Math.floor(totalMin/60),totalD=Math.floor(totalH/24);
  const totalW=Math.floor(totalD/7),totalM=Math.floor(totalD/30.436875);
  const s=totalSec%60,m=totalMin%60,h=totalH%24;
  const wd=totalD-(totalW*7),dInM=totalD-Math.floor(totalM*30.436875);
  let parts=[];
  if(fmt==='d') parts=[{v:totalD,u:'天'}];
  else if(fmt==='h') parts=[{v:totalH,u:'时'}];
  else if(fmt==='m') parts=[{v:totalMin,u:'分'}];
  else if(fmt==='dh') parts=[{v:totalD,u:'天'},{v:h,u:'时'}];
  else if(fmt==='dhm') parts=[{v:totalD,u:'天'},{v:h,u:'时'},{v:m,u:'分'}];
  else if(fmt==='dhms') parts=[{v:totalD,u:'天'},{v:h,u:'时'},{v:m,u:'分'},{v:s,u:'秒'}];
  else if(fmt==='Wd') parts=[{v:totalW,u:'周'},{v:wd,u:'天'}];
  else if(fmt==='Mwd') parts=[{v:totalM,u:'月'},{v:Math.floor(dInM/7),u:'周'},{v:dInM%7,u:'天'}];
  else if(fmt==='Md') parts=[{v:totalM,u:'月'},{v:dInM,u:'天'}];
  return {parts,past,totalD};
}

function renderCdBanner(){
  const strip=document.getElementById('cdStrip');
  const banner=document.getElementById('cdBanner');
  if(!countdowns.length){banner.classList.remove('visible');return;}
  banner.classList.add('visible');
  strip.innerHTML=countdowns.map(function(cd){
    const res=calcCountdown(cd.target,cd.format);
    const parts=res.parts,past=res.past,totalD=res.totalD;
    const numColor=cd.color||(totalD<=3?'#ff5c5c':totalD<=14?'#f5a623':'#4d9ef7');
    const urgClass=past?'cd-past':totalD<=3?'cd-urgent':totalD<=14?'cd-warn':'cd-ok';
    let numsHtml='';
    for(let i=0;i<parts.length;i++){
      numsHtml+='<div class="cd-unit-group"><span class="cd-num" style="color:'+numColor+';">'+String(parts[i].v).padStart(2,'0')+'</span><span class="cd-unit">'+parts[i].u+'</span></div>';
      if(i<parts.length-1) numsHtml+='<span class="cd-sep">·</span>';
    }
    const pastLabel=past?'<span style="font-size:10px;color:var(--text3);margin-left:4px;">已过</span>':'';
    return '<div class="cd-item '+urgClass+'" id="cdi'+cd.id+'"><div class="cd-item-left"><span class="cd-emoji">'+(cd.emoji||'⏱')+'</span><span class="cd-label">'+esc(cd.label)+pastLabel+'</span></div><div class="cd-numbers">'+numsHtml+'</div><div class="cd-actions-ico"><button class="btn btn-ico" onclick="openCdSettings()" title="管理">✎</button><button class="btn btn-ico del" onclick="deleteCd('+cd.id+')" title="删除">✕</button></div></div>';
  }).join('');
}

function startCdTimer(){
  if(cdTimer)clearInterval(cdTimer);
  renderCdBanner();
  const hasSeconds=countdowns.some(function(c){return c.format==='dhms';});
  cdTimer=setInterval(renderCdBanner,hasSeconds?1000:30000);
}

function deleteCd(id){
  countdowns=countdowns.filter(function(c){return c.id!==id;});
  saveCdData();startCdTimer();toast('倒计时已删除');
}

function openCdSettings(){
  cdDraft=JSON.parse(JSON.stringify(countdowns));
  renderCdList();openM('cdModal');
}

function renderCdList(){
  const el=document.getElementById('cdList');
  if(!cdDraft.length){
    el.innerHTML='<div style="text-align:center;padding:24px;color:var(--text3);font-size:13px;">还没有倒计时，点击下方按钮添加 👇</div>';
    return;
  }
  const colorOpts=['#4d9ef7','#34c76a','#f5a623','#ff5c5c','#b57bee','#2dd4bf','#f472b6','#fb923c'];
  let html='';
  for(let i=0;i<cdDraft.length;i++){
    const cd=cdDraft[i];
    let fmtOptions='';
    for(let fi=0;fi<CD_FORMATS.length;fi++){
      const f=CD_FORMATS[fi];
      fmtOptions+='<option value="'+f.id+'"'+(cd.format===f.id?' selected':'')+'>'+(f.label)+' — '+f.desc+'</option>';
    }
    let colorDots='';
    for(let ci=0;ci<colorOpts.length;ci++){
      const hex=colorOpts[ci];
      colorDots+='<div data-i="'+i+'" onclick="cdDraft['+i+'].color=\''+hex+'\';renderCdList()" style="width:22px;height:22px;border-radius:50%;background:'+hex+';cursor:pointer;border:2.5px solid '+(cd.color===hex?'#fff':'transparent')+';transition:border-color .1s;flex-shrink:0;"></div>';
    }
    html+='<div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;">'
      +'<div style="display:grid;grid-template-columns:50px 1fr 1fr;gap:10px;align-items:end;margin-bottom:10px;">'
      +'<div class="fg"><label class="flbl">图标</label><input class="fi" value="'+esc(cd.emoji||'⏱')+'" maxlength="2" style="text-align:center;font-size:18px;padding:6px;" oninput="cdDraft['+i+'].emoji=this.value"></div>'
      +'<div class="fg"><label class="flbl">名称 *</label><input class="fi" value="'+esc(cd.label)+'" maxlength="20" placeholder="倒计时名称…" oninput="cdDraft['+i+'].label=this.value"></div>'
      +'<div class="fg"><label class="flbl">目标日期 *</label><input class="fi" type="date" value="'+cd.target+'" onchange="cdDraft['+i+'].target=this.value"></div>'
      +'</div>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr 36px;gap:10px;align-items:end;">'
      +'<div class="fg"><label class="flbl">显示格式</label><select class="fi" onchange="cdDraft['+i+'].format=this.value">'+fmtOptions+'</select></div>'
      +'<div class="fg"><label class="flbl">数字颜色</label><div style="display:flex;gap:7px;flex-wrap:wrap;padding-top:8px;">'+colorDots+'</div></div>'
      +'<div class="fg" style="align-self:end;"><button class="btn btn-ico del" style="width:36px;height:36px;" onclick="cdDraft.splice('+i+',1);renderCdList()" title="删除">✕</button></div>'
      +'</div></div>';
  }
  el.innerHTML=html;
}

function addCdItem(){
  const d=new Date(Date.now()+864e5*30).toISOString().slice(0,10);
  cdDraft.push({id:Date.now(),label:'新倒计时',emoji:'⏱',target:d,format:'dhm',color:'#4d9ef7'});
  renderCdList();
  setTimeout(function(){document.getElementById('cdList').lastElementChild.scrollIntoView({behavior:'smooth'});},80);
}

function saveCd(){
  countdowns=JSON.parse(JSON.stringify(cdDraft));
  saveCdData();startCdTimer();closeM('cdModal');
  toast('倒计时已保存 ✓');
}

/* ======= INIT ======= */
initGreeting();
document.getElementById('toggleShowPred').checked=prefs.showPred;
document.getElementById('toggleAutoInvalidate').checked=prefs.autoInvalidate!==false;
updateAIStatus();
render();
startCdTimer();
</script>
