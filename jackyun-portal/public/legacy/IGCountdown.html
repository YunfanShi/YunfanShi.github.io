d/update cards\n  visibleTimers.forEach(t => {\n    const existing = document.getElementById('card-' + t.id);\n    if (!existing) {\n      const el = buildCard(t);\n      arena.appendChild(el);\n    } else {\n      refreshTimerDisplay(t.id);\n      refreshCardControls(t.id);\n    }\n  });\n  renderStats();\n  renderSettingsUI();\n}\n\nfunction buildCard(t) {\n  const el = document.createElement('div');\n  el.className = 'timer-card';\n  el.id = 'card-' + t.id;\n  el.innerHTML = cardHTML(t);\n  return el;\n}\n\nfunction cardHTML(t) {\n  const p = pct(t);\n  const dashOffset = RING_CIRC * (1 - p);\n  const color = t.color;\n  const icon  = SUBJ_ICONS[t.subj] || '⏱️';\n  const statusLabel = statusText(t);\n  const statusBg    = t.done ? '#e6f4ea' : t.running ? '#e8f0fe' : t.paused ? '#fce8b2' : '#f1f3f4';\n  const statusColor = t.done ? '#34a853' : t.running ? '#1a73e8' : t.paused ? '#f29900' : '#5f6368';\n  const dotColor    = t.done ? '#34a853' : t.running ? '#1a73e8' : t.paused ? '#fbbc04' : '#dadce0';\n  const timeColor   = t.done ? '#34a853' : (t.left < 60 && t.left > 0) ? '#ea4335' : '#202124';\n  const playIcon    = t.running ? 'pause' : 'play_arrow';\n  const playClass   = t.running ? 'running' : t.done ? 'done' : '';\n  const marks       = t.marks ? ` · ${t.marks} marks` : '';\n  const paperLine   = t.paper ? `${t.paper}${marks}` : (t.dur ? fmtDur(t.dur) : '');\n  const safeName = esc(t.name);\n  const safePaper = esc(paperLine);\n  const safeNote = esc(t.note || '');\n\n  return `\n    <div class=\"card-strip\" style=\"background:${stripForColor(color)};\"></div>\n    <div class=\"card-header\">\n      <div class=\"card-header-left\">\n        <div class=\"subj-icon\" style=\"background:${color}18;font-size:20px;\">${icon}</div>\n        <div class=\"subj-info\">\n          <div class=\"subj-name\" contenteditable=\"true\" style=\"color:${color};\"\n            onblur=\"saveTimerName('${t.id}', this.textContent)\"\n            onkeydown=\"editableKeydown(event,this)\">${safeName}</div>\n          <div class=\"subj-paper\"><span class=\"editable-dur\" onclick=\"editTimerDuration('${t.id}')\" title=\"点击编辑时长\">${safePaper}</span></div>\n        </div>\n      </div>\n      <div class=\"card-header-actions\">\n         <button class=\"icon-btn\" onclick=\"openEditModal('${t.id}')\" title=\"${getLanguage() === 'en' ? 'Edit' : '编辑'}\">\n          <span class=\"material-icons-round\" style=\"font-size:20px;\">edit</span>\n        </button>\n         <button class=\"icon-btn\" onclick=\"openFullscreen('${t.id}')\" title=\"${getLanguage() === 'en' ? 'Fullscreen' : '全屏'}\">\n          <span class=\"material-icons-round\" style=\"font-size:20px;\">open_in_full</span>\n        </button>\n         <button class=\"icon-btn\" onclick=\"removeTimer('${t.id}')\" title=\"${getLanguage() === 'en' ? 'Close' : '关闭'}\" style=\"color:var(--md-error);\">\n          <span class=\"material-icons-round\" style=\"font-size:20px;\">close</span>\n        </button>\n      </div>\n    </div>\n    <div class=\"save-indicator\" id=\"save-${t.id}\">\n      <span class=\"material-icons-round\">cloud_done</span>${getLanguage() === 'en' ? 'Saved' : '已保存'}\n    </div>\n    <div class=\"card-body\">\n      <div class=\"ring-container\" onclick=\"toggleTimer('${t.id}')\" title=\"${getLanguage() === 'en' ? 'Tap to pause/resume' : '点击 暂停/继续'}\">\n        <svg class=\"ring-svg\" viewBox=\"0 0 200 200\">\n          <circle cx=\"100\" cy=\"100\" r=\"${RING_R}\" class=\"ring-track\" stroke-width=\"10\"/>\n          <circle cx=\"100\" cy=\"100\" r=\"${RING_R}\" class=\"ring-progress\" id=\"ring-${t.id}\"\n            stroke=\"${color}\" stroke-width=\"10\"\n            stroke-dasharray=\"${RING_CIRC}\"\n            stroke-dashoffset=\"${dashOffset}\"/>\n          <circle cx=\"100\" cy=\"100\" r=\"${RING_R}\" class=\"ring-warn${(t.running&&t.left<60&&!t.done)?' active':''}\" id=\"ring-warn-${t.id}\"\n            stroke=\"${color}\" stroke-width=\"10\"\n            stroke-dasharray=\"${RING_CIRC}\" stroke-dashoffset=\"0\"/>\n        </svg>\n          <div class=\"ring-inner\">\n            <div class=\"time-display\" id=\"time-${t.id}\" style=\"color:${timeColor};\">${fmtTime(t.left)}</div>\n            <div class=\"time-pct\" id=\"pct-${t.id}\">${remainingText(p)}</div>\n          <div class=\"time-status-badge\" id=\"badge-${t.id}\" style=\"background:${statusBg};color:${statusColor};\">\n            <div class=\"status-dot\" id=\"dot-${t.id}\" style=\"background:${dotColor};\"></div>\n            ${statusLabel}\n          </div>\n        </div>\n      </div>\n\n      <div class=\"controls-row\">\n        <button class=\"ctrl-btn ctrl-sm\" onclick=\"resetTimer('${t.id}')\" title=\"${getLanguage() === 'en' ? 'Reset' : '重置'}\">\n          <span class=\"material-icons-round\">replay</span>\n        </button>\n        <button class=\"ctrl-btn ctrl-play ${playClass}\" id=\"play-${t.id}\" onclick=\"toggleTimer('${t.id}')\">\n          <span class=\"material-icons-round\" id=\"play-icon-${t.id}\">${playIcon}</span>\n        </button>\n        <button class=\"ctrl-btn ctrl-sm\" onclick=\"addTime('${t.id}', 5)\" title=\"${getLanguage() === 'en' ? '+5 minutes' : '+5 分钟'}\">\n          <span class=\"material-icons-round\">add</span>\n        </button>\n      </div>\n\n      <div class=\"controls-row\" style=\"gap:6px;\">\n        ${DUR_PRESETS.map(d => `\n          <button class=\"ctrl-text${t.total===d.v*60?' active':''}\" id=\"dur-chip-${t.id}-${d.v}\"\n            onclick=\"setTimerDur('${t.id}',${d.v})\">${d.label}</button>\n        `).join('')}\n      </div>\n    </div>\n\n    <div class=\"card-notes\">\n      <div class=\"presets-label\">${getLanguage() === 'en' ? 'Checkpoint note (auto-save)' : '断点记录（自动保存）'}</div>\n      <textarea class=\"notes-input\" oninput=\"saveTimerNoteDebounced('${t.id}', this.value)\"\n        maxlength=\"200\" placeholder=\"${getLanguage() === 'en' ? 'Input current question (e.g. P2 Q12)' : '输入当前做的题目（例如：P2 Q12）'}\">${safeNote}</textarea>\n    </div>\n\n    <div class=\"presets-section\" style=\"padding-top:0;\">\n      <div class=\"presets-label\">${t.subj !== 'custom' ? (getLanguage() === 'en' ? `${t.subj} papers` : t.subj + ' 卷型') : (getLanguage() === 'en' ? 'Common durations' : '常用时长')}</div>\n      <div class=\"presets-chips\" id=\"paper-chips-${t.id}\">\n        ${IGCSE_PAPERS.filter(p => p.subj === t.subj).map(p => `\n          <button class=\"preset-chip${t.paperId===p.id?' active':''}\"\n            onclick=\"switchPaper('${t.id}','${p.id}')\"\n            title=\"${p.tier} · ${fmtDur(p.dur)}\">${p.paper.replace('Paper ','P')}</button>\n        `).join('') || DUR_PRESETS.map(d => `\n          <button class=\"preset-chip${t.total===d.v*60?' active':''}\"\n            onclick=\"setTimerDur('${t.id}',${d.v})\">${d.label}</button>\n        `).join('')}\n      </div>\n    </div>\n  `;\n}\n\nfunction setTimerDur(id, mins) {\n  const t = timers.find(x => x.id === id);\n  if (!t) return;\n  stopDoneSound();\n  const wasRunning = t.running;\n  if (wasRunning) pauseTimer(id, false);\n  t.total = mins * 60;\n  t.left  = mins * 60;\n  t.dur   = mins;\n  t.done  = false;\n  t._preEndAlerted = false;\n  t._muteNextRing = false;\n  t.startedAt = null;\n  persist();\n  renderTimerCard(id);\n  if (wasRunning) startTimer(id);\n}\n\nfunction switchPaper(timerId, paperId) {\n  const t = timers.find(x => x.id === timerId);\n  const p = IGCSE_PAPERS.find(x => x.id === paperId);\n  if (!t || !p) return;\n  stopDoneSound();\n  const wasRunning = t.running;\n  if (wasRunning) pauseTimer(timerId, false);\n  t.paperId = p.id;\n  t.paper   = p.paper;\n  t.marks   = p.marks;\n  t.color   = p.color;\n  t.total   = p.dur * 60;\n  t.left    = p.dur * 60;\n  t.dur     = p.dur;\n  t.done    = false;\n  t._preEndAlerted = false;\n  t._muteNextRing = false;\n  t.startedAt = null;\n  persist();\n  renderTimerCard(timerId);\n  if (wasRunning) startTimer(timerId);\n}\n\nfunction editableKeydown(e, el) {\n  if (e.key === 'Enter') {\n    e.preventDefault();\n    el.blur();\n  }\n}\n\nfunction saveTimerName(id, text) {\n  const t = timers.find(x => x.id === id);\n  if (!t) return;\n  const v = (text || '').trim();\n  t.name = v || 'Custom Timer';\n  persist();\n  refreshFsDisplay();\n  updateMiniPill();\n}\n\nasync function editTimerDuration(id) {\n  const t = timers.find(x => x.id === id);\n  if (!t) return;\n  const { ok, value } = await showConfirmDialog({\n    title: '修改时长',\n    body: '请输入新的时长（分钟）',\n    okText: '保存',\n    cancelText: '取消',\n    input: {\n      type: 'number',\n      value: String(Math.round(t.total / 60)),\n      min: '1',\n      max: '600',\n      placeholder: '1 - 600'\n    }\n  });\n  if (!ok) return;\n  const mins = parseInt(value, 10);\n  if (Number.isNaN(mins) || mins < 1 || mins > 600) {\n    showSnackbar('时长范围应为 1-600 分钟');\n    renderTimerCard(id);\n    return;\n  }\n  setTimerDur(id, mins);\n}\n\nfunction saveTimerNoteDebounced(id, val) {\n  const t = timers.find(x => x.id === id);\n  if (!t) return;\n  const raw = val || '';\n  if (raw.length >= 200 && raw !== t.note) showSnackbar('断点记录最多 200 字');\n  t.note = raw.slice(0, 200);\n  clearTimeout(noteDebounceTimers[id]);\n  noteDebounceTimers[id] = setTimeout(() => {\n    persist();\n    flashSaveIndicator(id);\n  }, 1000);\n}\n\nfunction renderTimerCard(id) {\n  const el = document.getElementById('card-' + id);\n  const t  = timers.find(x => x.id === id);\n  if (!el || !t) return;\n  const newEl = buildCard(t);\n  el.replaceWith(newEl);\n}\n\n// Fast DOM update (no full re-render)\nfunction refreshTimerDisplay(id) {\n  const t = timers.find(x => x.id === id);\n  if (!t) return;\n  const p = pct(t);\n  const dashOffset = RING_CIRC * (1 - p);\n  const timeColor = t.done ? '#34a853' : (t.left < 60 && t.left > 0) ? '#ea4335' : '#202124';\n\n  const ringEl  = document.getElementById('ring-' + id);\n  const timeEl  = document.getElementById('time-' + id);\n  const pctEl   = document.getElementById('pct-'  + id);\n  const warnEl  = document.getElementById('ring-warn-' + id);\n\n  if (ringEl) {\n    ringEl.style.strokeDashoffset = dashOffset;\n    ringEl.style.stroke = (t.left < 60 && !t.done) ? '#ea4335' : t.color;\n  }\n  if (timeEl) {\n    timeEl.textContent = fmtTime(t.left);\n    timeEl.style.color = timeColor;\n    if (!timeEl.classList.contains('tick')) {\n      timeEl.classList.add('tick');\n      setTimeout(() => timeEl.classList.remove('tick'), 100);\n    }\n  }\n  if (pctEl) pctEl.textContent = remainingText(p);\n  if (warnEl) {\n    if (t.running && t.left < 60 && !t.done) warnEl.classList.add('active');\n    else warnEl.classList.remove('active');\n  }\n}\n\nfunction refreshCardControls(id) {\n  const t = timers.find(x => x.id === id);\n  if (!t) return;\n  const playBtn  = document.getElementById('play-' + id);\n  const playIcon = document.getElementById('play-icon-' + id);\n  const badge    = document.getElementById('badge-' + id);\n  const dot      = document.getElementById('dot-' + id);\n\n  if (playBtn) {\n    playBtn.className = 'ctrl-btn ctrl-play' + (t.running ? ' running' : t.done ? ' done' : '');\n  }\n  if (playIcon) playIcon.textContent = t.running ? 'pause' : 'play_arrow';\n  if (badge) {\n    const statusLabel = statusText(t);\n    const statusBg    = t.done ? '#e6f4ea' : t.running ? '#e8f0fe' : t.paused ? '#fce8b2' : '#f1f3f4';\n    const statusColor = t.done ? '#34a853' : t.running ? '#1a73e8' : t.paused ? '#f29900' : '#5f6368';\n    badge.style.background = statusBg;\n    badge.style.color = statusColor;\n    badge.innerHTML = `<div class=\"status-dot\" style=\"background:${t.running?'#1a73e8':t.done?'#34a853':t.paused?'#fbbc04':'#dadce0'}\"></div>${statusLabel}`;\n  }\n}\n\nfunction flashSaveIndicator(id) {\n  const el = document.getElementById('save-' + id);\n  if (!el) return;\n  el.classList.add('show');\n  clearTimeout(el._t);\n  el._t = setTimeout(() => el.classList.remove('show'), 1800);\n}\n\n// ============================================================\n// STATS\n// ============================================================\nfunction renderStats() {\n  const today = getTodayStats();\n  const liveFocusMins = timers.reduce((sum, t) => {\n    if (t.done || !t.running || t.total <= 0) return sum;\n    return sum + Math.max(0, (t.total - t.left) / 60);\n  }, 0);\n  const focusMins = Math.round((today.focusMins || 0) + liveFocusMins);\n  document.getElementById('statFocusTime').innerHTML =\n    focusMins >= 60\n      ? `${Math.floor(focusMins/60)}<span class=\"stat-unit\">hr</span> ${focusMins%60}<span class=\"stat-unit\">m</span>`\n      : `${focusMins}<span class=\"stat-unit\">min</span>`;\n  document.getElementById('statCompleted').innerHTML = `${today.completed || 0}<span class=\"stat-unit\">${getLanguage() === 'en' ? 'x' : '次'}</span>`;\n  document.getElementById('statPauses').innerHTML    = `${today.pauses || 0}<span class=\"stat-unit\">${getLanguage() === 'en' ? 'x' : '次'}</span>`;\n}\n\n// ============================================================\n// HEATMAP\n// ============================================================\nfunction renderHeatmap() {\n  const heatmap = getHeatmap();\n  const days7 = [];\n  for (let i = 6; i >= 0; i--) {\n    const d = new Date(); d.setDate(d.getDate() - i);\n    days7.push(d.toISOString().slice(0,10));\n  }\n  const dayLabels = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];\n  const daysEl = document.getElementById('heatmapDays');\n  const gridEl = document.getElementById('heatmapGrid');\n  if (!daysEl || !gridEl) return;\n  daysEl.innerHTML = days7.map(d => {\n    const dayIdx = new Date(d).getDay();\n    return `<span class=\"heatmap-day\">${dayLabels[dayIdx]}</span>`;\n  }).join('');\n  const maxMins = Math.max(...days7.map(d => heatmap[d] || 0), 1);\n  gridEl.innerHTML = days7.map(d => {\n    const mins = heatmap[d] || 0;\n    const intensity = Math.min(1, mins / maxMins);\n    const alpha = 0.1 + intensity * 0.9;\n    const h = `rgba(26,115,232,${alpha.toFixed(2)})`;\n    const hours = Math.round(mins);\n    return `<div class=\"heat-cell\" style=\"background:${mins > 0 ? h : 'var(--md-surface-container)'}\"\n      data-mins=\"${mins}\" data-label=\"${hours} min\"></div>`;\n  }).join('');\n}\n\n// ============================================================\n// HISTORY\n// ============================================================\nfunction renderHistory() {\n  const h = getHistory();\n  renderHistoryList(document.getElementById('recentHistory'), h.slice(0,5));\n  const emptyMsg = document.getElementById('histEmptyMsg');\n  if (emptyMsg) emptyMsg.style.display = h.length === 0 ? 'block' : 'none';\n}\n\nfunction renderHistoryList(container, items) {\n  if (!container) return;\n  if (!items.length) { container.innerHTML = ''; return; }\n  container.innerHTML = items.map(entry => {\n    const safeName = esc(entry.name || '');\n    const safeNote = esc(entry.note || '');\n    const t = new Date(entry.completedAt);\n    const timeStr = t.toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit' });\n    const dateStr = t.toLocaleDateString('zh-CN', { month:'short', day:'numeric' });\n    const spentStr = fmtDur(entry.spentMins || 0);\n    return `<div class=\"hist-item\">\n      <div class=\"hist-color-bar\" style=\"background:${entry.color};\"></div>\n      <div class=\"hist-info\">\n        <div class=\"hist-name\">${safeName}</div>\n        <div class=\"hist-meta\">${dateStr} ${timeStr} · ${entry.type==='completed'?'完成':'保存'} · ${entry.pauseCount || 0}次暂停</div>\n        ${safeNote ? `<div class=\"hist-meta\" style=\"margin-top:2px;\">📌 ${safeNote}</div>` : ''}\n      </div>\n      <div class=\"hist-time\">${spentStr}</div>\n      <button class=\"hist-resume-btn\" onclick=\"resumeSession(${JSON.stringify(entry).split('\"').join('&quot;')})\">恢复</button>\n    </div>`;\n  }).join('');\n}\n\nfunction openHistoryModal() {\n  const h = getHistory();\n  const container = document.getElementById('fullHistoryList');\n  renderHistoryList(container, h);\n  if (!h.length) container.innerHTML = '<div style=\"text-align:center;padding:40px;color:var(--md-on-surface-variant);font-size:14px;\">暂无历史记录</div>';\n  openModal('historyModal');\n}\n\nfunction resumeSession(entry) {\n  closeModal('historyModal');\n  const remaining = (entry.spentMins < entry.dur) ? (entry.dur - entry.spentMins) * 60 : entry.dur * 60;\n  createTimer({\n    name: entry.name, color: entry.color, subj: entry.subj,\n    paper: entry.paper, marks: entry.marks, paperId: entry.paperId,\n    dur: entry.dur, left: remaining,\n    saveInterval: 5, note: entry.note || '',\n  });\n  showSnackbar(`已恢复：${entry.name}（剩余 ${fmtDur(Math.round(remaining/60))}）`);\n}\n\n// ============================================================\n// FULLSCREEN\n// ============================================================\nfunction openFullscreen(id) {\n  fsTimerId = id;\n  const overlay = document.getElementById('fullscreen-overlay');\n  overlay.classList.add('open');\n  refreshFsDisplay();\n  startFullscreenClock();\n  requestBrowserFullscreen(document.documentElement);\n}\n\nfunction exitFullscreen() {\n  document.getElementById('fullscreen-overlay').classList.remove('open');\n  fsTimerId = null;\n  stopFullscreenClock();\n  exitBrowserFullscreen();\n}\n\nfunction refreshFsDisplay() {\n  if (fsTimerId === null) return;\n  const t = timers.find(x => x.id === fsTimerId);\n  if (!t) { exitFullscreen(); return; }\n  const p = pct(t);\n  const color = t.done ? '#34a853' : (t.left < 60) ? '#ea4335' : t.color;\n  const fst = document.getElementById('fs-time-display');\n  if (fst) { fst.textContent = fmtHMS(t.left); fst.style.color = '#f7f9ff'; }\n  refreshCurrentClock();\n\n  const pb = document.getElementById('fsProgressBar');\n  if (pb) { pb.style.width = (p*100) + '%'; pb.style.background = color; }\n}\n\nfunction refreshCurrentClock() {\n  const el = document.getElementById('fs-current-time');\n  if (!el) return;\n  const now = new Date();\n  el.textContent = `${t('currentTimeLabel')} ${now.toLocaleTimeString(getLanguage() === 'en' ? 'en-GB' : 'zh-CN', { hour12: false })}`;\n}\n\nfunction startFullscreenClock() {\n  stopFullscreenClock();\n  refreshCurrentClock();\n  fsClockTimer = setInterval(refreshCurrentClock, 1000);\n}\n\nfunction stopFullscreenClock() {\n  if (!fsClockTimer) return;\n  clearInterval(fsClockTimer);\n  fsClockTimer = null;\n}\n\nfunction fsToggle() {\n  if (fsTimerId !== null) toggleTimer(fsTimerId);\n}\nfunction fsReset()  { if (fsTimerId !== null) resetTimer(fsTimerId); }\nfunction fsAddTime(m) { if (fsTimerId !== null) addTime(fsTimerId, m); }\n\nfunction requestBrowserFullscreen(element) {\n  const req = element.requestFullscreen || element.webkitRequestFullscreen || element.mozRequestFullScreen || element.msRequestFullscreen;\n  if (req) {\n    try {\n      const p = req.call(element);\n      if (p && typeof p.catch === 'function') p.catch(() => {});\n    } catch(_) {}\n  }\n}\n\nfunction exitBrowserFullscreen() {\n  const doc = document;\n  const ex = doc.exitFullscreen || doc.webkitExitFullscreen || doc.mozCancelFullScreen || doc.msExitFullscreen;\n  const isFs = !!(doc.fullscreenElement || doc.webkitFullscreenElement || doc.mozFullScreenElement || doc.msFullscreenElement);\n  if (isFs && ex) {\n    try {\n      const p = ex.call(doc);\n      if (p && typeof p.catch === 'function') p.catch(() => {});\n    } catch(_) {}\n  }\n}\n\nfunction onFullscreenChange() {\n  const doc = document;\n  const isFs = !!(doc.fullscreenElement || doc.webkitFullscreenElement || doc.mozFullScreenElement || doc.msFullscreenElement);\n  if (!isFs) {\n    document.getElementById('fullscreen-overlay').classList.remove('open');\n    fsTimerId = null;\n    stopFullscreenClock();\n  } else if (fsTimerId !== null) {\n    document.getElementById('fullscreen-overlay').classList.add('open');\n    startFullscreenClock();\n  }\n}\n\nfunction handleGlobalKeydown(e) {\n  if ((e.key === '~' || e.key === '`') && !e.repeat) {\n    const tag = e.target && e.target.tagName ? e.target.tagName.toLowerCase() : '';\n    if (!['input', 'textarea', 'select'].includes(tag)) {\n      e.preventDefault();\n      openDebugModal();\n      return;\n    }\n  }\n  if (e.key === 'Escape') {\n    e.preventDefault();\n    if (closeTopmostOverlay()) return;\n    exitFullscreen();\n    return;\n  }\n  if (e.key === ' ' && fsTimerId !== null) {\n    e.preventDefault();\n    fsToggle();\n  }\n  if (e.key === 'f' || e.key === 'F') {\n    const running = timers.find(x => x.running);\n    if (running) openFullscreen(running.id);\n  }\n}\n\n// ============================================================\n// MINI PILL\n// ============================================================\nfunction toggleMinipill() {\n  miniPillActive = !miniPillActive;\n  document.getElementById('minipillBtn').classList.toggle('active', miniPillActive);\n  if (!miniPillActive) closeMiniPipWindow();\n  updateMiniPill();\n}\n\nasync function ensureMiniPipWindow() {\n  if (!miniPillActive) return null;\n  if (pipMiniWindow && !pipMiniWindow.closed) return pipMiniWindow;\n  if (!window.documentPictureInPicture?.requestWindow) return null;\n  try {\n    pipMiniWindow = await window.documentPictureInPicture.requestWindow({\n      width: 320,\n      height: 110\n    });\n    const doc = pipMiniWindow.document;\n    doc.body.style.margin = '0';\n    doc.body.style.background = '#111827';\n    doc.body.innerHTML = `\n      <style>\n        .pip-wrap {height:100vh;display:flex;align-items:center;justify-content:center;padding:10px 12px;color:#fff;font-family:Roboto,sans-serif;gap:8px;cursor:pointer;user-select:none;background:linear-gradient(135deg,#111827,#1f2937);transition:transform .2s ease, box-shadow .3s ease;position:relative;overflow:hidden;}\n        .pip-wrap:active { transform: scale(0.98); }\n        .pip-meta {display:flex;flex-direction:column;align-items:center;gap:2px;min-width:0;}\n        .pip-title {font-size:13px;opacity:.92;max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}\n        .pip-time {font-family:'Roboto Mono',monospace;font-size:26px;font-weight:700;letter-spacing:.4px;}\n        .pip-state {font-size:11px;opacity:.8;}\n        .pip-wrap.pip-running .pip-time {color:#dbeafe;}\n        .pip-wrap.pip-paused .pip-time {color:#fde68a;}\n        .pip-wrap.pip-done {animation:pipDonePulse 1.35s ease-in-out infinite;box-shadow:inset 0 0 0 1px rgba(255,255,255,.15);}\n        .pip-wrap.pip-done::after {content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 20%,rgba(52,168,83,.38),transparent 58%);pointer-events:none;animation:pipDoneGlow 2s ease-in-out infinite;}\n        @keyframes pipDonePulse {0%,100%{filter:saturate(1)}50%{filter:saturate(1.35)}}\n        @keyframes pipDoneGlow {0%,100%{opacity:.45}50%{opacity:.9}}\n      </style>\n      <div class=\"pip-wrap pip-paused\" id=\"pipWrap\" role=\"button\" tabindex=\"0\">\n        <div class=\"pip-meta\">\n          <div class=\"pip-title\" id=\"pipTitle\">Timer</div>\n          <div class=\"pip-time\" id=\"pipTime\">--:--</div>\n          <div class=\"pip-state\" id=\"pipState\">${t('pipToggleHint')}</div>\n        </div>\n      </div>`;\n    doc.getElementById('pipWrap').addEventListener('click', () => {\n      const active = timers.find(x => x.running) || timers[0];\n      if (active) toggleTimer(active.id);\n    });\n    doc.getElementById('pipWrap').addEventListener('keydown', (event) => {\n      if (event.key !== 'Enter' && event.key !== ' ') return;\n      event.preventDefault();\n      const active = timers.find(x => x.running) || timers[0];\n      if (active) toggleTimer(active.id);\n    });\n    pipMiniWindow.addEventListener('pagehide', () => {\n      closeMiniPipWindow(false);\n      miniPillActive = false;\n      const btn = document.getElementById('minipillBtn');\n      if (btn) btn.classList.remove('active');\n      updateMiniPill();\n    });\n    return pipMiniWindow;\n  } catch (e) {\n    console.warn('Document PiP unavailable', e);\n    return null;\n  }\n}\n\nfunction closeMiniPipWindow(closeWindow = true) {\n  if (pipMiniTimer) {\n    clearInterval(pipMiniTimer);\n    pipMiniTimer = null;\n  }\n  if (closeWindow && pipMiniWindow && !pipMiniWindow.closed) {\n    try { pipMiniWindow.close(); } catch (_) {}\n  }\n  pipMiniWindow = null;\n}\n\nfunction updateMiniPill() {\n  const pill = document.getElementById('mini-pill');\n  if (!miniPillActive) { pill.style.display = 'none'; return; }\n  const active = timers.find(x => x.running) || timers[0];\n  if (!active) {\n    pill.style.display = 'none';\n    closeMiniPipWindow();\n    return;\n  }\n  ensureMiniPipWindow().then(win => {\n    if (!miniPillActive) return;\n    if (win && !win.closed) {\n      const tEl = win.document.getElementById('pipTime');\n      const nEl = win.document.getElementById('pipTitle');\n      const sEl = win.document.getElementById('pipState');\n      const wEl = win.document.getElementById('pipWrap');\n      if (tEl) tEl.textContent = fmtTime(active.left);\n      if (nEl) nEl.textContent = active.name;\n      if (sEl) {\n        sEl.textContent = active.done\n          ? t('pipDone')\n          : active.running\n            ? t('pipPause')\n            : t('pipStart');\n      }\n      if (wEl) {\n        wEl.classList.toggle('pip-running', !!active.running && !active.done);\n        wEl.classList.toggle('pip-paused', !active.running && !active.done);\n        wEl.classList.toggle('pip-done', !!active.done);\n      }\n      pill.style.display = 'none';\n    } else {\n      pill.style.display = 'flex';\n    }\n  });\n  if (pipMiniWindow && !pipMiniWindow.closed) return;\n  pill.style.display = 'flex';\n  document.getElementById('pillSubject').textContent = active.name;\n  document.getElementById('mini-pill-time').textContent = fmtTime(active.left);\n  const icon = document.getElementById('pillIcon');\n  if (icon) icon.textContent = active.running ? 'timer' : 'pause';\n}\n\nfunction toggleFromPill() {\n  const active = timers.find(x => x.running) || timers[0];\n  if (active) toggleTimer(active.id);\n}\n\nfunction handleMiniPillKeydown(event) {\n  if (event.key !== 'Enter' && event.key !== ' ') return;\n  event.preventDefault();\n  toggleFromPill();\n}\n\nfunction expandFromPill() {\n  const active = timers.find(x => x.running) || timers[0];\n  if (active) openFullscreen(active.id);\n  miniPillActive = false;\n  closeMiniPipWindow();\n  const btn = document.getElementById('minipillBtn');\n  if (btn) btn.classList.remove('active');\n  updateMiniPill();\n}\n\nfunction switchCountdownVersion() {\n  window.location.href = 'igcse_timer.html';\n}\n\nfunction primeNotificationPermission() {\n  if (notificationPermissionRequested || !('Notification' in window)) return;\n  notificationPermissionRequested = true;\n  if (Notification.permission === 'default') {\n    Notification.requestPermission().catch(() => {});\n  }\n}\n\nfunction pushDesktopNotification(title, body) {\n  if (!('Notification' in window)) return;\n  if (Notification.permission !== 'granted') return;\n  try {\n    new Notification(title, { body, icon: 'Github.png' });\n  } catch (_) {}\n}\n\nfunction syncAllRunningTimers() {\n  // Re-sync active timers after returning to foreground to catch up throttled background ticks.\n  timers.filter(t => t.running).forEach(t => tickTimer(t.id));\n}\n\n// ============================================================\n// SETTINGS\n// ============================================================\nfunction openSettings() {\n  renderSettingsUI();\n  const examDate = localStorage.getItem('igcse_exam_date') || '';\n  document.getElementById('sExamDate').value = examDate;\n  document.getElementById('sApiKey').value = settings.apiKey || '';\n  const neteaseInput = document.getElementById('neteaseSongId');\n  if (neteaseInput) neteaseInput.value = settings.neteaseSongId || '';\n  const unattendedAction = document.getElementById('bellUnattendedAction');\n  if (unattendedAction) unattendedAction.value = settings.bellUnattendedAction || 'manual';\n  const unattendedDelay = document.getElementById('bellUnattendedDelay');\n  if (unattendedDelay) unattendedDelay.value = String(getBellUnattendedDelaySec());\n  const langInput = document.getElementById('sLanguage');\n  if (langInput) langInput.value = getLanguage();\n  updateExamCountdown(examDate);\n  openModal('settingsModal');\n}\n\nfunction renderSettingsUI() {\n  ['sound','autoFS','fullscreenFx','interruptLog','mockLink','goalLink'].forEach(key => {\n    const el = document.getElementById('toggle' + key[0].toUpperCase() + key.slice(1));\n    if (el) el.classList.toggle('on', !!settings[key]);\n  });\n  const lm = document.getElementById('sLayoutMode');\n  if (lm) lm.value = settings.layoutMode || 'carousel';\n  const lang = document.getElementById('sLanguage');\n  if (lang) lang.value = getLanguage();\n  document.querySelectorAll('input[name=\"bellSource\"]').forEach(radio => {\n    radio.checked = radio.value === (settings.bellSource === 'netease' ? 'netease' : 'local');\n  });\n  const unattendedAction = document.getElementById('bellUnattendedAction');\n  if (unattendedAction) unattendedAction.value = settings.bellUnattendedAction || 'manual';\n  const unattendedDelay = document.getElementById('bellUnattendedDelay');\n  if (unattendedDelay) unattendedDelay.value = String(getBellUnattendedDelaySec());\n  const fs = document.getElementById('fullscreen-overlay');\n  if (fs) fs.classList.toggle('fx-on', !!settings.fullscreenFx);\n}\n\nfunction toggleSetting(key) {\n  settings[key] = !settings[key];\n  if (key === 'sound' && !settings[key]) stopDoneSound();\n  renderSettingsUI();\n  persist();\n}\n\nfunction setLayoutMode(mode) {\n  settings.layoutMode = mode === 'grouped' ? 'grouped' : 'carousel';\n  currentPage = 0;\n  persist();\n  renderAll();\n}\n\nfunction saveExamDate(val) {\n  localStorage.setItem('igcse_exam_date', val);\n  updateExamCountdown(val);\n}\n\nfunction updateExamCountdown(dateStr) {\n  const el = document.getElementById('examCountdownDisplay');\n  if (!el) return;\n  if (!dateStr) { el.style.display = 'none'; return; }\n  const target = new Date(dateStr + 'T09:00:00');\n  const now = new Date();\n  const diffMs = target - now;\n  if (diffMs <= 0) {\n    el.textContent = getLanguage() === 'en' ? 'Exam day has arrived 🎓' : '考试日期已到 🎓';\n    el.style.display = 'block';\n    return;\n  }\n  const days = Math.ceil(diffMs / 86400000);\n  el.textContent = getLanguage() === 'en' ? `${days} day(s) to exam` : `距考试还有 ${days} 天`;\n  el.style.display = 'block';\n}\n\nasync function clearAllData() {\n  const { ok } = await showConfirmDialog({\n    title: '清除数据',\n    body: '确定清除本应用所有本地数据并重置吗？',\n    okText: '确认清除',\n    cancelText: '取消'\n  });\n  if (!ok) return;\n  timers.forEach(t => clearInterval(t._interval));\n  Object.keys(noteDebounceTimers).forEach(id => {\n    clearTimeout(noteDebounceTimers[id]);\n    delete noteDebounceTimers[id];\n  });\n  stopDoneSound(false);\n  dismissFinishScene();\n  timers = [];\n  settings = { ...DEFAULT_SETTINGS };\n  await clearCustomAudioFromIndexedDb();\n  customBellPlaybackSrc = '';\n  setCustomAudioPreviewSrc('');\n  currentPage = 0;\n  pendingInterruptTimerId = null;\n  const keys = [SK, 'igcse_hist', 'igcse_stats', 'igcse_heat', 'igcse_exam_date', 'igcse_ai_privacy_ok', 'is_first_run'];\n  keys.forEach(k => localStorage.removeItem(k));\n  const examInput = document.getElementById('sExamDate');\n  if (examInput) examInput.value = '';\n  const examCountdown = document.getElementById('examCountdownDisplay');\n  if (examCountdown) examCountdown.style.display = 'none';\n  applyI18n();\n  renderAll();\n  renderStats(); renderHistory(); renderHeatmap();\n  showSnackbar(getLanguage() === 'en' ? 'All data cleared' : '数据已清除');\n}\n\nfunction openFinishScene(timerObj, shouldPlayNetease = false) {\n  const scene = document.getElementById('finishScene');\n  if (!scene) return;\n  const fallback = fallbackFinishLines(timerObj?.name);\n  const info = timerObj?.finishSceneData || fallback;\n  const main = document.getElementById('finishMainText');\n  const sub = document.getElementById('finishSubText');\n  const meta = document.getElementById('finishMetaText');\n  const musicWrap = document.getElementById('finishMusicWrap');\n  const frame = document.getElementById('neteaseBgFrame');\n  finishSceneOwnerId = timerObj?.id || null;\n  const zhText = info.zhHans || fallback.zhHans || '倒计时结束';\n  const enText = settings.apiKey ? (info.en || '').trim() : '';\n  const englishOnTop = getLanguage() === 'en' && !!enText;\n\n  if (main) main.textContent = englishOnTop ? enText : zhText;\n  if (sub) {\n    sub.textContent = englishOnTop ? zhText : enText;\n    sub.style.display = enText ? '' : 'none';\n  }\n\n  if (meta) {\n    const sourceLine = info.source\n      ? `来自「${info.source}」${info.sourceWho ? ` · ${info.sourceWho}` : ''}`\n      : '';\n    meta.textContent = sourceLine\n      ? `${sourceLine} · ${t('tapToContinue')}`\n      : t('tapToContinue');\n  }\n\n  if (shouldPlayNetease && settings.neteaseSongId && musicWrap && frame) {\n    const id = sanitizeNumericInput(settings.neteaseSongId);\n    frame.setAttribute('allow', 'autoplay');\n    frame.setAttribute('sandbox', 'allow-scripts allow-forms allow-popups');\n    try {\n      frame.src = `https://music.163.com/outchain/player?type=2&id=${encodeURIComponent(id)}&auto=1&height=66&autoplay=1`;\n    } catch (err) {\n      console.warn('NetEase iframe set failed', err);\n    }\n    musicWrap.style.display = 'none';\n    activeBellMode = 'netease';\n  } else if (musicWrap && frame) {\n    frame.src = '';\n    musicWrap.style.display = 'none';\n  }\n  scene.classList.add('open');\n  updateBodyScrollLock();\n}\n\nfunction dismissFinishScene(e) {\n  if (e && typeof e.stopPropagation === 'function') e.stopPropagation();\n  const scene = document.getElementById('finishScene');\n  if (!scene || !scene.classList.contains('open')) return;\n  scene.classList.remove('open');\n  finishSceneOwnerId = null;\n  stopDoneSound(false);\n  updateBodyScrollLock();\n}\n\nfunction saveApiKey() {\n  settings.apiKey = (document.getElementById('sApiKey').value || '').trim();\n  persist();\n  closeModal('apiModal');\n  showSnackbar('API Key 已保存');\n}\n\nasync function handleAudioUpload(e) {\n  const f = e.target.files && e.target.files[0];\n  if (!f) return;\n  settings.customBellType = f.type || 'audio/mpeg';\n  settings.bellSource = 'local';\n  try {\n    await saveCustomAudioToIndexedDb(f);\n    settings.customBellData = '';\n    customBellPlaybackSrc = URL.createObjectURL(f);\n    setCustomAudioPreviewSrc(customBellPlaybackSrc);\n    persist();\n    renderSettingsUI();\n    showSnackbar(getLanguage() === 'en' ? 'Custom bell saved' : '自定义铃声已保存');\n    return;\n  } catch (dbErr) {\n    console.warn('IndexedDB save failed, fallback to localStorage base64', dbErr);\n  }\n  const rd = new FileReader();\n  rd.onload = () => {\n    settings.customBellData = rd.result;\n    customBellPlaybackSrc = settings.customBellData;\n    persist();\n    setCustomAudioPreviewSrc(settings.customBellData);\n    renderSettingsUI();\n    showSnackbar(getLanguage() === 'en' ? 'Custom bell saved' : '自定义铃声已保存');\n  };\n  rd.onerror = () => showSnackbar(getLanguage() === 'en' ? 'Save failed' : '铃声保存失败');\n  rd.readAsDataURL(f);\n}\n\nfunction saveNeteaseSongId() {\n  const input = document.getElementById('neteaseSongId');\n  if (!input) return;\n  const cleaned = sanitizeNumericInput(input.value);\n  settings.neteaseSongId = cleaned;\n  if (cleaned) settings.bellSource = 'netease';\n  input.value = cleaned;\n  persist();\n  renderSettingsUI();\n  showSnackbar(cleaned\n    ? (getLanguage() === 'en' ? 'NetEase song ID saved' : '网易云歌曲 ID 已保存')\n    : (getLanguage() === 'en' ? 'NetEase song ID cleared' : '已清除网易云歌曲 ID'));\n}\n\nfunction saveBellUnattendedAction(action) {\n  settings.bellUnattendedAction = ['manual', 'mute', 'close'].includes(action) ? action : 'manual';\n  persist();\n  renderSettingsUI();\n}\n\nfunction saveBellUnattendedDelay(value) {\n  const n = Number(value);\n  settings.bellUnattendedDelaySec = Number.isFinite(n)\n    ? Math.min(MAX_BELL_UNATTENDED_DELAY_SEC, Math.max(MIN_BELL_UNATTENDED_DELAY_SEC, Math.round(n)))\n    : DEFAULT_BELL_UNATTENDED_DELAY_SEC;\n  persist();\n  renderSettingsUI();\n}\n\nfunction setBellSource(source) {\n  settings.bellSource = source === 'netease' ? 'netease' : 'local';\n  persist();\n  renderSettingsUI();\n}\n\nfunction setLanguage(lang) {\n  settings.language = lang === 'en' ? 'en' : 'zh';\n  persist();\n  applyI18n();\n  renderAll();\n  renderStats();\n  renderHistory();\n}\n\nasync function generateAiSummary() {\n  const out = document.getElementById('aiOutput');\n  if (!out) return;\n  const s = getTodayStats();\n  const h = getHistory().slice(0, 10);\n  if (!settings.apiKey) {\n    out.textContent = '请先在设置中填写 DeepSeek API Key。';\n    return;\n  }\n  const consentKey = 'igcse_ai_privacy_ok';\n  if (!localStorage.getItem(consentKey)) {\n    const res = await showConfirmDialog({\n      title: '隐私确认',\n      body: '将把学习统计与最近记录发送到 DeepSeek 以生成分析。是否继续？',\n      okText: '继续',\n      cancelText: '取消'\n    });\n    const ok = res.ok;\n    if (!ok) {\n      out.textContent = '已取消发送。';\n      return;\n    }\n    localStorage.setItem(consentKey, '1');\n  }\n  out.textContent = '生成中...';\n  const prompt = `你是一名经验丰富的 IGCSE 考官，请根据以下数据给出不超过200字的分析建议。\\n今日数据: ${JSON.stringify(s)}\\n最近记录: ${JSON.stringify(h)}`;\n  try {\n    const resp = await fetch('https://api.deepseek.com/chat/completions', {\n      method: 'POST',\n      headers: {\n        'Content-Type': 'application/json',\n        'Authorization': `Bearer ${settings.apiKey}`\n      },\n      body: JSON.stringify({\n        model: 'deepseek-chat',\n        messages: [{ role: 'user', content: prompt }],\n        temperature: 0.6\n      })\n    });\n    const data = await resp.json();\n    const text = data?.choices?.[0]?.message?.content || '生成失败，请稍后重试。';\n    out.textContent = text;\n  } catch (e) {\n    out.textContent = '网络或接口错误，请检查 API Key。';\n  }\n}\n\nfunction saveInterruptReason() {\n  const selector = document.getElementById('interruptReason');\n  const customInput = document.getElementById('interruptCustomReason');\n  const baseReason = selector ? selector.value : '';\n  const customReason = customInput ? customInput.value.trim() : '';\n  const reason = (baseReason === '其他' && customReason) ? customReason.slice(0, 40) : baseReason;\n  if (pendingInterruptTimerId) {\n    const t = timers.find(x => x.id === pendingInterruptTimerId);\n    if (t) {\n      if (!t.interruptions) t.interruptions = [];\n      t.interruptions.push({ reason, ts: Date.now() });\n      persist();\n    }\n  }\n  pendingInterruptTimerId = null;\n  if (customInput) customInput.value = '';\n  updateInterruptCustomInputVisibility();\n  closeModal('interruptModal');\n}\n\nfunction updateInterruptCustomInputVisibility() {\n  const selector = document.getElementById('interruptReason');\n  const wrap = document.getElementById('interruptCustomWrap');\n  const input = document.getElementById('interruptCustomReason');\n  const isOther = selector && selector.value === '其他';\n  if (wrap) wrap.style.display = isOther ? 'block' : 'none';\n  if (!isOther && input) input.value = '';\n}\n\nconst ONBOARD_STEPS = [\n  { target: '#quickStartLabel', title: '快捷启动', desc: '这里可以一键启动常用 IGCSE 卷型。' },\n  { target: '#timersLabel', title: '多计时器区', desc: '超过3个计时器会自动分页。可在设置中切换展示模式。' },\n  { target: '#minipillBtn', title: '悬浮迷你窗', desc: '点击可开启迷你悬浮，再次点击可快速回到全屏计时。' },\n  { target: '#timerPageControls', title: '分页按钮', desc: '点击页码切换分组或滑动窗口。' }\n];\n\nfunction startOnboarding() {\n  onboardingIdx = 0;\n  document.getElementById('oblay').classList.add('show');\n  showOnboardingStep();\n}\n\nfunction showOnboardingStep() {\n  const step = ONBOARD_STEPS[onboardingIdx];\n  if (!step) { skipOnboarding(); return; }\n  const el = document.querySelector(step.target);\n  if (!el) { nextOnboarding(); return; }\n  const r = el.getBoundingClientRect();\n  const focus = document.getElementById('obfocus');\n  const bub = document.getElementById('obbub');\n  focus.style.left = `${Math.max(8, r.left - 6)}px`;\n  focus.style.top = `${Math.max(8, r.top - 6)}px`;\n  focus.style.width = `${Math.max(40, r.width + 12)}px`;\n  focus.style.height = `${Math.max(30, r.height + 12)}px`;\n  const bubWidth = (bub.getBoundingClientRect().width || 420) + 20;\n  bub.style.left = `${Math.max(16, Math.min(window.innerWidth - bubWidth, r.left))}px`;\n  bub.style.top = `${Math.min(window.innerHeight - 220, r.bottom + 12)}px`;\n  document.getElementById('obtitle').textContent = step.title;\n  document.getElementById('obdesc').textContent = step.desc;\n  document.getElementById('obnext').textContent = onboardingIdx === ONBOARD_STEPS.length - 1 ? '完成' : '下一步';\n}\n\nfunction nextOnboarding() {\n  onboardingIdx++;\n  if (onboardingIdx >= ONBOARD_STEPS.length) {\n    skipOnboarding();\n    return;\n  }\n  showOnboardingStep();\n}\n\nfunction skipOnboarding() {\n  document.getElementById('oblay').classList.remove('show');\n  localStorage.setItem('is_first_run', 'done');\n}\n\n// ============================================================\n// MODAL UTILITIES\n// ============================================================\nfunction updateBodyScrollLock() {\n  const hasOpenModal = !!document.querySelector('.modal-backdrop.open');\n  const hasOpenScene = !!document.getElementById('finishScene')?.classList.contains('open');\n  document.body.style.overflow = (hasOpenModal || hasOpenScene) ? 'hidden' : '';\n}\n\nfunction openModal(id) {\n  const modal = document.getElementById(id);\n  if (!modal) return;\n  const idx = modalStack.indexOf(id);\n  if (idx >= 0) modalStack.splice(idx, 1);\n  modalStack.push(id);\n  modal.classList.add('open');\n  updateBodyScrollLock();\n}\nfunction closeModal(id) {\n  const modal = document.getElementById(id);\n  if (!modal) return;\n  modalStack = modalStack.filter(mid => mid !== id);\n  modal.classList.remove('open');\n  updateBodyScrollLock();\n}\nfunction closeModalOnBackdrop(e, id) {\n  if (e.target.id !== id) return;\n  if (id === 'confirmModal') {\n    resolveConfirmModal(false);\n    return;\n  }\n  closeModal(id);\n}\n\nfunction closeTopmostOverlay() {\n  const overlays = [];\n  const openModalId = modalStack[modalStack.length - 1];\n  if (openModalId) {\n    const modalEl = document.getElementById(openModalId);\n    if (modalEl && modalEl.classList.contains('open')) overlays.push({ type: 'modal', id: openModalId, el: modalEl });\n  }\n  const finishScene = document.getElementById('finishScene');\n  if (finishScene && finishScene.classList.contains('open')) overlays.push({ type: 'finish', el: finishScene });\n  const onboarding = document.getElementById('oblay');\n  if (onboarding && onboarding.classList.contains('show')) overlays.push({ type: 'onboarding', el: onboarding });\n  if (!overlays.length) return false;\n  const top = overlays[overlays.length - 1];\n  if (top.type === 'modal') {\n    const id = top.id || top.el.id;\n    if (id === 'confirmModal') resolveConfirmModal(false);\n    else closeModal(id);\n    return true;\n  }\n  if (top.type === 'finish') {\n    dismissFinishScene();\n    return true;\n  }\n  if (top.type === 'onboarding') {\n    skipOnboarding();\n    return true;\n  }\n  return false;\n}\n\nfunction showConfirmDialog(opts = {}) {\n  if (suppressStandardAlerts) {\n    const value = opts.input ? String(opts.input.value || '').trim() : '';\n    return Promise.resolve({ ok: true, value });\n  }\n  const title = document.getElementById('confirmTitle');\n  const body = document.getElementById('confirmBody');\n  const okBtn = document.getElementById('confirmOkBtn');\n  const cancelBtn = document.getElementById('confirmCancelBtn');\n  const input = document.getElementById('confirmInput');\n  if (!title || !body || !okBtn || !cancelBtn || !input) {\n    console.error('Confirm modal elements missing');\n    return Promise.resolve({ ok: false, value: '' });\n  }\n  title.textContent = opts.title || '确认操作';\n  body.textContent = opts.body || '确定继续吗？';\n  okBtn.textContent = opts.okText || '确定';\n  cancelBtn.textContent = opts.cancelText || '取消';\n\n  const inputCfg = opts.input || null;\n  confirmModalHasInput = !!inputCfg;\n  if (inputCfg) {\n    input.type = inputCfg.type || 'text';\n    input.placeholder = inputCfg.placeholder || '';\n    input.value = inputCfg.value || '';\n    input.min = inputCfg.min || '';\n    input.max = inputCfg.max || '';\n    input.style.display = 'block';\n    input.onkeydown = (ev) => {\n      if (ev.key === 'Enter') {\n        ev.preventDefault();\n        resolveConfirmModal(true);\n      }\n    };\n  } else {\n    input.style.display = 'none';\n    input.value = '';\n    input.onkeydown = null;\n  }\n\n  openModal('confirmModal');\n  if (inputCfg) setTimeout(() => input.focus(), 80);\n  return new Promise(resolve => {\n    confirmModalResolver = resolve;\n  });\n}\n\nfunction resolveConfirmModal(ok) {\n  const resolve = confirmModalResolver;\n  const input = document.getElementById('confirmInput');\n  const value = confirmModalHasInput && input ? (input.value || '').trim() : '';\n  confirmModalResolver = null;\n  confirmModalHasInput = false;\n  closeModal('confirmModal');\n  if (resolve) resolve({ ok, value });\n}\n\n// ============================================================\n// SNACKBAR\n// ============================================================\nfunction showSnackbar(msg, showUndo = false, undoFn = null, actionLabel = '撤销', durationMs = 3000) {\n  if (suppressStandardAlerts) return;\n  document.getElementById('snackbar-msg').textContent = msg;\n  const actionBtn = document.getElementById('snackbar-action');\n  actionBtn.textContent = actionLabel;\n  actionBtn.style.display = showUndo ? 'inline' : 'none';\n  snackbarUndoFn = undoFn;\n  const el = document.getElementById('snackbar');\n  el.classList.add('show');\n  clearTimeout(snackbarTimer);\n  if (durationMs === null) return;\n  snackbarTimer = setTimeout(() => el.classList.remove('show'), durationMs);\n}\nfunction snackbarAction() {\n  if (snackbarUndoFn) { snackbarUndoFn(); snackbarUndoFn = null; }\n  document.getElementById('snackbar').classList.remove('show');\n}\n\nfunction showBellStopToast() {\n  const el = document.getElementById('bell-stop-toast');\n  if (el) el.classList.add('show');\n}\n\nfunction hideBellStopToast() {\n  const el = document.getElementById('bell-stop-toast');\n  if (el) el.classList.remove('show');\n}\n\nfunction bindGlobalListeners() {\n  if (listenersBound) return;\n  listenersBound = true;\n  document.addEventListener('keydown', handleGlobalKeydown);\n  document.addEventListener('fullscreenchange', onFullscreenChange);\n  document.addEventListener('webkitfullscreenchange', onFullscreenChange);\n  document.addEventListener('mozfullscreenchange', onFullscreenChange);\n  document.addEventListener('MSFullscreenChange', onFullscreenChange);\n  const primeOnce = () => {\n    primeMediaPlaybackPermission().catch(() => {});\n  };\n  document.addEventListener('pointerdown', primeOnce, { once: true, passive: true });\n  document.addEventListener('keydown', primeOnce, { once: true });\n  document.addEventListener('pointerdown', primeNotificationPermission, { once: true, passive: true });\n  document.addEventListener('visibilitychange', () => {\n    if (!document.hidden) syncAllRunningTimers();\n  });\n  window.addEventListener('scroll', () => {\n    document.getElementById('topAppBar').classList.toggle('elevated', window.scrollY > 8);\n  }, { passive: true });\n}\n\nfunction setDebugOutput(text) {\n  const out = document.getElementById('debugOutput');\n  if (out) out.textContent = text || '';\n}\n\nfunction getDebugTargetTimer() {\n  const sel = document.getElementById('debugTimerSelect');\n  const id = sel ? sel.value : '';\n  return timers.find(x => x.id === id) || timers[0] || null;\n}\n\nfunction refreshDebugTimerSelect() {\n  const sel = document.getElementById('debugTimerSelect');\n  if (!sel) return;\n  const selected = sel.value;\n  sel.innerHTML = timers.length\n    ? timers.map(t => `<option value=\"${esc(t.id)}\">${esc(t.name)} (${fmtTime(t.left)})</option>`).join('')\n    : '<option value=\"\">暂无计时器</option>';\n  if (selected && timers.some(t => t.id === selected)) sel.value = selected;\n}\n\nfunction openDebugModal() {\n  refreshDebugTimerSelect();\n  setDebugOutput('调试模式已开启。');\n  openModal('debugModal');\n}\n\nasync function runInDebugMode(fn) {\n  suppressStandardAlerts = true;\n  try {\n    await fn();\n  } finally {\n    suppressStandardAlerts = false;\n  }\n}\n\nasync function debugForceFinishSelected() {\n  const t = getDebugTargetTimer();\n  if (!t) return setDebugOutput('没有可用计时器。');\n  await runInDebugMode(async () => {\n    if (t._interval) clearInterval(t._interval);\n    t.running = true;\n    t.left = 0;\n    await onTimerDone(t.id);\n  });\n  setDebugOutput(`已触发结束：${t.name}`);\n}\n\nasync function debugPlayBellSelected() {\n  await runInDebugMode(async () => {\n    await playDoneSound();\n  });\n  setDebugOutput('已触发铃声播放测试。');\n}\n\nfunction debugStopBellSelected() {\n  stopDoneSound(false);\n  setDebugOutput('已停止铃声。');\n}\n\nasync function debugPrefetchSelected() {\n  const t = getDebugTargetTimer();\n  if (!t) return setDebugOutput('没有可用计时器。');\n  await runInDebugMode(async () => {\n    await prefetchFinishSceneData(t.id);\n  });\n  setDebugOutput(`已执行预加载：${t.name}`);\n}\n\nasync function debugForceSceneWithPrefetch() {\n  const t = getDebugTargetTimer();\n  if (!t) return setDebugOutput('没有可用计时器。');\n  await runInDebugMode(async () => {\n    await prefetchFinishSceneData(t.id);\n    openFinishScene(t, settings.bellSource === 'netease' && !!sanitizeNumericInput(settings.neteaseSongId));\n  });\n  setDebugOutput(`已使用预加载数据展示结束动画：${t.name}`);\n}\n\nasync function debugTestHitokotoAndTranslation() {\n  const t = getDebugTargetTimer();\n  if (!t) return setDebugOutput('没有可用计时器。');\n  setDebugOutput('正在请求一言并测试英文翻译...');\n  const fallback = fallbackFinishLines(t.name);\n  try {\n    const hitResp = await fetch(HITOKOTO_API_URL);\n    if (!hitResp.ok) throw new Error(`hitokoto request failed: ${hitResp.status}`);\n    const hitData = await hitResp.json();\n    const zh = String(hitData?.hitokoto || fallback.zhHans).trim().slice(0, 72) || fallback.zhHans;\n    const en = await translateWithDeepSeekIfAvailable(zh, 'en');\n    t.finishSceneData = {\n      zhHans: zh,\n      en: en || '',\n      source: String(hitData?.from || ''),\n      sourceWho: String(hitData?.from_who || ''),\n      loadedAt: Date.now(),\n    };\n    persist();\n    setDebugOutput(`一言与翻译测试成功：\\n简体：${t.finishSceneData.zhHans}\\nEnglish：${t.finishSceneData.en}`);\n  } catch (err) {\n    setDebugOutput(`测试失败：${err?.message || '未知错误'}`);\n  }\n}\n\nfunction debugTestNeteasePlayback() {\n  const t = getDebugTargetTimer();\n  if (!t) return setDebugOutput('没有可用计时器。');\n  if (!sanitizeNumericInput(settings.neteaseSongId)) {\n    return setDebugOutput('请先在设置中保存网易云歌曲 ID。');\n  }\n  settings.bellSource = 'netease';\n  if (!t.finishSceneData) {\n    t.finishSceneData = { ...fallbackFinishLines(t.name), loadedAt: Date.now() };\n  }\n  openFinishScene(t, true);\n  setDebugOutput(`已触发网易云播放测试：${settings.neteaseSongId}`);\n}\n\nfunction debugInjectFakeSceneData() {\n  const t = getDebugTargetTimer();\n  if (!t) return setDebugOutput('没有可用计时器。');\n  const hitokoto = (document.getElementById('debugFakeHitokoto')?.value || '').trim() || `${t.name} 调试文本`;\n  const source = (document.getElementById('debugFakeFrom')?.value || '').trim() || 'Debug Source';\n  const sourceWho = (document.getElementById('debugFakeWho')?.value || '').trim() || 'Debug User';\n  t.finishSceneData = {\n    zhHans: hitokoto,\n    en: `Debug: ${hitokoto}`,\n    source,\n    sourceWho,\n    loadedAt: Date.now(),\n  };\n  openFinishScene(t, false);\n  persist();\n  setDebugOutput(`已注入并展示假数据：${t.name}`);\n}\n\nfunction bindNeteaseSafetyHandlers() {\n  const isNeteaseCrossOriginError = (msg) => {\n    const text = String(msg || '');\n    return text.includes('Blocked a frame with origin') && text.includes('music.163.com');\n  };\n  window.addEventListener('error', (event) => {\n    if (isNeteaseCrossOriginError(event?.message)) {\n      event.preventDefault();\n    }\n  });\n  window.addEventListener('unhandledrejection', (event) => {\n    const reason = event?.reason;\n    if (isNeteaseCrossOriginError(reason?.message || reason)) {\n      event.preventDefault();\n    }\n  });\n}\n\n// ============================================================\n// INIT\n// ============================================================\nasync function init() {\n  if (isInitialized) return;\n  isInitialized = true;\n  bindGlobalListeners();\n  bindNeteaseSafetyHandlers();\n  loadPersisted();\n  applyI18n();\n  renderSettingsUI();\n  renderQuickStart();\n  renderAll();\n\n  // Restore exam date in settings\n  const ed = localStorage.getItem('igcse_exam_date') || '';\n  const si = document.getElementById('sExamDate');\n  if (si) si.value = ed;\n\n  // Restore layout switches (timers are paused on load)\n  timers.forEach(t => {\n    t.paused = true;\n    t.running = false;\n  });\n  updateArenaLayout();\n\n  // Render stats immediately\n  renderStats();\n  renderHistory();\n  renderHeatmap();\n  await restoreCustomAudioFromStorage();\n  const neteaseInput = document.getElementById('neteaseSongId');\n  if (neteaseInput) neteaseInput.value = settings.neteaseSongId || '';\n  const langInput = document.getElementById('sLanguage');\n  if (langInput) langInput.value = getLanguage();\n  const versionEl = document.getElementById('settingsVersion');\n  if (versionEl) versionEl.textContent = `Version: ${APP_VERSION}`;\n  const interruptSelect = document.getElementById('interruptReason');\n  if (interruptSelect) interruptSelect.onchange = updateInterruptCustomInputVisibility;\n  updateInterruptCustomInputVisibility();\n  refreshDebugTimerSelect();\n  if (!localStorage.getItem('is_first_run')) {\n    setTimeout(startOnboarding, 450);\n  }\n\n  console.log(`🎓 IGCSE Timer loaded. Timers restored: ${timers.length}`);\n}\n\ndocument.addEventListener('DOMContentLoaded', init);\nwindow.addEventListener('beforeunload', persist);\n<\/script>\n</body>\n</html>\n";

    function buildUISwitchScript(currentVersion) {
      const targetVersion = currentVersion === 'new' ? 'old' : 'new';
      const labelText = currentVersion === 'new' ? '旧版' : '新版';
      const titleText = currentVersion === 'new' ? '切换到旧版' : '切换到新版';
      return `<script>(function(){const KEY='igcse_ui_version';const target='${targetVersion}';function mount(){const actions=document.querySelector('.app-bar-actions');if(!actions)return;let btn=document.getElementById('versionSwitchBtn');if(!btn){btn=document.createElement('button');btn.type='button';btn.id='versionSwitchBtn';btn.className='icon-btn';btn.innerHTML='<span class="material-icons-round">swap_horiz</span><span class="icon-btn-label" id="versionSwitchLabel"></span>';const settingsBtn=document.getElementById('settingsBtn');if(settingsBtn&&settingsBtn.parentElement===actions){actions.insertBefore(btn,settingsBtn);}else{actions.appendChild(btn);}}const label=btn.querySelector('#versionSwitchLabel')||btn.querySelector('.icon-btn-label');if(label)label.textContent='${labelText}';btn.title='${titleText}';btn.onclick=function(e){e.preventDefault();e.stopPropagation();localStorage.setItem(KEY,target);location.reload();};}if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',mount);}else{mount();}})();<\/script>`;
    }


    function renderVersion(version) {
      const baseHtml = version === 'new' ? NEW_HTML : OLD_HTML;
      const switchScript = buildUISwitchScript(version);
      const renderedHtml = /<\/body>/i.test(baseHtml)
        ? baseHtml.replace(/<\/body>/i, switchScript + '\n</body>')
        : baseHtml + switchScript;
      document.open();
      document.write(renderedHtml);
      document.close();
    }

    const version = localStorage.getItem('igcse_ui_version') === 'new' ? 'new' : 'old';
    renderVersion(version);
  </script>
</body>
