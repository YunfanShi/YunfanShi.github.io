    const OLD_HTML = "\n\n<!DOCTYPE html>\n<html lang=\"zh-CN\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>IGCSE Timer · Jack's Ecosystem</title>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin>\n<link href=\"https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Display:wght@400;700&family=Roboto:wght@300;400;500;700&family=Roboto+Mono:wght@400;500;700&display=swap\" rel=\"stylesheet\">\n<link href=\"https://fonts.googleapis.com/icon?family=Material+Icons+Round\" rel=\"stylesheet\">\n<style>\n/* ============================================================\n   DESIGN TOKENS — Material Design 3 Light Theme\n   ============================================================ */\n:root {\n  --md-primary: #1a73e8;\n  --md-primary-container: #d3e3fd;\n  --md-on-primary: #ffffff;\n  --md-on-primary-container: #041e49;\n  --md-secondary: #4285f4;\n  --md-surface: #ffffff;\n  --md-surface-variant: #f0f4ff;\n  --md-surface-dim: #f8f9fa;\n  --md-surface-container: #f1f3f4;\n  --md-surface-container-high: #e8eaed;\n  --md-on-surface: #202124;\n  --md-on-surface-variant: #5f6368;\n  --md-outline: #dadce0;\n  --md-outline-variant: #e8eaed;\n  --md-error: #b3261e;\n  --md-error-container: #f9dedc;\n\n  /* Google Brand */\n  --g-blue: #1a73e8;\n  --g-red: #ea4335;\n  --g-yellow: #fbbc04;\n  --g-green: #34a853;\n\n  /* Subject colours */\n  --math-color: #1a73e8;\n  --math-bg: #e8f0fe;\n  --bio-color: #34a853;\n  --bio-bg: #e6f4ea;\n  --chem-color: #fa7b17;\n  --chem-bg: #fce8b2;\n  --phys-color: #9c27b0;\n  --phys-bg: #f3e5f5;\n  --eng-color: #ea4335;\n  --eng-bg: #fce8e6;\n  --custom-color: #5f6368;\n  --custom-bg: #f1f3f4;\n\n  /* Elevation */\n  --elev-1: 0 1px 2px rgba(60,64,67,.3), 0 1px 3px 1px rgba(60,64,67,.15);\n  --elev-2: 0 1px 2px rgba(60,64,67,.3), 0 2px 6px 2px rgba(60,64,67,.15);\n  --elev-3: 0 1px 3px rgba(60,64,67,.3), 0 4px 8px 3px rgba(60,64,67,.15);\n  --elev-4: 0 2px 3px rgba(60,64,67,.3), 0 6px 10px 4px rgba(60,64,67,.15);\n  --elev-5: 0 4px 4px rgba(60,64,67,.3), 0 8px 12px 6px rgba(60,64,67,.15);\n\n  /* Radius */\n  --r-xs: 4px;\n  --r-sm: 8px;\n  --r-md: 12px;\n  --r-lg: 16px;\n  --r-xl: 24px;\n  --r-full: 9999px;\n\n  /* Motion */\n  --ease-standard: cubic-bezier(0.2, 0, 0, 1);\n  --ease-decel: cubic-bezier(0, 0, 0, 1);\n  --ease-accel: cubic-bezier(0.3, 0, 1, 1);\n  --ease-spring: cubic-bezier(0.22, 1, 0.36, 1);\n  --dur-short: 140ms;\n  --dur-med: 260ms;\n  --dur-long: 420ms;\n  --dur-extra: 620ms;\n}\n\n/* ============================================================\n   BASE RESET\n   ============================================================ */\n*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\nhtml { height: 100%; scroll-behavior: smooth; }\n\nbody {\n  font-family: 'Roboto', sans-serif;\n  background: var(--md-surface-dim);\n  color: var(--md-on-surface);\n  min-height: 100vh;\n  overflow-x: hidden;\n  -webkit-font-smoothing: antialiased;\n}\n\n/* Google top bar */\n.google-bar {\n  position: fixed; top: 0; left: 0; right: 0; height: 4px; z-index: 1000;\n  background: linear-gradient(90deg,\n    var(--g-blue) 0 25%, var(--g-red) 25% 50%,\n    var(--g-yellow) 50% 75%, var(--g-green) 75% 100%);\n}\n\n/* ============================================================\n   APP SHELL\n   ============================================================ */\n.app-shell {\n  display: flex;\n  flex-direction: column;\n  min-height: 100vh;\n  padding-top: 4px; /* google bar */\n}\n\n/* ============================================================\n   TOP APP BAR — Material 3\n   ============================================================ */\n.top-app-bar {\n  position: sticky; top: 4px; z-index: 100;\n  height: 64px;\n  background: var(--md-surface);\n  box-shadow: var(--elev-1);\n  display: flex;\n  align-items: center;\n  padding: 0 16px;\n  gap: 8px;\n  transition: box-shadow var(--dur-med) var(--ease-standard);\n}\n.top-app-bar.elevated { box-shadow: var(--elev-2); }\n\n.tab-back-btn {\n  width: 40px; height: 40px;\n  border-radius: var(--r-full);\n  border: none; background: transparent;\n  display: flex; align-items: center; justify-content: center;\n  color: var(--md-on-surface-variant);\n  cursor: pointer;\n  transition: background var(--dur-short) var(--ease-standard);\n  text-decoration: none;\n  flex-shrink: 0;\n}\n.tab-back-btn:hover { background: rgba(60,64,67,.08); }\n.tab-back-btn:active { background: rgba(60,64,67,.12); }\n\n.app-bar-title {\n  display: flex; align-items: center; gap: 12px; flex: 1;\n}\n.app-bar-logo {\n  font-family: 'Google Sans', sans-serif;\n  font-size: 20px; font-weight: 700;\n  letter-spacing: -0.3px;\n}\n.app-bar-logo .blue { color: var(--g-blue); }\n.app-bar-logo .red  { color: var(--g-red); }\n.app-bar-logo .yel  { color: var(--g-yellow); }\n.app-bar-logo .grn  { color: var(--g-green); }\n\n.app-bar-subtitle {\n  font-size: 13px; color: var(--md-on-surface-variant);\n  font-weight: 400;\n}\n\n.app-bar-actions {\n  display: flex; align-items: center; gap: 4px;\n}\n\n.icon-btn {\n  width: 40px; height: 40px;\n  border-radius: var(--r-full);\n  border: none; background: transparent;\n  display: flex; align-items: center; justify-content: center;\n  color: var(--md-on-surface-variant);\n  cursor: pointer;\n  position: relative;\n  transition: background var(--dur-short) var(--ease-standard),\n              color var(--dur-short) var(--ease-standard);\n  font-family: inherit;\n}\n.icon-btn:hover { background: rgba(60,64,67,.08); }\n.icon-btn:active { background: rgba(60,64,67,.12); }\n.icon-btn .material-icons-round { font-size: 24px; }\n.icon-btn-label {\n  font-size: 10px; font-weight: 500;\n  position: absolute; bottom: -2px; left: 50%; transform: translateX(-50%);\n  white-space: nowrap; color: var(--md-on-surface-variant); letter-spacing: .3px;\n  opacity: 0; transition: opacity var(--dur-short) var(--ease-standard);\n}\n.icon-btn:hover .icon-btn-label { opacity: 1; }\n\n/* ============================================================\n   CONTENT AREA\n   ============================================================ */\n.content {\n  flex: 1;\n  padding: 20px 16px 100px;\n  max-width: 1400px;\n  margin: 0 auto;\n  width: 100%;\n}\n\n/* ============================================================\n   FLOATING ACTION BUTTON\n   ============================================================ */\n.fab-container {\n  position: fixed; bottom: 28px; right: 28px; z-index: 200;\n  display: flex; flex-direction: column; align-items: flex-end; gap: 12px;\n}\n.fab {\n  display: flex; align-items: center; gap: 12px;\n  padding: 0 20px 0 16px;\n  height: 56px;\n  border-radius: var(--r-xl);\n  border: none;\n  background: var(--md-primary);\n  color: var(--md-on-primary);\n  font-family: 'Google Sans', sans-serif;\n  font-size: 14px; font-weight: 500;\n  cursor: pointer;\n  box-shadow: var(--elev-3);\n  transition: box-shadow var(--dur-med) var(--ease-standard),\n              transform var(--dur-long) var(--ease-spring),\n              background var(--dur-med) var(--ease-standard);\n  white-space: nowrap;\n}\n.fab:hover {\n  box-shadow: var(--elev-4);\n  background: #1557b0;\n}\n.fab:active { transform: scale(0.96); box-shadow: var(--elev-1); }\n.fab .material-icons-round { font-size: 24px; }\n\n.mini-fab {\n  width: 40px; height: 40px;\n  border-radius: var(--r-full);\n  border: 1px solid var(--md-outline);\n  background: var(--md-surface);\n  color: var(--md-on-surface-variant);\n  display: flex; align-items: center; justify-content: center;\n  cursor: pointer;\n  box-shadow: var(--elev-1);\n  transition: box-shadow var(--dur-med) var(--ease-standard),\n              transform var(--dur-long) var(--ease-spring);\n  font-size: 12px; font-weight: 500;\n  font-family: 'Google Sans', sans-serif;\n}\n.mini-fab:hover { box-shadow: var(--elev-2); background: var(--md-surface-variant); }\n.mini-fab:active { transform: scale(0.93); }\n.mini-fab .material-icons-round { font-size: 18px; }\n\n/* ============================================================\n   TIMER GRID — responsive, animated\n   ============================================================ */\n#timer-arena {\n  display: grid;\n  grid-template-columns: 1fr;\n  gap: 16px;\n  transition: grid-template-columns var(--dur-long) var(--ease-standard);\n}\n#timer-arena.split-2 { grid-template-columns: 1fr 1fr; }\n#timer-arena.split-3 { grid-template-columns: 1fr 1fr 1fr; }\n.timer-page-controls {\n  margin-top: 12px;\n  display: flex;\n  align-items: center;\n  gap: 8px;\n  flex-wrap: wrap;\n}\n.timer-page-controls .mini-fab.active {\n  background: var(--md-primary);\n  color: var(--md-on-primary);\n  border-color: transparent;\n}\n\n/* ============================================================\n   TIMER CARD — Material 3 elevated card\n   ============================================================ */\n.timer-card {\n  background: var(--md-surface);\n  border-radius: var(--r-xl);\n  box-shadow: var(--elev-1);\n  overflow: hidden;\n  display: flex;\n  flex-direction: column;\n  position: relative;\n  transition: box-shadow var(--dur-med) var(--ease-standard),\n              transform var(--dur-long) var(--ease-spring),\n              filter var(--dur-med) var(--ease-standard);\n  animation: cardEnter var(--dur-extra) var(--ease-spring) both;\n}\n.timer-card:hover { box-shadow: var(--elev-2); transform: translateY(-2px); }\n.timer-card.active-focus { box-shadow: var(--elev-3); }\n\n@keyframes cardEnter {\n  from { opacity: 0; transform: scale(0.92) translateY(20px); }\n  to   { opacity: 1; transform: scale(1) translateY(0); }\n}\n@keyframes cardExit {\n  from { opacity: 1; transform: scale(1); }\n  to   { opacity: 0; transform: scale(0.88) translateY(10px); }\n}\n.timer-card.exiting { animation: cardExit var(--dur-long) var(--ease-accel) forwards; }\n\n/* Subject colour strip */\n.card-strip {\n  height: 6px;\n  background: linear-gradient(90deg,\n    var(--g-blue) 0 25%, var(--g-red) 25% 50%,\n    var(--g-yellow) 50% 75%, var(--g-green) 75%);\n  transition: background var(--dur-extra) var(--ease-standard);\n}\n\n/* Card header */\n.card-header {\n  padding: 16px 20px 12px;\n  display: flex;\n  align-items: flex-start;\n  justify-content: space-between;\n  gap: 8px;\n}\n.card-header-left {\n  display: flex; align-items: center; gap: 10px; min-width: 0;\n}\n.subj-icon {\n  width: 40px; height: 40px;\n  border-radius: var(--r-md);\n  display: flex; align-items: center; justify-content: center;\n  flex-shrink: 0;\n  font-size: 20px;\n  transition: background var(--dur-med) var(--ease-standard);\n}\n.subj-info { min-width: 0; }\n.subj-name {\n  font-family: 'Google Sans', sans-serif;\n  font-size: 16px; font-weight: 500;\n  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\n  transition: color var(--dur-med) var(--ease-standard);\n}\n.subj-name[contenteditable=\"true\"] {\n  outline: none;\n  border-bottom: 1px dashed transparent;\n}\n.subj-name[contenteditable=\"true\"]:focus { border-bottom-color: currentColor; }\n.subj-paper { font-size: 12px; color: var(--md-on-surface-variant); margin-top: 1px; }\n.editable-dur { cursor: pointer; border-bottom: 1px dashed transparent; }\n.editable-dur:hover { border-bottom-color: var(--md-outline); }\n.card-header-actions { display: flex; gap: 2px; flex-shrink: 0; }\n\n/* Ring + time display */\n.card-body {\n  padding: 0 20px 16px;\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  gap: 12px;\n}\n\n.ring-container {\n  position: relative;\n  width: 200px; height: 200px;\n  display: flex; align-items: center; justify-content: center;\n  cursor: pointer;\n  transition: transform var(--dur-long) var(--ease-spring);\n}\n.ring-container:hover { transform: scale(1.01); }\n.ring-container:active { transform: scale(0.98); }\n\n.ring-svg {\n  position: absolute; inset: 0;\n  transform: rotate(-90deg);\n  width: 100%; height: 100%;\n}\n\n.ring-track {\n  fill: none;\n  stroke: var(--md-surface-container);\n  stroke-width: 10;\n  stroke-linecap: round;\n}\n.ring-progress {\n  fill: none;\n  stroke-width: 10;\n  stroke-linecap: round;\n  stroke-dasharray: 534.07; /* 2π×85 */\n  stroke-dashoffset: 0;\n  transition: stroke-dashoffset 920ms linear,\n              stroke var(--dur-long) var(--ease-standard);\n}\n.ring-warn {\n  fill: none;\n  stroke-width: 10;\n  stroke-linecap: round;\n  stroke-dasharray: 534.07;\n  stroke-dashoffset: 534.07;\n  opacity: 0;\n  transition: opacity var(--dur-med) var(--ease-standard);\n}\n.ring-warn.active {\n  opacity: 0.25;\n  animation: ringPulse 1.2s ease-in-out infinite;\n}\n@keyframes ringPulse { 0%,100%{opacity:0.15} 50%{opacity:0.4} }\n\n.ring-inner {\n  position: relative; z-index: 1;\n  display: flex; flex-direction: column;\n  align-items: center; justify-content: center;\n  gap: 2px;\n  pointer-events: none;\n}\n.time-display {\n  font-family: 'Roboto Mono', monospace;\n  font-size: clamp(24px, 3.6vw, 40px);\n  font-weight: 400;\n  letter-spacing: -1px;\n  line-height: 1;\n  transition: color var(--dur-med) var(--ease-standard),\n              transform var(--dur-short) var(--ease-spring);\n}\n.time-display.tick { animation: timeTick var(--dur-short) var(--ease-spring); }\n@keyframes timeTick {\n  0%  { transform: scale(1.025); }\n  100%{ transform: scale(1); }\n}\n.time-pct {\n  font-size: 12px; font-weight: 500;\n  color: var(--md-on-surface-variant);\n  letter-spacing: .3px;\n  font-family: 'Google Sans', sans-serif;\n}\n.time-status-badge {\n  display: flex; align-items: center; gap: 4px;\n  padding: 3px 10px;\n  border-radius: var(--r-full);\n  font-size: 11px; font-weight: 500;\n  letter-spacing: .4px;\n  font-family: 'Google Sans', sans-serif;\n  margin-top: 2px;\n  transition: background var(--dur-med) var(--ease-standard),\n              color var(--dur-med) var(--ease-standard);\n}\n.status-dot {\n  width: 6px; height: 6px;\n  border-radius: var(--r-full);\n  transition: background var(--dur-med) var(--ease-standard);\n}\n\n/* Controls row */\n.controls-row {\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  gap: 8px;\n  width: 100%;\n  padding: 0 4px;\n}\n\n.ctrl-btn {\n  border-radius: var(--r-full);\n  border: none;\n  cursor: pointer;\n  display: flex; align-items: center; justify-content: center;\n  font-family: 'Google Sans', sans-serif;\n  font-weight: 500;\n  transition: transform var(--dur-long) var(--ease-spring),\n              box-shadow var(--dur-med) var(--ease-standard),\n              background var(--dur-med) var(--ease-standard);\n}\n.ctrl-btn:active { transform: scale(0.93) !important; }\n\n.ctrl-play {\n  width: 64px; height: 64px;\n  background: var(--md-primary);\n  color: var(--md-on-primary);\n  box-shadow: var(--elev-3);\n  font-size: 28px;\n}\n.ctrl-play:hover { box-shadow: var(--elev-4); background: #1557b0; }\n.ctrl-play.running { background: var(--g-yellow); color: #202124; }\n.ctrl-play.running:hover { background: #f29900; }\n.ctrl-play.done { background: var(--g-green); color: #fff; }\n.ctrl-play .material-icons-round { font-size: 28px; transition: transform var(--dur-long) var(--ease-spring); }\n\n.ctrl-sm {\n  width: 48px; height: 48px;\n  background: var(--md-surface-container);\n  color: var(--md-on-surface-variant);\n  font-size: 20px;\n}\n.ctrl-sm:hover { background: var(--md-surface-container-high); }\n.ctrl-sm .material-icons-round { font-size: 20px; }\n\n.ctrl-text {\n  padding: 0 16px;\n  height: 40px;\n  background: var(--md-surface-container);\n  color: var(--md-on-surface-variant);\n  font-size: 12px; font-weight: 500;\n  border-radius: var(--r-full);\n  border: none;\n  cursor: pointer;\n  transition: background var(--dur-med) var(--ease-standard);\n  font-family: 'Google Sans', sans-serif;\n}\n.ctrl-text:hover { background: var(--md-surface-container-high); color: var(--md-on-surface); }\n\n/* Quick presets */\n.presets-section {\n  width: 100%;\n  padding: 0 20px 20px;\n}\n.presets-label {\n  font-size: 11px; font-weight: 500;\n  color: var(--md-on-surface-variant);\n  text-transform: uppercase;\n  letter-spacing: .6px;\n  margin-bottom: 8px;\n  font-family: 'Google Sans', sans-serif;\n}\n.presets-chips {\n  display: flex; flex-wrap: wrap; gap: 6px;\n}\n.preset-chip {\n  padding: 6px 14px;\n  border-radius: var(--r-full);\n  border: 1px solid var(--md-outline);\n  background: var(--md-surface);\n  color: var(--md-on-surface-variant);\n  font-size: 12px; font-weight: 500;\n  cursor: pointer;\n  font-family: 'Google Sans', sans-serif;\n  transition: background var(--dur-med) var(--ease-spring),\n              color var(--dur-med) var(--ease-spring),\n              border-color var(--dur-med) var(--ease-spring),\n              transform var(--dur-long) var(--ease-spring);\n  white-space: nowrap;\n}\n.preset-chip:hover {\n  background: var(--md-primary-container);\n  color: var(--md-on-primary-container);\n  border-color: transparent;\n  transform: translateY(-1px);\n}\n.preset-chip:active { transform: scale(0.94); }\n.preset-chip.active {\n  background: var(--md-primary);\n  color: var(--md-on-primary);\n  border-color: transparent;\n}\n\n/* Notes area */\n.card-notes {\n  padding: 0 20px 16px;\n  width: 100%;\n}\n.notes-input {\n  width: 100%;\n  padding: 8px 12px;\n  border-radius: var(--r-md);\n  border: 1px solid var(--md-outline-variant);\n  background: var(--md-surface-variant);\n  color: var(--md-on-surface);\n  font-size: 13px;\n  font-family: 'Roboto', sans-serif;\n  resize: none;\n  outline: none;\n  transition: border-color var(--dur-med) var(--ease-standard);\n  line-height: 1.5;\n}\n.notes-input:focus { border-color: var(--md-primary); }\n.notes-input::placeholder { color: var(--md-on-surface-variant); }\n\n/* Save indicator */\n.save-indicator {\n  position: absolute;\n  t mp(16px, 2.8vw, 26px);\n  font-weight: 500;\n  line-height: 1.35;\n  color: rgba(241,245,249,.86);\n  min-height: 1.5em;\n}\n.finish-meta {\n  margin-top: 12px;\n  font-size: 13px;\n  letter-spacing: .04em;\n  opacity: .76;\n}\n.finish-music {\n  display: none !important;\n}\n.finish-music iframe {\n  width: 0;\n  height: 0;\n  opacity: 0;\n  pointer-events: none;\n  border: 0;\n}\n@keyframes finishPulse {\n  0%,100% { transform: translateZ(0) scale(0.985); opacity: .9; }\n  50% { transform: translateZ(0) scale(1.02); opacity: 1; }\n}\n@keyframes finishDrift {\n  0% { transform: translate3d(-2%, -3%, 0) scale(0.92); }\n  100% { transform: translate3d(6%, 8%, 0) scale(1.1); }\n}\n\n#oblay {\n  position: fixed; inset: 0; z-index: 1200;\n  background: rgba(15,23,42,0.72);\n  display: none;\n}\n#oblay.show { display: block; }\n.ob-focus {\n  position: absolute;\n  border: 2px solid #fff;\n  border-radius: 12px;\n  box-shadow: 0 0 0 9999px rgba(15,23,42,0.72);\n  pointer-events: none;\n}\n.ob-bub {\n  position: absolute;\n  width: min(420px, calc(100vw - 32px));\n  background: #fff;\n  border-radius: 16px;\n  padding: 16px;\n  box-shadow: var(--elev-4);\n}\n.ob-title { font-family: 'Google Sans', sans-serif; font-size: 18px; margin-bottom: 6px; }\n.ob-desc { font-size: 14px; color: var(--md-on-surface-variant); line-height: 1.55; }\n.ob-actions { margin-top: 12px; display: flex; justify-content: flex-end; gap: 8px; }\n\n/* ============================================================\n   DYNAMIC ISLAND / MINI PILL\n   ============================================================ */\n#mini-pill {\n  position: fixed;\n  top: 16px; left: 50%; transform: translateX(-50%);\n  z-index: 1100;\n  display: none;\n  align-items: center;\n  gap: 10px;\n  padding: 8px 20px;\n  background: var(--md-on-surface);\n  color: var(--md-surface);\n  border-radius: var(--r-full);\n  box-shadow: var(--elev-4);\n  cursor: pointer;\n  font-family: 'Google Sans', sans-serif;\n  font-size: 14px; font-weight: 500;\n  white-space: nowrap;\n  transition: transform var(--dur-long) var(--ease-spring),\n              padding var(--dur-long) var(--ease-spring);\n  animation: pillEnter var(--dur-extra) var(--ease-spring);\n}\n@keyframes pillEnter {\n  from { transform: translateX(-50%) translateY(-60px) scale(0.8); opacity: 0; }\n  to   { transform: translateX(-50%) translateY(0) scale(1); opacity: 1; }\n}\n#mini-pill:hover { transform: translateX(-50%) scale(1.04); }\n#mini-pill .material-icons-round { font-size: 16px; }\n#mini-pill-time {\n  font-family: 'Roboto Mono', monospace;\n  font-weight: 500;\n}\n\n/* ============================================================\n   SNACKBAR / TOAST\n   ============================================================ */\n#snackbar {\n  position: fixed;\n  bottom: 100px; left: 50%; transform: translateX(-50%) translateY(60px);\n  z-index: 400;\n  background: #323232;\n  color: #fff;\n  padding: 12px 20px;\n  border-radius: var(--r-sm);\n  font-size: 14px;\n  font-family: 'Roboto', sans-serif;\n  box-shadow: var(--elev-3);\n  display: flex; align-items: center; gap: 16px;\n  opacity: 0;\n  transition: transform var(--dur-long) var(--ease-spring),\n              opacity var(--dur-med) var(--ease-standard);\n  white-space: nowrap;\n}\n#snackbar.show {\n  transform: translateX(-50%) translateY(0);\n  opacity: 1;\n}\n#snackbar-action {\n  color: var(--g-yellow);\n  font-weight: 500;\n  cursor: pointer;\n  background: none;\n  border: none;\n  font-size: 14px;\n  font-family: inherit;\n  padding: 0;\n}\n#bell-stop-toast {\n  position: fixed;\n  top: 14px;\n  right: 14px;\n  z-index: 1800;\n  background: rgba(17,24,39,.95);\n  color: #fff;\n  border: 1px solid rgba(255,255,255,.14);\n  border-radius: 12px;\n  box-shadow: var(--elev-3);\n  padding: 8px 10px;\n  font-size: 12px;\n  display: none;\n  align-items: center;\n  gap: 8px;\n  backdrop-filter: blur(10px);\n}\n#bell-stop-toast.show { display: inline-flex; }\n#bell-stop-toast button {\n  border: none;\n  background: rgba(255,255,255,.14);\n  color: #fff;\n  border-radius: 999px;\n  font-size: 12px;\n  padding: 4px 10px;\n  cursor: pointer;\n}\n\n/* ============================================================\n   RESPONSIVE TWEAKS\n   ============================================================ */\n@media (max-width: 768px) {\n  #timer-arena.split-2 { grid-template-columns: 1fr; }\n  #timer-arena.split-3 { grid-template-columns: 1fr; }\n  .stats-strip { gap: 8px; }\n  .stat-card { min-width: 100px; }\n  .igcse-chip { padding: 8px 12px; }\n  .content { padding: 16px 12px 100px; }\n}\n\n#timer-arena.split-2 .ring-container { width: 184px; height: 184px; }\n#timer-arena.split-3 .ring-container { width: 164px; height: 164px; }\n#timer-arena.split-2 .time-display { font-size: clamp(22px, 2.8vw, 34px); }\n#timer-arena.split-3 .time-display { font-size: clamp(20px, 2.2vw, 30px); }\n@media (max-width: 480px) {\n  .app-bar-subtitle { display: none; }\n  .top-app-bar { padding: 0 8px; }\n}\n\n/* ============================================================\n   SETTINGS PANEL\n   ============================================================ */\n.settings-row {\n  display: flex; align-items: center; justify-content: space-between;\n  gap: 12px;\n}\n.settings-row-label { font-size: 14px; color: var(--md-on-surface); }\n.settings-row-sub { font-size: 12px; color: var(--md-on-surface-variant); margin-top: 2px; }\n\n.toggle {\n  width: 52px; height: 32px;\n  border-radius: var(--r-full);\n  background: var(--md-outline);\n  position: relative;\n  cursor: pointer;\n  transition: background var(--dur-med) var(--ease-standard);\n  flex-shrink: 0;\n  border: none;\n  padding: 0;\n}\n.toggle.on { background: var(--md-primary); }\n.toggle::after {\n  content: '';\n  position: absolute;\n  top: 4px; left: 4px;\n  width: 24px; height: 24px;\n  border-radius: var(--r-full);\n  background: white;\n  box-shadow: var(--elev-1);\n  transition: transform var(--dur-med) var(--ease-spring);\n}\n.toggle.on::after { transform: translateX(20px); }\n\n/* Divider */\n.divider { height: 1px; background: var(--md-outline-variant); margin: 4px 0; }\n\n/* Right side panel (history + stats) */\n.sidebar-panel {\n  background: var(--md-surface);\n  border-radius: var(--r-xl);\n  box-shadow: var(--elev-1);\n  padding: 20px;\n}\n\n.main-grid {\n  display: grid;\n  grid-template-columns: 1fr 340px;\n  gap: 20px;\n  align-items: start;\n}\n@media (max-width: 1024px) {\n  .main-grid { grid-template-columns: 1fr; }\n}\n</style>\n</head>\n<body>\n\n<div class=\"google-bar\"></div>\n\n<div class=\"app-shell\">\n  <!-- TOP APP BAR -->\n  <header class=\"top-app-bar\" id=\"topAppBar\">\n    <a href=\"index.html\" class=\"tab-back-btn\" title=\"返回主页\">\n      <span class=\"material-icons-round\">home</span>\n    </a>\n    <div class=\"app-bar-title\">\n      <div class=\"app-bar-logo\">\n        <span class=\"blue\">I</span><span class=\"red\">G</span><span class=\"yel\">C</span><span class=\"grn\">S</span><span class=\"blue\">E</span>\n        &nbsp;Timer\n      </div>\n      <span class=\"app-bar-subtitle\" id=\"appBarSub\">Jack's Ecosystem · 考试计时器</span>\n    </div>\n    <div class=\"app-bar-actions\">\n      <button class=\"icon-btn\" onclick=\"toggleMinipill()\" id=\"minipillBtn\" title=\"迷你悬浮\">\n        <span class=\"material-icons-round\">picture_in_picture</span>\n      </button>\n      <button class=\"icon-btn\" onclick=\"openSettings()\" id=\"settingsBtn\" title=\"设置\">\n        <span class=\"material-icons-round\">settings</span>\n      </button>\n    </div>\n  </header>\n\n  <div class=\"content\">\n    <div class=\"main-grid\">\n      <!-- LEFT: timers + quick-start -->\n      <div>\n        <!-- IGCSE Quick-start -->\n        <div class=\"section-label\" id=\"quickStartLabel\">IGCSE 快捷启动</div>\n        <div class=\"igcse-quickstart\" id=\"igcseQuickstart\"></div>\n\n        <!-- Timer arena -->\n        <div class=\"section-label\" id=\"timersLabel\" style=\"display:none;\">运行中 / 已暂停</div>\n        <div id=\"timer-arena\"></div>\n        <div class=\"timer-page-controls\" id=\"timerPageControls\" style=\"display:none;\"></div>\n\n        <!-- Empty state -->\n        <div class=\"empty-state\" id=\"emptyState\">\n          <div class=\"empty-icon-wrap\">\n            <span class=\"material-icons-round\">timer</span>\n          </div>\n          <div class=\"empty-title\" id=\"emptyTitle\">开始你的备考计时</div>\n          <div class=\"empty-desc\" id=\"emptyDesc\">点击上方快捷启动卡片，或者点击右下角的按钮来创建自定义计时器。支持多开、全屏、历史记录恢复。</div>\n          <div class=\"empty-actions\">\n            <button class=\"btn-filled\" onclick=\"openCreateModal()\" id=\"emptyCreateBtn\">\n              <span class=\"material-icons-round\">add</span><span id=\"emptyCreateBtnText\">新建计时器</span>\n            </button>\n            <button class=\"btn-tonal\" onclick=\"openHistoryModal()\" id=\"emptyHistoryBtn\">\n              <span class=\"material-icons-round\">history</span><span id=\"emptyHistoryBtnText\">历史记录</span>\n            </button>\n          </div>\n        </div>\n      </div>\n\n      <!-- RIGHT: stats + history -->\n      <div>\n        <!-- Stats strip -->\n        <div class=\"sidebar-panel\" style=\"margin-bottom:16px;\">\n          <div class=\"section-label\" style=\"padding-bottom:16px;\">今日统计</div>\n          <div class=\"stats-strip\" id=\"statsStrip\">\n            <div class=\"stat-card\">\n              <div class=\"stat-label\">专注时长</div>\n              <div class=\"stat-value\" id=\"statFocusTime\">0<span class=\"stat-unit\">min</span></div>\n            </div>\n            <div class=\"stat-card\">\n              <div class=\"stat-label\">已完成</div>\n              <div class=\"stat-value\" id=\"statCompleted\">0<span class=\"stat-unit\">次</span></div>\n            </div>\n            <div class=\"stat-card\">\n              <div class=\"stat-label\">暂停次数</div>\n              <div class=\"stat-value\" id=\"statPauses\">0<span class=\"stat-unit\">次</span></div>\n            </div>\n          </div>\n\n          <!-- 7-day heatmap -->\n          <div style=\"margin-top:8px;\">\n            <div class=\"section-label\" style=\"padding:0 0 10px;\">近7天活跃度</div>\n            <div class=\"heatmap-days\" id=\"heatmapDays\"></div>\n            <div class=\"heatmap-grid\" id=\"heatmapGrid\"></div>\n          </div>\n        </div>\n\n        <!-- Recent history -->\n        <div class=\"sidebar-panel\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;\">\n            <div class=\"section-label\" style=\"padding:0;\">最近记录</div>\n            <button class=\"btn-text\" style=\"padding:4px 10px;font-size:12px;\" onclick=\"openHistoryModal()\">查看全部</button>\n          </div>\n          <div class=\"history-list\" id=\"recentHistory\"></div>\n          <div id=\"histEmptyMsg\" style=\"text-align:center;padding:24px;color:var(--md-on-surface-variant);font-size:13px;display:none;\">\n            暂无历史记录，完成一次计时后即可显示。\n          </div>\n        </div>\n      </div>\n    </div>\n  </div>\n</div>\n\n<!-- FAB -->\n<div class=\"fab-container\">\n  <button class=\"fab\" onclick=\"openCreateModal()\" id=\"mainFab\">\n    <span class=\"material-icons-round\">add</span>\n    新建计时器\n  </button>\n</div>\n\n<!-- ============================================================\n     MINI PILL (Dynamic Island style)\n     ============================================================ -->\n<div id=\"mini-pill\" onclick=\"expandFromPill()\">\n  <span class=\"material-icons-round\" id=\"pillIcon\">timer</span>\n  <span id=\"pillSubject\">Timer</span>\n  <span id=\"mini-pill-time\">--:--</span>\n  <span class=\"material-icons-round\" style=\"font-size:14px;opacity:0.6;\">open_in_full</span>\n</div>\n\n<!-- ============================================================\n     FULLSCREEN OVERLAY\n     ============================================================ -->\n<div id=\"fullscreen-overlay\">\n  <div class=\"fs-fx-layer\" id=\"fsFxLayer\">\n    <div class=\"fs-fx-line\"></div>\n    <div class=\"fs-fx-line\"></div>\n    <div class=\"fs-fx-line\"></div>\n  </div>\n  <div class=\"fs-google-bar\"></div>\n  <div class=\"fs-progress-bar\" id=\"fsProgressBar\"></div>\n\n  <button class=\"fs-exit-btn\" onclick=\"exitFullscreen()\">\n    <span class=\"material-icons-round\">close_fullscreen</span>\n    <span id=\"fsExitText\">退出全屏</span>\n  </button>\n\n  <div class=\"fs-minimal-wrap\">\n    <div id=\"fs-time-display\">00:00:00</div>\n  </div>\n</div>\n\n<!-- ============================================================\n     CREATE TIMER MODAL\n     ============================================================ -->\n<div class=\"modal-backdrop\" id=\"createModal\" onclick=\"closeModalOnBackdrop(event,'createModal')\">\n  <div class=\"modal-surface\">\n    <div class=\"modal-header\">\n      <div class=\"modal-title\" id=\"createModalTitle\">新建计时器</div>\n      <button class=\"icon-btn\" onclick=\"closeModal('createModal')\">\n        <span class=\"material-icons-round\">close</span>\n      </button>\n    </div>\n    <div class=\"modal-body\">\n      <div class=\"form-field\">\n        <label class=\"form-label\">科目 / 名称</label>\n        <input class=\"form-input\" id=\"f-name\" placeholder=\"如：Physics Paper 4 Mock\" maxlength=\"50\">\n      </div>\n\n      <div class=\"form-field\">\n        <label class=\"form-label\">IGCSE 卷型快捷选择</label>\n        <div class=\"form-chips\" id=\"igcseChips\"></div>\n      </div>\n\n      <div class=\"form-field\">\n        <label class=\"form-label\">时长（分钟）</label>\n        <div class=\"form-chips\" id=\"durChips\" style=\"margin-bottom:8px;\"></div>\n        <input class=\"form-input\" id=\"f-dur\" type=\"number\" placeholder=\"自定义分钟数\" min=\"1\" max=\"300\" style=\"margin-top:4px;\">\n      </div>\n\n      <div class=\"form-field\">\n        <label class=\"form-label\">颜色标签</label>\n        <div class=\"color-dots\" id=\"colorDots\"></div>\n      </div>\n\n      <div class=\"form-field\">\n        <label class=\"form-label\">自动保存间隔</label>\n        <select class=\"form-select\" id=\"f-saveInterval\">\n          <option value=\"1\">每 1 秒保存一次</option>\n          <option value=\"5\" selected>每 5 秒保存一次</option>\n          <option value=\"10\">每 10 秒保存一次</option>\n          <option value=\"30\">每 30 秒保存一次</option>\n        </select>\n      </div>\n\n      <div class=\"form-field\">\n        <label class=\"form-label\">备注（可选，如：P2 第12题）</label>\n        <input class=\"form-input\" id=\"f-note\" placeholder=\"记录当前做到的题目或进度…\" maxlength=\"80\">\n      </div>\n    </div>\n    <div class=\"modal-footer\">\n      <button class=\"btn-text\" onclick=\"closeModal('createModal')\">取消</button>\n      <button class=\"btn-filled\" id=\"createModalConfirmBtn\" onclick=\"confirmCreate()\">\n        <span class=\"material-icons-round\">play_arrow</span> 启动计时\n      </button>\n    </div>\n  </div>\n</div>\n\n<!-- ============================================================\n     HISTORY MODAL\n     ============================================================ -->\n<div class=\"modal-backdrop\" id=\"historyModal\" onclick=\"closeModalOnBackdrop(event,'historyModal')\">\n  <div class=\"modal-surface\" style=\"max-width:600px;\">\n    <div class=\"modal-header\">\n      <div class=\"modal-title\">全部历史记录</div>\n      <div style=\"display:flex;gap:4px;\">\n        <button class=\"btn-text danger\" onclick=\"clearAllHistory()\" style=\"padding:8px 14px;font-size:13px;\">清空</button>\n        <button class=\"icon-btn\" onclick=\"closeModal('historyModal')\">\n          <span class=\"material-icons-round\">close</span>\n        </button>\n      </div>\n    </div>\n    <div class=\"modal-body\" id=\"fullHistoryList\" style=\"max-height:60vh;overflow-y:auto;\"></div>\n    <div class=\"modal-footer\">\n      <button class=\"btn-tonal\" onclick=\"closeModal('historyModal')\">关闭</button>\n    </div>\n  </div>\n</div>\n\n<!-- ============================================================\n     SETTINGS MODAL\n     ============================================================ -->\n<div class=\"modal-backdrop\" id=\"settingsModal\" onclick=\"closeModalOnBackdrop(event,'settingsModal')\">\n  <div class=\"modal-surface\">\n    <div class=\"modal-header\">\n      <div class=\"modal-title\" id=\"settingsTitle\">设置</div>\n      <button class=\"icon-btn\" onclick=\"closeModal('settingsModal')\">\n        <span class=\"material-icons-round\">close</span>\n      </button>\n    </div>\n    <div class=\"modal-body\">\n      <div class=\"settings-row\">\n        <div>\n          <div class=\"settings-row-label\">结束铃声</div>\n          <div class=\"settings-row-sub\">可关闭，剩余 20 秒会弹窗提醒本次是否播放</div>\n        </div>\n        <button class=\"toggle on\" id=\"toggleSound\" onclick=\"toggleSetting('sound')\"></button>\n      </div>\n      <div class=\"divider\"></div>\n      <div class=\"settings-row\">\n        <div>\n          <div class=\"settings-row-label\" id=\"autoFsLabel\">禅意模式自动全屏</div>\n          <div class=\"settings-row-sub\" id=\"autoFsSub\">启动计时时自动进入全屏</div>\n        </div>\n        <button class=\"toggle\" id=\"toggleAutoFS\" onclick=\"toggleSetting('autoFS')\"></button>\n      </div>\n      <div class=\"divider\"></div>\n      <div class=\"settings-row\">\n        <div>\n          <div class=\"settings-row-label\" id=\"fullscreenFxLabel\">全屏背景动画</div>\n          <div class=\"settings-row-sub\" id=\"fullscreenFxSub\">全屏模式显示漂浮线条动画</div>\n        </div>\n        <button class=\"toggle\" id=\"toggleFullscreenFx\" onclick=\"toggleSetting('fullscreenFx')\"></button>\n      </div>\n      <div class=\"divider\"></div>\n      <div class=\"settings-row\">\n        <div>\n          <div class=\"settings-row-label\" id=\"interruptLogLabel\">中断原因登记</div>\n          <div class=\"settings-row-sub\" id=\"interruptLogSub\">暂停时弹出中断原因登记窗口</div>\n        </div>\n        <button class=\"toggle on\" id=\"toggleInterruptLog\" onclick=\"toggleSetting('interruptLog')\"></button>\n      </div>\n      <div class=\"divider\"></div>\n      <div class=\"settings-row\">\n        <div>\n          <div class=\"settings-row-label\">MockPortal 联动</div>\n          <div class=\"settings-row-sub\">计时完成后自动触发 MockPortal 标记</div>\n        </div>\n        <button class=\"toggle on\" id=\"toggleMockLink\" onclick=\"toggleSetting('mockLink')\"></button>\n      </div>\n      <div class=\"divider\"></div>\n      <div class=\"settings-row\">\n        <div>\n          <div class=\"settings-row-label\">Goal Tracker 联动</div>\n          <div class=\"settings-row-sub\">完成后在 Goal 系统中自动打卡</div>\n        </div>\n        <button class=\"toggle on\" id=\"toggleGoalLink\" onclick=\"toggleSetting('goalLink')\"></button>\n      </div>\n      <div class=\"divider\"></div>\n      <div class=\"form-field\">\n        <label class=\"form-label\">考试日期（用于顶栏倒计时）</label>\n        <input class=\"form-input\" id=\"sExamDate\" type=\"date\" onchange=\"saveExamDate(this.value)\">\n      </div>\n      <div class=\"divider\"></div>\n      <div class=\"form-field\">\n        <label class=\"form-label\">多计时器显示模式</label>\n        <select class=\"form-select\" id=\"sLayoutMode\" onchange=\"setLayoutMode(this.value)\">\n          <option value=\"carousel\">滑动显示所有（每页 3 个）</option>\n          <option value=\"grouped\">自动分组（1-3、4-6…）</option>\n        </select>\n      </div>\n      <div class=\"divider\"></div>\n      <div class=\"form-field\">\n        <label class=\"form-label\" id=\"siteLanguageLabel\">网站语言</label>\n        <select class=\"form-select\" id=\"sLanguage\" onchange=\"setLanguage(this.value)\">\n          <option value=\"zh\">简体中文</option>\n          <option value=\"en\">English</option>\n        </select>\n      </div>\n      <div class=\"divider\"></div>\n      <div style=\"display:flex;gap:8px;flex-wrap:wrap;\">\n        <button class=\"btn-tonal\" id=\"openApiBtn\" onclick=\"openModal('apiModal')\">DeepSeek API Key</button>\n        <button class=\"btn-tonal\" id=\"openAudioBtn\" onclick=\"openModal('audioModal')\">上传结束铃声</button>\n        <button class=\"btn-tonal\" id=\"openAiBtn\" onclick=\"openModal('aiModal')\">生成学习分析</button>\n      </div>\n      <div id=\"settingsVersion\" style=\"font-size:12px;color:var(--md-on-surface-variant);margin-top:8px;\">Version: 202604202200</div>\n      <div id=\"examCountdownDisplay\" style=\"font-family:'Google Sans',sans-serif;font-size:14px;color:var(--md-primary);text-align:center;display:none;\"></div>\n      <div class=\"divider\"></div>\n      <div>\n        <div class=\"settings-row-label\" style=\"margin-bottom:8px;\">清除数据</div>\n        <button class=\"btn-text danger\" onclick=\"clearAllHistory()\" style=\"padding:8px 0;display:block;\">清除所有计时历史</button>\n        <button class=\"btn-text danger\" onclick=\"clearAllData()\" style=\"padding:8px 0;display:block;\">清除所有数据</button>\n      </div>\n    </div>\n    <div class=\"modal-footer\">\n        <button class=\"btn-filled\" id=\"settingsDoneBtn\" onclick=\"closeModal('settingsModal')\">完成</button>\n      </div>\n  </div>\n</div>\n\n<!-- API KEY MODAL -->\n<div class=\"modal-backdrop\" id=\"apiModal\" onclick=\"closeModalOnBackdrop(event,'apiModal')\">\n  <div class=\"modal-surface\" style=\"max-width:560px;\">\n    <div class=\"modal-header\">\n      <div class=\"modal-title\">DeepSeek API 配置</div>\n      <button class=\"icon-btn\" onclick=\"closeModal('apiModal')\"><span class=\"material-icons-round\">close</span></button>\n    </div>\n    <div class=\"modal-body\">\n      <div class=\"form-field\">\n        <label class=\"form-label\">API Key</label>\n        <input class=\"form-input\" id=\"sApiKey\" type=\"password\" placeholder=\"sk-...\" autocomplete=\"off\">\n      </div>\n      <div style=\"font-size:12px;color:var(--md-on-surface-variant);line-height:1.5;\">\n        提示：调用 AI 分析时会将你的 API Key 与学习统计发送到 DeepSeek 服务端。\n      </div>\n    </div>\n    <div class=\"mod  setText('openAudioBtn', t('uploadAudio'));\n  setText('openAiBtn', t('aiSummary'));\n  setText('settingsDoneBtn', t('done'));\n  setText('audioModalTitle', t('audioModalTitle'));\n  setText('audioUploadLabel', t('audioUploadLabel'));\n  setText('bellSourceLabel', t('bellSourceLabel'));\n  setText('bellSourceLocalLabel', t('localMusic'));\n  setText('bellSourceNeteaseLabel', t('neteaseMusic'));\n  setText('neteaseSongIdLabel', t('neteaseIdLabel'));\n  setText('neteaseHintLine1', t('neteaseHint1'));\n  setText('neteaseHintLine2', t('neteaseHint2'));\n  setText('bellUnattendedActionLabel', t('bellUnattendedActionLabel'));\n  setText('bellUnattendedManualOption', t('bellUnattendedManualOption'));\n  setText('bellUnattendedMuteOption', t('bellUnattendedMuteOption'));\n  setText('bellUnattendedCloseOption', t('bellUnattendedCloseOption'));\n  setText('bellUnattendedDelayLabel', t('bellUnattendedDelayLabel'));\n  setText('bellUnattendedHint', t('bellUnattendedHint'));\n  setText('saveNeteaseBtn', t('saveSongId'));\n  setText('audioCloseBtn', t('close'));\n  setText('finishDismissBtn', t('iKnow'));\n  setText('fsExitText', t('fsExit'));\n  setText('bellStopToastText', t('bellPlaying'));\n  setText('bellStopToastBtn', t('stopBell'));\n  const minipillBtn = document.getElementById('minipillBtn');\n  if (minipillBtn) minipillBtn.title = getLanguage() === 'en' ? 'Mini floating window' : '迷你悬浮';\n  const settingsBtn = document.getElementById('settingsBtn');\n  if (settingsBtn) settingsBtn.title = t('settings');\n  renderSettingsUI();\n}\n\n// ============================================================\n// PERSISTENCE\n// ============================================================\nconst SK = 'igcse_timer_v6';\n\nfunction openAudioDb() {\n  return new Promise((resolve, reject) => {\n    if (!window.indexedDB) {\n      reject(new Error('IndexedDB unavailable'));\n      return;\n    }\n    const req = indexedDB.open(AUDIO_DB_NAME, 1);\n    req.onupgradeneeded = () => {\n      const db = req.result;\n      if (!db.objectStoreNames.contains(AUDIO_DB_STORE)) {\n        db.createObjectStore(AUDIO_DB_STORE);\n      }\n    };\n    req.onsuccess = () => resolve(req.result);\n    req.onerror = () => reject(req.error || new Error('Failed to open IndexedDB'));\n  });\n}\n\nasync function saveCustomAudioToIndexedDb(file) {\n  const db = await openAudioDb();\n  return new Promise((resolve, reject) => {\n    const tx = db.transaction(AUDIO_DB_STORE, 'readwrite');\n    tx.oncomplete = () => { db.close(); resolve(true); };\n    tx.onerror = () => { db.close(); reject(tx.error || new Error('IndexedDB write failed')); };\n    tx.objectStore(AUDIO_DB_STORE).put({ blob: file, type: file.type || 'audio/mpeg', name: file.name || '' }, AUDIO_DB_KEY);\n  });\n}\n\nasync function readCustomAudioFromIndexedDb() {\n  const db = await openAudioDb();\n  return new Promise((resolve, reject) => {\n    const tx = db.transaction(AUDIO_DB_STORE, 'readonly');\n    const req = tx.objectStore(AUDIO_DB_STORE).get(AUDIO_DB_KEY);\n    req.onsuccess = () => {\n      db.close();\n      const value = req.result;\n      if (value && value.blob instanceof Blob) resolve(value);\n      else resolve(null);\n    };\n    req.onerror = () => {\n      db.close();\n      reject(req.error || new Error('IndexedDB read failed'));\n    };\n  });\n}\n\nasync function clearCustomAudioFromIndexedDb() {\n  try {\n    const db = await openAudioDb();\n    await new Promise((resolve, reject) => {\n      const tx = db.transaction(AUDIO_DB_STORE, 'readwrite');\n      tx.oncomplete = () => { db.close(); resolve(true); };\n      tx.onerror = () => { db.close(); reject(tx.error || new Error('IndexedDB delete failed')); };\n      tx.objectStore(AUDIO_DB_STORE).delete(AUDIO_DB_KEY);\n    });\n  } catch (e) {\n    console.warn('clearCustomAudioFromIndexedDb failed', e);\n  }\n}\n\nfunction setCustomAudioPreviewSrc(src) {\n  const p = document.getElementById('customAudioPreview');\n  if (!p) return;\n  if (customBellObjectUrl && customBellObjectUrl !== src) {\n    URL.revokeObjectURL(customBellObjectUrl);\n  }\n  customBellObjectUrl = src && String(src).startsWith('blob:') ? src : '';\n  p.src = src || '';\n  p.style.display = src ? 'block' : 'none';\n}\n\nasync function restoreCustomAudioFromStorage() {\n  try {\n    const stored = await readCustomAudioFromIndexedDb();\n    if (stored?.blob) {\n      const src = URL.createObjectURL(stored.blob);\n      customBellPlaybackSrc = src;\n      settings.customBellType = stored.type || settings.customBellType || 'audio/mpeg';\n      setCustomAudioPreviewSrc(src);\n      return true;\n    }\n  } catch (e) {\n    console.warn('IndexedDB audio restore failed', e);\n  }\n  if (settings.customBellData) {\n    customBellPlaybackSrc = settings.customBellData;\n    setCustomAudioPreviewSrc(settings.customBellData);\n    return true;\n  }\n  customBellPlaybackSrc = '';\n  setCustomAudioPreviewSrc('');\n  return false;\n}\n\nfunction persist() {\n  const snapshot = {\n    timers: timers.map(t => ({\n      id: t.id, name: t.name, color: t.color, subj: t.subj,\n      paperId: t.paperId, paper: t.paper, marks: t.marks,\n      total: t.total, left: t.left, running: false, paused: t.paused || !t.running,\n      done: t.done, note: t.note || '', saveInterval: t.saveInterval,\n      createdAt: t.createdAt, startedAt: t.startedAt, finishSceneData: t.finishSceneData || null,\n    })),\n    history: getHistory(),\n    stats: getStats(),\n    settings,\n    heatmap: getHeatmap(),\n  };\n  localStorage.setItem(SK, JSON.stringify(snapshot));\n}\n\nfunction loadPersisted() {\n  try {\n    const raw = localStorage.getItem(SK);\n    if (!raw) return;\n    const s = JSON.parse(raw);\n    if (s.settings) settings = { ...settings, ...s.settings };\n    settings.language = settings.language === 'en' ? 'en' : 'zh';\n    settings.bellSource = settings.bellSource === 'netease' ? 'netease' : 'local';\n    settings.bellUnattendedAction = ['manual', 'mute', 'close'].includes(settings.bellUnattendedAction)\n      ? settings.bellUnattendedAction\n      : 'manual';\n    const unattendedDelay = Number(settings.bellUnattendedDelaySec);\n    settings.bellUnattendedDelaySec = Number.isFinite(unattendedDelay)\n      ? Math.min(MAX_BELL_UNATTENDED_DELAY_SEC, Math.max(MIN_BELL_UNATTENDED_DELAY_SEC, Math.round(unattendedDelay)))\n      : DEFAULT_BELL_UNATTENDED_DELAY_SEC;\n    settings.autoFS = settings.autoFS !== false;\n    settings.fullscreenFx = !!settings.fullscreenFx;\n    settings.interruptLog = settings.interruptLog !== false;\n    if (s.timers) {\n      timers = s.timers.map(t => ({\n        ...t,\n        running: false,\n        paused: true,\n        _interval: null,\n        _saveCountdown: t.saveInterval || 5,\n        _preEndAlerted: false,\n        _muteNextRing: false,\n        _finishScenePrefetching: false,\n      }));\n    }\n  } catch(e) { console.warn('Load failed', e); }\n}\n\nfunction getHistory() {\n  try { return JSON.parse(localStorage.getItem('igcse_hist') || '[]'); }\n  catch(e) { return []; }\n}\nfunction saveHistory(h) { localStorage.setItem('igcse_hist', JSON.stringify(h)); }\nfunction addHistory(entry) {\n  const h = getHistory();\n  h.unshift(entry);\n  if (h.length > 200) h.splice(200);\n  saveHistory(h);\n}\nasync function clearAllHistory() {\n  const { ok } = await showConfirmDialog({\n    title: '清空历史记录',\n    body: '确定清除全部历史记录？',\n    okText: '清空',\n    cancelText: '取消'\n  });\n  if (!ok) return;\n  saveHistory([]);\n  renderHistory();\n  closeModal('historyModal');\n  showSnackbar('历史记录已清除');\n}\n\nfunction getStats() {\n  try { return JSON.parse(localStorage.getItem('igcse_stats') || '{}'); }\n  catch(e) { return {}; }\n}\nfunction saveStats(s) { localStorage.setItem('igcse_stats', JSON.stringify(s)); }\n\nfunction getHeatmap() {\n  try { return JSON.parse(localStorage.getItem('igcse_heat') || '{}'); }\n  catch(e) { return {}; }\n}\nfunction saveHeatmap(h) { localStorage.setItem('igcse_heat', JSON.stringify(h)); }\nfunction addToHeatmap(mins) {\n  const h = getHeatmap();\n  const today = new Date().toISOString().slice(0,10);\n  h[today] = (h[today] || 0) + mins;\n  saveHeatmap(h);\n}\n\nfunction addToStats(field, val = 1) {\n  const s = getStats();\n  const today = new Date().toISOString().slice(0,10);\n  if (!s[today]) s[today] = { focusMins:0, completed:0, pauses:0 };\n  s[today][field] = (s[today][field] || 0) + val;\n  saveStats(s);\n}\nfunction getTodayStats() {\n  const s = getStats();\n  const today = new Date().toISOString().slice(0,10);\n  return s[today] || { focusMins:0, completed:0, pauses:0 };\n}\n\n// ============================================================\n// HELPERS\n// ============================================================\nfunction fmtTime(sec) {\n  if (sec < 0) sec = 0;\n  const m = Math.floor(sec / 60), s = sec % 60;\n  return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');\n}\nfunction fmtHMS(sec) {\n  if (sec < 0) sec = 0;\n  const h = Math.floor(sec / 3600);\n  const m = Math.floor((sec % 3600) / 60);\n  const s = sec % 60;\n  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;\n}\nfunction fmtDur(min) {\n  if (min < 60) return min + ' min';\n  const h = Math.floor(min/60), m = min%60;\n  return m ? `${h}h ${m}m` : `${h} hr${h>1?'s':''}`;\n}\nfunction uid() { return Date.now() + Math.random().toString(36).slice(2,7); }\nfunction lerp(a,b,t){ return a+(b-a)*t; }\nfunction esc(v) {\n  return String(v ?? '').replace(/[&<>\"']/g, ch => ({\n    '&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',\"'\":'&#39;'\n  }[ch]));\n}\n\nfunction sanitizeNumericInput(value) {\n  return String(value || '').replace(/[^\\d]/g, '');\n}\n\nfunction statusText(t) {\n  if (getLanguage() === 'en') {\n    return t.done ? 'Done' : t.running ? 'Running' : t.paused ? 'Paused' : 'Ready';\n  }\n  return t.done ? '完成' : t.running ? '计时中' : t.paused ? '已暂停' : '准备';\n}\n\nfunction remainingText(percent) {\n  const value = Math.round(percent * 100);\n  return getLanguage() === 'en' ? `${value}% left` : `剩余 ${value}%`;\n}\n\nfunction fallbackFinishLines(name = '计时器') {\n  const safeName = String(name || '计时器').slice(0, 36);\n  return {\n    zhHans: `${safeName} 倒计时结束`,\n    en: `${safeName} countdown finished`,\n    source: ''\n  };\n}\n\nfunction parseAiTextPayload(payload) {\n  if (typeof payload === 'string') return payload;\n  if (Array.isArray(payload)) {\n    return payload.map(part => {\n      if (typeof part === 'string') return part;\n      if (part && typeof part.text === 'string') return part.text;\n      return '';\n    }).join(' ').trim();\n  }\n  if (payload && typeof payload.text === 'string') return payload.text;\n  return '';\n}\n\nfunction cleanupTranslationText(text) {\n  return String(text || '')\n    .replace(/^```[\\w-]*\\s*/i, '')\n    .replace(/```$/i, '')\n    .replace(/^[\"'“”‘’\\s]+|[\"'“”‘’\\s]+$/g, '')\n    .trim();\n}\n\nfunction looksLikeEnglish(text) {\n  const value = String(text || '');\n  const latin = (value.match(/[A-Za-z]/g) || []).length;\n  const cjk = (value.match(/[\\u3400-\\u9FFF]/g) || []).length;\n  return latin >= 3 && latin >= cjk;\n}\n\nasync function translateWithDeepSeekIfAvailable(text, targetLang) {\n  const localFallback = '';\n  if (!settings.apiKey) {\n    return localFallback;\n  }\n  const langMap = { en: '英文' };\n  const target = langMap[targetLang] || targetLang;\n  const prompt = `请将下面内容翻译成${target}，只返回翻译结果，不要解释：\\n${text}`;\n  try {\n    const resp = await fetch('https://api.deepseek.com/chat/completions', {\n      method: 'POST',\n      headers: {\n        'Content-Type': 'application/json',\n        'Authorization': `Bearer ${settings.apiKey}`\n      },\n      body: JSON.stringify({\n        model: 'deepseek-chat',\n        messages: [{ role: 'user', content: prompt }],\n        temperature: 0.2\n      })\n    });\n    if (!resp.ok) throw new Error(`deepseek request failed: ${resp.status}`);\n    const data = await resp.json();\n    const parsed = cleanupTranslationText(parseAiTextPayload(data?.choices?.[0]?.message?.content || data?.choices?.[0]?.text));\n    if (targetLang === 'en' && !looksLikeEnglish(parsed)) throw new Error('invalid english translation');\n    return parsed || localFallback;\n  } catch (err) {\n    console.warn('DeepSeek translation failed', err);\n    return localFallback;\n  }\n}\n\nasync function prefetchFinishSceneData(timerId) {\n  const t = timers.find(x => x.id === timerId);\n  if (!t || t.finishSceneData || t._finishScenePrefetching) return;\n  t._finishScenePrefetching = true;\n  const fallback = fallbackFinishLines(t.name);\n  try {\n    const hitResp = await fetch(HITOKOTO_API_URL);\n    if (!hitResp.ok) throw new Error(`hitokoto prefetch failed (status ${hitResp.status})`);\n    const hitData = await hitResp.json();\n    const rawHitokoto = String(hitData?.hitokoto || '').trim();\n    const rawFrom = String(hitData?.from || '').trim();\n    const rawFromWho = String(hitData?.from_who || '').trim();\n    const zh = (rawHitokoto || fallback.zhHans).slice(0, 72) || fallback.zhHans;\n    const en = await translateWithDeepSeekIfAvailable(zh, 'en');\n    t.finishSceneData = {\n      zhHans: zh,\n      en: en || '',\n      source: rawFrom,\n      sourceWho: rawFromWho,\n      loadedAt: Date.now(),\n    };\n  } catch (e) {\n    console.warn('Finish scene prefetch failed', e);\n    t.finishSceneData = { ...fallback, en: '', loadedAt: Date.now() };\n  } finally {\n    t._finishScenePrefetching = false;\n    persist();\n  }\n}\n\nfunction colorForSubj(subj) {\n  const m = { '0580':'#1a73e8','0610':'#34a853','0620':'#fa7b17','0625':'#9c27b0','0500':'#ea4335' };\n  return m[subj] || '#5f6368';\n}\n\nfunction stripForColor(c) {\n  return `linear-gradient(90deg, ${c} 0 25%, #ea4335 25% 50%, #fbbc04 50% 75%, #34a853 75%)`;\n}\n\nfunction ringCircumference(r) { return 2 * Math.PI * r; }\nconst RING_R = 85;\nconst RING_CIRC = 2 * Math.PI * RING_R;\nconst FS_RING_R = 220;\nconst FS_RING_CIRC = 2 * Math.PI * FS_RING_R;\n\nfunction pct(t) {\n  if (!t.total) return 0;\n  return Math.max(0, Math.min(1, t.left / t.total));\n}\n\n// ============================================================\n// QUICK START CHIPS RENDER\n// ============================================================\nfunction renderQuickStart() {\n  const wrap = document.getElementById('igcseQuickstart');\n  const shown = [\n    { id:'0580P4', icon:'📐', color:'#1a73e8', bg:'#e8f0fe' },\n    { id:'0580P2', icon:'📐', color:'#1a73e8', bg:'#e8f0fe' },\n    { id:'0625P4', icon:'⚡', color:'#9c27b0', bg:'#f3e5f5' },\n    { id:'0625P2', icon:'⚡', color:'#9c27b0', bg:'#f3e5f5' },\n    { id:'0620P4', icon:'⚗️', color:'#fa7b17', bg:'#fce8b2' },\n    { id:'0620P6', icon:'⚗️', color:'#fa7b17', bg:'#fce8b2' },\n    { id:'0610P4', icon:'🔬', color:'#34a853', bg:'#e6f4ea' },\n    { id:'0610P6', icon:'🔬', color:'#34a853', bg:'#e6f4ea' },\n    { id:'0500P1', icon:'📚', color:'#ea4335', bg:'#fce8e6' },\n  ];\n  wrap.innerHTML = shown.map(s => {\n    const p = IGCSE_PAPERS.find(x => x.id === s.id);\n    if (!p) return '';\n    return `<button class=\"igcse-chip\" onclick=\"quickLaunch('${p.id}')\" title=\"${p.name} · ${fmtDur(p.dur)}\">\n      <div class=\"igcse-chip-icon\" style=\"background:${s.bg};color:${s.color};\">${s.icon}</div>\n      <div class=\"igcse-chip-info\">\n        <div class=\"igcse-chip-name\" style=\"color:${s.color};\">${p.subj}/${p.paper.replace('Paper ','P')}</div>\n        <div class=\"igcse-chip-meta\">${fmtDur(p.dur)} · ${p.marks}m</div>\n      </div>\n    </button>`;\n  }).join('');\n}\n\nfunction quickLaunch(paperId) {\n  const p = IGCSE_PAPERS.find(x => x.id === paperId);\n  if (!p) return;\n  createTimer({\n    name: `${p.subj} ${p.paper}`,\n    color: p.color,\n    subj: p.subj,\n    paperId: p.id,\n    paper: p.paper,\n    marks: p.marks,\n    dur: p.dur,\n    saveInterval: 5,\n    note: '',\n  });\n  showSnackbar(`启动：${p.name} (${fmtDur(p.dur)})`);\n}\n\n// ============================================================\n// CREATE MODAL\n// ============================================================\nfunction openCreateModal() {\n  editingTimerId = null;\n  selColor = COLORS[0];\n  selDur   = null;\n  selIgcse = null;\n  document.getElementById('f-name').value = '';\n  document.getElementById('f-dur').value  = '';\n  document.getElementById('f-note').value = '';\n  document.getElementById('f-saveInterval').value = '5';\n  document.getElementById('createModalTitle').textContent = '新建计时器';\n  setCreateModalAction('play_arrow', '启动计时');\n\n  // Render IGCSE chips\n  const ic = document.getElementById('igcseChips');\n  ic.innerHTML = IGCSE_PAPERS.map(p =>\n    `<button class=\"form-chip\" data-igcse=\"${p.id}\" onclick=\"pickIgcse('${p.id}')\"\n      title=\"${p.tier} · ${fmtDur(p.dur)} · ${p.marks} marks\">\n      ${p.name}\n    </button>`\n  ).join('');\n\n  // Render duration chips\n  const dc = document.getElementById('durChips');\n  dc.innerHTML = DUR_PRESETS.map(d =>\n    `<button class=\"form-chip\" data-dur=\"${d.v}\" onclick=\"pickDur(${d.v})\">${d.label}</button>`\n  ).join('');\n\n  // Render color dots\n  renderColorDots();\n\n  openModal('createModal');\n  setTimeout(() => document.getElementById('f-name').focus(), 300);\n}\n\nfunction setCreateModalAction(icon, text) {\n  const btn = document.getElementById('createModalConfirmBtn');\n  if (!btn) return;\n  btn.innerHTML = `<span class=\"material-icons-round\">${icon}</span> ${text}`;\n}\n\nfunction getTimerDurationMinutes(t) {\n  if (Number.isFinite(t?.dur) && t.dur > 0) return t.dur;\n  if (Number.isFinite(t?.total)) return Math.max(1, Math.round(t.total / 60));\n  return 1;\n}\n\nfunction openEditModal(id) {\n  const t = timers.find(x => x.id === id);\n  if (!t) return;\n  editingTimerId = id;\n  selColor = t.color || COLORS[0];\n  selDur = getTimerDurationMinutes(t);\n  selIgcse = t.paperId ? IGCSE_PAPERS.find(p => p.id === t.paperId) : null;\n\n  document.getElementById('f-name').value = t.name || '';\n  document.getElementById('f-dur').value = selDur;\n  document.getElementById('f-note').value = t.note || '';\n  document.getElementById('f-saveInterval').value = String(t.saveInterval || 5);\n  document.getElementById('createModalTitle').textContent = '编辑计时器';\n  setCreateModalAction('save', '保存修改');\n\n  // Render IGCSE chips\n  const ic = document.getElementById('igcseChips');\n  ic.innerHTML = IGCSE_PAPERS.map(p =>\n    `<button class=\"form-chip\" data-igcse=\"${p.id}\" onclick=\"pickIgcse('${p.id}')\"\n      title=\"${p.tier} · ${fmtDur(p.dur)} · ${p.marks} marks\">\n      ${p.name}\n    </button>`\n  ).join('');\n  document.querySelectorAll('#igcseChips .form-chip').forEach(b => {\n    b.classList.toggle('sel', selIgcse && b.dataset.igcse === selIgcse.id);\n  });\n\n  // Render duration chips\n  const dc = document.getElementById('durChips');\n  dc.innerHTML = DUR_PRESETS.map(d =>\n    `<button class=\"form-chip\" data-dur=\"${d.v}\" onclick=\"pickDur(${d.v})\">${d.label}</button>`\n  ).join('');\n  document.querySelectorAll('#durChips .form-chip').forEach(b => {\n    b.classList.toggle('sel', Number(b.dataset.dur) === selDur);\n  });\n\n  // Render color dots\n  renderColorDots();\n\n  openModal('createModal');\n  setTimeout(() => document.getElementById('f-name').focus(), 300);\n}\n\nfunction pickIgcse(id) {\n  selIgcse = IGCSE_PAPERS.find(p => p.id === id);\n  if (!selIgcse) return;\n  document.getElementById('f-name').value = `${selIgcse.subj} ${selIgcse.paper}`;\n  pickDur(selIgcse.dur);\n  pickColor(selIgcse.color);\n  document.querySelectorAll('#igcseChips .form-chip').forEach(b => {\n    b.classList.toggle('sel', b.dataset.igcse === id);\n  });\n}\n\nfunction pickDur(v) {\n  selDur = v;\n  document.getElementById('f-dur').value = v;\n  document.querySelectorAll('#durChips .form-chip').forEach(b => {\n    b.classList.toggle('sel', Number(b.dataset.dur) === v);\n  });\n}\n\nfunction pickColor(c) {\n  selColor = c;\n  document.querySelectorAll('#colorDots .color-dot').forEach(d => {\n    d.classList.toggle('sel', d.style.background === c);\n  });\n}\n\nfunction renderColorDots() {\n  const cd = document.getElementById('colorDots');\n  cd.innerHTML = COLORS.map(c =>\n    `<div class=\"color-dot${c===selColor?' sel':''}\" style=\"background:${c};\" onclick=\"pickColor('${c}')\"></div>`\n  ).join('');\n}\n\nfunction confirmCreate() {\n  const name = document.getElementById('f-name').value.trim() || 'Custom Timer';\n  const dur  = parseInt(document.getElementById('f-dur').value) || selDur;\n  const note = document.getElementById('f-note').value.trim();\n  const si   = parseInt(document.getElementById('f-saveInterval').value) || 5;\n  if (!dur || dur < 1) { showSnackbar('请选择或输入时长'); return; }\n  closeModal('createModal');\n  if (editingTimerId) {\n    const t = timers.find(x => x.id === editingTimerId);\n    if (!t) { editingTimerId = null; return; }\n    t.name = name;\n    t.color = selColor;\n    t.subj = selIgcse ? selIgcse.subj : 'custom';\n    t.paperId = selIgcse ? selIgcse.id : null;\n    t.paper = selIgcse ? selIgcse.paper : null;\n    t.marks = selIgcse ? selIgcse.marks : null;\n    t.note = note;\n    t.saveInterval = si;\n    t._saveCountdown = si;\n    const nextDur = Math.max(1, dur);\n    // Duration changes should go through setTimerDur so timer reset/restart behavior stays consistent.\n    if (t.dur !== nextDur) setTimerDur(editingTimerId, nextDur);\n    else {\n      persist();\n      renderTimerCard(editingTimerId);\n      refreshFsDisplay();\n      updateMiniPill();\n    }\n    editingTimerId = null;\n    showSnackbar('计时器信息已更新');\n    return;\n  }\n  createTimer({\n    name, color: selColor,\n    subj: selIgcse ? selIgcse.subj : 'custom',\n    paperId: selIgcse ? selIgcse.id : null,\n    paper: selIgcse ? selIgcse.paper : null,\n    marks: selIgcse ? selIgcse.marks : null,\n    dur, saveInterval: si, note,\n  });\n}\n\n// ============================================================\n// TIMER LIFECYCLE\n// ============================================================\nfunction createTimer(cfg) {\n  const t = {\n    id: uid(),\n    name: cfg.name,\n    color: cfg.color || COLORS[0],\n    subj: cfg.subj || 'custom',\n    paperId: cfg.paperId || null,\n    paper: cfg.paper || null,\n    marks: cfg.marks || null,\n    total: cfg.dur * 60,\n    left: cfg.left !== undefined ? cfg.left : cfg.dur * 60,\n    dur: cfg.dur,\n    running: false,\n    paused: false,\n    done: false,\n    note: cfg.note || '',\n    saveInterval: cfg.saveInterval || 5,\n    _interval: null,\n    _saveCountdown: cfg.saveInterval || 5,\n    _pauseCount: cfg.pauseCount || 0,\n    _preEndAlerted: false,\n    _muteNextRing: false,\n    _finishScenePrefetching: false,\n    finishSceneData: cfg.finishSceneData || null,\n    createdAt: cfg.createdAt || Date.now(),\n    startedAt: null,\n  };\n  timers.push(t);\n  currentPage = settings.layoutMode === 'carousel'\n    ? Math.max(0, timers.length - 1)\n    : Math.floor((timers.length - 1) / 3);\n  updateArenaLayout();\n  renderAll();\n  startTimer(t.id);\n  if (settings.autoFS) openFullscreen(t.id);\n  persist();\n}\n\nfunction startTimer(id) {\n  const t = timers.find(x => x.id === id);\n  if (!t || t.done) return;\n  primeMediaPlaybackPermission().catch(() => {});\n  stopDoneSound();\n  // Pause all others if in split layout with this as active\n  if (timers.length > 1) {\n    timers.filter(x => x.id !== id && x.running).forEach(x => pauseTimer(x.id, false));\n  }\n  t.running = true;\n  t.paused  = false;\n  if (!t.startedAt) t.startedAt = Date.now();\n  clearInterval(t._interval);\n  t._interval = setInterval(() => tickTimer(id), 1000);\n  refreshCardControls(id);\n  updateMiniPill();\n}\n\nfunction pauseTimer(id, logPause = true) {\n  const t = timers.find(x => x.id === id);\n  if (!t) return;\n  t.running = false;\n  t.paused  = true;\n  clearInterval(t._interval);\n  if (logPause) {\n    t._pauseCount++;\n    addToStats('pauses');\n    if (settings.interruptLog) {\n      pendingInterruptTimerId = id;\n      openModal('interruptModal');\n    }\n  }\n  persist();\n  refreshCardControls(id);\n  updateMiniPill();\n}\n\nfunction toggleTimer(id) {\n  const t = timers.find(x => x.id === id);\n  if (!t || t.done) return;\n  if (t.running) pauseTimer(id);\n  else startTimer(id);\n}\n\nfunction resetTimer(id) {\n  const t = timers.find(x => x.id === id);\n  if (!t) return;\n  stopDoneSound();\n  clearInterval(t._interval);\n  t.left = t.total;\n  t.running = false;\n  t.paused  = false;\n  t.done    = false;\n  t._preEndAlerted = false;\n  t._muteNextRing = false;\n  t.startedAt = null;\n  t._pauseCount = 0;\n  persist();\n  renderTimerCard(id);\n  updateMiniPill();\n}\n\nfunction addTime(id, mins) {\n  const t = timers.find(x => x.id === id);\n  if (!t) return;\n  stopDoneSound();\n  t.left  += mins * 60;\n  t.total += mins * 60;\n  if (t.done) { t.done = false; t.left = mins * 60; t.total = mins * 60; }\n  if (t.left > PRE_END_ALERT_THRESHOLD) t._preEndAlerted = false;\n  t._muteNextRing = false;\n  persist();\n  renderTimerCard(id);\n  showSnackbar(`+${mins} 分钟已添加`);\n}\n\nfunction removeTimer(id) {\n  const t = timers.find(x => x.id === id);\n  if (!t) return;\n  stopDoneSound();\n  clearInterval(t._interval);\n  const wasRunning = t.running;\n  const el = document.getElementById('card-' + id);\n  if (el) {\n    el.classList.add('exiting');\n    setTimeout(() => {\n      timers = timers.filter(x => x.id !== id);\n      renderAll();\n      updateArenaLayout();\n      persist();\n    }, 250);\n  } else {\n    timers = timers.filter(x => x.id !== id);\n    renderAll();\n    updateArenaLayout();\n    persist();\n  }\n  if (fsTimerId === id) exitFullscreen();\n  updateMiniPill();\n}\n\nfunction tickTimer(id) {\n  const t = timers.find(x => x.id === id);\n  if (!t || !t.running) return;\n  t.left = Math.max(0, t.left - 1);\n\n  if (t.left <= PRE_END_ALERT_THRESHOLD && !t._finishScenePrefetching && !t.finishSceneData) {\n    prefetchFinishSceneData(t.id);\n  }\n\n  if (t.left === PRE_END_ALERT_THRESHOLD && !t.done && !t._preEndAlerted) {\n    t._preEndAlerted = true;\n    showPreEndBellPopup(t);\n  }\n\n  // Auto-save\n  t._saveCountdown--;\n  if (t._saveCountdown <= 0) {\n    t._saveCountdown = t.saveInterval;\n    persist();\n    flashSaveIndicator(id);\n  }\n\n  refreshTimerDisplay(id);\n  if (fsTimerId === id) refreshFsDisplay();\n  updateMiniPill();\n  const now = performance.now();\n  if (now - statsRenderClock > 900) {\n    statsRenderClock = now;\n    renderStats();\n  }\n\n  if (t.left <= 0) onTimerDone(id);\n}\n\nasync function showPreEndBellPopup(t) {\n  if (!t) return;\n  if (!settings.sound) {\n    showSnackbar(`⏳ ${t.name} 剩余 ${PRE_END_ALERT_THRESHOLD} 秒`);\n    return;\n  }\n  const { ok } = await showConfirmDialog({\n    title: '结束铃声提醒',\n    body: `⏳ ${t.name} 剩余 ${PRE_END_ALERT_THRESHOLD} 秒，结束时要播放铃声吗？`,\n    okText: '播放铃声',\n    cancelText: '静音结束'\n  });\n  t._muteNextRing = !ok;\n  showSnackbar(ok ? '已保留结束铃声' : '本次结束将静音');\n}\n\nasync function onTimerDone(id) {\n  const t = timers.find(x => x.id === id);\n  if (!t) return;\n  clearInterval(t._interval);\n  t.running = false;\n  t.done    = true;\n\n  const spentMins = Math.round((t.total - t.left) / 60);\n  addToStats('completed');\n  addToStats('focusMins', spentMins);\n  addToHeatmap(spentMins);\n\n  const entry = {\n    id: t.id, name: t.name, color: t.color, subj: t.subj,\n    paper: t.paper, marks: t.marks,\n    dur: t.dur, spentMins, pauseCount: t._pauseCount,\n    note: t.note, completedAt: Date.now(), type: 'completed',\n  };\n  addHistory(entry);\n  persist();\n\n  const shouldPlayRing = settings.sound && !t._muteNextRing;\n  const didPlayBell = shouldPlayRing ? await playDoneSound() : false;\n  t._muteNextRing = false;\n  t._preEndAlerted = false;\n  openFinishScene(t, shouldPlayRing && settings.bellSource === 'netease' && !!sanitizeNumericInput(settings.neteaseSongId));\n  if (settings.mockLink) notifyMockPortal(entry);\n  if (settings.goalLink) notifyGoalTracker(entry);\n\n  showSnackbar(`✓ ${t.name} — 时间到！`, didPlayBell, didPlayBell ? stopDoneSound : null, '停止播放', didPlayBell ? null : 3200);\n  renderTimerCard(id);\n  refreshFsDisplay();\n  renderStats();\n  renderHistory();\n  renderHeatmap();\n  updateMiniPill();\n}\n\n// ============================================================\n// INTER-APP HOOKS (MockPortal / Goal Tracker)\n// ============================================================\nfunction notifyMockPortal(entry) {\n  try {\n    const key = 'warden_mock_portal_v4';\n    const raw = localStorage.getItem(key);\n    if (!raw) return;\n    const s = JSON.parse(raw);\n    // Append a timer completion note to mock portal state\n    if (!s._timerLog) s._timerLog = [];\n    s._timerLog.unshift({\n      from: 'igcse-timer',\n      name: entry.name,\n      paper: entry.paper,\n      subj: entry.subj,\n      spentMins: entry.spentMins,\n      completedAt: entry.completedAt,\n    });\n    localStorage.setItem(key, JSON.stringify(s));\n  } catch(e) {}\n}\n\nfunction notifyGoalTracker(entry) {\n  try {\n    const key = 'gt_v6';\n    const raw = localStorage.getItem(key);\n    if (!raw) return;\n    const goals = JSON.parse(raw);\n    // Find a matching goal by subj name and auto-increment done\n    const match = goals.find(g => g.name && (\n      g.name.toLowerCase().includes(entry.subj) ||\n      g.name.toLowerCase().includes(entry.name.toLowerCase().split(' ')[0])\n    ) && g.total > 0 && g.done < g.total);\n    if (match) {\n      match.done = Math.min(match.total, (match.done || 0) + 1);\n      if (!match.history) match.history = [];\n      match.history.push({\n        date: new Date().toISOString().slice(0,10),\n        done: match.done, total: match.total,\n        note: `Auto from IGCSE Timer: ${entry.name} (${entry.spentMins}min)`\n      });\n      localStorage.setItem(key, JSON.stringify(goals));\n    }\n  } catch(e) {}\n}\n\n// ============================================================\n// SOUND\n// ============================================================\nfunction getBellUnattendedDelaySec() {\n  const n = Number(settings.bellUnattendedDelaySec);\n  if (!Number.isFinite(n)) return DEFAULT_BELL_UNATTENDED_DELAY_SEC;\n  return Math.min(MAX_BELL_UNATTENDED_DELAY_SEC, Math.max(MIN_BELL_UNATTENDED_DELAY_SEC, Math.round(n)));\n}\n\nfunction scheduleBellUnattendedAction() {\n  clearTimeout(unattendedBellTimer);\n  unattendedBellTimer = null;\n  const action = settings.bellUnattendedAction;\n  if (action !== 'mute' && action !== 'close') return;\n  const delaySec = getBellUnattendedDelaySec();\n  unattendedBellTimer = setTimeout(() => {\n    if (action === 'close') {\n      stopDoneSound(false);\n      dismissFinishScene();\n      showSnackbar(t('bellAutoClosed'));\n      return;\n    }\n    stopDoneSound(false);\n    showSnackbar(t('bellAutoMuted'));\n  }, delaySec * 1000);\n}\n\nasync function primeMediaPlaybackPermission() {\n  if (mediaPermissionPrimed) return;\n  mediaPermissionPrimed = true;\n  try {\n    const Ctx = window.AudioContext || window.webkitAudioContext;\n    if (Ctx) {\n      const ac = new Ctx();\n      if (ac.state === 'suspended') await ac.resume();\n      try { await ac.close(); } catch (closeErr) { console.warn('AudioContext close failed', closeErr); }\n    }\n  } catch (err) {}\n}\n\nasync function playDoneSound() {\n  try {\n    stopDoneSound();\n    await primeMediaPlaybackPermission();\n    const source = settings.bellSource === 'netease' ? 'netease' : 'local';\n    if (source === 'netease' && sanitizeNumericInput(settings.neteaseSongId)) {\n      activeBellMode = 'netease';\n      showBellStopToast();\n      scheduleBellUnattendedAction();\n      return true;\n    }\n    const customSrc = customBellPlaybackSrc || settings.customBellData;\n    if (source === 'local' && customSrc) {\n      const bell = new Audio(customSrc);\n      bell.loop = true;\n      bell.preload = 'auto';\n      activeBellAudio = bell;\n      try {\n        await bell.play();\n        activeBellMode = 'custom';\n        showBellStopToast();\n        scheduleBellUnattendedAction();\n        return true;\n      } catch (playErr) {\n        console.warn('Custom bell play failed, fallback to tone', playErr);\n        activeBellAudio = null;\n      }\n    }\n    const ac = new (window.AudioContext || window.webkitAudioContext)();\n    if (ac.state === 'suspended') await ac.resume();\n    activeBellContext = ac;\n    function tone(freq, start, dur, vol, offset = ac.currentTime) {\n      const o = ac.createOscillator();\n      const g = ac.createGain();\n      o.connect(g); g.connect(ac.destination);\n      o.type = 'sine';\n      o.frequency.value = freq;\n      g.gain.setValueAtTime(vol, offset + start);\n      g.gain.exponentialRampToValueAtTime(0.001, offset + start + dur);\n      o.start(offset + start);\n      o.stop(offset + start + dur);\n    }\n    const playTonePattern = () => {\n      const base = ac.currentTime;\n      tone(523, 0,    0.3, 0.3, base);\n      tone(659, 0.2,  0.3, 0.3, base);\n      tone(784, 0.4,  0.5, 0.3, base);\n    };\n    playTonePattern();\n    clearTimeout(activeToneLoopTimer);\n    const loopTonePattern = () => {\n      playTonePattern();\n      activeToneLoopTimer = setTimeout(loopTonePattern, TONE_LOOP_INTERVAL_MS);\n    };\n    activeToneLoopTimer = setTimeout(loopTonePattern, TONE_LOOP_INTERVAL_MS);\n    activeBellMode = 'tone';\n    showBellStopToast();\n    scheduleBellUnattendedAction();\n    return true;\n  } catch(e) {\n    stopDoneSound(false);\n    return false;\n  }\n}\n\nfunction stopDoneSound(hideSnackbar = true) {\n  clearTimeout(unattendedBellTimer);\n  unattendedBellTimer = null;\n  clearTimeout(activeBellStopTimer);\n  activeBellStopTimer = null;\n  clearTimeout(activeToneLoopTimer);\n  activeToneLoopTimer = null;\n  hideBellStopToast();\n  if (activeBellAudio) {\n    try {\n      activeBellAudio.pause();\n      activeBellAudio.currentTime = 0;\n      activeBellAudio.src = '';\n    } catch(e) {}\n    activeBellAudio = null;\n  }\n  if (activeBellContext) {\n    try { activeBellContext.close(); } catch(e) {}\n    activeBellContext = null;\n  }\n  const frame = document.getElementById('neteaseBgFrame');\n  const wrap = document.getElementById('finishMusicWrap');\n  if (frame) frame.src = '';\n  if (wrap) wrap.style.display = 'none';\n  activeBellMode = null;\n  if (hideSnackbar) {\n    document.getElementById('snackbar').classList.remove('show');\n  }\n}\n\n// ============================================================\n// CARD RENDERING\n// ============================================================\nfunction updateArenaLayout() {\n  const arena = document.getElementById('timer-arena');\n  arena.className = '';\n  const visibleCount = getVisibleTimers().length;\n  if (visibleCount === 2) arena.classList.add('split-2');\n  if (visibleCount >= 3) arena.classList.add('split-3');\n  const label = document.getElementById('timersLabel');\n  const empty  = document.getElementById('emptyState');\n  if (timers.length > 0) {\n    label.style.display = 'block';\n    empty.style.display  = 'none';\n  } else {\n    label.style.display = 'none';\n    empty.style.display  = 'flex';\n  }\n  renderPageControls();\n}\n\nfunction totalPages() {\n  if (timers.length <= 3) return 1;\n  return settings.layoutMode === 'carousel'\n    ? timers.length\n    : Math.ceil(timers.length / 3);\n}\n\nfunction getVisibleTimers() {\n  if (timers.length <= 3) return timers;\n  const pages = totalPages();\n  currentPage = Math.max(0, Math.min(currentPage, pages - 1));\n  if (settings.layoutMode === 'grouped') {\n    const start = currentPage * 3;\n    return timers.slice(start, start + 3);\n  }\n  const start = currentPage;\n  return timers.slice(start, start + 3);\n}\n\nfunction setPage(page) {\n  currentPage = Math.max(0, Math.min(page, totalPages() - 1));\n  renderAll();\n}\n\nfunction renderPageControls() {\n  const wrap = document.getElementById('timerPageControls');\n  if (!wrap) return;\n  const pages = totalPages();\n  if (timers.length <= 3 || pages <= 1) {\n    wrap.style.display = 'none';\n    wrap.innerHTML = '';\n    return;\n  }\n  wrap.style.display = 'flex';\n  wrap.innerHTML = Array.from({ length: pages }, (_, i) =>\n    `<button class=\"mini-fab${i===currentPage?' active':''}\" onclick=\"setPage(${i})\">${i+1}</button>`\n  ).join('');\n}\n\nfunction renderAll() {\n  updateArenaLayout();\n  const arena = document.getElementById('timer-arena');\n  const visibleTimers = getVisibleTimers();\n  // Sync DOM with state\n  const existingIds = [...arena.querySelectorAll('.timer-card')].map(e => e.id.replace('card-',''));\n  const stateIds = visibleTimers.map(t => t.id);\n  // Remove cards not in state\n  existingIds.forEach(id => {\n    if (!stateIds.includes(id)) {\n      const el = document.getElementById('card-' + id);\n      if (el) el.remove();\n    }\n  });\n  // Add/update cards\n  visibleTimers.forEach(t => {\n    const existing = document.getElementById('card-' + t.id);\n    if (!existing) {\n      const el = buildCard(t);\n      arena.appendChild(el);\n    } else {\n      refreshTimerDisplay(t.id);\n      refreshCardControls(t.id);\n    }\n  });\n  renderStats();\n  renderSettingsUI();\n}\n\nfunction buildCard(t) {\n  const el = document.createElement('div');\n  el.className = 'timer-card';\n  el.id = 'card-' + t.id;\n  el.innerHTML = cardHTML(t);\n  return el;\n}\n\nfunction cardHTML(t) {\n  const p = pct(t);\n  const dashOffset = RING_CIRC * (1 - p);\n  const color = t.color;\n  const icon  = SUBJ_ICONS[t.subj] || '⏱️';\n  const statusLabel = statusText(t);\n  const statusBg    = t.done ? '#e6f4ea' : t.running ? '#e8f0fe' : t.paused ? '#fce8b2' : '#f1f3f4';\n  const statusColor = t.done ? '#34a853' : t.running ? '#1a73e8' : t.paused ? '#f29900' : '#5f6368';\n  const dotColor    = t.done ? '#34a853' : t.running ? '#1a73e8' : t.paused ? '#fbbc04' : '#dadce0';\n  const timeColor   = t.done ? '#34a853' : (t.left < 60 && t.left > 0) ? '#ea4335' : '#202124';\n  const playIcon    = t.running ? 'pause' : 'play_arrow';\n  const playClass   = t.running ? 'running' : t.done ? 'done' : '';\n  const marks       = t.marks ? ` · ${t.marks} marks` : '';\n  const paperLine   = t.paper ? `${t.paper}${marks}` : (t.dur ? fmtDur(t.dur) : '');\n  const safeName = esc(t.name);\n  const safePaper = esc(paperLine);\n  const safeNote = esc(t.note || '');\n\n  return `\n    <div class=\"card-strip\" style=\"background:${stripForColor(color)};\"></div>\n    <div class=\"card-header\">\n      <div class=\"card-header-left\">\n        <div class=\"subj-icon\" style=\"background:${color}18;font-size:20px;\">${icon}</div>\n        <div class=\"subj-info\">\n          <div class=\"subj-name\" contenteditable=\"true\" style=\"color:${color};\"\n            onblur=\"saveTimerName('${t.id}', this.textContent)\"\n            onkeydown=\"editableKeydown(event,this)\">${safeName}</div>\n          <div class=\"subj-paper\"><span class=\"editable-dur\" onclick=\"editTimerDuration('${t.id}')\" title=\"点击编辑时长\">${safePaper}</span></div>\n        </div>\n      </div>\n      <div class=\"card-header-actions\">\n         <button class=\"icon-btn\" onclick=\"openEditModal('${t.id}')\" title=\"${getLanguage() === 'en' ? 'Edit' : '编辑'}\">\n          <span class=\"material-icons-round\" style=\"font-size:20px;\">edit</span>\n        </button>\n         <button class=\"icon-btn\" onclick=\"openFullscreen('${t.id}')\" title=\"${getLanguage() === 'en' ? 'Fullscreen' : '全屏'}\">\n          <span class=\"material-icons-round\" style=\"font-size:20px;\">open_in_full</span>\n        </button>\n         <button class=\"icon-btn\" onclick=\"removeTimer('${t.id}')\" title=\"${getLanguage() === 'en' ? 'Close' : '关闭'}\" style=\"color:var(--md-error);\">\n          <span class=\"material-icons-round\" style=\"font-
